<script>
const BOOK_ID='13-no-rush';const BOOK_TITLE='毛毛不慌';const BOOK_TOTAL=7;
function getInteractionLayer(el){if(!el)return null;if(el._interactionLayer)return el._interactionLayer;const isSvgGroup=el.namespaceURI==='http://www.w3.org/2000/svg'&&el.tagName.toLowerCase()==='g';if(!isSvgGroup||!el.hasAttribute('transform')){el._interactionLayer=el;return el}const layer=document.createElementNS('http://www.w3.org/2000/svg','g');layer.setAttribute('data-interaction-layer','');if(el.classList.contains('float')){el.classList.remove('float');layer.classList.add('float');layer.style.animationDelay=el.style.animationDelay||'';el.style.animationDelay=''}while(el.firstChild)layer.appendChild(el.firstChild);el.appendChild(layer);el._interactionLayer=layer;return layer}
function placeSpeechBubble(scene,el,msg){const er=el.getBoundingClientRect(),sr=scene.getBoundingClientRect(),b=document.createElement('div');b.className='speech-bubble';b.textContent=msg;b.style.maxWidth=Math.max(120,sr.width-24)+'px';b.style.overflow='hidden';b.style.textOverflow='ellipsis';b.style.whiteSpace='nowrap';scene.appendChild(b);const br=b.getBoundingClientRect();let left=er.left+er.width/2-sr.left,top=er.top-sr.top-br.height-10;if(top<8)top=Math.min(sr.height-br.height-8,er.bottom-sr.top+10);left=Math.max(12+br.width/2,Math.min(sr.width-12-br.width/2,left));Array.from(scene.querySelectorAll('.speech-bubble')).filter(x=>x!==b).forEach(other=>{const or=other.getBoundingClientRect();const overlaps=!(left+br.width/2<or.left-sr.left||left-br.width/2>or.right-sr.left||top+br.height<or.top-sr.top||top>or.bottom-sr.top);if(overlaps)top=Math.min(sr.height-br.height-8,or.bottom-sr.top+8)});b.style.left=left+'px';b.style.top=Math.max(8,top)+'px';b.style.transform='translateX(-50%)';setTimeout(()=>b.remove(),1500)}
function makeInteractive(el,animClass,msg){if(!el)return;const target=getInteractionLayer(el);el.classList.add('interactive');el.addEventListener('click',function(){if(el._busy)return;el._busy=true;target.classList.remove(animClass);void target.getBoundingClientRect();target.classList.add(animClass);if(msg){const scene=el.closest('.scene');if(scene)placeSpeechBubble(scene,el,msg)}setTimeout(()=>{target.classList.remove(animClass);el._busy=false},750)})}
const pages=document.querySelectorAll('.page'),total=pages.length,dots=document.getElementById('dots');let current=0;for(let i=0;i<total;i++){const d=document.createElement('span');if(i===0)d.classList.add('is-active');dots.appendChild(d)}function goTo(idx){if(idx<0||idx>=total)return;speechSynthesis.cancel();pages.forEach((p,i)=>p.classList.toggle('is-active',i===idx));dots.querySelectorAll('span').forEach((s,i)=>s.classList.toggle('is-active',i===idx));current=idx;document.getElementById('prev').disabled=idx===0;document.getElementById('next').disabled=idx===total-1;if(window.FO)FO.logProgress(BOOK_ID,idx,BOOK_TOTAL)}document.getElementById('prev').addEventListener('click',()=>goTo(current-1));document.getElementById('next').addEventListener('click',()=>goTo(current+1));document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo(current-1);if(e.key==='ArrowRight')goTo(current+1)});let _tx=0;document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX},{passive:true});document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-_tx;if(Math.abs(dx)>50)dx<0?goTo(current+1):goTo(current-1)});document.getElementById('readBtn').addEventListener('click',()=>{const text=pages[current].dataset.text;if(!text||!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=.85;u.pitch=1.1;speechSynthesis.speak(u)});goTo(0);makeInteractive(document.getElementById('p1-maomao'),'do-shake','有点紧张……');makeInteractive(document.getElementById('p1-dad'),'do-bounce','我陪你练');makeInteractive(document.getElementById('p2-maomao'),'do-shake','越急越乱');makeInteractive(document.getElementById('p3-dad'),'do-bounce','先慢下来');makeInteractive(document.getElementById('p3-maomao'),'do-wobble','时间是朋友？');makeInteractive(document.getElementById('p4-maomao'),'do-bounce','一段一段来');makeInteractive(document.getElementById('p4-dad'),'do-bounce','对，就这样');makeInteractive(document.getElementById('p5-maomao'),'do-bounce','呼——');makeInteractive(document.getElementById('p6-maomao'),'do-bounce','我讲完啦！');makeInteractive(document.getElementById('p6-dad'),'do-bounce','真稳');makeInteractive(document.getElementById('p6-doudou'),'do-bounce','鼓掌！');document.addEventListener('DOMContentLoaded',()=>{if(window.FO)FO.logHistory(BOOK_ID,BOOK_TITLE)});
</script>
