<script>
  const BOOK_ID = '09-good-direction'; const BOOK_TITLE = '毛毛的好方向'; const BOOK_TOTAL = 7;
  function getInteractionLayer(el) {
    if (!el) return null;
    if (el._interactionLayer) return el._interactionLayer;
    const isSvgGroup = el.namespaceURI === 'http://www.w3.org/2000/svg' && el.tagName.toLowerCase() === 'g';
    if (!isSvgGroup || !el.hasAttribute('transform')) {
      el._interactionLayer = el;
      return el;
    }
    const layer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    layer.setAttribute('data-interaction-layer', '');
    if (el.classList.contains('float')) {
      el.classList.remove('float');
      layer.classList.add('float');
      layer.style.animationDelay = el.style.animationDelay || '';
      el.style.animationDelay = '';
    }
    while (el.firstChild) layer.appendChild(el.firstChild);
    el.appendChild(layer);
    el._interactionLayer = layer;
    return layer;
  }

  function placeSpeechBubble(scene, el, msg) {
    const er = el.getBoundingClientRect();
    const sr = scene.getBoundingClientRect();
    const b = document.createElement('div');
    b.className = 'speech-bubble';
    b.textContent = msg;
    b.style.maxWidth = Math.max(120, sr.width - 24) + 'px';
    b.style.overflow = 'hidden';
    b.style.textOverflow = 'ellipsis';
    b.style.whiteSpace = 'nowrap';
    scene.appendChild(b);

    const br = b.getBoundingClientRect();
    let left = er.left + er.width / 2 - sr.left;
    let top = er.top - sr.top - br.height - 10;
    if (top < 8) top = Math.min(sr.height - br.height - 8, er.bottom - sr.top + 10);
    left = Math.max(12 + br.width / 2, Math.min(sr.width - 12 - br.width / 2, left));

    const bubbles = Array.from(scene.querySelectorAll('.speech-bubble')).filter(x => x !== b);
    for (const other of bubbles) {
      const or = other.getBoundingClientRect();
      const overlaps = !(left + br.width / 2 < or.left - sr.left || left - br.width / 2 > or.right - sr.left || top + br.height < or.top - sr.top || top > or.bottom - sr.top);
      if (overlaps) top = Math.min(sr.height - br.height - 8, or.bottom - sr.top + 8);
    }

    b.style.left = left + 'px';
    b.style.top = Math.max(8, top) + 'px';
    b.style.transform = 'translateX(-50%)';
    setTimeout(() => b.remove(), 1500);
  }

  function makeInteractive(el, animClass, msg) {
    if (!el) return;
    const target = getInteractionLayer(el);
    el.classList.add('interactive');
    el.addEventListener('click', function () {
      if (el._busy) return;
      el._busy = true;
      target.classList.remove(animClass);
      void target.getBoundingClientRect();
      target.classList.add(animClass);
      if (msg) {
        const scene = el.closest('.scene');
        if (scene) placeSpeechBubble(scene, el, msg);
      }
      setTimeout(() => { target.classList.remove(animClass); el._busy = false; }, 750);
    });
  }
  const pages = document.querySelectorAll('.page'), total = pages.length;
  const dotsEl = document.getElementById('dots'); let current = 0;
  for (let i = 0; i < total; i++) { const d = document.createElement('span'); if (i === 0) d.classList.add('is-active'); dotsEl.appendChild(d); }
  function goTo(idx) {
    if (idx < 0 || idx >= total) return;
    speechSynthesis.cancel();
    if (idx === current) {
      pages.forEach((p, i) => { p.classList.toggle('is-active', i === idx); p.classList.remove('flip-out-fwd','flip-in-fwd','flip-out-bwd','flip-in-bwd'); p.style.opacity=''; p.style.pointerEvents=''; });
      current = idx; document.getElementById('prev').disabled = idx === 0; document.getElementById('next').disabled = idx === total-1;
      dotsEl.querySelectorAll('span').forEach((s, i) => s.classList.toggle('is-active', i === idx));
      if (window.FO) FO.logProgress(BOOK_ID, idx, BOOK_TOTAL); return;
    }
    const dir = idx > current ? 'fwd' : 'bwd';
    const outClass = dir==='fwd'?'flip-out-fwd':'flip-out-bwd', inClass = dir==='fwd'?'flip-in-fwd':'flip-in-bwd';
    const oldPage = pages[current], newPage = pages[idx];
    newPage.style.opacity='0'; newPage.style.pointerEvents='none';
    oldPage.classList.add(outClass); newPage.classList.add(inClass);
    function cleanup() {
      oldPage.classList.remove('is-active', outClass); newPage.classList.remove(inClass);
      oldPage.style.opacity=''; newPage.style.opacity=''; newPage.style.pointerEvents='';
      newPage.classList.add('is-active'); current = idx;
      document.getElementById('prev').disabled = idx === 0; document.getElementById('next').disabled = idx === total-1;
      dotsEl.querySelectorAll('span').forEach((s, i) => s.classList.toggle('is-active', i === idx));
      if (window.FO) FO.logProgress(BOOK_ID, idx, BOOK_TOTAL);
    }
    newPage.addEventListener('animationend', cleanup, { once: true });
  }
  document.getElementById('prev').addEventListener('click', () => goTo(current-1));
  document.getElementById('next').addEventListener('click', () => goTo(current+1));
  document.addEventListener('keydown', e => { if (e.key==='ArrowLeft') goTo(current-1); if (e.key==='ArrowRight') goTo(current+1); });
  let _tx = 0;
  document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => { const dx = e.changedTouches[0].clientX - _tx; if (Math.abs(dx)>50) dx<0?goTo(current+1):goTo(current-1); });
  document.getElementById('readBtn').addEventListener('click', () => {
    const text = pages[current].dataset.text;
    if (!text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='zh-CN'; u.rate=0.85; u.pitch=1.1; speechSynthesis.speak(u);
  });
  goTo(0);
  makeInteractive(document.getElementById('p1-maomao'), 'do-wobble', '我要做最棒的菜！🍳');
  makeInteractive(document.getElementById('p2-maomao'), 'do-shake', '怎么失败了！😤');
  makeInteractive(document.getElementById('p3-maomao'), 'do-wobble', '呜呜呜 😢');
  makeInteractive(document.getElementById('p4-dad'), 'do-bounce', '先想清楚哦 🧭');
  makeInteractive(document.getElementById('p5-maomao'), 'do-bounce', '我想通了！💡');
  makeInteractive(document.getElementById('p6-maomao'), 'do-bounce', '向好方向出发！🚀');
  document.addEventListener('DOMContentLoaded', () => { if (window.FO) FO.logHistory(BOOK_ID, BOOK_TITLE); });
</script>
</body>
</html>
