<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "LXGW WenKai TC", "LXGW WenKai", serif; background: #FFF8E0; min-height: 100vh; overflow: hidden; }
  .book { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
  .top { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; z-index: 20; }
  .back { text-decoration: none; color: #5C4F3D; font-size: 16px; background: rgba(255,255,255,0.7); padding: 8px 16px; border-radius: 999px; backdrop-filter: blur(8px); }
  .read-aloud { background: #F4C13E; color: #2B2419; border: 0; padding: 10px 18px; border-radius: 999px; font-family: inherit; font-size: 16px; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
  .read-aloud:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
  .page { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px 40px 120px; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
  .page.is-active { opacity: 1; pointer-events: auto; }
  .page[data-bg="cream"] { background: #FFF8E0; }
  .page[data-bg="peach"] { background: #FBE3D5; }
  .page[data-bg="mint"] { background: #D7EBC9; }
  .page[data-bg="sky"] { background: #D7E7F4; }
  .page[data-bg="yellow"] { background: #FBE39A; }
  .scene { flex: 1; min-height: 0; position: relative; width: 100%; overflow: hidden; }
  .scene svg { width: 100%; height: 100%; }
  .text { flex-shrink: 0; text-align: center; max-width: 100%; }
  .text h2 { font-size: clamp(24px, 5vw, 38px); line-height: 1.4; color: #2B2419; font-weight: 500; text-wrap: balance; }
  .text .big { font-size: clamp(32px, 6vw, 52px); line-height: 1.3; color: #2B2419; font-weight: 700; margin-top: 12px; }
  .text .small { font-size: 18px; color: #5C4F3D; margin-top: 16px; }
  .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.88); border: 0; width: 56px; height: 56px; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,0.1); font-family: inherit; color: #2B2419; z-index: 20; backdrop-filter: blur(4px); }
  .nav-btn:disabled { opacity: 0.3; pointer-events: none; }
  .nav-btn:active { transform: translateY(calc(-50% + 1px)); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
  #prev { left: 12px; } #next { right: 12px; }
  .dots-wrap { position: absolute; bottom: 24px; left: 0; right: 0; display: flex; justify-content: center; z-index: 20; }
  .dots { display: flex; gap: 6px; }
  .dots span { width: 8px; height: 8px; border-radius: 50%; background: rgba(43,36,25,0.2); transition: background 0.3s, transform 0.3s; }
  .dots span.is-active { background: #F4C13E; transform: scale(1.4); }
  .float { animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .end-card { background: white; padding: 32px; border-radius: 24px; max-width: 480px; box-shadow: 0 8px 0 rgba(0,0,0,0.06), 0 24px 48px -16px rgba(0,0,0,0.2); text-align: center; }
  .end-card h2 { font-size: 28px; color: #2B2419; margin-bottom: 16px; }
  .end-card p { font-size: 19px; color: #2B2419; line-height: 1.7; margin-bottom: 12px; }
  .interactive { cursor: pointer; transform-box: fill-box; transform-origin: center center; }
  .interactive:hover { opacity: 0.9; }
  .do-bounce { animation: iBounce 0.6s cubic-bezier(0.36,0.07,0.19,0.97) both !important; }
  @keyframes iBounce { 0% { transform: translateY(0) scale(1); } 25% { transform: translateY(-18px) scale(1.15); } 55% { transform: translateY(-4px) scale(0.96); } 75% { transform: translateY(-8px) scale(1.05); } 100% { transform: translateY(0) scale(1); } }
  .do-shake { animation: iShake 0.55s ease both !important; }
  @keyframes iShake { 0%,100% { transform: rotate(0deg); } 18% { transform: rotate(-22deg); } 38% { transform: rotate(18deg); } 58% { transform: rotate(-14deg); } 78% { transform: rotate(9deg); } }
  .do-wobble { animation: iWobble 0.7s ease both !important; }
  @keyframes iWobble { 0%,100% { transform: scaleX(1) scaleY(1); } 20% { transform: scaleX(1.25) scaleY(0.75); } 45% { transform: scaleX(0.85) scaleY(1.2); } 65% { transform: scaleX(1.1) scaleY(0.9); } 80% { transform: scaleX(0.96) scaleY(1.04); } }
  .speech-bubble { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: white; border-radius: 999px; padding: 6px 16px; font-size: 20px; font-family: "LXGW WenKai TC", serif; box-shadow: 0 3px 0 rgba(0,0,0,0.12); pointer-events: none; white-space: nowrap; z-index: 50; animation: bPop 0.3s ease; }
  @keyframes bPop { from { transform: translateX(-50%) scale(0); opacity: 0; } to { transform: translateX(-50%) scale(1); opacity: 1; } }

  /* — page flip — */
  .book { perspective: 1400px; }
  .page { backface-visibility: hidden; }
  .flip-out-fwd { animation: fOutFwd 0.4s cubic-bezier(0.4,0,1,1) forwards; pointer-events: none; z-index: 5; opacity: 1; transform-origin: left center; }
  .flip-in-fwd  { animation: fInFwd 0.4s cubic-bezier(0,0,0.6,1) forwards; pointer-events: none; z-index: 4; transform-origin: right center; }
  .flip-out-bwd { animation: fOutBwd 0.4s cubic-bezier(0.4,0,1,1) forwards; pointer-events: none; z-index: 5; opacity: 1; transform-origin: right center; }
  .flip-in-bwd  { animation: fInBwd 0.4s cubic-bezier(0,0,0.6,1) forwards; pointer-events: none; z-index: 4; transform-origin: left center; }
  @keyframes fOutFwd { 0% { transform: rotateY(0deg); opacity: 1; } 100% { transform: rotateY(-80deg); opacity: 0; } }
  @keyframes fInFwd  { 0% { transform: rotateY(80deg); opacity: 0; } 100% { transform: rotateY(0deg); opacity: 1; } }
  @keyframes fOutBwd { 0% { transform: rotateY(0deg); opacity: 1; } 100% { transform: rotateY(80deg); opacity: 0; } }
  @keyframes fInBwd  { 0% { transform: rotateY(-80deg); opacity: 0; } 100% { transform: rotateY(0deg); opacity: 1; } }

<div class="book">

      <g transform="translate(150,235)"><ellipse cx="0" cy="0" rx="33" ry="36" fill="#FFFDF6"/><circle cx="0" cy="-40" r="28" fill="#FFFDF6"/><circle cx="-10" cy="-43" r="4" fill="#2B2419"/><circle cx="11" cy="-43" r="4" fill="#2B2419"/><polygon points="0,-34 15,-30 0,-26" fill="#E56B5A"/><path d="M-9,-26 Q0,-19 9,-26" stroke="#2B2419" stroke-width="2" fill="none"/></g>

      <g stroke="#D7E7F4" stroke-width="4" fill="none" stroke-linecap="round"><path d="M30,245 Q70,230 110,245"/><path d="M180,260 Q220,245 260,260"/><path d="M290,225 Q330,210 370,225"/></g>
      <g id="p4-mao" transform="translate(190,225)"><ellipse cx="0" cy="0" rx="36" ry="24" fill="#FFFDF6"/><circle cx="22" cy="-20" r="23" fill="#FFFDF6"/><circle cx="15" cy="-22" r="3" fill="#2B2419"/><circle cx="29" cy="-22" r="3" fill="#2B2419"/><polygon points="23,-15 34,-12 23,-9" fill="#E56B5A"/><ellipse cx="-28" cy="0" rx="8" ry="20" fill="#FBE39A" transform="rotate(-55 -28 0)"/></g>
      <g transform="translate(310,160)"><ellipse cx="0" cy="0" rx="31" ry="35" fill="#FFFDF6"/><circle cx="0" cy="-38" r="25" fill="#FFFDF6"/><circle cx="-8" cy="-40" r="3" fill="#2B2419"/><circle cx="8" cy="-40" r="3" fill="#2B2419"/><polygon points="0,-32 12,-29 0,-26" fill="#E56B5A"/><ellipse cx="-30" cy="-12" rx="8" ry="20" fill="#FBE39A" transform="rotate(-35 -30 -12)"/><ellipse cx="30" cy="-12" rx="8" ry="20" fill="#FBE39A" transform="rotate(35 30 -12)"/></g>
    </svg></div>
    <div class="text"><h2>走着走着——遇到一条<span style="color:#4B7BA8;">小河</span>！</h2><p class="small">毛毛扑通跳下去，<br>学会了游泳！</p></div>
  </div>

  <div class="page" data-bg="mint" data-text="走了好久。没有到山顶，也没有到大海。但他们找到了——一片最美的草地。">
    <div class="scene"><svg viewBox="0 0 400 320">
      <ellipse cx="200" cy="235" rx="190" ry="75" fill="#6FA86D" opacity="0.7"/>
      <g id="p5-flowers"><g fill="#E56B5A"><circle cx="85" cy="230" r="5"/><circle cx="93" cy="224" r="5"/><circle cx="101" cy="230" r="5"/></g><circle cx="93" cy="230" r="4" fill="#F4C13E"/><g fill="#F4C13E"><circle cx="300" cy="235" r="5"/><circle cx="308" cy="229" r="5"/><circle cx="316" cy="235" r="5"/></g><circle cx="308" cy="235" r="4" fill="#E56B5A"/></g>
      <g transform="translate(175,215)"><ellipse cx="0" cy="0" rx="32" ry="36" fill="#FFFDF6"/><circle cx="0" cy="-40" r="28" fill="#FFFDF6"/><circle cx="-9" cy="-42" r="3.5" fill="#2B2419"/><circle cx="9" cy="-42" r="3.5" fill="#2B2419"/><polygon points="0,-33 12,-30 0,-27" fill="#E56B5A"/><ellipse cx="30" cy="-8" rx="8" ry="18" fill="#FBE39A" transform="rotate(42 30 -8)"/></g>

  <div class="page" data-bg="yellow" data-text="先选一个方向，再慢慢走。路上遇到的，都是惊喜。不用想太多目标，方向对了，慢慢来就好。">
    <div class="end-card">
      <h2>给小弟弟 ❤️</h2>

<script src="../fo-utils.js"></script>
<script>
  const BOOK_ID = '06-the-direction'; const BOOK_TITLE = '毛毛的路'; const BOOK_TOTAL = 5;
  function makeInteractive(el, animClass, msg) { if (!el) return; el.classList.add('interactive'); el.addEventListener('click', function () { if (el._busy) return; el._busy = true; el.classList.remove(animClass); void el.getBoundingClientRect(); el.classList.add(animClass); if (msg) { const scene = el.closest('.scene'); const er = el.getBoundingClientRect(); const sr = scene.getBoundingClientRect(); const cx = er.left + er.width / 2 - sr.left; const cy = Math.max(8, er.top - sr.top - 48); const b = document.createElement('div'); b.className = 'speech-bubble'; b.textContent = msg; b.style.left = cx + 'px'; b.style.top = cy + 'px'; b.style.transform = 'translateX(-50%)'; scene.appendChild(b); setTimeout(() => b.remove(), 1500); } setTimeout(() => { el.classList.remove(animClass); el._busy = false; }, 750); }); }
  const pages = document.querySelectorAll('.page'); const total = pages.length; const dots = document.getElementById('dots'); let current = 0;
  for (let i = 0; i < total; i++) { const d = document.createElement('span'); if (i === 0) d.classList.add('is-active'); dots.appendChild(d); }
  function goTo(idx) {
    if (idx < 0 || idx >= total) return;
    speechSynthesis.cancel();

    if (idx === current) {
      pages.forEach((p, i) => {
        p.classList.toggle('is-active', i === idx);
        p.classList.remove('flip-out-fwd', 'flip-in-fwd', 'flip-out-bwd', 'flip-in-bwd');
        p.style.opacity = '';
        p.style.pointerEvents = '';
      });
      current = idx;
      document.getElementById('prev').disabled = idx === 0;
      document.getElementById('next').disabled = idx === total - 1;
      dots.querySelectorAll('span').forEach((s, i) => s.classList.toggle('is-active', i === idx));
      if (window.FO) FO.logProgress(BOOK_ID, idx, BOOK_TOTAL);
      return;
    }

    const dir = idx > current ? 'fwd' : 'bwd';
    const outClass = dir === 'fwd' ? 'flip-out-fwd' : 'flip-out-bwd';
    const inClass  = dir === 'fwd' ? 'flip-in-fwd'  : 'flip-in-bwd';
    const oldPage  = pages[current];
    const newPage  = pages[idx];

    // prepare new page (hidden, no is-active yet)
    newPage.style.opacity = '0';
    newPage.style.pointerEvents = 'none';

    oldPage.classList.add(outClass);
    newPage.classList.add(inClass);

    function cleanup() {
      oldPage.classList.remove('is-active', outClass);
      newPage.classList.remove(inClass);
      oldPage.style.opacity = '';
      newPage.style.opacity = '';
      newPage.style.pointerEvents = '';
      newPage.classList.add('is-active');
      current = idx;
      document.getElementById('prev').disabled = idx === 0;
      document.getElementById('next').disabled = idx === total - 1;
      dots.querySelectorAll('span').forEach((s, i) => s.classList.toggle('is-active', i === idx));
      if (window.FO) FO.logProgress(BOOK_ID, idx, BOOK_TOTAL);
    }

    newPage.addEventListener('animationend', cleanup, { once: true });
  }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1)); document.getElementById('next').addEventListener('click', () => goTo(current + 1)); document.addEventListener('keydown', (e) => { if (e.key === 'ArrowLeft') goTo(current - 1); if (e.key === 'ArrowRight') goTo(current + 1); });
  let _tx = 0; document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true }); document.addEventListener('touchend', e => { const dx = e.changedTouches[0].clientX - _tx; if (Math.abs(dx) > 50) dx < 0 ? goTo(current + 1) : goTo(current - 1); });
  document.getElementById('readBtn').addEventListener('click', () => { const text = pages[current].dataset.text; if (!text || !window.speechSynthesis) return; speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'zh-CN'; u.rate = 0.85; u.pitch = 1.1; speechSynthesis.speak(u); });
  goTo(0);
  makeInteractive(document.getElementById('p1-sign'), 'do-shake', '去哪？🤔');
  makeInteractive(document.getElementById('p2-mao'), 'do-bounce', '向东！🐣');
  makeInteractive(document.getElementById('p3-apple'), 'do-wobble', '香！🍎');
  makeInteractive(document.getElementById('p4-mao'), 'do-wobble', '会游啦！🏊');
  makeInteractive(document.getElementById('p5-flowers'), 'do-wobble', '好美！🌸');
  document.addEventListener('DOMContentLoaded', () => { if (window.FO) FO.logHistory(BOOK_ID, BOOK_TITLE); });
</script>
</body>
