  <!-- PAGE 1 -->
  <div class="page is-active" data-bg="sky" data-text="下雪啦！毛毛跑到雪地里玩。她看见一只小鸟，在白白的雪上踩出一串小脚印。好可爱呀！毛毛想让爸爸也看看。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- falling snow -->
        <g fill="#FFFFFF">
          <circle cx="60" cy="50" r="3"/><circle cx="140" cy="34" r="2.4"/><circle cx="250" cy="46" r="3"/>
          <circle cx="320" cy="30" r="2.4"/><circle cx="356" cy="78" r="2.8"/><circle cx="40" cy="110" r="2.4"/>
        </g>
        <!-- snowy ground -->
        <ellipse cx="200" cy="284" rx="210" ry="46" fill="#FFFDF6"/>
        <!-- bird footprints in snow -->
        <g stroke="#9DB4C9" stroke-width="2" stroke-linecap="round" fill="none">
          <path d="M118 250 l5 4 M118 250 l5 -4 M118 250 l-6 0"/>
          <path d="M140 256 l5 4 M140 256 l5 -4 M140 256 l-6 0"/>
          <path d="M162 250 l5 4 M162 250 l5 -4 M162 250 l-6 0"/>
        </g>
        <!-- little bird -->
        <g id="p1-bird" transform="translate(196,236)">
          <ellipse cx="0" cy="0" rx="16" ry="12" fill="#7FB0D6"/>
          <circle cx="13" cy="-8" r="9" fill="#7FB0D6"/>
          <circle cx="15" cy="-9" r="2" fill="#2B2419"/>

          <line x1="-6" y1="12" x2="-6" y2="18" stroke="#F4C13E" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="12" x2="4" y2="18" stroke="#F4C13E" stroke-width="2" stroke-linecap="round"/>
        </g>
        <!-- 毛毛 looking, delighted -->
        <g id="p1-maomao" transform="translate(296,222)">
          <g class="float">
            <ellipse cx="0" cy="6" rx="22" ry="24" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
            <circle cx="0" cy="-20" r="18" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
            <circle cx="-7" cy="-22" r="3" fill="#2B2419"/>
            <circle cx="6" cy="-22" r="3" fill="#2B2419"/>

            <ellipse cx="-24" cy="2" rx="8" ry="13" fill="#F4C13E" transform="rotate(-40 -24 2)"/>
            <ellipse cx="24" cy="2" rx="8" ry="13" fill="#F4C13E" transform="rotate(40 24 2)"/>

            <rect x="-13" y="-4" width="26" height="7" rx="3" fill="#E56B5A"/>

            <line x1="8" y1="30" x2="11" y2="40" stroke="#E56B5A" stroke-width="2.4" stroke-linecap="round"/>
          </g>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>下雪啦！毛毛看见一只小鸟</h2>
      <p class="small">小鸟在雪上踩出一串小脚印。好可爱呀！</p>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page" data-bg="blue" data-text="毛毛朝屋子大声喊：爸爸，快出来看小鸟！可是话刚出口，呼——就被风吹走了。爸爸在屋里，没听见。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <ellipse cx="200" cy="286" rx="210" ry="42" fill="#FFFDF6"/>
        <!-- house with warm window (dad inside) -->
        <g transform="translate(64,128)">
          <rect x="-6" y="40" width="92" height="78" rx="4" fill="#C98A6A"/>
          <polygon points="-14,40 40,2 94,40" fill="#9B6A4F"/>
          <rect x="20" y="62" width="40" height="36" rx="3" fill="#FBE39A" stroke="#9B6A4F" stroke-width="3"/>

          <!-- snow on roof -->

        <g id="p2-maomao" transform="translate(214,208)">
          <ellipse cx="0" cy="6" rx="22" ry="24" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
          <circle cx="0" cy="-20" r="18" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
          <circle cx="-7" cy="-22" r="3" fill="#2B2419"/>
          <circle cx="6" cy="-22" r="3" fill="#2B2419"/>
          <ellipse cx="-1" cy="-12" rx="4" ry="5" fill="#E56B5A"/>
          <ellipse cx="-24" cy="-2" rx="8" ry="13" fill="#F4C13E" transform="rotate(-66 -24 -2)"/>
          <ellipse cx="24" cy="2" rx="8" ry="13" fill="#F4C13E" transform="rotate(40 24 2)"/>
          <rect x="-13" y="-4" width="26" height="7" rx="3" fill="#E56B5A"/>
          <line x1="-8" y1="30" x2="-11" y2="40" stroke="#E56B5A" stroke-width="2.4" stroke-linecap="round"/>
          <line x1="8" y1="30" x2="11" y2="40" stroke="#E56B5A" stroke-width="2.4" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>"爸爸，快出来看！"</h2>
      <p class="small">话刚出口，呼——就被风吹走了。爸爸没听见。</p>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page" data-bg="peach" data-text="毛毛想了个办法。她踩出一行大脚印，又用小手指在雪上画了一只小鸟。这样，话就留在雪地上啦。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <ellipse cx="200" cy="288" rx="210" ry="44" fill="#FFFDF6"/>
        <!-- 毛毛's big footprint trail -->
        <g fill="#E2C3AE">
          <ellipse cx="92" cy="272" rx="8" ry="5"/>
          <ellipse cx="120" cy="262" rx="8" ry="5"/>
          <ellipse cx="150" cy="270" rx="8" ry="5"/>
          <ellipse cx="178" cy="260" rx="8" ry="5"/>
        </g>
        <!-- drawn bird in the snow (finger drawing) -->
        <g id="p3-drawing" stroke="#4B7BA8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M250 250 q18 -22 40 -6 q10 -16 24 -6"/>
          <path d="M250 250 q14 18 40 10 q18 12 24 -10"/>
          <path d="M314 232 l10 -2"/>
          <circle cx="300" cy="234" r="1.8" fill="#4B7BA8"/>
        </g>
        <!-- 毛毛 crouching, drawing with wing -->
        <g id="p3-maomao" transform="translate(196,212)">
          <ellipse cx="0" cy="8" rx="22" ry="22" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
          <circle cx="0" cy="-16" r="18" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
          <circle cx="-6" cy="-18" r="3" fill="#2B2419"/>
          <circle cx="7" cy="-18" r="3" fill="#2B2419"/>
          <polygon points="2,-11 14,-8 2,-5" fill="#E56B5A"/>
          <path d="M-7,-8 Q1,-3 8,-9" stroke="#2B2419" stroke-width="1.4" fill="none"/>
          <ellipse cx="-22" cy="6" rx="7" ry="12" fill="#F4C13E" transform="rotate(20 -22 6)"/>
          <!-- drawing wing reaching to the snow -->
          <ellipse cx="26" cy="22" rx="7" ry="13" fill="#F4C13E" transform="rotate(54 26 22)"/>
          <rect x="-13" y="0" width="26" height="7" rx="3" fill="#E56B5A"/>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>毛毛想了个办法</h2>
      <p class="small">她在雪上画了一只小鸟——话，就留下来啦！</p>
    </div>
  </div>

  <!-- PAGE 4 -->
  <div class="page" data-bg="sky" data-text="爸爸出来了！他顺着毛毛的脚印走过来，一眼看见雪上的小鸟画。哇，你看见小鸟啦！爸爸一下子就懂了。">

      <svg viewBox="0 0 400 320">

          <circle cx="9" cy="-28" r="8" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.6"/>
          <line x1="-1" y1="-28" x2="1" y2="-28" stroke="#2B2419" stroke-width="1.6"/>

          <ellipse cx="32" cy="8" rx="9" ry="16" fill="#FBE39A" transform="rotate(22 32 8)"/>
        </g>
        <!-- 毛毛 happy, pointing -->
        <g id="p4-maomao" transform="translate(120,214)">
          <ellipse cx="0" cy="6" rx="20" ry="21" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
          <circle cx="0" cy="-16" r="16" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
          <circle cx="-5" cy="-18" r="2.6" fill="#2B2419"/>
          <circle cx="6" cy="-18" r="2.6" fill="#2B2419"/>
          <polygon points="-2,-11 -13,-8 -2,-5" fill="#E56B5A"/>

          <ellipse cx="22" cy="2" rx="6" ry="12" fill="#F4C13E" transform="rotate(-44 22 2)"/>
          <ellipse cx="-20" cy="8" rx="6" ry="11" fill="#F4C13E" transform="rotate(16 -20 8)"/>
          <rect x="-12" y="-3" width="24" height="6" rx="3" fill="#E56B5A"/>
        </g>

    </div>

  <!-- PAGE 5 -->
  <div class="page" data-bg="blue" data-text="第二天早上，太阳出来了。昨天喊的话，早就没有了。可雪上的小鸟，还在那里，等着毛毛。画下来的，就留住了。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- morning sun -->
        <circle cx="328" cy="62" r="26" fill="#F4C13E"/>
        <g stroke="#F4C13E" stroke-width="3" stroke-linecap="round">
          <line x1="328" y1="22" x2="328" y2="32"/><line x1="288" y1="62" x2="298" y2="62"/>
          <line x1="358" y1="62" x2="368" y2="62"/><line x1="300" y1="34" x2="307" y2="41"/>
        </g>
        <ellipse cx="200" cy="286" rx="210" ry="44" fill="#FFFDF6"/>
        <!-- faded crossed-out speech (yesterday's words, gone) -->
        <g opacity="0.4">
          <rect x="60" y="96" width="92" height="34" rx="16" fill="#FFFFFF"/>
          <text x="106" y="118" text-anchor="middle" font-size="14" fill="#8C7C66">昨天的话</text>
          <line x1="64" y1="132" x2="148" y2="94" stroke="#B86A5C" stroke-width="3" stroke-linecap="round"/>
        </g>
        <text x="106" y="156" text-anchor="middle" font-size="12" fill="#5C7896">飞走啦</text>
        <!-- the drawing still here -->
        <g id="p5-drawing" stroke="#4B7BA8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M236 256 q18 -22 40 -6 q10 -16 24 -6"/>
          <path d="M236 256 q14 18 40 10 q18 12 24 -10"/>
          <path d="M300 238 l10 -2"/>
          <circle cx="286" cy="240" r="1.8" fill="#4B7BA8"/>
        </g>
        <text x="280" y="288" text-anchor="middle" font-size="12" fill="#4B7BA8" font-weight="700">还在这儿！</text>
        <!-- 毛毛 happy looking at her drawing -->
        <g id="p5-maomao" transform="translate(150,214)">
          <g class="float">
            <ellipse cx="0" cy="6" rx="20" ry="21" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
            <circle cx="0" cy="-16" r="16" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
            <circle cx="-5" cy="-18" r="2.6" fill="#2B2419"/>
            <circle cx="6" cy="-18" r="2.6" fill="#2B2419"/>
            <polygon points="2,-11 13,-8 2,-5" fill="#E56B5A"/>
            <path d="M-7,-8 Q1,-3 8,-9" stroke="#2B2419" stroke-width="1.4" fill="none"/>
            <ellipse cx="-20" cy="2" rx="6" ry="11" fill="#F4C13E" transform="rotate(18 -20 2)"/>
            <ellipse cx="22" cy="4" rx="6" ry="12" fill="#F4C13E" transform="rotate(-30 22 4)"/>
            <rect x="-12" y="-3" width="24" height="6" rx="3" fill="#E56B5A"/>
          </g>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>第二天，小鸟还在那里</h2>
      <p class="big">画下来的，就留住了。</p>
    </div>
  </div>

  <!-- LAST PAGE — end-card -->
  <div class="page" data-bg="sky" data-text="给小弟弟。说出来的话，一会儿就飞走了。可是画下来、写下来的，明天还在，后天还在。把你想记住的，画下来、写下来吧。">
    <div class="end-card">
      <h2>给小弟弟 ❄️</h2>
      <p>说出来的话，一阵风就吹走了；画下来、写下来的，明天还在等着你。</p>
      <p style="font-size:32px;color:#4B7BA8;font-weight:700;margin:16px 0;">"画下来，就留住了。"</p>
      <p style="font-size:16px;color:#5C4F3D;">想记住的事，想告诉别人的话——画一画、写一写，它就不会跑掉。</p>
      <button class="read-aloud" style="margin-top:24px;" onclick="goTo(0)">🔄 再讲一遍</button>
    </div>
  </div>

  <button class="nav-btn" id="prev" aria-label="上一页">←</button>
  <div class="dots-wrap"><div class="dots" id="dots"></div></div>
  <button class="nav-btn" id="next" aria-label="下一页">→</button>

</div>
<script src="../fo-utils.js"></script>
<script>
  const BOOK_ID = '29-snow-tracks'; const BOOK_TITLE = '毛毛的雪地画'; const BOOK_TOTAL = 6;

  function getInteractionLayer(el) {
    if (!el) return null;
    if (el._interactionLayer) return el._interactionLayer;
    const isSvgGroup = el.namespaceURI === 'http://www.w3.org/2000/svg' && el.tagName.toLowerCase() === 'g';
    if (!isSvgGroup || !el.hasAttribute('transform')) {
      el._interactionLayer = el;
      return el;
    }
    const layer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    layer.setAttribute('data-interaction-layer', '');
    if (el.classList.contains('float')) {
      el.classList.remove('float');
      layer.classList.add('float');
      layer.style.animationDelay = el.style.animationDelay || '';
      el.style.animationDelay = '';
    }
    while (el.firstChild) layer.appendChild(el.firstChild);
    el.appendChild(layer);
    el._interactionLayer = layer;
    return layer;
  }

  function placeSpeechBubble(scene, el, msg) {
    const er = el.getBoundingClientRect();
    const sr = scene.getBoundingClientRect();
    const b = document.createElement('div');
    b.className = 'speech-bubble';
    b.textContent = msg;
    b.style.maxWidth = Math.max(120, sr.width - 24) + 'px';
    b.style.overflow = 'hidden';
    b.style.textOverflow = 'ellipsis';
    b.style.whiteSpace = 'nowrap';
    scene.appendChild(b);

    const br = b.getBoundingClientRect();
    let left = er.left + er.width / 2 - sr.left;
    let top = er.top - sr.top - br.height - 10;
    if (top < 8) top = Math.min(sr.height - br.height - 8, er.bottom - sr.top + 10);
    left = Math.max(12 + br.width / 2, Math.min(sr.width - 12 - br.width / 2, left));

    const bubbles = Array.from(scene.querySelectorAll('.speech-bubble')).filter(x => x !== b);
    for (const other of bubbles) {
      const or = other.getBoundingClientRect();
      const overlaps = !(left + br.width / 2 < or.left - sr.left || left - br.width / 2 > or.right - sr.left || top + br.height < or.top - sr.top || top > or.bottom - sr.top);
      if (overlaps) top = Math.min(sr.height - br.height - 8, or.bottom - sr.top + 8);
    }

    b.style.left = left + 'px';
    b.style.top = Math.max(8, top) + 'px';
    b.style.transform = 'translateX(-50%)';
    setTimeout(() => b.remove(), 1500);
  }

  function makeInteractive(el, animClass, msg) {
    if (!el) return;
    const target = getInteractionLayer(el);
    el.classList.add('interactive');
    el.addEventListener('click', function () {
      if (el._busy) return;
      el._busy = true;
      target.classList.remove(animClass);
      void target.getBoundingClientRect();
      target.classList.add(animClass);
      if (msg) {
        const scene = el.closest('.scene');
        if (scene) placeSpeechBubble(scene, el, msg);
      }
      setTimeout(() => { target.classList.remove(animClass); el._busy = false; }, 750);
    });
  }

  const pages = document.querySelectorAll('.page');
  const total  = pages.length;
  const dots   = document.getElementById('dots');
  let current  = 0;

  for (let i = 0; i < total; i++) {
    const d = document.createElement('span');
    if (i === 0) d.classList.add('is-active');
    dots.appendChild(d);
  }

  function goTo(idx) {
    if (idx < 0 || idx >= total) return;
    speechSynthesis.cancel();
    pages.forEach((p, i) => p.classList.toggle('is-active', i === idx));
    dots.querySelectorAll('span').forEach((s, i) => s.classList.toggle('is-active', i === idx));
    current = idx;
    document.getElementById('prev').disabled = idx === 0;
    document.getElementById('next').disabled = idx === total - 1;
    if (window.FO) FO.logProgress(BOOK_ID, idx, BOOK_TOTAL);
  }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('next').addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  let _tx = 0;
  document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - _tx;
    if (Math.abs(dx) > 50) dx < 0 ? goTo(current + 1) : goTo(current - 1);
  });

  document.getElementById('readBtn').addEventListener('click', () => {
    const text = pages[current].dataset.text;
    if (!text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 0.85; u.pitch = 1.1;
    speechSynthesis.speak(u);
  });

  goTo(0);

  // Interactions — one per scene page
  makeInteractive(document.getElementById('p1-bird'), 'do-bounce', '叽叽 🐦');
  makeInteractive(document.getElementById('p1-maomao'), 'do-bounce', '好可爱呀！🐣');
  makeInteractive(document.getElementById('p2-maomao'), 'do-shake', '爸爸——听不见…');
  makeInteractive(document.getElementById('p3-maomao'), 'do-wobble', '画一只小鸟 ✏️');
  makeInteractive(document.getElementById('p3-drawing'), 'do-bounce', '留在雪上啦');
  makeInteractive(document.getElementById('p4-dad'), 'do-bounce', '哦，是小鸟！');
  makeInteractive(document.getElementById('p4-maomao'), 'do-bounce', '你看你看！');
  makeInteractive(document.getElementById('p5-maomao'), 'do-bounce', '它还在！🐦');
  makeInteractive(document.getElementById('p5-drawing'), 'do-wobble', '留住了 ❄️');

  document.addEventListener('DOMContentLoaded', () => {
    if (window.FO) FO.logHistory(BOOK_ID, BOOK_TITLE);
  });
</script>
<script src="/storybooks/booklist.js"></script>
<script>if (window.FO && window.FO.initBookNav) FO.initBookNav(BOOK_ID);</script>
</body>
