<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>毛毛共学记</title>
<meta name="description" content="关于「一起学，不教训」的绘本动画。">

<meta property="og:description" content="关于「一起学，不教训」的绘本动画。">

<meta property="og:image:height" content="630">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #E56B5A; --coral-soft: #F4A799;
    --yellow: #F4C13E; --yellow-soft: #FBE39A;
    --green: #6FA86D; --green-soft: #B5D4A8;
    --blue: #4B7BA8; --blue-soft: #A8C2DE;
    --cream: #F8F2E2; --cream-deep: #F1E8D0;
    --paper: #FFFDF6;
    --ink: #2B2419; --ink-soft: #5C4F3D; --ink-mute: #8C7C66;
    --shadow-button: 0 3px 0 rgba(43,36,25,0.15);
    --shadow-card: 0 4px 0 rgba(43,36,25,0.06),0 12px 32px -16px rgba(43,36,25,0.18);
    --radius: 18px; --radius-lg: 28px; --radius-full: 999px;
    --page-bg-peach: #FBE3D5;
    --page-bg-mint: #D7EBC9;
    --page-bg-sky: #D7E7F4;
    --glass-nav: rgba(255,255,255,0.7);
    --glass-btn: rgba(255,255,255,0.88);
    --dot-inactive: rgba(43,36,25,0.2);
    --viewport-w: 100vw;
    --viewport-h: 100vh;
    --page-top-pad: 72px;
    --page-bottom-pad: 48px;
    --end-card-max: 480px;
    --end-card-side-gap: 48px;
    --nav-btn-size: 56px;
    --text-h2-fluid: 4.5vw;
    --text-h2-max: 34px;
    --text-big-max: 40px;
    --text-small-fluid: 2.8vw;
    --text-small-min: 14px;
    --text-small-max: 16px;
    --end-card-body: 19px;
    --anim-float-y: -10px;
    --anim-bounce-peak: -18px;
    --anim-bounce-mid1: -4px;
    --anim-bounce-mid2: -8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "LXGW WenKai TC","LXGW WenKai",serif; background: var(--cream); min-height: var(--viewport-h); overflow: hidden; }
  .book { width: var(--viewport-w); height: var(--viewport-h); position: relative; overflow: hidden; }
  .top { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: var(--space-5xl) var(--space-9xl); z-index: 20; }
  .back, .dash-link { text-decoration: none; color: var(--ink-soft); font-size: var(--space-3xl); background: var(--glass-nav); padding: var(--space-md) var(--space-3xl); border-radius: var(--radius-full); backdrop-filter: blur(var(--space-md)); }
  .read-aloud { background: var(--yellow); color: var(--ink); border: 0; padding: var(--radius-md) var(--radius); border-radius: var(--radius-full); font-family: inherit; font-size: var(--space-3xl); cursor: pointer; box-shadow: var(--shadow-button); }
  .read-aloud:active { transform: translateY(var(--size-hairline)); }
  .page { position: absolute; inset: 0; display: flex; flex-direction: column; padding: var(--page-top-pad) 0 var(--page-bottom-pad); opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
  .page.is-active { opacity: 1; pointer-events: auto; }
  .page[data-bg="cream"]  { background: var(--cream); }
  .page[data-bg="peach"]  { background: var(--page-bg-peach); }
  .page[data-bg="mint"]   { background: var(--page-bg-mint); }
  .page[data-bg="sky"]    { background: var(--page-bg-sky); }
  .page[data-bg="yellow"] { background: var(--yellow-soft); }
  .scene { flex: 1; min-height: 0; position: relative; width: 100%; overflow: hidden; }
  .scene svg { width: 100%; height: 100%; }
  .text { flex-shrink: 0; padding: var(--radius-card-inner) var(--space-7xl) var(--space-md); text-align: center; }
  .text h2 { font-size: clamp(var(--space-6xl), var(--text-h2-fluid), var(--text-h2-max)); line-height: 1.4; color: var(--ink); font-weight: 500; text-wrap: balance; }
  .text .big { font-size: clamp(var(--font-size-hero-sm), var(--font-size-hero-fluid), var(--text-big-max)); line-height: 1.3; color: var(--yellow); font-weight: 700; margin-top: var(--space-md); }
  .text .small { font-size: clamp(var(--text-small-min), var(--text-small-fluid), var(--text-small-max)); color: var(--ink-soft); margin-top: var(--space-md); line-height: 1.6; }
  .end-card { margin: auto; background: var(--paper); padding: var(--space-9xl); border-radius: var(--radius-lg); max-width: var(--end-card-max); width: calc(100% - var(--end-card-side-gap)); box-shadow: var(--shadow-card); text-align: center; }
  .end-card h2 { font-size: var(--radius-lg); color: var(--yellow); margin-bottom: var(--space-3xl); }
  .end-card p { font-size: var(--end-card-body); color: var(--ink); line-height: 1.7; margin-bottom: var(--radius-card-inner); }
  .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: var(--glass-btn); border: 0; width: var(--nav-btn-size); height: var(--nav-btn-size); border-radius: var(--radius-full); font-size: var(--space-7xl); cursor: pointer; box-shadow: var(--shadow-button); font-family: inherit; color: var(--ink); z-index: 20; backdrop-filter: blur(var(--radius-xs)); }
  .nav-btn:disabled { opacity: 0.3; pointer-events: none; }
  .nav-btn:active { transform: translateY(calc(-50% + var(--size-hairline))); }
  #prev { left: var(--radius-card-inner); } #next { right: var(--radius-card-inner); }
  .dots-wrap { position: absolute; bottom: var(--space-3xl); left: 0; right: 0; display: flex; justify-content: center; z-index: 20; }
  .dots { display: flex; gap: var(--radius-sm); }
  .dots span { width: var(--space-md); height: var(--space-md); border-radius: var(--radius-full); background: var(--dot-inactive); transition: background 0.3s, transform 0.3s; }
  .dots span.is-active { background: var(--yellow); transform: scale(1.4); }
  .float { animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(var(--anim-float-y)) } }
  .interactive { cursor: pointer; transform-box: fill-box; transform-origin: center center; }
  .interactive:hover { opacity: 0.9; }
  .do-bounce { animation: iBounce 0.6s cubic-bezier(0.36,0.07,0.19,0.97) both !important; }
  @keyframes iBounce {
    0%   { transform: translateY(0) scale(1) }
    25%  { transform: translateY(var(--anim-bounce-peak)) scale(1.15) }
    55%  { transform: translateY(var(--anim-bounce-mid1)) scale(0.96) }
    75%  { transform: translateY(var(--anim-bounce-mid2)) scale(1.05) }
    100% { transform: translateY(0) scale(1) }
  }
  .do-shake { animation: iShake 0.55s ease both !important; }
  @keyframes iShake { 0%,100%{transform:rotate(0deg)} 18%{transform:rotate(-22deg)} 38%{transform:rotate(18deg)} 58%{transform:rotate(-14deg)} 78%{transform:rotate(9deg)} }
  .do-wobble { animation: iWobble 0.7s ease both !important; }
  @keyframes iWobble { 0%,100%{transform:scaleX(1) scaleY(1)} 20%{transform:scaleX(1.25) scaleY(0.75)} 45%{transform:scaleX(0.85) scaleY(1.2)} 65%{transform:scaleX(1.1) scaleY(0.9)} 80%{transform:scaleX(0.96) scaleY(1.04)} }
  .speech-bubble { position: absolute; background: var(--paper); border-radius: var(--radius-full); padding: var(--radius-sm) var(--space-3xl); font-size: var(--space-5xl); font-family: "LXGW WenKai TC",serif; box-shadow: var(--shadow-button); pointer-events: none; white-space: nowrap; z-index: 50; animation: bPop 0.3s ease forwards; }
  @keyframes bPop { from{opacity:0} to{opacity:1} }
  .cb   { fill: var(--paper); stroke: var(--ink); stroke-width: 1.5; }
  .cb-sm{ fill: var(--paper); stroke: var(--ink); stroke-width: 1.3; }
  .ce   { fill: var(--ink); }
  .ck   { fill: var(--coral); }
  .cd   { fill: none; stroke: var(--ink); stroke-linecap: round; }
  .f-paper     { fill: var(--paper); }
  .f-ink       { fill: var(--ink); }
  .f-ink-mute  { fill: var(--ink-mute); }
  .f-coral     { fill: var(--coral); }
  .f-coral-soft{ fill: var(--coral-soft); }
  .f-yellow    { fill: var(--yellow); }
  .f-yellow-soft{ fill: var(--yellow-soft); }
  .f-green     { fill: var(--green); }
  .f-green-soft{ fill: var(--green-soft); }
  .f-blue      { fill: var(--blue); }
  .f-blue-soft { fill: var(--blue-soft); }
  .f-cream     { fill: var(--cream); }
  .f-cream-deep{ fill: var(--cream-deep); }
  .f-none      { fill: none; }
  .s-ink-13{ stroke: var(--ink); stroke-width: 1.3; }
  .s-ink-15{ stroke: var(--ink); stroke-width: 1.5; }
  .s-ink-20{ stroke: var(--ink); stroke-width: 2; }
  .s-yellow    { stroke: var(--yellow); stroke-width: 2; }
  .s-yellow-soft{ stroke: var(--yellow-soft); stroke-width: 2; }
  .s-green-soft{ stroke: var(--green-soft); stroke-width: 2; }
  .s-blue-soft { stroke: var(--blue-soft); stroke-width: 2; }
  .rnd { stroke-linecap: round; }
</style>
</head>
<body>
<div class="book">
  <div class="top">
    <a class="back" href="../for-youngest.html">← 回绘本目录</a>
    <button class="read-aloud" id="readBtn">🔊 念给我听</button>
    <a href="../dashboard.html" class="dash-link" title="仪表盘">📊</a>
  </div>

  <!-- Page 1: 毛毛和豆豆搭积木 -->
  <div class="page is-active" data-bg="mint" data-text="毛毛和豆豆要一起搭一座超高的积木塔！她们已经搭了好高了。">
    <div class="scene"><svg viewBox="0 0 400 300">
      <rect x="0" y="250" width="400" height="50" class="f-green-soft" opacity="0.5"/>
      <!-- Block tower in center, partially built -->
      <g transform="translate(200,210)">
        <rect x="-15" y="32" width="30" height="14" rx="2" class="f-coral"/>
        <rect x="-13" y="18" width="26" height="13" rx="2" class="f-blue"/>
        <rect x="-14" y="5" width="28" height="12" rx="2" class="f-yellow"/>
        <rect x="-12" y="-7" width="24" height="11" rx="2" class="f-green"/>
        <rect x="-13" y="-18" width="26" height="10" rx="2" class="f-coral-soft"/>
        <rect x="-10" y="-28" width="20" height="9" rx="2" class="f-blue-soft"/>
        <!-- top wobble indicator -->
        <text x="0" y="-36" font-size="12" text-anchor="middle" class="f-yellow">！</text>
      </g>
      <!-- Maomao (left, working on tower) -->
      <g id="p1-maomao" transform="translate(145,228)">
        <ellipse cx="0" cy="10" rx="22" ry="24" class="cb"/>
        <circle cx="0" cy="-20" r="18" class="cb"/>
        <circle cx="-6" cy="-23" r="2.8" class="ce"/>
        <circle cx="6" cy="-23" r="2.8" class="ce"/>
        <polygon points="0,-16 10,-12 0,-9" class="ck"/>
        <path d="M -5,-10 Q 0,-5 5,-10" class="cd s-ink-20"/>
        <line x1="16" y1="2" x2="30" y2="-8" class="cd s-ink-20 rnd"/>
      </g>
      <!-- Doudou (right, working on tower) -->
      <g id="p1-doudou" transform="translate(260,235)">
        <ellipse cx="0" cy="7" rx="16" ry="18" class="cb-sm"/>
        <circle cx="0" cy="-15" r="13" class="cb-sm"/>
        <circle cx="-4" cy="-17" r="2" class="ce"/>
        <circle cx="4" cy="-17" r="2" class="ce"/>
        <polygon points="0,-12 7,-9 0,-7" class="ck"/>
        <path d="M -4,-8 Q 0,-4 4,-8" class="cd s-ink-13"/>
        <line x1="-10" y1="2" x2="-22" y2="-6" class="cd s-ink-15 rnd"/>
      </g>
      <!-- Stars around tower -->
      <text x="92" y="115" font-size="16" class="f-yellow">★</text>
      <text x="308" y="120" font-size="12" class="f-yellow">★</text>
    </svg></div>
    <div class="text"><h2>毛毛和豆豆要搭一座超高的积木塔！</h2><p class="small">她们已经搭了好高了。</p></div>
  </div>

  <!-- Page 2: 豆豆放错了，毛毛教训 -->
  <div class="page" data-bg="peach" data-text="豆豆的积木放错了，塔倒了一半。毛毛说：不是这样！你错了！应该放这里！">
    <div class="scene"><svg viewBox="0 0 400 300">
      <rect x="0" y="250" width="400" height="50" class="f-coral-soft" opacity="0.3"/>
      <!-- Fallen blocks -->
      <rect x="162" y="242" width="18" height="12" rx="2" class="f-coral" transform="rotate(-20 171 248)"/>
      <rect x="188" y="238" width="14" height="10" rx="2" class="f-blue" transform="rotate(15 195 243)"/>
      <rect x="210" y="244" width="16" height="11" rx="2" class="f-yellow" transform="rotate(-8 218 249)"/>
      <rect x="235" y="240" width="14" height="10" rx="2" class="f-green" transform="rotate(12 242 245)"/>
      <!-- Remaining small tower -->
      <rect x="188" y="226" width="24" height="12" rx="2" class="f-coral-soft"/>
      <rect x="190" y="214" width="20" height="11" rx="2" class="f-blue-soft"/>
      <!-- Maomao lecturing (pointing left hand) -->
      <g id="p2-maomao" transform="translate(140,220)">
        <ellipse cx="0" cy="10" rx="22" ry="24" class="cb"/>
        <circle cx="0" cy="-20" r="18" class="cb"/>
        <!-- stern eyes -->
        <path d="M -8,-25 Q -6,-27 -4,-25" class="cd s-ink-20"/>
        <path d="M 4,-25 Q 6,-27 8,-25" class="cd s-ink-20"/>
        <polygon points="0,-16 10,-12 0,-9" class="ck"/>
        <path d="M -6,-10 L 6,-10" class="cd s-ink-20 rnd"/>
        <!-- pointing arm -->
        <line x1="18" y1="0" x2="38" y2="-10" class="cd s-ink-20 rnd"/>
        <circle cx="40" cy="-11" r="3" class="f-paper s-ink-15"/>
      </g>
      <!-- Speech bubble: 你错了！ -->
      <g transform="translate(188,152)">
        <rect x="-44" y="-18" width="88" height="32" rx="10" class="f-paper s-coral-soft"/>
        <polygon points="-6,14 6,14 -8,26" class="f-paper s-coral-soft"/>
        <text x="0" y="1" font-size="14" text-anchor="middle" class="f-coral" font-weight="700">不是这样！你错了！</text>
      </g>
      <!-- Doudou standing, head down -->
      <g id="p2-doudou" transform="translate(288,238)">
        <ellipse cx="0" cy="7" rx="16" ry="18" class="cb-sm"/>
        <circle cx="0" cy="-15" r="13" class="cb-sm"/>
        <path d="M -5,-18 Q -4,-21 -3,-18" class="cd s-ink-15"/>
        <path d="M 3,-18 Q 4,-21 5,-18" class="cd s-ink-15"/>
        <polygon points="0,-12 7,-9 0,-7" class="ck"/>
        <path d="M -4,-9 Q 0,-7 4,-9" class="cd s-ink-13"/>
      </g>
    </svg></div>
    <div class="text"><h2>积木倒了！毛毛说：</h2><p class="big">"你错了！应该这样！"</p></div>
  </div>

  <!-- Page 3: 豆豆难过了 -->
  <div class="page" data-bg="sky" data-text="豆豆难过了，低着头，不想搭了。毛毛也不知道该怎么办。">
    <div class="scene"><svg viewBox="0 0 400 300">
      <rect x="0" y="250" width="400" height="50" class="f-blue-soft" opacity="0.3"/>
      <!-- A few scattered blocks remain -->
      <rect x="178" y="244" width="16" height="10" rx="2" class="f-cream-deep" transform="rotate(-5 186 249)"/>
      <rect x="202" y="247" width="14" height="9" rx="2" class="f-cream-deep" transform="rotate(8 209 251)"/>
      <!-- Doudou very sad, head drooping -->
      <g id="p3-doudou" transform="translate(235,235)">
        <ellipse cx="0" cy="7" rx="16" ry="18" class="cb-sm"/>
        <circle cx="0" cy="-15" r="13" class="cb-sm" transform="rotate(10)"/>
        <!-- drooping eyes, crying -->
        <path d="M -6,-18 Q -4,-21 -2,-18" class="cd s-ink-15"/>
        <path d="M 2,-18 Q 4,-21 6,-18" class="cd s-ink-15"/>
        <polygon points="0,-12 7,-9 0,-7" class="ck"/>
        <path d="M -4,-9 Q 0,-12 4,-9" class="cd s-ink-13"/>
        <ellipse cx="-5" cy="-12" rx="1.5" ry="2.5" class="f-blue-soft" opacity="0.8"/>
        <ellipse cx="5" cy="-11" rx="1.5" ry="2.5" class="f-blue-soft" opacity="0.8"/>
      </g>
      <!-- Maomao standing awkwardly (right) -->
      <g id="p3-maomao" transform="translate(148,228)">
        <ellipse cx="0" cy="10" rx="22" ry="24" class="cb"/>
        <circle cx="0" cy="-20" r="18" class="cb"/>
        <path d="M -8,-25 Q -6,-28 -4,-25" class="cd s-ink-15"/>
        <path d="M 4,-25 Q 6,-28 8,-25" class="cd s-ink-15"/>
        <polygon points="0,-16 10,-12 0,-9" class="ck"/>
        <path d="M -4,-10 L 4,-10" class="cd s-ink-20 rnd"/>
      </g>
      <!-- Ellipsis thoughts -->
      <text x="188" y="175" font-size="16" class="f-ink-mute">…</text>
    </svg></div>
    <div class="text"><h2>豆豆难过了，低着头——</h2><p class="small">不想再搭了。</p></div>
  </div>

  <!-- Page 4: 爸爸悄悄走过来 -->
  <div class="page" data-bg="cream" data-text="爸爸悄悄走过来，蹲下来小声对毛毛说：试试换个说法？">
    <div class="scene"><svg viewBox="0 0 400 300">
      <rect x="0" y="250" width="400" height="50" class="f-cream-deep"/>
      <!-- Dad whispering to Maomao -->
      <g id="p4-dad" transform="translate(195,210)">
        <ellipse cx="0" cy="8" rx="30" ry="34" class="cb"/>
        <circle cx="0" cy="-34" r="24" class="cb"/>
        <circle cx="-8" cy="-37" r="6.5" class="f-none s-ink-15"/>
        <circle cx="8" cy="-37" r="6.5" class="f-none s-ink-15"/>
        <line x1="-1.5" y1="-37" x2="1.5" y2="-37" class="f-none s-ink-15"/>
        <polygon points="0,-27 13,-22 0,-18" class="ck"/>
        <path d="M -8,-21 Q 0,-16 8,-21" class="cd s-ink-20"/>
        <!-- whispering hand to mouth -->
        <line x1="-22" y1="-14" x2="-35" y2="-24" class="cd s-ink-20 rnd"/>
        <circle cx="-35" cy="-24" r="4" class="f-paper s-ink-15"/>
      </g>
      <!-- Maomao listening -->
      <g id="p4-maomao" transform="translate(295,228)">
        <ellipse cx="0" cy="10" rx="22" ry="24" class="cb"/>
        <circle cx="0" cy="-20" r="18" class="cb"/>
        <circle cx="-6" cy="-23" r="2.8" class="ce"/>
        <circle cx="6" cy="-23" r="2.8" class="ce"/>
        <polygon points="0,-16 10,-12 0,-9" class="ck"/>
        <!-- thinking look -->
        <path d="M -4,-10 Q 0,-7 4,-10" class="cd s-ink-20"/>
      </g>
      <!-- Whisper bubble -->
      <g transform="translate(240,148)">
        <rect x="-66" y="-20" width="132" height="36" rx="10" class="f-paper s-yellow-soft"/>
        <polygon points="8,16 22,16 6,30" class="f-paper s-yellow-soft"/>
        <text x="0" y="-3" font-size="11" text-anchor="middle" class="f-ink">试试换个说法：</text>
        <text x="0" y="13" font-size="11" text-anchor="middle" class="f-ink-soft">"我们一起想想？"</text>
      </g>
    </svg></div>
    <div class="text"><h2>爸爸悄悄走过来——</h2><p class="small">小声说："试试换个说法？"</p></div>
  </div>

  <!-- Page 5: 毛毛换了说法 -->
  <div class="page" data-bg="yellow" data-text="毛毛想了想，走到豆豆身边，轻轻说：豆豆，我们一起想想怎么搭？">
    <div class="scene"><svg viewBox="0 0 400 300">
      <rect x="0" y="250" width="400" height="50" class="f-yellow" opacity="0.3"/>
      <!-- Maomao approaching gently -->
      <g id="p5-maomao" transform="translate(162,224)">
        <ellipse cx="0" cy="10" rx="22" ry="24" class="cb"/>
        <circle cx="0" cy="-20" r="18" class="cb"/>
        <circle cx="-6" cy="-23" r="2.8" class="ce"/>
        <circle cx="6" cy="-23" r="2.8" class="ce"/>
        <polygon points="0,-16 10,-12 0,-9" class="ck"/>
        <path d="M -6,-10 Q 0,-4 6,-10" class="cd s-ink-20"/>
        <line x1="18" y1="4" x2="36" y2="8" class="cd s-ink-20 rnd"/>
      </g>
      <!-- New speech bubble: 一起想想？ -->
      <g transform="translate(200,155)">
        <rect x="-58" y="-18" width="116" height="32" rx="10" class="f-paper s-yellow"/>
        <polygon points="-8,14 8,14 -4,26" class="f-paper s-yellow"/>
        <text x="0" y="1" font-size="13" text-anchor="middle" class="f-ink" font-weight="700">我们一起想想怎么搭？</text>
      </g>
      <!-- Doudou looking up, surprised pleasantly -->
      <g id="p5-doudou" transform="translate(295,237)">

<script src="../fo-utils.js"></script>
<script>
  const BOOK_ID = '12-learn-together'; const BOOK_TITLE = '毛毛共学记'; const BOOK_TOTAL = 7;

  function getInteractionLayer(el) {
    if (!el) return null;
    if (el._interactionLayer) return el._interactionLayer;
    const isSvgGroup = el.namespaceURI === 'http://www.w3.org/2000/svg' && el.tagName.toLowerCase() === 'g';
    if (!isSvgGroup || !el.hasAttribute('transform')) {
      el._interactionLayer = el;
      return el;
    }
    const layer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    layer.setAttribute('data-interaction-layer', '');
    if (el.classList.contains('float')) {
      el.classList.remove('float');
      layer.classList.add('float');
      layer.style.animationDelay = el.style.animationDelay || '';
      el.style.animationDelay = '';
    }
    while (el.firstChild) layer.appendChild(el.firstChild);
    el.appendChild(layer);
    el._interactionLayer = layer;
    return layer;
  }

  function placeSpeechBubble(scene, el, msg) {
    const er = el.getBoundingClientRect();
    const sr = scene.getBoundingClientRect();
    const b = document.createElement('div');
    b.className = 'speech-bubble';
    b.textContent = msg;
    b.style.maxWidth = Math.max(120, sr.width - 24) + 'px';
    b.style.overflow = 'hidden';
    b.style.textOverflow = 'ellipsis';
    b.style.whiteSpace = 'nowrap';
    scene.appendChild(b);

    const br = b.getBoundingClientRect();
    let left = er.left + er.width / 2 - sr.left;
    let top = er.top - sr.top - br.height - 10;
    if (top < 8) top = Math.min(sr.height - br.height - 8, er.bottom - sr.top + 10);
    left = Math.max(12 + br.width / 2, Math.min(sr.width - 12 - br.width / 2, left));

    const bubbles = Array.from(scene.querySelectorAll('.speech-bubble')).filter(x => x !== b);
    for (const other of bubbles) {
      const or = other.getBoundingClientRect();
      const overlaps = !(left + br.width / 2 < or.left - sr.left || left - br.width / 2 > or.right - sr.left || top + br.height < or.top - sr.top || top > or.bottom - sr.top);
      if (overlaps) top = Math.min(sr.height - br.height - 8, or.bottom - sr.top + 8);
    }

    b.style.left = left + 'px';
    b.style.top = Math.max(8, top) + 'px';
    b.style.transform = 'translateX(-50%)';
    setTimeout(() => b.remove(), 1500);
  }

  function makeInteractive(el, animClass, msg) {
    if (!el) return;
    const target = getInteractionLayer(el);
    el.classList.add('interactive');
    el.addEventListener('click', function () {
      if (el._busy) return;
      el._busy = true;
      target.classList.remove(animClass);
      void target.getBoundingClientRect();
      target.classList.add(animClass);
      if (msg) {
        const scene = el.closest('.scene');
        if (scene) placeSpeechBubble(scene, el, msg);
      }
      setTimeout(() => { target.classList.remove(animClass); el._busy = false; }, 750);
    });
  }

  const pages = document.querySelectorAll('.page');
  const total = pages.length;
  const dotsEl = document.getElementById('dots');
  let current = 0;

  for (let i = 0; i < total; i++) {
    const d = document.createElement('span');
    if (i === 0) d.classList.add('is-active');
    dotsEl.appendChild(d);
  }

  function goTo(idx) {
    if (idx < 0 || idx >= total) return;
    speechSynthesis.cancel();
    pages.forEach((p, i) => p.classList.toggle('is-active', i === idx));
    dotsEl.querySelectorAll('span').forEach((s, i) => s.classList.toggle('is-active', i === idx));
    current = idx;
    document.getElementById('prev').disabled = idx === 0;
    document.getElementById('next').disabled = idx === total - 1;
    if (window.FO) FO.logProgress(BOOK_ID, idx, BOOK_TOTAL);
  }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('next').addEventListener('click', () => goTo(current + 1));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });
  let _tx = 0;
  document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - _tx;
    if (Math.abs(dx) > 50) dx < 0 ? goTo(current + 1) : goTo(current - 1);
  });
  document.getElementById('readBtn').addEventListener('click', () => {
    const text = pages[current].dataset.text;
    if (!text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 0.85; u.pitch = 1.1;
    speechSynthesis.speak(u);
  });

  goTo(0);
  makeInteractive(document.getElementById('p1-maomao'), 'do-wobble', '我们来搭高塔！🧱');
  makeInteractive(document.getElementById('p1-doudou'), 'do-bounce', '一起搭！🧱');
  makeInteractive(document.getElementById('p2-maomao'), 'do-shake', '你错了！😤');
  makeInteractive(document.getElementById('p2-doudou'), 'do-wobble', '……😢');
  makeInteractive(document.getElementById('p3-doudou'), 'do-wobble', '我不想搭了……😞');
  makeInteractive(document.getElementById('p3-maomao'), 'do-shake', '啊，我说错了……😟');
  makeInteractive(document.getElementById('p4-dad'), 'do-bounce', '换个说法试试 💡');
  makeInteractive(document.getElementById('p4-maomao'), 'do-wobble', '好，我来试试！');
  makeInteractive(document.getElementById('p5-maomao'), 'do-bounce', '一起想想？😊');
  makeInteractive(document.getElementById('p5-doudou'), 'do-bounce', '好！一起来！😊');
  makeInteractive(document.getElementById('p6-maomao'), 'do-bounce', '我们成功了！🎉');
  makeInteractive(document.getElementById('p6-doudou'), 'do-bounce', '太高了！🎊');

  document.addEventListener('DOMContentLoaded', () => {
    if (window.FO) FO.logHistory(BOOK_ID, BOOK_TITLE);
  });
</script>
