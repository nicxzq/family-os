<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>贝贝说对不起 · 绘本</title>
<meta name="description" content="贝贝不小心打碎了妈妈最喜欢的花瓶，又害怕又难受。直到他鼓起勇气说出"对不起"，才发现道歉比躲避轻松多了！">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"LXGW WenKai TC","LXGW WenKai",serif;background:#FFF8E0;min-height:100vh;overflow:hidden;}
  .book{width:100vw;height:100vh;position:relative;overflow:hidden;perspective:1400px;}
  .top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:20px 32px;z-index:20;}
  .back{text-decoration:none;color:#5C4F3D;font-size:16px;background:rgba(255,255,255,0.7);padding:8px 16px;border-radius:999px;backdrop-filter:blur(8px);}
  .read-aloud{background:#4B7BA8;color:white;border:0;padding:10px 18px;border-radius:999px;font-family:inherit;font-size:16px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.1);}
  .page{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:80px 40px 120px;opacity:0;pointer-events:none;transition:opacity .6s ease;}
  .page.is-active{opacity:1;pointer-events:auto;}
  .page[data-bg="sky"]{background:#D7E7F4;}
  .page[data-bg="mint"]{background:#D7EBC9;}
  .page[data-bg="yellow"]{background:#FBE39A;}
  .page[data-bg="lavender"]{background:#E8DFF4;}
  .page[data-bg="peach"]{background:#FBE3D5;}
  .page[data-bg="coral"]{background:#F4A799;}
  .scene{flex:1;min-height:0;position:relative;width:100%;overflow:hidden;}
  .scene svg{width:100%;height:100%;}
  .text{flex-shrink:0;text-align:center;max-width:100%;}
  .text h2{font-size:clamp(22px,4.5vw,36px);line-height:1.4;color:#2B2419;font-weight:500;text-wrap:balance;}
  .text .small{font-size:18px;color:#5C4F3D;margin-top:16px;}
  .nav-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.88);border:0;width:56px;height:56px;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.1);font-family:inherit;color:#2B2419;z-index:20;backdrop-filter:blur(4px);}
  .nav-btn:disabled{opacity:.3;pointer-events:none;}
  #prev{left:12px;}#next{right:12px;}
  .dots-wrap{position:absolute;bottom:24px;left:0;right:0;display:flex;justify-content:center;z-index:20;}
  .dots{display:flex;gap:6px;}
  .dots span{width:8px;height:8px;border-radius:50%;background:rgba(43,36,25,.2);transition:background .3s,transform .3s;}
  .dots span.is-active{background:#4B7BA8;transform:scale(1.4);}
  .float{animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .do-bounce{animation:iBounce .6s cubic-bezier(.36,.07,.19,.97) both!important;}
  @keyframes iBounce{0%{transform:translateY(0) scale(1);}25%{transform:translateY(-18px) scale(1.15);}55%{transform:translateY(-4px) scale(.96);}75%{transform:translateY(-8px) scale(1.05);}100%{transform:translateY(0) scale(1);}}
  .do-shake{animation:iShake .55s ease both!important;}
  @keyframes iShake{0%,100%{transform:rotate(0);}18%{transform:rotate(-22deg);}38%{transform:rotate(18deg);}58%{transform:rotate(-14deg);}78%{transform:rotate(9deg);}}
  .do-spin{animation:iSpin .6s ease both!important;}
  @keyframes iSpin{0%{transform:rotate(0) scale(1);}50%{transform:rotate(180deg) scale(1.2);}100%{transform:rotate(360deg) scale(1);}}
  .interactive{cursor:pointer;transform-box:fill-box;transform-origin:center center;}
  .interactive:hover{opacity:.9;}
  .speech-bubble{position:absolute;top:0;left:50%;transform:translateX(-50%);background:white;border-radius:999px;padding:6px 16px;font-size:20px;font-family:"LXGW WenKai TC",serif;box-shadow:0 3px 0 rgba(0,0,0,.12);pointer-events:none;white-space:nowrap;z-index:50;animation:bPop .3s ease;}
  @keyframes bPop{from{transform:translateX(-50%) scale(0);opacity:0;}to{transform:translateX(-50%) scale(1);opacity:1;}}
  .flip-out-fwd{animation:fOutFwd .4s cubic-bezier(.4,0,1,1) forwards;pointer-events:none;z-index:5;opacity:1;transform-origin:left center;}
  .flip-in-fwd{animation:fInFwd .4s cubic-bezier(0,0,.6,1) forwards;pointer-events:none;z-index:4;transform-origin:right center;}
  .flip-out-bwd{animation:fOutBwd .4s cubic-bezier(.4,0,1,1) forwards;pointer-events:none;z-index:5;opacity:1;transform-origin:right center;}
  .flip-in-bwd{animation:fInBwd .4s cubic-bezier(0,0,.6,1) forwards;pointer-events:none;z-index:4;transform-origin:left center;}
  @keyframes fOutFwd{0%{transform:rotateY(0);opacity:1;}100%{transform:rotateY(-80deg);opacity:0;}}
  @keyframes fInFwd{0%{transform:rotateY(80deg);opacity:0;}100%{transform:rotateY(0);opacity:1;}}
  @keyframes fOutBwd{0%{transform:rotateY(0);opacity:1;}100%{transform:rotateY(80deg);opacity:0;}}
  @keyframes fInBwd{0%{transform:rotateY(-80deg);opacity:0;}100%{transform:rotateY(0);opacity:1;}}
  .end-card{background:white;padding:32px;border-radius:24px;max-width:480px;box-shadow:0 8px 0 rgba(0,0,0,.06),0 24px 48px -16px rgba(0,0,0,.2);text-align:center;}
  .end-card h2{font-size:28px;color:#E56B5A;margin-bottom:16px;}
  .end-card p{font-size:19px;color:#2B2419;line-height:1.7;margin-bottom:12px;}
</style>
</head>
<body>
<div class="book">
  <div class="top">
    <a class="back" href="../for-middle.html">← 回绘本目录</a>
    <button class="read-aloud" id="readBtn">🔊 念给我听</button>
  </div>

  <!-- P1: Beibei running happily, vase on shelf about to be bumped -->
  <div class="page is-active" data-bg="sky" data-text="贝贝今天特别开心，在家里跑来跑去，转来转去——砰！一声响，妈妈最喜欢的花瓶倒下来了。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <rect x="0" y="265" width="400" height="55" fill="#A8C2DE" opacity=".15"/>
        <!-- Shelf on wall -->
        <rect x="240" y="80" width="130" height="10" rx="3" fill="#C8966A" opacity=".7"/>
        <rect x="350" y="80" width="8" height="80" rx="2" fill="#C8966A" opacity=".4"/>
        <rect x="240" y="80" width="8" height="80" rx="2" fill="#C8966A" opacity=".4"/>
        <!-- Vase on shelf (upright, about to fall) -->
        <g id="p1-vase" class="interactive" transform="translate(305,70)">
          <ellipse cx="0" cy="0" rx="18" ry="8" fill="#4B7BA8" opacity=".8"/>
          <rect x="-14" y="-32" width="28" height="36" rx="8" fill="#4B7BA8" opacity=".85"/>
          <ellipse cx="0" cy="-32" rx="10" ry="4" fill="#6B99C8" opacity=".8"/>
          <!-- Flower in vase -->
          <line x1="0" y1="-36" x2="0" y2="-56" stroke="#6FA86D" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="0" cy="-60" r="7" fill="#E56B5A" opacity=".85"/>
          <circle cx="0" cy="-60" r="4" fill="#FBE39A"/>
          <!-- Decorative dots on vase -->
          <circle cx="-5" cy="-18" r="2.5" fill="white" opacity=".5"/>
          <circle cx="5"  cy="-18" r="2.5" fill="white" opacity=".5"/>
          <circle cx="0"  cy="-10" r="2.5" fill="white" opacity=".5"/>
        </g>
        <!-- Beibei running happily, leaning forward -->
        <g id="p1-bear" transform="translate(190,265)">
          <ellipse cx="0" cy="0" rx="28" ry="20" fill="#C8966A"/>
          <ellipse cx="0" cy="5" rx="16" ry="13" fill="#E8C49A" opacity=".6"/>
          <!-- Arms spread running -->
          <ellipse cx="-28" cy="-15" rx="18" ry="7" fill="#C8966A" transform="rotate(-30 -28 -15)"/>
          <ellipse cx="28"  cy="-5"  rx="18" ry="7" fill="#C8966A" transform="rotate(30 28 -5)"/>
          <!-- Head -->
          <circle cx="6" cy="-38" r="22" fill="#C8966A"/>
          <circle cx="-8" cy="-54" r="9" fill="#C8966A"/>
          <circle cx="-8" cy="-54" r="5" fill="#E8A080"/>
          <circle cx="20" cy="-54" r="9" fill="#C8966A"/>
          <circle cx="20" cy="-54" r="5" fill="#E8A080"/>
          <!-- Happy squint eyes -->
          <path d="M -3,-46 Q 1,-39 6,-46" stroke="#2B2419" stroke-width="2.5" fill="none"/>
          <path d="M 8,-46 Q 12,-39 17,-46" stroke="#2B2419" stroke-width="2.5" fill="none"/>
          <ellipse cx="7" cy="-29" rx="7" ry="5" fill="#E8C49A"/>
          <path d="M 2,-24 Q 7,-17 12,-24" stroke="#8C5A4A" stroke-width="2.5" fill="none"/>
          <!-- Cheek blush -->
          <ellipse cx="-5" cy="-33" rx="5" ry="3.5" fill="#E56B5A" opacity=".18"/>
          <ellipse cx="18" cy="-33" rx="5" ry="3.5" fill="#E56B5A" opacity=".18"/>
        </g>
        <!-- Speed lines -->
        <line x1="80" y1="200" x2="130" y2="198" stroke="#8C7C66" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
        <line x1="80" y1="215" x2="140" y2="213" stroke="#8C7C66" stroke-width="1.5" stroke-linecap="round" opacity=".2"/>
        <line x1="80" y1="230" x2="128" y2="228" stroke="#8C7C66" stroke-width="1.5" stroke-linecap="round" opacity=".15"/>
        <text x="148" y="250" font-size="22" fill="#F4C13E">✨</text>
      </svg>
    </div>
    <div class="text">
      <h2>贝贝今天特别开心，<span style="color:#4B7BA8">在家里跑来跑去——</span></h2>
      <p class="small">砰！一声响……</p>
    </div>
  </div>

  <!-- P2: Broken vase on floor, Beibei shocked -->
  <div class="page" data-bg="peach" data-text="妈妈最喜欢的花瓶，碎了！花散落在地上。贝贝愣在那里，心跳得好快，好快……">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <rect x="0" y="265" width="400" height="55" fill="#F4A799" opacity=".15"/>
        <!-- Broken vase pieces on floor -->
        <g transform="translate(250,240)">
          <polygon points="0,0 -20,-15 5,-28" fill="#4B7BA8" opacity=".7"/>
          <polygon points="5,-28 30,-20 15,0" fill="#6B99C8" opacity=".7"/>
          <polygon points="-20,-15 -35,-5 -18,8" fill="#4B7BA8" opacity=".6"/>
          <polygon points="15,0 35,5 20,20" fill="#6B99C8" opacity=".5"/>
          <!-- Scattered flowers -->
          <circle cx="-40" cy="10" r="6" fill="#E56B5A" opacity=".7"/>
          <circle cx="-40" cy="10" r="3" fill="#FBE39A"/>
          <line x1="-34" y1="8" x2="-20" y2="0" stroke="#6FA86D" stroke-width="1.5"/>
          <circle cx="44" cy="-5" r="5" fill="#E56B5A" opacity=".6"/>
          <circle cx="44" cy="-5" r="2.5" fill="#FBE39A"/>
          <!-- Water spill -->
          <ellipse cx="0" cy="15" rx="28" ry="8" fill="#A8C2DE" opacity=".3"/>
        </g>
        <!-- Impact mark -->
        <text x="280" y="208" font-size="18" fill="#F4C13E">💥</text>
        <!-- Empty shelf above -->
        <rect x="240" y="80" width="130" height="10" rx="3" fill="#C8966A" opacity=".7"/>
        <rect x="350" y="80" width="8" height="80" rx="2" fill="#C8966A" opacity=".4"/>
        <rect x="240" y="80" width="8" height="80" rx="2" fill="#C8966A" opacity=".4"/>
        <text x="290" y="118" font-size="11" fill="#8C7C66" opacity=".5">空了……</text>
        <!-- Beibei shocked: hands to cheeks, wide eyes -->
        <g id="p2-bear" class="interactive" transform="translate(155,265)">
          <ellipse cx="0" cy="0" rx="28" ry="20" fill="#C8966A"/>
          <ellipse cx="0" cy="5" rx="16" ry="13" fill="#E8C49A" opacity=".6"/>
          <!-- Hands raised to face in shock -->
          <ellipse cx="-28" cy="-25" rx="16" ry="7" fill="#C8966A" transform="rotate(-55 -28 -25)"/>
          <ellipse cx="28"  cy="-25" rx="16" ry="7" fill="#C8966A" transform="rotate(55 28 -25)"/>
          <!-- Head -->
          <circle cx="0" cy="-38" r="22" fill="#C8966A"/>
          <circle cx="-14" cy="-54" r="9" fill="#C8966A"/>
          <circle cx="-14" cy="-54" r="5" fill="#E8A080"/>
          <circle cx="14"  cy="-54" r="9" fill="#C8966A"/>
          <circle cx="14"  cy="-54" r="5" fill="#E8A080"/>
          <!-- Shocked wide eyes -->
          <circle cx="-7" cy="-41" r="7" fill="#2B2419"/>
          <circle cx="7"  cy="-41" r="7" fill="#2B2419"/>
          <circle cx="-5" cy="-43" r="2.5" fill="white"/>
          <circle cx="9"  cy="-43" r="2.5" fill="white"/>
          <!-- Open O mouth -->
          <ellipse cx="0" cy="-29" rx="7" ry="5" fill="#E8C49A"/>
          <ellipse cx="0" cy="-27" rx="5" ry="4" fill="#8C5A4A" opacity=".8"/>
        </g>
        <!-- Sweat drop -->
        <ellipse cx="188" cy="208" rx="4" ry="6" fill="#A8C2DE" opacity=".7"/>
        <polygon points="184,208 192,208 188,202" fill="#A8C2DE" opacity=".7"/>
      </svg>
    </div>
    <div class="text">
      <h2>妈妈最喜欢的花瓶，<span style="color:#E56B5A">碎了！</span></h2>
      <p class="small">贝贝愣在那里，<br>心跳得好快，好快……</p>
    </div>
  </div>

  <!-- P3: Beibei hiding behind sofa, heavy heart -->
  <div class="page" data-bg="lavender" data-text="贝贝躲到沙发后面，缩成一团。可是，躲起来的贝贝，心里一点都不好受。肚子里好像有块石头，沉沉的。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <rect x="0" y="265" width="400" height="55" fill="#E8DFF4" opacity=".15"/>
        <!-- Sofa -->
        <rect x="60" y="175" width="200" height="90" rx="16" fill="#C8A882" opacity=".7"/>
        <rect x="60" y="155" width="200" height="40" rx="12" fill="#D4B896" opacity=".7"/>
        <rect x="60" y="155" width="36" height="110" rx="8" fill="#BFA070" opacity=".7"/>
        <rect x="224" y="155" width="36" height="110" rx="8" fill="#BFA070" opacity=".7"/>
        <!-- Beibei peeking just over sofa back (ears + top of head) -->
        <g transform="translate(170,168)">
          <circle cx="-12" cy="-8" r="9" fill="#C8966A"/>
          <circle cx="-12" cy="-8" r="5" fill="#E8A080"/>
          <circle cx="12"  cy="-8" r="9" fill="#C8966A"/>
          <circle cx="12"  cy="-8" r="5" fill="#E8A080"/>
          <circle cx="0"   cy="2" r="20" fill="#C8966A"/>
          <!-- Worried eyes peeking -->
          <circle cx="-6" cy="-2" r="4.5" fill="#2B2419"/>
          <circle cx="6"  cy="-2" r="4.5" fill="#2B2419"/>
          <circle cx="-8" cy="-4" r="1.5" fill="white"/>
          <circle cx="4"  cy="-4" r="1.5" fill="white"/>
        </g>
        <!-- Heavy stone thought bubble -->
        <g transform="translate(300,160)">
          <rect x="-50" y="-28" width="100" height="50" rx="12" fill="white" opacity=".9" stroke="#C8B0D8" stroke-width="1.5"/>
          <text x="0" y="-8"  font-size="14" text-anchor="middle" fill="#8C7C66">心里好沉……</text>
          <text x="0" y="14"  font-size="20" text-anchor="middle">🪨</text>
          <polygon points="-6,22 6,22 0,36" fill="white" stroke="#C8B0D8" stroke-width="1.5"/>
        </g>
        <!-- Sad cloud -->
        <text x="128" y="140" font-size="22" fill="#8C7C66" opacity=".6">☁️</text>
        <!-- Hint text -->
        <text x="165" y="258" font-size="11" fill="#8C7C66" opacity=".5">（贝贝躲在沙发后面）</text>
      </svg>
    </div>
    <div class="text">
      <h2>贝贝躲在沙发后面，<span style="color:#8C7C66">缩成一团。</span></h2>
      <p class="small">可是心里一点都不好受——<br>像是有块石头，沉沉的。</p>
    </div>
  </div>

  <!-- P4: Dad finds Beibei and gently encourages him -->
  <div class="page" data-bg="mint" data-text="爸爸找到了贝贝，轻轻地蹲下来：贝贝，说'对不起'需要勇气。但是说出口以后，那块石头就会消失的。你能做到！">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <rect x="0" y="265" width="400" height="55" fill="#B5D4A8" opacity=".15"/>
        <!-- Dad bear (large, crouching on left) -->
        <g transform="translate(120,265)">
          <ellipse cx="0" cy="0" rx="34" ry="22" fill="#8C6B4A"/>
          <ellipse cx="0" cy="6" rx="20" ry="15" fill="#C8966A" opacity=".5"/>
          <!-- Arms extended toward Beibei -->
          <ellipse cx="38"  cy="-12" rx="22" ry="8" fill="#8C6B4A" transform="rotate(-15 38 -12)"/>
          <ellipse cx="-28" cy="-10" rx="18" ry="8" fill="#8C6B4A" transform="rotate(15 -28 -10)"/>
          <!-- Head looking toward Beibei -->
          <circle cx="8"   cy="-42" r="26" fill="#8C6B4A"/>
          <circle cx="-10" cy="-60" r="10" fill="#8C6B4A"/>
          <circle cx="-10" cy="-60" r="6"  fill="#A0785A"/>
          <circle cx="26"  cy="-60" r="10" fill="#8C6B4A"/>
          <circle cx="26"  cy="-60" r="6"  fill="#A0785A"/>
          <!-- Kind smiling eyes -->
          <path d="M -1,-50 Q 4,-43 9,-50" stroke="#2B2419" stroke-width="2.5" fill="none"/>
          <path d="M 11,-50 Q 16,-43 21,-50" stroke="#2B2419" stroke-width="2.5" fill="none"/>
          <ellipse cx="8" cy="-32" rx="8" ry="6" fill="#C8966A"/>
          <path d="M 2,-27 Q 8,-21 14,-27" stroke="#8C5A4A" stroke-width="2.5" fill="none"/>
        </g>
        <!-- Beibei listening, hopeful eyes looking up -->
        <g id="p4-bear" class="interactive" transform="translate(290,265)">
          <ellipse cx="0" cy="0" rx="26" ry="18" fill="#C8966A"/>
          <ellipse cx="0" cy="4" rx="15" ry="12" fill="#E8C49A" opacity=".6"/>
          <ellipse cx="-20" cy="-6" rx="15" ry="6" fill="#C8966A" transform="rotate(20 -20 -6)"/>
          <ellipse cx="20"  cy="-6" rx="15" ry="6" fill="#C8966A" transform="rotate(-20 20 -6)"/>
          <circle cx="0"   cy="-33" r="20" fill="#C8966A"/>
          <circle cx="-12" cy="-47" r="8" fill="#C8966A"/>
          <circle cx="-12" cy="-47" r="4.5" fill="#E8A080"/>
          <circle cx="12"  cy="-47" r="8" fill="#C8966A"/>
          <circle cx="12"  cy="-47" r="4.5" fill="#E8A080"/>
          <!-- Hopeful wide eyes looking up -->
          <ellipse cx="-5" cy="-38" rx="5" ry="5.5" fill="#2B2419"/>
          <ellipse cx="5"  cy="-38" rx="5" ry="5.5" fill="#2B2419"/>
          <circle cx="-3" cy="-40" r="2" fill="white"/>
          <circle cx="7"  cy="-40" r="2" fill="white"/>
          <ellipse cx="0" cy="-25" rx="6" ry="4.5" fill="#E8C49A"/>
          <path d="M -4,-21 Q 0,-27 4,-21" stroke="#8C5A4A" stroke-width="2" fill="none"/>
        </g>
        <!-- Dad speech bubble -->
        <g transform="translate(158,148)">
          <rect x="-82" y="-30" width="164" height="54" rx="12" fill="white" opacity=".95" stroke="#6FA86D" stroke-width="1.5"/>
          <text x="0" y="-10" font-size="13" text-anchor="middle" fill="#6FA86D" font-weight="600">说"对不起"需要勇气，</text>
          <text x="0" y="10"  font-size="13" text-anchor="middle" fill="#6FA86D" font-weight="600">但你能做到！💪</text>
          <polygon points="-8,24 8,24 0,38" fill="white" stroke="#6FA86D" stroke-width="1.5"/>
        </g>
        <!-- Small heart between dad and Beibei -->
        <text x="228" y="230" font-size="18" fill="#E56B5A" opacity=".6">♡</text>
      </svg>
    </div>
    <div class="text">
      <h2>爸爸轻轻说：<span style="color:#6FA86D">说"对不起"需要勇气，</span></h2>
      <p class="small">说出口以后，<br>那块石头就会消失的！</p>
    </div>
  </div>

  <!-- P5: Beibei walks to mom, says sorry, gets a hug — interactive -->
  <div class="page" data-bg="yellow" data-text="贝贝深吸一口气，走到妈妈面前：妈妈，对不起……我不是故意的。妈妈弯下腰，把贝贝抱得紧紧的——那块沉沉的石头，不见了！">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <rect x="0" y="265" width="400" height="55" fill="#FBE39A" opacity=".2"/>
        <!-- Warm glow between them -->
        <ellipse cx="200" cy="200" rx="100" ry="60" fill="#F4C13E" opacity=".15"/>
        <!-- Mom bear (right, bending down to hug) -->
        <g transform="translate(270,265)">
          <ellipse cx="0" cy="0" rx="30" ry="22" fill="#D4A87A"/>
          <ellipse cx="0" cy="6" rx="17" ry="14" fill="#E8C49A" opacity=".5"/>
          <!-- Arms wrapping around -->

<script>
const BOOK_ID='m07-bear-sorry'; const BOOK_TITLE='贝贝说对不起'; const BOOK_TOTAL=5;
function makeInteractive(el,animClass,msg){if(!el)return;el.classList.add('interactive');el.addEventListener('click',function(){if(el._busy)return;el._busy=true;el.classList.remove(animClass);void el.getBoundingClientRect();el.classList.add(animClass);if(msg){const scene=el.closest('.scene');const er=el.getBoundingClientRect(),sr=scene.getBoundingClientRect();const cx=er.left+er.width/2-sr.left,cy=Math.max(8,er.top-sr.top-48);const b=document.createElement('div');b.className='speech-bubble';b.textContent=msg;b.style.left=cx+'px';b.style.top=cy+'px';b.style.transform='translateX(-50%)';scene.appendChild(b);setTimeout(()=>b.remove(),1500);}setTimeout(()=>{el.classList.remove(animClass);el._busy=false;},800);});}
const pages=document.querySelectorAll('.page'),total=pages.length;
const dotsEl=document.getElementById('dots');let current=0;
for(let i=0;i<total;i++){const d=document.createElement('span');if(i===0)d.classList.add('is-active');dotsEl.appendChild(d);}
function goTo(idx){if(idx<0||idx>=total)return;speechSynthesis.cancel();if(idx===current){pages.forEach((p,i)=>{p.classList.toggle('is-active',i===idx);p.classList.remove('flip-out-fwd','flip-in-fwd','flip-out-bwd','flip-in-bwd');p.style.opacity='';p.style.pointerEvents='';});current=idx;document.getElementById('prev').disabled=idx===0;document.getElementById('next').disabled=idx===total-1;dotsEl.querySelectorAll('span').forEach((s,i)=>s.classList.toggle('is-active',i===idx));if(window.FO)FO.logProgress(BOOK_ID,idx,BOOK_TOTAL);return;}const dir=idx>current?'fwd':'bwd',outClass=dir==='fwd'?'flip-out-fwd':'flip-out-bwd',inClass=dir==='fwd'?'flip-in-fwd':'flip-in-bwd';const oldPage=pages[current],newPage=pages[idx];newPage.style.opacity='0';newPage.style.pointerEvents='none';oldPage.classList.add(outClass);newPage.classList.add(inClass);function cleanup(){oldPage.classList.remove('is-active',outClass);newPage.classList.remove(inClass);oldPage.style.opacity='';newPage.style.opacity='';newPage.style.pointerEvents='';newPage.classList.add('is-active');current=idx;document.getElementById('prev').disabled=idx===0;document.getElementById('next').disabled=idx===total-1;dotsEl.querySelectorAll('span').forEach((s,i)=>s.classList.toggle('is-active',i===idx));if(window.FO)FO.logProgress(BOOK_ID,idx,BOOK_TOTAL);}newPage.addEventListener('animationend',cleanup,{once:true});}
document.getElementById('prev').addEventListener('click',()=>goTo(current-1));
document.getElementById('next').addEventListener('click',()=>goTo(current+1));
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo(current-1);if(e.key==='ArrowRight')goTo(current+1);});
let _tx=0;document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-_tx;if(Math.abs(dx)>50)dx<0?goTo(current+1):goTo(current-1);});
document.getElementById('readBtn').addEventListener('click',()=>{const text=pages[current].dataset.text;if(!text||!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=.85;u.pitch=1.1;speechSynthesis.speak(u);});
goTo(0);
makeInteractive(document.getElementById('p1-vase'), 'do-shake',  '啊！小心！');
makeInteractive(document.getElementById('p2-bear'), 'do-shake',  '怎么办……😰');
makeInteractive(document.getElementById('p4-bear'), 'do-bounce', '我能做到！');
makeInteractive(document.getElementById('p5-bear'), 'do-bounce', '妈妈，对不起！💛');
if(window.FO)FO.logHistory(BOOK_ID,BOOK_TITLE);
</script>
