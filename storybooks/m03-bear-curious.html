<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>贝贝的好奇心 · 绘本</title>
<meta name="description" content="小熊贝贝爱问"为什么"——好奇心是最好的老师。">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"LXGW WenKai TC","LXGW WenKai",serif;background:#FFF8E0;min-height:100vh;overflow:hidden;}
  .book{width:100vw;height:100vh;position:relative;overflow:hidden;perspective:1400px;}
  .top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:20px 32px;z-index:20;}
  .back{text-decoration:none;color:#5C4F3D;font-size:16px;background:rgba(255,255,255,0.7);padding:8px 16px;border-radius:999px;backdrop-filter:blur(8px);}
  .read-aloud{background:#4B7BA8;color:white;border:0;padding:10px 18px;border-radius:999px;font-family:inherit;font-size:16px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.1);}
  .page{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:80px 40px 120px;opacity:0;pointer-events:none;transition:opacity .6s ease;}
  .page.is-active{opacity:1;pointer-events:auto;}
  .page[data-bg="sky"]{background:#D7E7F4;}
  .page[data-bg="mint"]{background:#D7EBC9;}
  .page[data-bg="yellow"]{background:#FBE39A;}
  .page[data-bg="lavender"]{background:#E8DFF4;}
  .page[data-bg="peach"]{background:#FBE3D5;}
  .page[data-bg="coral"]{background:#F4A799;}
  .scene{flex:1;min-height:0;position:relative;width:100%;overflow:hidden;}
  .scene svg{width:100%;height:100%;}
  .text{flex-shrink:0;text-align:center;max-width:100%;}
  .text h2{font-size:clamp(22px,4.5vw,36px);line-height:1.4;color:#2B2419;font-weight:500;text-wrap:balance;}
  .text .big{font-size:clamp(26px,5vw,42px);line-height:1.3;color:#4B7BA8;font-weight:700;margin-top:12px;}
  .text .small{font-size:18px;color:#5C4F3D;margin-top:16px;}
  .nav-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.88);border:0;width:56px;height:56px;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.1);font-family:inherit;color:#2B2419;z-index:20;backdrop-filter:blur(4px);}
  .nav-btn:disabled{opacity:.3;pointer-events:none;}
  #prev{left:12px;}#next{right:12px;}
  .dots-wrap{position:absolute;bottom:24px;left:0;right:0;display:flex;justify-content:center;z-index:20;}
  .dots{display:flex;gap:6px;}
  .dots span{width:8px;height:8px;border-radius:50%;background:rgba(43,36,25,.2);transition:background .3s,transform .3s;}
  .dots span.is-active{background:#4B7BA8;transform:scale(1.4);}
  .float{animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .wiggle{animation:wiggle 2.5s ease-in-out infinite;transform-origin:center bottom;}
  @keyframes wiggle{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
  .do-bounce{animation:iBounce .6s cubic-bezier(.36,.07,.19,.97) both!important;}
  @keyframes iBounce{0%{transform:translateY(0) scale(1);}25%{transform:translateY(-18px) scale(1.15);}55%{transform:translateY(-4px) scale(.96);}75%{transform:translateY(-8px) scale(1.05);}100%{transform:translateY(0) scale(1);}}
  .do-spin{animation:iSpin .7s ease both!important;transform-origin:center center;transform-box:fill-box;}
  @keyframes iSpin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
  .do-shake{animation:iShake .55s ease both!important;}
  @keyframes iShake{0%,100%{transform:rotate(0);}18%{transform:rotate(-22deg);}38%{transform:rotate(18deg);}58%{transform:rotate(-14deg);}78%{transform:rotate(9deg);}}
  .interactive{cursor:pointer;transform-box:fill-box;transform-origin:center center;}
  .interactive:hover{opacity:.9;}
  .speech-bubble{position:absolute;top:0;left:50%;transform:translateX(-50%);background:white;border-radius:999px;padding:6px 16px;font-size:20px;font-family:"LXGW WenKai TC",serif;box-shadow:0 3px 0 rgba(0,0,0,.12);pointer-events:none;white-space:nowrap;z-index:50;animation:bPop .3s ease;}
  @keyframes bPop{from{transform:translateX(-50%) scale(0);opacity:0;}to{transform:translateX(-50%) scale(1);opacity:1;}}
  .flip-out-fwd{animation:fOutFwd .4s cubic-bezier(.4,0,1,1) forwards;pointer-events:none;z-index:5;opacity:1;transform-origin:left center;}
  .flip-in-fwd{animation:fInFwd .4s cubic-bezier(0,0,.6,1) forwards;pointer-events:none;z-index:4;transform-origin:right center;}
  .flip-out-bwd{animation:fOutBwd .4s cubic-bezier(.4,0,1,1) forwards;pointer-events:none;z-index:5;opacity:1;transform-origin:right center;}
  .flip-in-bwd{animation:fInBwd .4s cubic-bezier(0,0,.6,1) forwards;pointer-events:none;z-index:4;transform-origin:left center;}
  @keyframes fOutFwd{0%{transform:rotateY(0);opacity:1;}100%{transform:rotateY(-80deg);opacity:0;}}
  @keyframes fInFwd{0%{transform:rotateY(80deg);opacity:0;}100%{transform:rotateY(0);opacity:1;}}
  @keyframes fOutBwd{0%{transform:rotateY(0);opacity:1;}100%{transform:rotateY(80deg);opacity:0;}}
  @keyframes fInBwd{0%{transform:rotateY(-80deg);opacity:0;}100%{transform:rotateY(0);opacity:1;}}
  .end-card{background:white;padding:32px;border-radius:24px;max-width:480px;box-shadow:0 8px 0 rgba(0,0,0,.06),0 24px 48px -16px rgba(0,0,0,.2);text-align:center;}
  .end-card h2{font-size:28px;color:#4B7BA8;margin-bottom:16px;}
  .end-card p{font-size:19px;color:#2B2419;line-height:1.7;margin-bottom:12px;}
  /* Question mark rain animation */
  @keyframes qFall{0%{transform:translateY(-30px) rotate(-10deg);opacity:0;}20%{opacity:1;}80%{opacity:.8;}100%{transform:translateY(60px) rotate(15deg);opacity:0;}}
  .q-mark{position:absolute;animation:qFall 2.5s ease-in-out infinite;font-family:"LXGW WenKai TC",serif;font-size:28px;color:#4B7BA8;pointer-events:none;}
</style>
</head>
<body>
<div class="book">
  <div class="top">
    <a class="back" href="../for-middle.html">← 回绘本目录</a>
    <button class="read-aloud" id="readBtn">🔊 念给我听</button>
  </div>

  <!-- P1: Beibei sees a rainbow -->
  <div class="page is-active" data-bg="sky" data-text="下完雨，天空出现了一道彩虹。贝贝抬起头，眼睛睁得大大的，问：彩虹是怎么来的？">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- Sky and ground -->
        <rect width="400" height="220" fill="#A8C2DE" opacity=".2"/>
        <ellipse cx="200" cy="310" rx="220" ry="40" fill="#B5D4A8" opacity=".3"/>
        <!-- Clouds -->
        <g opacity=".7">
          <ellipse cx="80" cy="55" rx="35" ry="22" fill="white"/>
          <ellipse cx="110" cy="48" rx="25" ry="18" fill="white"/>
          <ellipse cx="60" cy="58" rx="22" ry="15" fill="white"/>
        </g>
        <g opacity=".5">
          <ellipse cx="310" cy="45" rx="30" ry="18" fill="white"/>
          <ellipse cx="338" cy="40" rx="22" ry="15" fill="white"/>
        </g>
        <!-- Rainbow -->
        <path d="M 40,200 A 160,160 0 0,1 360,200" fill="none" stroke="#E56B5A" stroke-width="7" opacity=".6"/>
        <path d="M 52,200 A 148,148 0 0,1 348,200" fill="none" stroke="#F4C13E" stroke-width="7" opacity=".6"/>
        <path d="M 64,200 A 136,136 0 0,1 336,200" fill="none" stroke="#6FA86D" stroke-width="7" opacity=".6"/>
        <path d="M 76,200 A 124,124 0 0,1 324,200" fill="none" stroke="#4B7BA8" stroke-width="7" opacity=".6"/>
        <path d="M 88,200 A 112,112 0 0,1 312,200" fill="none" stroke="#8B5CF6" stroke-width="7" opacity=".6"/>
        <!-- Beibei looking up -->
        <g id="p1-bear" transform="translate(200,260)">
          <ellipse cx="0" cy="0" rx="28" ry="32" fill="#C8966A"/>
          <ellipse cx="0" cy="6" rx="17" ry="18" fill="#E8C49A" opacity=".7"/>
          <!-- Head tilted up -->
          <circle cx="0" cy="-44" r="26" fill="#C8966A"/>
          <circle cx="-18" cy="-60" r="10" fill="#C8966A"/>
          <circle cx="-18" cy="-60" r="6" fill="#E8A080"/>
          <circle cx="18" cy="-60" r="10" fill="#C8966A"/>
          <circle cx="18" cy="-60" r="6" fill="#E8A080"/>
          <!-- Wide excited eyes looking up -->
          <ellipse cx="-8" cy="-50" rx="5" ry="6" fill="#2B2419"/>
          <ellipse cx="8" cy="-50" rx="5" ry="6" fill="#2B2419"/>
          <circle cx="-6" cy="-52" r="2" fill="white"/>
          <circle cx="10" cy="-52" r="2" fill="white"/>
          <ellipse cx="0" cy="-36" rx="9" ry="6" fill="#E8C49A"/>
          <circle cx="-2" cy="-37" r="2" fill="#8C5A4A"/>
          <circle cx="2" cy="-37" r="2" fill="#8C5A4A"/>
          <path d="M -5,-31 Q 0,-27 5,-31" stroke="#8C5A4A" stroke-width="2" fill="none"/>
        </g>
        <!-- Question mark balloon -->
        <g transform="translate(260,165)">
          <circle cx="0" cy="0" r="28" fill="#4B7BA8" opacity=".15" stroke="#4B7BA8" stroke-width="2"/>
          <text x="0" y="10" font-size="26" text-anchor="middle" fill="#4B7BA8">？</text>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>彩虹是怎么来的？</h2>
      <p class="small">贝贝眼睛睁得大大的，<br>心里装满了<span style="color:#4B7BA8">小问号</span>。</p>
    </div>
  </div>

  <!-- P2: More questions about everything -->
  <div class="page" data-bg="yellow" data-text="贝贝总是有很多问题。为什么蚂蚁不会迷路？为什么苹果是红的？为什么晚上有星星？问题一个接一个，停不下来！">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- Ant trail -->
        <path d="M 30,280 Q 100,240 160,260" fill="none" stroke="#8C6B4A" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/>
        <!-- Ants -->
        <g transform="translate(55,268)" style="font-size:16px">
          <ellipse cx="0" cy="0" rx="5" ry="3.5" fill="#2B2419"/>
          <ellipse cx="8" cy="-1" rx="4" ry="3" fill="#2B2419"/>
          <ellipse cx="14" cy="1" rx="3.5" ry="2.5" fill="#2B2419"/>
          <!-- legs -->
          <line x1="3" y1="2" x2="0" y2="7" stroke="#2B2419" stroke-width=".8"/>
          <line x1="6" y1="-3" x2="4" y2="-8" stroke="#2B2419" stroke-width=".8"/>
          <line x1="10" y1="2" x2="8" y2="7" stroke="#2B2419" stroke-width=".8"/>
        </g>
        <!-- Apple tree -->
        <line x1="310" y1="290" x2="310" y2="230" stroke="#8C6B4A" stroke-width="5" stroke-linecap="round"/>
        <circle cx="310" cy="205" r="35" fill="#6FA86D" opacity=".7"/>
        <circle cx="295" cy="190" r="18" fill="#E56B5A" opacity=".8"/>
        <circle cx="320" cy="200" r="14" fill="#E56B5A" opacity=".7"/>
        <!-- Stars above -->
        <text x="165" y="55" font-size="22" fill="#F4C13E">★</text>
        <text x="200" y="40" font-size="16" fill="#F4C13E">★</text>
        <text x="235" y="60" font-size="20" fill="#F4C13E">★</text>
        <!-- Beibei with lots of question marks -->
        <g id="p2-bear" transform="translate(170,245)" class="wiggle">
          <ellipse cx="0" cy="0" rx="28" ry="32" fill="#C8966A"/>
          <ellipse cx="0" cy="6" rx="17" ry="18" fill="#E8C49A" opacity=".7"/>
          <circle cx="0" cy="-38" r="24" fill="#C8966A"/>
          <circle cx="-17" cy="-56" r="10" fill="#C8966A"/>
          <circle cx="-17" cy="-56" r="6" fill="#E8A080"/>
          <circle cx="17" cy="-56" r="10" fill="#C8966A"/>
          <circle cx="17" cy="-56" r="6" fill="#E8A080"/>
          <ellipse cx="-6" cy="-43" rx="5" ry="5.5" fill="#2B2419"/>
          <ellipse cx="6" cy="-43" rx="5" ry="5.5" fill="#2B2419"/>
          <circle cx="-4" cy="-45" r="1.8" fill="white"/>
          <circle cx="8" cy="-45" r="1.8" fill="white"/>
          <ellipse cx="0" cy="-30" rx="8" ry="5.5" fill="#E8C49A"/>
          <circle cx="-2" cy="-31" r="1.8" fill="#8C5A4A"/>
          <circle cx="2" cy="-31" r="1.8" fill="#8C5A4A"/>
          <path d="M -5,-25 Q 0,-21 5,-25" stroke="#8C5A4A" stroke-width="2" fill="none"/>
        </g>
        <!-- Floating question marks -->
        <text x="70" y="200" font-size="24" fill="#4B7BA8" opacity=".7">？</text>
        <text x="240" y="170" font-size="20" fill="#4B7BA8" opacity=".8">？</text>
        <text x="130" y="155" font-size="28" fill="#4B7BA8">？</text>
        <text x="260" y="220" font-size="18" fill="#4B7BA8" opacity=".6">？</text>
      </svg>
    </div>
    <div class="text">
      <h2>贝贝总是有<span style="color:#4B7BA8">好多好多问题</span>！</h2>
      <p class="small">蚂蚁为什么不迷路？<br>苹果为什么是红的？<br>晚上为什么有星星？</p>
    </div>
  </div>

  <!-- P3: Others get tired of questions -->
  <div class="page" data-bg="peach" data-text="有一次，贝贝问了好多个为什么，小伙伴说：你问题太多了！贝贝低下了头，不说话了。难道问太多问题不好吗？">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- Friend (rabbit) -->
        <g transform="translate(130,240)">
          <ellipse cx="0" cy="0" rx="26" ry="30" fill="#F0E8E8"/>
          <ellipse cx="0" cy="5" rx="15" ry="17" fill="white" opacity=".8"/>
          <circle cx="0" cy="-35" r="22" fill="#F0E8E8"/>
          <ellipse cx="-10" cy="-62" rx="8" ry="20" fill="#F0E8E8"/>
          <ellipse cx="-10" cy="-62" rx="4" ry="16" fill="#E8B0B0" opacity=".6"/>
          <ellipse cx="10" cy="-62" rx="8" ry="20" fill="#F0E8E8"/>
          <ellipse cx="10" cy="-62" rx="4" ry="16" fill="#E8B0B0" opacity=".6"/>
          <!-- Frustrated expression -->
          <circle cx="-7" cy="-38" r="4" fill="#2B2419"/>
          <circle cx="7" cy="-38" r="4" fill="#2B2419"/>
          <!-- Frown -->
          <path d="M -6,-26 Q 0,-22 6,-26" stroke="#8C5A4A" stroke-width="2" fill="none"/>
          <!-- Speech bubble -->
          <rect x="-15" y="-90" width="120" height="35" rx="12" fill="white" stroke="#C87060" stroke-width="1.5"/>
          <polygon points="-5,-55 10,-55 2,-45" fill="white" stroke="#C87060" stroke-width="1.5"/>
          <text x="45" y="-78" font-size="11" text-anchor="middle" fill="#C87060">你问题</text>
          <text x="45" y="-65" font-size="11" text-anchor="middle" fill="#C87060">太多了！</text>
        </g>
        <!-- Beibei sad -->
        <g id="p3-bear" transform="translate(270,255)">
          <ellipse cx="0" cy="0" rx="26" ry="30" fill="#C8966A"/>
          <ellipse cx="0" cy="6" rx="16" ry="18" fill="#E8C49A" opacity=".7"/>
          <!-- Head drooped -->
          <circle cx="0" cy="-34" r="22" fill="#C8966A" transform="rotate(10 0 0)"/>
          <circle cx="-15" cy="-52" r="9" fill="#C8966A"/>
          <circle cx="-15" cy="-52" r="5" fill="#E8A080"/>
          <circle cx="13" cy="-53" r="9" fill="#C8966A"/>
          <circle cx="13" cy="-53" r="5" fill="#E8A080"/>
          <!-- Sad eyes -->
          <path d="M -9,-42 Q -6,-44 -3,-42" stroke="#2B2419" stroke-width="2" fill="none"/>
          <path d="M 3,-42 Q 6,-44 9,-42" stroke="#2B2419" stroke-width="2" fill="none"/>
          <ellipse cx="0" cy="-30" rx="8" ry="5" fill="#E8C49A"/>
          <!-- Sad mouth -->
          <path d="M -6,-25 Q 0,-29 6,-25" stroke="#8C5A4A" stroke-width="2" fill="none"/>
          <!-- Tear -->
          <ellipse cx="-10" cy="-30" rx="2.5" ry="4" fill="#A8C2DE" opacity=".7"/>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>小伙伴说：<span style="color:#C87060">你问题太多了！</span></h2>
      <p class="small">贝贝低下了头——<br>难道问问题不好吗？</p>
    </div>
  </div>

  <!-- P4: Dad explains curiosity is wonderful -->
  <div class="page" data-bg="lavender" data-text="爸爸听了，抱了抱贝贝，说：好奇心是最好的礼物！爱问为什么的孩子，会发现最多有趣的事。贝贝，你的问题很棒！">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- Warm glow -->
        <circle cx="200" cy="180" r="130" fill="#FBE39A" opacity=".2"/>
        <!-- Dad bear hugging Beibei -->
        <g transform="translate(185,230)">
          <!-- Dad body -->
          <ellipse cx="0" cy="0" rx="38" ry="42" fill="#C8966A"/>
          <ellipse cx="0" cy="8" rx="22" ry="25" fill="#E8C49A" opacity=".6"/>
          <!-- Dad head -->
          <circle cx="0" cy="-50" r="32" fill="#C8966A"/>
          <circle cx="-22" cy="-74" r="13" fill="#C8966A"/>
          <circle cx="-22" cy="-74" r="7.5" fill="#E8A080"/>
          <circle cx="22" cy="-74" r="13" fill="#C8966A"/>
          <circle cx="22" cy="-74" r="7.5" fill="#E8A080"/>
          <!-- Dad smiling -->
          <ellipse cx="-8" cy="-54" rx="6" ry="6.5" fill="#2B2419"/>
          <ellipse cx="8" cy="-54" rx="6" ry="6.5" fill="#2B2419"/>
          <circle cx="-6" cy="-57" r="2" fill="white"/>
          <circle cx="10" cy="-57" r="2" fill="white"/>
          <ellipse cx="0" cy="-40" rx="10" ry="7" fill="#E8C49A"/>
          <path d="M -8,-34 Q 0,-27 8,-34" stroke="#8C5A4A" stroke-width="2.5" fill="none"/>
          <!-- Dad arms hugging -->
          <ellipse cx="-50" cy="5" rx="14" ry="22" fill="#C8966A" transform="rotate(-30 -50 5)"/>
          <ellipse cx="50" cy="5" rx="14" ry="22" fill="#C8966A" transform="rotate(30 50 5)"/>
        </g>
        <!-- Small Beibei being hugged -->
        <g id="p4-bear" transform="translate(198,240)">
          <circle cx="0" cy="-22" r="16" fill="#C8966A"/>
          <circle cx="-10" cy="-35" r="7" fill="#C8966A"/>
          <circle cx="-10" cy="-35" r="4" fill="#E8A080"/>
          <circle cx="10" cy="-35" r="7" fill="#C8966A"/>
          <circle cx="10" cy="-35" r="4" fill="#E8A080"/>
          <!-- Happy eyes -->
          <path d="M -5,-26 Q -3,-23 -1,-26" stroke="#2B2419" stroke-width="2" fill="none"/>
          <path d="M 1,-26 Q 3,-23 5,-26" stroke="#2B2419" stroke-width="2" fill="none"/>
          <path d="M -4,-18 Q 0,-14 4,-18" stroke="#8C5A4A" stroke-width="1.5" fill="none"/>
        </g>
        <!-- Stars of encouragement -->
        <text x="90" y="110" font-size="26" fill="#F4C13E">⭐</text>
        <text x="310" y="120" font-size="22" fill="#F4C13E">⭐</text>
        <text x="200" y="85" font-size="20" fill="#F4C13E">✨</text>
        <!-- Dad speech bubble above the whole group -->
        <g transform="translate(200,55)">
          <rect x="-105" y="-20" width="210" height="46" rx="15" fill="white" opacity=".9" stroke="#4B7BA8" stroke-width="1.5"/>
          <text x="0" y="-2" font-size="13" text-anchor="middle" fill="#4B7BA8">好奇心是最好的礼物！</text>
          <text x="0" y="16" font-size="11" text-anchor="middle" fill="#5C4F3D">你的问题，很棒！</text>
          <polygon points="-10,26 10,26 0,40" fill="white" stroke="#4B7BA8" stroke-width="1.5"/>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>爸爸说：<span style="color:#4B7BA8">好奇心是最好的礼物！</span></h2>
      <p class="small">爱问问题的孩子，<br>会发现最多有趣的事。</p>
    </div>
  </div>

  <!-- P5: Beibei researches rainbow — interactive -->
  <div class="page" data-bg="mint" data-text="贝贝决定自己找答案！他用水盆和阳光做了一个小实验，真的出现了小彩虹！贝贝高兴得跳起来！">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- Sun -->
        <circle id="p5-sun" cx="60" cy="70" r="38" fill="#F4C13E" opacity=".6" class="interactive"/>
        <line x1="60" y1="22" x2="60" y2="10" stroke="#F4C13E" stroke-width="3" stroke-linecap="round"/>

        <line x1="100" y1="65" x2="112" y2="63" stroke="#F4C13E" stroke-width="3" stroke-linecap="round"/>

<script src="../fo-utils.js"></script>
<script>
const BOOK_ID='m03-bear-curious'; const BOOK_TITLE='贝贝的好奇心'; const BOOK_TOTAL=5;
function makeInteractive(el,animClass,msg){if(!el)return;el.classList.add('interactive');el.addEventListener('click',function(){if(el._busy)return;el._busy=true;el.classList.remove(animClass);void el.getBoundingClientRect();el.classList.add(animClass);if(msg){const scene=el.closest('.scene');const er=el.getBoundingClientRect(),sr=scene.getBoundingClientRect();const cx=er.left+er.width/2-sr.left,cy=Math.max(8,er.top-sr.top-48);const b=document.createElement('div');b.className='speech-bubble';b.textContent=msg;b.style.left=cx+'px';b.style.top=cy+'px';b.style.transform='translateX(-50%)';scene.appendChild(b);setTimeout(()=>b.remove(),1500);}setTimeout(()=>{el.classList.remove(animClass);el._busy=false;},800);});}
const pages=document.querySelectorAll('.page'),total=pages.length;
const dotsEl=document.getElementById('dots');let current=0;
for(let i=0;i<total;i++){const d=document.createElement('span');if(i===0)d.classList.add('is-active');dotsEl.appendChild(d);}
function goTo(idx){if(idx<0||idx>=total)return;speechSynthesis.cancel();if(idx===current){pages.forEach((p,i)=>{p.classList.toggle('is-active',i===idx);p.classList.remove('flip-out-fwd','flip-in-fwd','flip-out-bwd','flip-in-bwd');p.style.opacity='';p.style.pointerEvents='';});current=idx;document.getElementById('prev').disabled=idx===0;document.getElementById('next').disabled=idx===total-1;dotsEl.querySelectorAll('span').forEach((s,i)=>s.classList.toggle('is-active',i===idx));if(window.FO)FO.logProgress(BOOK_ID,idx,BOOK_TOTAL);return;}const dir=idx>current?'fwd':'bwd',outClass=dir==='fwd'?'flip-out-fwd':'flip-out-bwd',inClass=dir==='fwd'?'flip-in-fwd':'flip-in-bwd';const oldPage=pages[current],newPage=pages[idx];newPage.style.opacity='0';newPage.style.pointerEvents='none';oldPage.classList.add(outClass);newPage.classList.add(inClass);function cleanup(){oldPage.classList.remove('is-active',outClass);newPage.classList.remove(inClass);oldPage.style.opacity='';newPage.style.opacity='';newPage.style.pointerEvents='';newPage.classList.add('is-active');current=idx;document.getElementById('prev').disabled=idx===0;document.getElementById('next').disabled=idx===total-1;dotsEl.querySelectorAll('span').forEach((s,i)=>s.classList.toggle('is-active',i===idx));if(window.FO)FO.logProgress(BOOK_ID,idx,BOOK_TOTAL);}newPage.addEventListener('animationend',cleanup,{once:true});}
document.getElementById('prev').addEventListener('click',()=>goTo(current-1));
document.getElementById('next').addEventListener('click',()=>goTo(current+1));
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo(current-1);if(e.key==='ArrowRight')goTo(current+1);});
let _tx=0;document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-_tx;if(Math.abs(dx)>50)dx<0?goTo(current+1):goTo(current-1);});
document.getElementById('readBtn').addEventListener('click',()=>{const text=pages[current].dataset.text;if(!text||!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=.85;u.pitch=1.1;speechSynthesis.speak(u);});
goTo(0);
makeInteractive(document.getElementById('p1-bear'),'do-bounce','为什么？🌈');
makeInteractive(document.getElementById('p2-bear'),'do-bounce','还有为什么？');
makeInteractive(document.getElementById('p3-bear'),'do-shake','……');
makeInteractive(document.getElementById('p4-bear'),'do-bounce','谢谢爸爸！');
makeInteractive(document.getElementById('p5-bear'),'do-bounce','我发现了！🌈');
// Sun click: spawn rainbow sparkles
const sun=document.getElementById('p5-sun');
if(sun){sun.classList.add('interactive');sun.addEventListener('click',()=>{const svg=sun.closest('svg');const colors=['#E56B5A','#F4C13E','#6FA86D','#4B7BA8','#8B5CF6'];for(let i=0;i<8;i++){const c=document.createElementNS('http://www.w3.org/2000/svg','circle');const angle=Math.random()*Math.PI*2;const r=40+Math.random()*40;c.setAttribute('cx',60+Math.cos(angle)*r);c.setAttribute('cy',70+Math.sin(angle)*r);c.setAttribute('r',6+Math.random()*6);c.setAttribute('fill',colors[Math.floor(Math.random()*colors.length)]);c.style.opacity='.8';c.style.transition='opacity 1.2s,r 1.2s';svg.appendChild(c);setTimeout(()=>{c.style.opacity='0';},50);setTimeout(()=>c.remove(),1300);}sun.classList.add('do-spin');setTimeout(()=>sun.classList.remove('do-spin'),800);});}
if(window.FO)FO.logHistory(BOOK_ID,BOOK_TITLE);
</script>
