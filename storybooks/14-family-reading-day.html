ll:#E56B5A}.cd{fill:none;stroke:#2B2419;stroke-linecap:round}.s15{stroke-width:1.5}.s2{stroke-width:2}.paper{fill:#FFFDF6}.ink{fill:#2B2419}.mute{fill:#8C7C66}.coral{fill:#E56B5A}.yellow{fill:#F4C13E}.green{fill:#6FA86D}.green-soft{fill:#B5D4A8}.blue{fill:#4B7BA8}.blue-soft{fill:#A8C2DE}.cream-deep{fill:#F1E8D0}.none{fill:none}

      <g id="p3-dad" transform="translate(200,220)"><ellipse cx="0" cy="8" rx="28" ry="32" class="cb"/><circle cx="0" cy="-30" r="22" class="cb"/><circle cx="-8" cy="-33" r="6" class="none" stroke="#2B2419" stroke-width="1.5"/><circle cx="8" cy="-33" r="6" class="none" stroke="#2B2419" stroke-width="1.5"/><line x1="-2" y1="-33" x2="2" y2="-33" class="cd s15"/><polygon points="0,-24 12,-20 0,-16" class="ck"/><path d="M-7,-18 Q0,-13 7,-18" class="cd s2"/><rect x="-26" y="0" width="52" height="30" rx="4" class="blue"/></g>

      <g id="p4-maomao" class="float" transform="translate(200,230)"><ellipse cx="0" cy="10" rx="22" ry="24" class="cb"/><circle cx="0" cy="-20" r="18" class="cb"/><circle cx="-6" cy="-23" r="2.8" class="ce"/><circle cx="6" cy="-23" r="2.8" class="ce"/><polygon points="0,-16 10,-12 0,-9" class="ck"/><path d="M-6,-10 Q0,-5 6,-10" class="cd s2"/><rect x="-28" y="-2" width="56" height="34" rx="5" class="blue"/></g>

  <div class="page" data-bg="peach" data-text="大家看到有趣的地方，就轻轻说给旁边的人听。客厅里有小小的笑声。">

      <g id="p5-maomao" transform="translate(135,232)"><ellipse cx="0" cy="10" rx="22" ry="24" class="cb"/><circle cx="0" cy="-20" r="18" class="cb"/><circle cx="-6" cy="-23" r="2.8" class="ce"/><circle cx="6" cy="-23" r="2.8" class="ce"/><polygon points="0,-16 10,-12 0,-9" class="ck"/><path d="M-8,-10 Q0,-3 8,-10" class="cd s2"/><line x1="18" y1="2" x2="34" y2="-8" class="cd s2"/></g>
      <g id="p5-mom" transform="translate(270,224)"><ellipse cx="0" cy="8" rx="26" ry="30" class="cb"/><circle cx="0" cy="-28" r="21" class="cb"/><circle cx="-7" cy="-31" r="2.5" class="ce"/><circle cx="7" cy="-31" r="2.5" class="ce"/><polygon points="0,-22 11,-18 0,-14" class="ck"/><path d="M-7,-17 Q0,-12 7,-17" class="cd s2"/><line x1="-18" y1="2" x2="-34" y2="-8" class="cd s2"/></g>

      <g id="p6-maomao" transform="translate(306,236)"><ellipse cx="0" cy="10" rx="22" ry="24" class="cb"/><circle cx="0" cy="-20" r="18" class="cb"/><circle cx="-6" cy="-23" r="2.8" class="ce"/><circle cx="6" cy="-23" r="2.8" class="ce"/><polygon points="0,-16 10,-12 0,-9" class="ck"/><path d="M-6,-10 Q0,-5 6,-10" class="cd s2"/><rect x="-22" y="0" width="44" height="26" rx="4" class="blue"/></g>

<script>
const BOOK_ID='14-family-reading-day';const BOOK_TITLE='毛毛的家书节';const BOOK_TOTAL=7;
function getInteractionLayer(el){if(!el)return null;if(el._interactionLayer)return el._interactionLayer;const isSvgGroup=el.namespaceURI==='http://www.w3.org/2000/svg'&&el.tagName.toLowerCase()==='g';if(!isSvgGroup||!el.hasAttribute('transform')){el._interactionLayer=el;return el}const layer=document.createElementNS('http://www.w3.org/2000/svg','g');layer.setAttribute('data-interaction-layer','');if(el.classList.contains('float')){el.classList.remove('float');layer.classList.add('float');layer.style.animationDelay=el.style.animationDelay||'';el.style.animationDelay=''}while(el.firstChild)layer.appendChild(el.firstChild);el.appendChild(layer);el._interactionLayer=layer;return layer}
function placeSpeechBubble(scene,el,msg){const er=el.getBoundingClientRect(),sr=scene.getBoundingClientRect(),b=document.createElement('div');b.className='speech-bubble';b.textContent=msg;b.style.maxWidth=Math.max(120,sr.width-24)+'px';b.style.overflow='hidden';b.style.textOverflow='ellipsis';b.style.whiteSpace='nowrap';scene.appendChild(b);const br=b.getBoundingClientRect();let left=er.left+er.width/2-sr.left,top=er.top-sr.top-br.height-10;if(top<8)top=Math.min(sr.height-br.height-8,er.bottom-sr.top+10);left=Math.max(12+br.width/2,Math.min(sr.width-12-br.width/2,left));Array.from(scene.querySelectorAll('.speech-bubble')).filter(x=>x!==b).forEach(other=>{const or=other.getBoundingClientRect();const overlaps=!(left+br.width/2<or.left-sr.left||left-br.width/2>or.right-sr.left||top+br.height<or.top-sr.top||top>or.bottom-sr.top);if(overlaps)top=Math.min(sr.height-br.height-8,or.bottom-sr.top+8)});b.style.left=left+'px';b.style.top=Math.max(8,top)+'px';b.style.transform='translateX(-50%)';setTimeout(()=>b.remove(),1500)}
function makeInteractive(el,animClass,msg){if(!el)return;const target=getInteractionLayer(el);el.classList.add('interactive');el.addEventListener('click',function(){if(el._busy)return;el._busy=true;target.classList.remove(animClass);void target.getBoundingClientRect();target.classList.add(animClass);if(msg){const scene=el.closest('.scene');if(scene)placeSpeechBubble(scene,el,msg)}setTimeout(()=>{target.classList.remove(animClass);el._busy=false},750)})}
const pages=document.querySelectorAll('.page'),total=pages.length,dots=document.getElementById('dots');let current=0;for(let i=0;i<total;i++){const d=document.createElement('span');if(i===0)d.classList.add('is-active');dots.appendChild(d)}function goTo(idx){if(idx<0||idx>=total)return;speechSynthesis.cancel();pages.forEach((p,i)=>p.classList.toggle('is-active',i===idx));dots.querySelectorAll('span').forEach((s,i)=>s.classList.toggle('is-active',i===idx));current=idx;document.getElementById('prev').disabled=idx===0;document.getElementById('next').disabled=idx===total-1;if(window.FO)FO.logProgress(BOOK_ID,idx,BOOK_TOTAL)}document.getElementById('prev').addEventListener('click',()=>goTo(current-1));document.getElementById('next').addEventListener('click',()=>goTo(current+1));document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo(current-1);if(e.key==='ArrowRight')goTo(current+1)});let _tx=0;document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX},{passive:true});document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-_tx;if(Math.abs(dx)>50)dx<0?goTo(current+1):goTo(current-1)});document.getElementById('readBtn').addEventListener('click',()=>{const text=pages[current].dataset.text;if(!text||!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=.85;u.pitch=1.1;speechSynthesis.speak(u)});goTo(0);makeInteractive(document.getElementById('p1-maomao'),'do-bounce','好多书！');makeInteractive(document.getElementById('p1-dad'),'do-bounce','今天家书节');makeInteractive(document.getElementById('p2-maomao'),'do-wobble','不是只有爸爸读？');makeInteractive(document.getElementById('p2-dad'),'do-bounce','全家都读');makeInteractive(document.getElementById('p3-mom'),'do-bounce','我读做饭书');makeInteractive(document.getElementById('p3-dad'),'do-bounce','我读地图');makeInteractive(document.getElementById('p3-doudou'),'do-bounce','我读故事');makeInteractive(document.getElementById('p4-maomao'),'do-bounce','我选月亮书');makeInteractive(document.getElementById('p5-maomao'),'do-bounce','这一页好玩');makeInteractive(document.getElementById('p5-mom'),'do-bounce','讲给我听');makeInteractive(document.getElementById('p6-maomao'),'do-bounce','放回书架');document.addEventListener('DOMContentLoaded',()=>{if(window.FO)FO.logHistory(BOOK_ID,BOOK_TITLE)});
</script>
