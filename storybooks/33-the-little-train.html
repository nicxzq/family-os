  <!-- PAGE 5 · 小火车跑起来 -->
  <div class="page" data-bg="yellow" data-text="呜——呜——！小火车绕着圆圈，欢快地跑起来啦！毛毛拍着翅膀笑：原来不是玩具坏了，是我没看说明书。说明书里都写着呢！">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <ellipse cx="200" cy="290" rx="185" ry="52" fill="#EAD98A"/>
        <ellipse cx="200" cy="290" rx="150" ry="40" fill="#F2E4A5"/>

        <ellipse cx="200" cy="248" rx="120" ry="46" fill="none" stroke="#4B7BA8" stroke-width="6"/>

        <g id="p5-train" transform="translate(116,222) rotate(-12)">

          <rect x="12" y="-7" width="18" height="13" rx="3" fill="#E56B5A"/>
          <rect x="-20" y="-27" width="13" height="13" rx="3" fill="#4B7BA8"/>
          <circle cx="-15" cy="9" r="5.5" fill="#2B2419"/>
          <circle cx="1" cy="9" r="5.5" fill="#2B2419"/>
          <circle cx="20" cy="9" r="4.5" fill="#2B2419"/>
          <g stroke="#8C7C66" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7">
            <path d="M-16 -34 q 5 -5 12 -3"/>
            <path d="M-20 -42 q 7 -6 15 -4"/>
          </g>
        </g>
        <text x="118" y="150" text-anchor="middle" font-size="17" fill="#E56B5A" font-weight="700">呜——呜——！</text>
        <!-- 毛毛 cheering inside the loop -->
        <g id="p5-maomao" transform="translate(238,214)">
          <ellipse cx="0" cy="8" rx="22" ry="24" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
          <circle cx="0" cy="-18" r="18" fill="#FFFDF6" stroke="#2B2419" stroke-width="1.5"/>
          <circle cx="-6" cy="-20" r="3" fill="#2B2419"/>
          <circle cx="7" cy="-20" r="3" fill="#2B2419"/>
          <polygon points="2,-13 14,-10 2,-7" fill="#F4C13E"/>
          <path d="M-7,-9 Q0,-2 8,-9" stroke="#2B2419" stroke-width="1.4" fill="none"/>
          <ellipse cx="-22" cy="-8" rx="8" ry="13" fill="#F4C13E" transform="rotate(-55 -22 -8)"/>
          <ellipse cx="22" cy="-8" rx="8" ry="13" fill="#F4C13E" transform="rotate(55 22 -8)"/>

        <!-- manual kept beside her like a treasure -->
        <g id="p5-manual" transform="translate(322,238)">

  <!-- LAST PAGE — end-card -->
  <div class="page" data-bg="blue" data-text="给小弟弟。不会的时候，别着急，先找找说明书——有人早就把方法，一步一步画好啦。">
    <div class="end-card">
      <h2>给小弟弟 🚂</h2>
      <p>不会的时候，别着急，先找找说明书——有人早就把方法，一步一步画好啦。</p>
      <p style="font-size:32px;color:#4B7BA8;font-weight:700;margin:16px 0;">"先看一看，说明书里都写着呢。"</p>
      <p style="font-size:16px;color:#5C4F3D;">新玩具、新拼图、新的小机器——盒子里那张画着 1、2、3 的纸，就是它的小秘密。</p>
      <button class="read-aloud" style="margin-top:24px;" onclick="goTo(0)">🔄 再讲一遍</button>

  <button class="nav-btn" id="prev" aria-label="上一页">←</button>

</div>
<script src="../fo-utils.js"></script>
<script>
  const BOOK_ID = '33-the-little-train'; const BOOK_TITLE = '毛毛的小火车'; const BOOK_TOTAL = 6;

  function getInteractionLayer(el) {
    if (!el) return null;
    if (el._interactionLayer) return el._interactionLayer;
    const isSvgGroup = el.namespaceURI === 'http://www.w3.org/2000/svg' && el.tagName.toLowerCase() === 'g';
    if (!isSvgGroup || !el.hasAttribute('transform')) {
      el._interactionLayer = el;
      return el;
    }
    const layer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    layer.setAttribute('data-interaction-layer', '');
    if (el.classList.contains('float')) {
      el.classList.remove('float');
      layer.classList.add('float');
      layer.style.animationDelay = el.style.animationDelay || '';
      el.style.animationDelay = '';
    }
    while (el.firstChild) layer.appendChild(el.firstChild);
    el.appendChild(layer);
    el._interactionLayer = layer;
    return layer;
  }

  function placeSpeechBubble(scene, el, msg) {
    const er = el.getBoundingClientRect();
    const sr = scene.getBoundingClientRect();
    const b = document.createElement('div');
    b.className = 'speech-bubble';
    b.textContent = msg;
    b.style.maxWidth = Math.max(120, sr.width - 24) + 'px';
    b.style.overflow = 'hidden';
    b.style.textOverflow = 'ellipsis';
    b.style.whiteSpace = 'nowrap';
    scene.appendChild(b);

    const br = b.getBoundingClientRect();
    let left = er.left + er.width / 2 - sr.left;
    let top = er.top - sr.top - br.height - 10;
    if (top < 8) top = Math.min(sr.height - br.height - 8, er.bottom - sr.top + 10);
    left = Math.max(12 + br.width / 2, Math.min(sr.width - 12 - br.width / 2, left));

    const bubbles = Array.from(scene.querySelectorAll('.speech-bubble')).filter(x => x !== b);
    for (const other of bubbles) {
      const or = other.getBoundingClientRect();
      const overlaps = !(left + br.width / 2 < or.left - sr.left || left - br.width / 2 > or.right - sr.left || top + br.height < or.top - sr.top || top > or.bottom - sr.top);
      if (overlaps) top = Math.min(sr.height - br.height - 8, or.bottom - sr.top + 8);
    }

    b.style.left = left + 'px';
    b.style.top = Math.max(8, top) + 'px';
    b.style.transform = 'translateX(-50%)';
    setTimeout(() => b.remove(), 1500);
  }

  function makeInteractive(el, animClass, msg) {
    if (!el) return;
    const target = getInteractionLayer(el);
    el.classList.add('interactive');
    el.addEventListener('click', function () {
      if (el._busy) return;
      el._busy = true;
      target.classList.remove(animClass);
      void target.getBoundingClientRect();
      target.classList.add(animClass);
      if (msg) {
        const scene = el.closest('.scene');
        if (scene) placeSpeechBubble(scene, el, msg);
      }
      setTimeout(() => { target.classList.remove(animClass); el._busy = false; }, 750);
    });
  }

  const pages = document.querySelectorAll('.page');
  const total  = pages.length;
  const dots   = document.getElementById('dots');
  let current  = 0;

  for (let i = 0; i < total; i++) {
    const d = document.createElement('span');
    if (i === 0) d.classList.add('is-active');
    dots.appendChild(d);
  }

  function goTo(idx) {
    if (idx < 0 || idx >= total) return;
    speechSynthesis.cancel();
    pages.forEach((p, i) => p.classList.toggle('is-active', i === idx));
    dots.querySelectorAll('span').forEach((s, i) => s.classList.toggle('is-active', i === idx));
    current = idx;
    document.getElementById('prev').disabled = idx === 0;
    document.getElementById('next').disabled = idx === total - 1;
    if (window.FO) FO.logProgress(BOOK_ID, idx, BOOK_TOTAL);
  }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('next').addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  let _tx = 0;
  document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - _tx;
    if (Math.abs(dx) > 50) dx < 0 ? goTo(current + 1) : goTo(current - 1);
  });

  document.getElementById('readBtn').addEventListener('click', () => {
    const text = pages[current].dataset.text;
    if (!text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 0.85; u.pitch = 1.1;
    speechSynthesis.speak(u);
  });

  goTo(0);

  // Interactions — one or two per scene page
  makeInteractive(document.getElementById('p1-maomao'), 'do-bounce', '新玩具！');
  makeInteractive(document.getElementById('p1-box'), 'do-wobble', '哗啦——');
  makeInteractive(document.getElementById('p1-train'), 'do-wobble', '呜呜？');
  makeInteractive(document.getElementById('p2-maomao'), 'do-shake', '拼不上嘛！');
  makeInteractive(document.getElementById('p2-train'), 'do-shake', '哎哟——');
  makeInteractive(document.getElementById('p3-dad'), 'do-bounce', '看，说明书。');
  makeInteractive(document.getElementById('p3-manual'), 'do-wobble', '一步一步画好啦');
  makeInteractive(document.getElementById('p3-maomao'), 'do-bounce', '咦？');
  makeInteractive(document.getElementById('p4-maomao'), 'do-bounce', '咔哒！');
  makeInteractive(document.getElementById('p4-dad'), 'do-bounce', '就是这样。');
  makeInteractive(document.getElementById('p4-track'), 'do-wobble', '连成圈啦！');
  makeInteractive(document.getElementById('p5-train'), 'do-bounce', '呜——呜——！');
  makeInteractive(document.getElementById('p5-maomao'), 'do-bounce', '都写着呢！');
  makeInteractive(document.getElementById('p5-manual'), 'do-wobble', '我的小秘密');

  document.addEventListener('DOMContentLoaded', () => {
    if (window.FO) FO.logHistory(BOOK_ID, BOOK_TITLE);
  });
</script>
<script src="/storybooks/booklist.js"></script>
<script>if (window.FO && window.FO.initBookNav) FO.initBookNav(BOOK_ID);</script>
