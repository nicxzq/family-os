<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "LXGW WenKai TC", "LXGW WenKai", serif;
    background: #FFF8E0;
    min-height: 100vh;
    overflow: hidden;
  }
  .book {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* 顶部条 */
  .top {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 32px;
    z-index: 20;
  }
  .back {
    text-decoration: none;
    color: #5C4F3D;
    font-size: 16px;
    background: rgba(255, 255, 255, 0.7);
    padding: 8px 16px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
  }
  .read-aloud {
    background: #E56B5A;
    color: white;
    border: 0;
    padding: 10px 18px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.1);
  }
  .read-aloud:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

  /* 每一页 */
  .page {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 40px 120px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .page.is-active {
    opacity: 1;
    pointer-events: auto;
  }

  /* 各页的背景 */
  .page[data-bg="cream"]   { background: #FFF8E0; }
  .page[data-bg="peach"]   { background: #FBE3D5; }
  .page[data-bg="mint"]    { background: #D7EBC9; }
  .page[data-bg="sky"]     { background: #D7E7F4; }
  .page[data-bg="yellow"]  { background: #FBE39A; }
  .page[data-bg="coral"]   { background: #F4A799; }

  .scene {
    flex: 1;
    min-height: 0;
    position: relative;
    width: 100%;
    overflow: hidden;
  }
  .scene svg {
    width: 100%;
    height: 100%;
  }

  .text {
    flex-shrink: 0;
    text-align: center;
    max-width: 100%;
  }
  .text h2 {
    font-size: clamp(24px, 5vw, 38px);
    line-height: 1.4;
    color: #2B2419;
    font-weight: 500;
    text-wrap: balance;
  }
  .text .big {
    font-size: clamp(32px, 6vw, 52px);
    line-height: 1.3;
    color: #E56B5A;
    font-weight: 700;
    margin-top: 12px;
  }
  .text .small {
    font-size: 18px;
    color: #5C4F3D;
    margin-top: 16px;
  }

  /* 左右导航按钮：固定在页面左右边缘垂直居中 */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.88);
    border: 0;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(0, 0, 0, 0.1);
    font-family: inherit;
    color: #2B2419;
    z-index: 20;
    backdrop-filter: blur(4px);
  }
  .nav-btn:disabled { opacity: 0.3; pointer-events: none; }
  .nav-btn:active { transform: translateY(calc(-50% + 1px)); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
  #prev { left: 12px; }
  #next { right: 12px; }

  /* 进度圆点：保留在底部居中 */
  .dots-wrap {
    position: absolute;
    bottom: 24px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    z-index: 20;
  }
  .dots { display: flex; gap: 6px; }
  .dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(43, 36, 25, 0.2);
    transition: background 0.3s, transform 0.3s;
  }
  .dots span.is-active {
    background: #E56B5A;
    transform: scale(1.4);
  }

  /* 小动画 */
  .float {
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .wiggle {
    animation: wiggle 2.5s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  .pop {
    animation: pop 0.6s ease;
  }
  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .end-card {
    background: white;
    padding: 32px;
    border-radius: 24px;
    max-width: 480px;
    box-shadow: 0 8px 0 rgba(0,0,0,0.06), 0 24px 48px -16px rgba(0,0,0,0.2);
    text-align: center;
  }
  .end-card h2 {
    font-size: 28px;
    color: #E56B5A;
    margin-bottom: 16px;
  }
  .end-card p {
    font-size: 19px;
    color: #2B2419;
    line-height: 1.7;
    margin-bottom: 12px;
  }

  /* 互动元素 */
  .interactive {
    cursor: pointer;
    transform-box: fill-box;
    transform-origin: center center;
  }
  .interactive:hover { opacity: 0.9; }

  /* 一次性动画类 */
  .do-bounce {
    animation: iBounce 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) both !important;
  }
  @keyframes iBounce {
    0%   { transform: translateY(0) scale(1); }
    25%  { transform: translateY(-18px) scale(1.15); }
    55%  { transform: translateY(-4px) scale(0.96); }
    75%  { transform: translateY(-8px) scale(1.05); }
    100% { transform: translateY(0) scale(1); }
  }
  .do-shake {
    animation: iShake 0.55s ease both !important;
  }
  @keyframes iShake {
    0%,100% { transform: rotate(0deg); }
    18%     { transform: rotate(-22deg); }
    38%     { transform: rotate(18deg); }
    58%     { transform: rotate(-14deg); }
    78%     { transform: rotate(9deg); }
  }
  .do-wobble {
    animation: iWobble 0.7s ease both !important;
  }
  @keyframes iWobble {
    0%,100% { transform: scaleX(1) scaleY(1); }
    20%     { transform: scaleX(1.25) scaleY(0.75); }
    45%     { transform: scaleX(0.85) scaleY(1.2); }
    65%     { transform: scaleX(1.1) scaleY(0.9); }
    80%     { transform: scaleX(0.96) scaleY(1.04); }
  }

  /* 语音气泡 */
  .speech-bubble {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 20px;
    font-family: "LXGW WenKai TC", serif;
    box-shadow: 0 3px 0 rgba(0, 0, 0, 0.12);
    pointer-events: none;
    white-space: nowrap;
    z-index: 50;
    animation: bPop 0.3s ease;
  }
  @keyframes bPop {
    from { transform: translateX(-50%) scale(0); opacity: 0; }
    to   { transform: translateX(-50%) scale(1); opacity: 1; }
  }

  /* — page flip — */
  .book { perspective: 1400px; }
  .page { backface-visibility: hidden; }
  .flip-out-fwd { animation: fOutFwd 0.4s cubic-bezier(0.4,0,1,1) forwards; pointer-events: none; z-index: 5; opacity: 1; transform-origin: left center; }
  .flip-in-fwd  { animation: fInFwd 0.4s cubic-bezier(0,0,0.6,1) forwards; pointer-events: none; z-index: 4; transform-origin: right center; }
  .flip-out-bwd { animation: fOutBwd 0.4s cubic-bezier(0.4,0,1,1) forwards; pointer-events: none; z-index: 5; opacity: 1; transform-origin: right center; }
  .flip-in-bwd  { animation: fInBwd 0.4s cubic-bezier(0,0,0.6,1) forwards; pointer-events: none; z-index: 4; transform-origin: left center; }
  @keyframes fOutFwd { 0% { transform: rotateY(0deg); opacity: 1; } 100% { transform: rotateY(-80deg); opacity: 0; } }
  @keyframes fInFwd  { 0% { transform: rotateY(80deg); opacity: 0; } 100% { transform: rotateY(0deg); opacity: 1; } }
  @keyframes fOutBwd { 0% { transform: rotateY(0deg); opacity: 1; } 100% { transform: rotateY(80deg); opacity: 0; } }
  @keyframes fInBwd  { 0% { transform: rotateY(-80deg); opacity: 0; } 100% { transform: rotateY(0deg); opacity: 1; } }
</style>
</head>
<body>

<div class="book">

  <div class="top">
    <a class="back" href="../for-youngest.html">← 回绘本目录</a>
    <button class="read-aloud" id="readBtn">🔊 念给我听</button>
    <a href="../dashboard.html" class="dash-link" style="background:rgba(255,255,255,0.7);padding:8px 14px;border-radius:999px;text-decoration:none;font-size:16px;backdrop-filter:blur(8px);" title="仪表盘">📊</a>
  </div>

  <!-- 第1页：开场 -->
  <div class="page is-active" data-bg="yellow" data-text="这是一只小小鸡，叫做毛毛。她和卡梅拉是好朋友。但是——毛毛和卡梅拉不太一样。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- 太阳 -->
        <circle cx="340" cy="60" r="32" fill="#F4C13E"/>
        <!-- 草地 -->
        <ellipse cx="200" cy="280" rx="220" ry="40" fill="#6FA86D"/>
        <!-- 小鸡毛毛 -->
        <g id="p1-mao" class="wiggle">
          <ellipse cx="200" cy="200" rx="50" ry="55" fill="#FFFDF6"/>
          <circle cx="200" cy="140" r="42" fill="#FFFDF6"/>
          <!-- 嘴 -->
          <polygon points="200,150 215,158 200,166" fill="#E56B5A"/>
          <!-- 眼睛 -->
          <circle cx="186" cy="135" r="4" fill="#2B2419"/>
          <circle cx="214" cy="135" r="4" fill="#2B2419"/>
          <!-- 翅膀 -->
          <ellipse cx="160" cy="200" rx="14" ry="22" fill="#FBE39A" transform="rotate(-15 160 200)"/>
          <ellipse cx="240" cy="200" rx="14" ry="22" fill="#FBE39A" transform="rotate(15 240 200)"/>
          <!-- 脚 -->
          <line x1="185" y1="250" x2="180" y2="270" stroke="#E56B5A" stroke-width="4" stroke-linecap="round"/>
          <line x1="215" y1="250" x2="220" y2="270" stroke="#E56B5A" stroke-width="4" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>这是一只小小鸡，叫做<span style="color:#E56B5A;">毛毛</span>。</h2>
      <p class="small">她和卡梅拉是好朋友。<br>但是——毛毛和卡梅拉不太一样。</p>
    </div>
  </div>

  <!-- 第2页：毛毛不爱试新东西 -->
  <div class="page" data-bg="peach" data-text="毛毛不喜欢新东西。新的食物——不要！新的游戏——不玩！新的朋友——躲起来！">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- 新东西：飞盘、新水果、新朋友剪影 -->
        <g transform="translate(80,150)">
          <ellipse cx="0" cy="0" rx="34" ry="12" fill="#6FA86D"/>
          <ellipse cx="0" cy="-6" rx="34" ry="6" fill="#5B8E58"/>
        </g>
        <g transform="translate(200,80)">
          <circle r="28" fill="#A8C2DE"/>
          <text x="0" y="6" font-size="28" text-anchor="middle" fill="#2B2419">?</text>
        </g>
        <g transform="translate(320,150)">
          <circle r="26" fill="#F4C13E"/>
          <text x="0" y="6" font-size="28" text-anchor="middle" fill="#2B2419">?</text>
        </g>
        <!-- 毛毛躲起来 -->
        <g id="p2-mao" transform="translate(200,250)">
          <ellipse cx="0" cy="0" rx="60" ry="20" fill="#2B2419" opacity="0.15"/>
          <ellipse cx="0" cy="-20" rx="44" ry="48" fill="#FFFDF6"/>
          <!-- 眼睛闭着 -->
          <path d="M -14,-30 Q -10,-26 -6,-30" stroke="#2B2419" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M 6,-30 Q 10,-26 14,-30" stroke="#2B2419" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <polygon points="-2,-22 8,-18 -2,-14" fill="#E56B5A"/>
          <!-- 翅膀挡脸 -->
          <ellipse cx="-30" cy="-10" rx="12" ry="20" fill="#FBE39A" transform="rotate(30 -30 -10)"/>
          <ellipse cx="30" cy="-10" rx="12" ry="20" fill="#FBE39A" transform="rotate(-30 30 -10)"/>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>毛毛不喜欢<span style="color:#E56B5A;">新东西</span>。</h2>
      <p class="small">新的食物——不要！<br>新的游戏——不玩！<br>新的朋友——躲起来！</p>
    </div>
  </div>

  <!-- 第3页：卡梅拉不一样 -->
  <div class="page" data-bg="sky" data-text="可卡梅拉不一样。卡梅拉说：我要看看大海！卡梅拉说：我要去月亮！卡梅拉总是先说一句话——『试一试』。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- 海浪 -->
        <path d="M0,220 Q100,200 200,220 T400,220 L400,320 L0,320 Z" fill="#A8C2DE"/>
        <path d="M0,240 Q100,225 200,240 T400,240 L400,320 L0,320 Z" fill="#7BA8CC"/>
        <!-- 月亮 -->
        <circle cx="340" cy="60" r="28" fill="#FBE39A"/>
        <circle cx="335" cy="55" r="26" fill="#FFF8E0"/>
        <!-- 卡梅拉（小鸡）勇敢站着 -->
        <g id="p3-kamela" class="float" transform="translate(180,200)">
          <ellipse cx="0" cy="0" rx="32" ry="38" fill="#FFFDF6"/>
          <circle cx="0" cy="-42" r="30" fill="#FFFDF6"/>
          <polygon points="0,-32 15,-26 0,-20" fill="#E56B5A"/>
          <circle cx="-12" cy="-46" r="3.5" fill="#2B2419"/>
          <circle cx="12" cy="-46" r="3.5" fill="#2B2419"/>
          <!-- 笑 -->
          <path d="M -8,-32 Q 0,-26 8,-32" stroke="#2B2419" stroke-width="2" fill="none"/>
          <!-- 翅膀举起 -->
          <ellipse cx="-32" cy="-15" rx="10" ry="22" fill="#FBE39A" transform="rotate(-40 -32 -15)"/>
          <ellipse cx="32" cy="-15" rx="10" ry="22" fill="#FBE39A" transform="rotate(40 32 -15)"/>
        </g>
        <!-- 对话气泡 -->
        <g transform="translate(280,100)">
          <ellipse cx="0" cy="0" rx="46" ry="28" fill="white"/>
          <path d="M -36,16 L -50,30 L -28,18 Z" fill="white"/>
          <text x="0" y="6" font-size="18" text-anchor="middle" fill="#E56B5A" font-weight="700">试一试！</text>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>可<span style="color:#E56B5A;">卡梅拉</span>不一样。</h2>
      <p class="small">卡梅拉要看大海。<br>卡梅拉要去月亮。<br>她总是先说一句话——</p>
      <p class="big">"试一试"</p>
    </div>
  </div>

  <!-- 第4页：毛毛发现的秘密 -->
  <div class="page" data-bg="mint" data-text="有一天，毛毛偷偷尝了一口新水果。哇——是甜的！毛毛悄悄说：『再试一口⋯⋯』">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- 水果（草莓） -->
        <g transform="translate(280,140)">
          <path d="M -30,-20 L 0,30 L 30,-20 Q 0,-50 -30,-20 Z" fill="#E56B5A"/>
          <g fill="#6FA86D">
            <ellipse cx="-12" cy="-30" rx="10" ry="6"/>
            <ellipse cx="12" cy="-30" rx="10" ry="6"/>
            <ellipse cx="0" cy="-36" rx="8" ry="6"/>
          </g>
          <circle cx="-8" cy="0" r="2" fill="#FBE39A"/>
          <circle cx="8" cy="-5" r="2" fill="#FBE39A"/>
          <circle cx="0" cy="10" r="2" fill="#FBE39A"/>
        </g>
        <!-- 毛毛 偷偷尝 -->
        <g id="p4-mao" transform="translate(150,200)" class="float">
          <ellipse cx="0" cy="0" rx="42" ry="46" fill="#FFFDF6"/>
          <circle cx="0" cy="-50" r="36" fill="#FFFDF6"/>
          <polygon points="20,-50 38,-45 22,-40" fill="#E56B5A"/>
          <!-- 眼睛大睁 -->
          <circle cx="-10" cy="-54" r="4.5" fill="#2B2419"/>
          <circle cx="14" cy="-54" r="4.5" fill="#2B2419"/>
          <circle cx="-9" cy="-55" r="1.5" fill="white"/>
          <circle cx="15" cy="-55" r="1.5" fill="white"/>
          <!-- 翅膀 -->
          <ellipse cx="36" cy="-10" rx="12" ry="20" fill="#FBE39A" transform="rotate(20 36 -10)"/>
        </g>
        <!-- 闪光 -->
        <g transform="translate(220,80)" class="pop">
          <text font-size="32" text-anchor="middle" fill="#F4C13E">✨</text>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>有一天，毛毛偷偷尝了一口<span style="color:#E56B5A;">新水果</span>。</h2>
      <p class="big">哇——是甜的！</p>
      <p class="small">毛毛悄悄说：<br>"再试一口⋯⋯再试一口⋯⋯"</p>
    </div>
  </div>

  <!-- 第5页：毛毛慢慢喜欢上"试一试" -->
  <div class="page" data-bg="coral" data-text="毛毛试了新游戏。毛毛认识了新朋友。毛毛跟着卡梅拉跑啊跑——发现：试一试，没有那么可怕。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- 太阳 -->
        <circle cx="340" cy="60" r="30" fill="#FBE39A"/>
        <!-- 三只小鸡一起跑 -->
        <g id="p5-chick1" transform="translate(80,210)" class="float">
          <ellipse cx="0" cy="0" rx="28" ry="32" fill="#FFFDF6"/>
          <circle cx="0" cy="-36" r="24" fill="#FFFDF6"/>
          <circle cx="-7" cy="-38" r="3" fill="#2B2419"/>
          <circle cx="7" cy="-38" r="3" fill="#2B2419"/>
          <polygon points="0,-32 12,-28 0,-24" fill="#E56B5A"/>
          <path d="M -6,-26 Q 0,-22 6,-26" stroke="#2B2419" stroke-width="1.5" fill="none"/>
        </g>
        <g id="p5-chick2" transform="translate(190,200)" class="float" style="animation-delay: -1s;">
          <ellipse cx="0" cy="0" rx="32" ry="36" fill="#FFFDF6"/>
          <circle cx="0" cy="-40" r="28" fill="#FFFDF6"/>
          <circle cx="-8" cy="-42" r="3.5" fill="#2B2419"/>
          <circle cx="8" cy="-42" r="3.5" fill="#2B2419"/>
          <polygon points="0,-36 14,-32 0,-28" fill="#E56B5A"/>
          <path d="M -8,-30 Q 0,-24 8,-30" stroke="#2B2419" stroke-width="2" fill="none"/>
          <ellipse cx="-30" cy="-12" rx="10" ry="18" fill="#FBE39A" transform="rotate(-30 -30 -12)"/>
        </g>
        <g id="p5-chick3" transform="translate(310,210)" class="float" style="animation-delay: -2s;">
          <ellipse cx="0" cy="0" rx="28" ry="32" fill="#FFFDF6"/>
          <circle cx="0" cy="-36" r="24" fill="#FFFDF6"/>
          <circle cx="-7" cy="-38" r="3" fill="#2B2419"/>
          <circle cx="7" cy="-38" r="3" fill="#2B2419"/>
          <polygon points="0,-32 12,-28 0,-24" fill="#E56B5A"/>
          <path d="M -6,-26 Q 0,-22 6,-26" stroke="#2B2419" stroke-width="1.5" fill="none"/>
        </g>
        <!-- 心 -->
        <text x="150" y="80" font-size="24" fill="white">♥</text>
        <text x="250" y="100" font-size="20" fill="white">♥</text>
      </svg>
    </div>
    <div class="text">
      <h2 style="color:white;">毛毛跟着卡梅拉跑啊跑——</h2>
      <p class="big" style="color:white;">原来"试一试"<br>没有那么可怕。</p>
    </div>
  </div>

  <!-- 第6页：结尾 -->
  <div class="page" data-bg="yellow" data-text="所以呀。小弟弟。下次你看到新东西的时候，悄悄说一句——『试一试』。试了不喜欢，没关系；试了喜欢，那就赚到了。">
    <div class="end-card">
      <h2>给小弟弟 ❤️</h2>
      <p>下次看到<strong style="color:#E56B5A;">新东西</strong>的时候，</p>
      <p>悄悄说一句——</p>
      <p style="font-size: 32px; color: #E56B5A; font-weight: 700; margin: 16px 0;">"试一试。"</p>
      <p style="font-size: 16px; color: #5C4F3D;">试了不喜欢——没关系。<br>试了喜欢——就赚到了。</p>
      <button class="read-aloud" style="margin-top: 24px;" onclick="goTo(0)">🔄 再讲一遍</button>
    </div>
  </div>

  <button class="nav-btn" id="prev" aria-label="上一页">←</button>
  <div class="dots-wrap"><div class="dots" id="dots"></div></div>
  <button class="nav-btn" id="next" aria-label="下一页">→</button>

</div>

<script src="../fo-utils.js"></script>
<script>
  const BOOK_ID = '01-try-it'; const BOOK_TITLE = '试一试'; const BOOK_TOTAL = 5;
  function getInteractionLayer(el) {
    if (!el) return null;
    if (el._interactionLayer) return el._interactionLayer;
    const isSvgGroup = el.namespaceURI === 'http://www.w3.org/2000/svg' && el.tagName.toLowerCase() === 'g';
    if (!isSvgGroup || !el.hasAttribute('transform')) {
      el._interactionLayer = el;
      return el;
    }
    const layer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    layer.setAttribute('data-interaction-layer', '');
    if (el.classList.contains('float')) {
      el.classList.remove('float');
      layer.classList.add('float');
      layer.style.animationDelay = el.style.animationDelay || '';
      el.style.animationDelay = '';
    }
    while (el.firstChild) layer.appendChild(el.firstChild);
    el.appendChild(layer);
    el._interactionLayer = layer;
    return layer;
  }

  function placeSpeechBubble(scene, el, msg) {
    const er = el.getBoundingClientRect();
    const sr = scene.getBoundingClientRect();
    const b = document.createElement('div');
    b.className = 'speech-bubble';
    b.textContent = msg;
    b.style.maxWidth = Math.max(120, sr.width - 24) + 'px';
    b.style.overflow = 'hidden';
    b.style.textOverflow = 'ellipsis';
    b.style.whiteSpace = 'nowrap';
    scene.appendChild(b);

    const br = b.getBoundingClientRect();
    let left = er.left + er.width / 2 - sr.left;
    let top = er.top - sr.top - br.height - 10;
    if (top < 8) top = Math.min(sr.height - br.height - 8, er.bottom - sr.top + 10);
    left = Math.max(12 + br.width / 2, Math.min(sr.width - 12 - br.width / 2, left));

    const bubbles = Array.from(scene.querySelectorAll('.speech-bubble')).filter(x => x !== b);
    for (const other of bubbles) {
      const or = other.getBoundingClientRect();
      const overlaps = !(left + br.width / 2 < or.left - sr.left || left - br.width / 2 > or.right - sr.left || top + br.height < or.top - sr.top || top > or.bottom - sr.top);
      if (overlaps) top = Math.min(sr.height - br.height - 8, or.bottom - sr.top + 8);
    }

    b.style.left = left + 'px';
    b.style.top = Math.max(8, top) + 'px';
    b.style.transform = 'translateX(-50%)';
    setTimeout(() => b.remove(), 1500);
  }

  function makeInteractive(el, animClass, msg) {
    if (!el) return;
    const target = getInteractionLayer(el);
    el.classList.add('interactive');
    el.addEventListener('click', function () {
      if (el._busy) return;
      el._busy = true;
      target.classList.remove(animClass);
      void target.getBoundingClientRect();
      target.classList.add(animClass);
      if (msg) {
        const scene = el.closest('.scene');
        if (scene) placeSpeechBubble(scene, el, msg);
      }
      setTimeout(() => { target.classList.remove(animClass); el._busy = false; }, 750);
    });
  }

  const pages = document.querySelectorAll('.page');
  const total = pages.length;
  const dots = document.getElementById('dots');
  let current = 0;

  for (let i = 0; i < total; i++) {
    const d = document.createElement('span');
    if (i === 0) d.classList.add('is-active');
    dots.appendChild(d);
  }

  function goTo(idx) {
    if (idx < 0 || idx >= total) return;
    stopNarration();

    if (idx === current) {
      pages.forEach((p, i) => {
        p.classList.toggle('is-active', i === idx);
        p.classList.remove('flip-out-fwd', 'flip-in-fwd', 'flip-out-bwd', 'flip-in-bwd');
        p.style.opacity = '';
        p.style.pointerEvents = '';
      });
      current = idx;
      document.getElementById('prev').disabled = idx === 0;
      document.getElementById('next').disabled = idx === total - 1;
      dots.querySelectorAll('span').forEach((s, i) => s.classList.toggle('is-active', i === idx));
      if (window.FO) FO.logProgress(BOOK_ID, idx, BOOK_TOTAL);
      return;
    }

    const dir = idx > current ? 'fwd' : 'bwd';
    const outClass = dir === 'fwd' ? 'flip-out-fwd' : 'flip-out-bwd';
    const inClass  = dir === 'fwd' ? 'flip-in-fwd'  : 'flip-in-bwd';
    const oldPage  = pages[current];
    const newPage  = pages[idx];

    // prepare new page (hidden, no is-active yet)
    newPage.style.opacity = '0';
    newPage.style.pointerEvents = 'none';

    oldPage.classList.add(outClass);
    newPage.classList.add(inClass);

    function cleanup() {
      oldPage.classList.remove('is-active', outClass);
      newPage.classList.remove(inClass);
      oldPage.style.opacity = '';
      newPage.style.opacity = '';
      newPage.style.pointerEvents = '';
      newPage.classList.add('is-active');
      current = idx;
      document.getElementById('prev').disabled = idx === 0;
      document.getElementById('next').disabled = idx === total - 1;
      dots.querySelectorAll('span').forEach((s, i) => s.classList.toggle('is-active', i === idx));
      if (window.FO) FO.logProgress(BOOK_ID, idx, BOOK_TOTAL);
    }

    newPage.addEventListener('animationend', cleanup, { once: true });
  }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('next').addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  let _tx = 0;
  document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - _tx;
    if (Math.abs(dx) > 50) dx < 0 ? goTo(current + 1) : goTo(current - 1);
  });

  // 朗读：优先播放 GPT-SoVITS 配音（default 声音），缺失时回退到浏览器朗读
  var _foAudio = null;

  function speakBrowser(text) {
    if (!text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 0.85;
    u.pitch = 1.1;
    speechSynthesis.speak(u);
  }

  function stopNarration() {
    if (window.speechSynthesis) speechSynthesis.cancel();
    if (_foAudio) { _foAudio.pause(); _foAudio = null; }
  }

  document.getElementById('readBtn').addEventListener('click', () => {
    stopNarration();
    const text = pages[current].dataset.text;
    const src = `audio/01-try-it/page-${current + 1}.wav`;
    const audio = new Audio(src);
    _foAudio = audio;
    // 配音文件不存在 / 加载失败时，回退到浏览器朗读
    audio.addEventListener('error', () => { _foAudio = null; speakBrowser(text); });
    audio.play().catch(() => { _foAudio = null; speakBrowser(text); });
  });

  goTo(0);
  makeInteractive(document.getElementById('p1-mao'), 'do-bounce', '你好呀！👋');
  makeInteractive(document.getElementById('p2-mao'), 'do-shake', '不要——！😤');
  makeInteractive(document.getElementById('p3-kamela'), 'do-bounce', '试一试！🐣');
  makeInteractive(document.getElementById('p4-mao'), 'do-bounce', '哇，甜的！😍');
  ['p5-chick1','p5-chick2','p5-chick3'].forEach(id => makeInteractive(document.getElementById(id), 'do-bounce', '♥'));
  document.addEventListener('DOMContentLoaded', () => {
    if (window.FO) FO.logHistory(BOOK_ID, BOOK_TITLE);
  });
</script>
</body>
</html>
