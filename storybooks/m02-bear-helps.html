<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>贝贝爱帮忙 · 绘本</title>
<meta name="description" content="小熊贝贝发现帮助别人是最快乐的事。">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"LXGW WenKai TC","LXGW WenKai",serif;background:#FFF8E0;min-height:100vh;overflow:hidden;}
  .book{width:100vw;height:100vh;position:relative;overflow:hidden;perspective:1400px;}
  .top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:20px 32px;z-index:20;}
  .back{text-decoration:none;color:#5C4F3D;font-size:16px;background:rgba(255,255,255,0.7);padding:8px 16px;border-radius:999px;backdrop-filter:blur(8px);}
  .read-aloud{background:#E56B5A;color:white;border:0;padding:10px 18px;border-radius:999px;font-family:inherit;font-size:16px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.1);}
  .page{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:80px 40px 120px;opacity:0;pointer-events:none;transition:opacity .6s ease;}
  .page.is-active{opacity:1;pointer-events:auto;}
  .page[data-bg="peach"]{background:#FBE3D5;}
  .page[data-bg="mint"]{background:#D7EBC9;}
  .page[data-bg="sky"]{background:#D7E7F4;}
  .page[data-bg="yellow"]{background:#FBE39A;}
  .page[data-bg="coral"]{background:#F4A799;}
  .page[data-bg="cream"]{background:#FFF8E0;}
  .scene{flex:1;min-height:0;position:relative;width:100%;overflow:hidden;}
  .scene svg{width:100%;height:100%;}
  .text{flex-shrink:0;text-align:center;max-width:100%;}
  .text h2{font-size:clamp(24px,5vw,38px);line-height:1.4;color:#2B2419;font-weight:500;text-wrap:balance;}
  .text .big{font-size:clamp(30px,5.5vw,48px);line-height:1.3;color:#E56B5A;font-weight:700;margin-top:12px;}
  .text .small{font-size:18px;color:#5C4F3D;margin-top:16px;}
  .nav-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.88);border:0;width:56px;height:56px;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.1);font-family:inherit;color:#2B2419;z-index:20;backdrop-filter:blur(4px);}
  .nav-btn:disabled{opacity:.3;pointer-events:none;}
  #prev{left:12px;}#next{right:12px;}
  .dots-wrap{position:absolute;bottom:24px;left:0;right:0;display:flex;justify-content:center;z-index:20;}
  .dots{display:flex;gap:6px;}
  .dots span{width:8px;height:8px;border-radius:50%;background:rgba(43,36,25,.2);transition:background .3s,transform .3s;}
  .dots span.is-active{background:#E56B5A;transform:scale(1.4);}
  .float{animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .wiggle{animation:wiggle 2.5s ease-in-out infinite;transform-origin:center bottom;}
  @keyframes wiggle{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
  .do-bounce{animation:iBounce .6s cubic-bezier(.36,.07,.19,.97) both!important;}
  @keyframes iBounce{0%{transform:translateY(0) scale(1);}25%{transform:translateY(-18px) scale(1.15);}55%{transform:translateY(-4px) scale(.96);}75%{transform:translateY(-8px) scale(1.05);}100%{transform:translateY(0) scale(1);}}
  .do-shake{animation:iShake .55s ease both!important;}
  @keyframes iShake{0%,100%{transform:rotate(0);}18%{transform:rotate(-22deg);}38%{transform:rotate(18deg);}58%{transform:rotate(-14deg);}78%{transform:rotate(9deg);}}
  .interactive{cursor:pointer;transform-box:fill-box;transform-origin:center center;}
  .interactive:hover{opacity:.9;}
  .speech-bubble{position:absolute;top:0;left:50%;transform:translateX(-50%);background:white;border-radius:999px;padding:6px 16px;font-size:20px;font-family:"LXGW WenKai TC",serif;box-shadow:0 3px 0 rgba(0,0,0,.12);pointer-events:none;white-space:nowrap;z-index:50;animation:bPop .3s ease;}
  @keyframes bPop{from{transform:translateX(-50%) scale(0);opacity:0;}to{transform:translateX(-50%) scale(1);opacity:1;}}
  .flip-out-fwd{animation:fOutFwd .4s cubic-bezier(.4,0,1,1) forwards;pointer-events:none;z-index:5;opacity:1;transform-origin:left center;}
  .flip-in-fwd{animation:fInFwd .4s cubic-bezier(0,0,.6,1) forwards;pointer-events:none;z-index:4;transform-origin:right center;}
  .flip-out-bwd{animation:fOutBwd .4s cubic-bezier(.4,0,1,1) forwards;pointer-events:none;z-index:5;opacity:1;transform-origin:right center;}
  .flip-in-bwd{animation:fInBwd .4s cubic-bezier(0,0,.6,1) forwards;pointer-events:none;z-index:4;transform-origin:left center;}
  @keyframes fOutFwd{0%{transform:rotateY(0);opacity:1;}100%{transform:rotateY(-80deg);opacity:0;}}
  @keyframes fInFwd{0%{transform:rotateY(80deg);opacity:0;}100%{transform:rotateY(0);opacity:1;}}
  @keyframes fOutBwd{0%{transform:rotateY(0);opacity:1;}100%{transform:rotateY(80deg);opacity:0;}}
  @keyframes fInBwd{0%{transform:rotateY(-80deg);opacity:0;}100%{transform:rotateY(0);opacity:1;}}
  .end-card{background:white;padding:32px;border-radius:24px;max-width:480px;box-shadow:0 8px 0 rgba(0,0,0,.06),0 24px 48px -16px rgba(0,0,0,.2);text-align:center;}
  .end-card h2{font-size:28px;color:#E56B5A;margin-bottom:16px;}
  .end-card p{font-size:19px;color:#2B2419;line-height:1.7;margin-bottom:12px;}
</style>
</head>
<body>
<div class="book">
  <div class="top">
    <a class="back" href="../for-middle.html">← 回绘本目录</a>
    <button class="read-aloud" id="readBtn">🔊 念给我听</button>
  </div>

  <!-- P1: Beibei sees grandma struggling -->
  <div class="page is-active" data-bg="peach" data-text="有一天，贝贝看见奶奶提着一袋很重的东西，走得慢慢的。贝贝停下来，看了看。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <ellipse cx="200" cy="290" rx="200" ry="35" fill="#B5D4A8" opacity=".3"/>
        <!-- Grandma bear -->
        <g id="p1-grandma" transform="translate(240,220)">
          <ellipse cx="0" cy="0" rx="32" ry="36" fill="#C8A07A"/>
          <ellipse cx="0" cy="8" rx="19" ry="22" fill="#E8C49A" opacity=".6"/>
          <circle cx="0" cy="-42" r="27" fill="#C8A07A"/>
          <circle cx="-20" cy="-62" r="11" fill="#C8A07A"/>
          <circle cx="-20" cy="-62" r="6" fill="#E8A080"/>
          <circle cx="20" cy="-62" r="11" fill="#C8A07A"/>
          <circle cx="20" cy="-62" r="6" fill="#E8A080"/>
          <!-- Glasses -->
          <circle cx="-9" cy="-45" r="6" fill="none" stroke="#8C7C66" stroke-width="1.5"/>
          <circle cx="9" cy="-45" r="6" fill="none" stroke="#8C7C66" stroke-width="1.5"/>
          <line x1="-3" y1="-45" x2="3" y2="-45" stroke="#8C7C66" stroke-width="1.5"/>
          <ellipse cx="0" cy="-34" rx="9" ry="6" fill="#E8C49A"/>
          <path d="M -7,-30 Q 0,-26 7,-30" stroke="#8C5A4A" stroke-width="1.5" fill="none"/>
          <!-- Cane and bag -->
          <line x1="-28" y1="-5" x2="-24" y2="45" stroke="#8C6B4A" stroke-width="3" stroke-linecap="round"/>
          <g transform="translate(28,15)">
            <rect x="-14" y="-8" width="28" height="36" rx="4" fill="#4B7BA8" opacity=".8"/>
            <line x1="-8" y1="-8" x2="-8" y2="-18" stroke="#4B7BA8" stroke-width="2"/>
            <line x1="8" y1="-8" x2="8" y2="-18" stroke="#4B7BA8" stroke-width="2"/>
          </g>
          <!-- Sweat drops -->
          <ellipse cx="40" cy="-10" rx="4" ry="6" fill="#A8C2DE" opacity=".7"/>
          <ellipse cx="48" cy="5" rx="3" ry="5" fill="#A8C2DE" opacity=".5"/>
        </g>
        <!-- Beibei watching -->
        <g id="p1-bear" transform="translate(120,235)">
          <ellipse cx="0" cy="0" rx="28" ry="32" fill="#C8966A"/>
          <ellipse cx="0" cy="6" rx="17" ry="18" fill="#E8C49A" opacity=".7"/>
          <circle cx="0" cy="-36" r="24" fill="#C8966A"/>
          <circle cx="-17" cy="-54" r="10" fill="#C8966A"/>
          <circle cx="-17" cy="-54" r="6" fill="#E8A080"/>
          <circle cx="17" cy="-54" r="10" fill="#C8966A"/>
          <circle cx="17" cy="-54" r="6" fill="#E8A080"/>
          <!-- Observing eyes -->
          <circle cx="-7" cy="-40" r="4" fill="#2B2419"/>
          <circle cx="7" cy="-40" r="4" fill="#2B2419"/>
          <circle cx="-6" cy="-42" r="1.5" fill="white"/>
          <ellipse cx="0" cy="-28" rx="8" ry="5" fill="#E8C49A"/>
          <circle cx="-2" cy="-29" r="1.5" fill="#8C5A4A"/>
          <circle cx="2" cy="-29" r="1.5" fill="#8C5A4A"/>
        </g>
        <!-- Thought bubble -->
        <g transform="translate(140,155)">
          <circle cx="-20" cy="20" r="5" fill="white" opacity=".7"/>
          <circle cx="-10" cy="10" r="7" fill="white" opacity=".8"/>
          <rect x="-35" y="-22" width="70" height="30" rx="15" fill="white" opacity=".9"/>
          <text x="0" y="-5" font-size="12" text-anchor="middle" fill="#5C4F3D">我可以帮忙……</text>
          <text x="0" y="9" font-size="12" text-anchor="middle" fill="#E56B5A">对不对？</text>
        </g>
      </svg>
    </div>
    <div class="text">
      <h2>奶奶的袋子<span style="color:#E56B5A">好重好重</span>。</h2>
      <p class="small">贝贝停下来，看了看——<br>心里想：我可以帮忙吗？</p>
    </div>
  </div>

  <!-- P2: Beibei helps -->
  <div class="page" data-bg="yellow" data-text="贝贝走过去，说：奶奶，我来帮您拿！奶奶笑了，说：贝贝真棒！贝贝用两只手，拎起了那个大袋子。虽然有点重，但贝贝走得很稳。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- Sun -->
        <circle cx="60" cy="70" r="40" fill="#F4C13E" opacity=".4"/>
        <!-- Grandma and Beibei walking together -->
        <g transform="translate(230,220)">
          <ellipse cx="0" cy="0" rx="32" ry="36" fill="#C8A07A"/>
          <ellipse cx="0" cy="8" rx="19" ry="22" fill="#E8C49A" opacity=".6"/>
          <circle cx="0" cy="-42" r="27" fill="#C8A07A"/>
          <circle cx="-20" cy="-62" r="11" fill="#C8A07A"/>
          <circle cx="-20" cy="-62" r="6" fill="#E8A080"/>
          <circle cx="20" cy="-62" r="11" fill="#C8A07A"/>
          <circle cx="20" cy="-62" r="6" fill="#E8A080"/>
          <circle cx="-9" cy="-45" r="6" fill="none" stroke="#8C7C66" stroke-width="1.5"/>
          <circle cx="9" cy="-45" r="6" fill="none" stroke="#8C7C66" stroke-width="1.5"/>
          <line x1="-3" y1="-45" x2="3" y2="-45" stroke="#8C7C66" stroke-width="1.5"/>
          <ellipse cx="0" cy="-34" rx="9" ry="6" fill="#E8C49A"/>
          <path d="M -7,-28 Q 0,-22 7,-28" stroke="#8C5A4A" stroke-width="2" fill="none"/>
          <line x1="-28" y1="-5" x2="-24" y2="45" stroke="#8C6B4A" stroke-width="3" stroke-linecap="round"/>
        </g>
        <!-- Beibei carrying bag proudly -->
        <g id="p2-bear" transform="translate(145,225)" class="float">
          <ellipse cx="0" cy="0" rx="28" ry="32" fill="#C8966A"/>
          <ellipse cx="0" cy="6" rx="17" ry="18" fill="#E8C49A" opacity=".7"/>
          <circle cx="0" cy="-36" r="24" fill="#C8966A"/>
          <circle cx="-17" cy="-54" r="10" fill="#C8966A"/>
          <circle cx="-17" cy="-54" r="6" fill="#E8A080"/>
          <circle cx="17" cy="-54" r="10" fill="#C8966A"/>
          <circle cx="17" cy="-54" r="6" fill="#E8A080"/>
          <path d="M -9,-40 Q -5,-36 -1,-40" stroke="#2B2419" stroke-width="2" fill="none"/>
          <path d="M 1,-40 Q 5,-36 9,-40" stroke="#2B2419" stroke-width="2" fill="none"/>
          <ellipse cx="0" cy="-28" rx="8" ry="5" fill="#E8C49A"/>
          <circle cx="-2" cy="-29" r="1.5" fill="#8C5A4A"/>
          <circle cx="2" cy="-29" r="1.5" fill="#8C5A4A"/>
          <path d="M -6,-23 Q 0,-17 6,-23" stroke="#8C5A4A" stroke-width="2" fill="none"/>
          <!-- Arms down holding bag -->
          <ellipse cx="-24" cy="18" rx="8" ry="18" fill="#C8966A" transform="rotate(10 -24 18)"/>
          <ellipse cx="24" cy="18" rx="8" ry="18" fill="#C8966A" transform="rotate(-10 24 18)"/>
          <!-- Bag -->
          <rect x="-14" y="26" width="28" height="32" rx="4" fill="#4B7BA8" opacity=".8"/>
          <line x1="-8" y1="26" x2="-8" y2="16" stroke="#4B7BA8" stroke-width="2"/>
          <line x1="8" y1="26" x2="8" y2="16" stroke="#4B7BA8" stroke-width="2"/>
        </g>
        <!-- Stars of pride -->
        <text x="115" y="165" font-size="18" fill="#F4C13E">⭐</text>
        <text x="260" y="155" font-size="14" fill="#F4C13E">✨</text>
        <text x="180" y="140" font-size="16" fill="#E56B5A">♥</text>
      </svg>
    </div>
    <div class="text">
      <h2>贝贝说：<span style="color:#E56B5A">我来帮您拿！</span></h2>
      <p class="small">虽然有点重——<br>但贝贝走得很稳。</p>
    </div>
  </div>

  <!-- P3: Grandma thanks, warm feeling -->
  <div class="page" data-bg="mint" data-text="奶奶说：谢谢你，贝贝，你真是个好孩子。贝贝心里暖暖的——比吃糖还要甜！">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- Warm background glow -->
        <circle cx="200" cy="200" r="150" fill="#FBE39A" opacity=".15"/>
        <!-- Grandma patting Beibei -->
        <g transform="translate(190,210)">
          <ellipse cx="0" cy="0" rx="34" ry="38" fill="#C8A07A"/>
          <ellipse cx="0" cy="8" rx="20" ry="23" fill="#E8C49A" opacity=".6"/>
          <circle cx="0" cy="-44" r="29" fill="#C8A07A"/>
          <circle cx="-21" cy="-66" r="12" fill="#C8A07A"/>
          <circle cx="-21" cy="-66" r="7" fill="#E8A080"/>
          <circle cx="21" cy="-66" r="12" fill="#C8A07A"/>
          <circle cx="21" cy="-66" r="7" fill="#E8A080"/>
          <circle cx="-9" cy="-48" r="6" fill="none" stroke="#8C7C66" stroke-width="1.5"/>
          <circle cx="9" cy="-48" r="6" fill="none" stroke="#8C7C66" stroke-width="1.5"/>
          <line x1="-3" y1="-48" x2="3" y2="-48" stroke="#8C7C66" stroke-width="1.5"/>
          <path d="M -8,-32 Q 0,-26 8,-32" stroke="#8C5A4A" stroke-width="2" fill="none"/>
          <!-- Hand patting -->
          <ellipse cx="46" cy="-62" rx="12" ry="10" fill="#C8A07A" transform="rotate(-20 46 -62)"/>
        </g>
        <!-- Beibei glowing with pride -->
        <g id="p3-bear" transform="translate(270,225)" class="float">
          <ellipse cx="0" cy="0" rx="26" ry="30" fill="#C8966A"/>
          <ellipse cx="0" cy="6" rx="16" ry="18" fill="#E8C49A" opacity=".7"/>
          <circle cx="0" cy="-34" r="22" fill="#C8966A"/>
          <circle cx="-15" cy="-51" r="9" fill="#C8966A"/>
          <circle cx="-15" cy="-51" r="5" fill="#E8A080"/>
          <circle cx="15" cy="-51" r="9" fill="#C8966A"/>
          <circle cx="15" cy="-51" r="5" fill="#E8A080"/>
          <path d="M -8,-38 Q -4,-34 0,-38" stroke="#2B2419" stroke-width="2.5" fill="none"/>
          <path d="M 0,-38 Q 4,-34 8,-38" stroke="#2B2419" stroke-width="2.5" fill="none"/>
          <ellipse cx="0" cy="-26" rx="7" ry="5" fill="#E8C49A"/>
          <circle cx="-2" cy="-27" r="1.5" fill="#8C5A4A"/>
          <circle cx="2" cy="-27" r="1.5" fill="#8C5A4A"/>
          <path d="M -5,-21 Q 0,-15 5,-21" stroke="#8C5A4A" stroke-width="2" fill="none"/>
          <!-- Glow effect -->
          <circle cx="0" cy="-34" r="26" fill="none" stroke="#F4C13E" stroke-width="2" opacity=".4"/>
        </g>
        <!-- Hearts floating -->
        <text x="120" y="130" font-size="24" fill="#E56B5A" opacity=".7">♥</text>
        <text x="300" y="120" font-size="20" fill="#E56B5A" opacity=".8">♥</text>
        <text x="200" y="100" font-size="28" fill="#E56B5A">♥</text>
        <!-- Candy for comparison -->
        <g transform="translate(100,230)">
          <circle cx="0" cy="0" r="16" fill="#E56B5A" opacity=".7"/>
          <line x1="0" y1="16" x2="0" y2="35" stroke="#C87060" stroke-width="3" stroke-linecap="round"/>
          <text x="0" y="5" font-size="12" text-anchor="middle" fill="white">糖</text>
        </g>
        <text x="125" y="240" font-size="12" fill="#5C4F3D">比糖还甜！</text>
      </svg>
    </div>
    <div class="text">
      <h2>奶奶说：<span style="color:#E56B5A">你真是个好孩子！</span></h2>
      <p class="small">贝贝心里暖暖的——<br>比吃糖还要甜！</p>
    </div>
  </div>

  <!-- P4: Beibei helps more people -->
  <div class="page" data-bg="sky" data-text="从那以后，贝贝喜欢上了帮忙。帮弟弟找丢掉的玩具，帮妈妈摆碗筷，帮小鸟的窝挡住风。每一次，心里都暖暖的。">
    <div class="scene">
      <svg viewBox="0 0 400 320">
        <!-- Three scenes -->
        <!-- Scene 1: helping find toy -->
        <g transform="translate(80,190)">
          <rect x="-50" y="-30" width="100" height="80" rx="12" fill="white" opacity=".6"/>
          <text x="0" y="-10" font-size="12" text-anchor="middle" fill="#5C4F3D">帮弟弟找玩具</text>
          <!-- Mini bear and toy -->
          <circle cx="-15" cy="20" r="15" fill="#C8966A"/>
          <circle cx="-15" cy="8" r="11" fill="#C8966A"/>
          <circle cx="-22" cy="3" r="5" fill="#C8966A"/>
          <circle cx="-8" cy="3" r="5" fill="#C8966A"/>
          <path d="M -19,4 Q -15,1 -11,4" stroke="#2B2419" stroke-width="1.5" fill="none"/>
          <!-- Toy car -->
          <rect x="10" y="14" width="24" height="14" rx="3" fill="#E56B5A"/>
          <circle cx="15" cy="28" r="4" fill="#2B2419"/>
          <circle cx="29" cy="28" r="4" fill="#2B2419"/>
        </g>
        <!-- Scene 2: setting table -->
        <g transform="translate(200,190)">
          <rect x="-50" y="-30" width="100" height="80" rx="12" fill="white" opacity=".6"/>
          <text x="0" y="-10" font-size="12" text-anchor="middle" fill="#5C4F3D">帮妈妈摆碗筷</text>
          <!-- Table with bowls -->
          <rect x="-35" y="5" width="70" height="8" rx="2" fill="#8C6B4A"/>
          <circle cx="-18" cy="2" r="10" fill="white" stroke="#8C6B4A" stroke-width="1.5"/>
          <circle cx="18" cy="2" r="10" fill="white" stroke="#8C6B4A" stroke-width="1.5"/>
          <!-- Bear placing bowl -->
          <circle cx="-5" cy="25" r="10" fill="#C8966A"/>
          <circle cx="-5" cy="16" r="8" fill="#C8966A"/>
        </g>
        <!-- Scene 3: helping bird -->
        <g transform="translate(320,180)">
          <rect x="-50" y="-30" width="100" height="90" rx="12" fill="white" opacity=".6"/>
          <text x="0" y="-10" font-size="12" text-anchor="middle" fill="#5C4F3D">帮小鸟挡风</text>
          <!-- Tree with nest -->
          <line x1="0" y1="55" x2="0" y2="15" stroke="#8C6B4A" stroke-width="4" stroke-linecap="round"/>
          <circle cx="0" cy="5" r="20" fill="#6FA86D" opacity=".7"/>
          <!-- Nest -->
          <path d="M -12,8 Q 0,20 12,8" fill="#C4A882" stroke="#8C6B4A" stroke-width="1.5" fill-opacity=".8"/>
          <!-- Birds -->
          <circle cx="-4" cy="12" r="4" fill="#F4C13E"/>
          <circle cx="4" cy="12" r="4" fill="#F4C13E"/>
          <!-- Bear holding branch as shield -->
          <circle cx="-25" cy="30" r="10" fill="#C8966A"/>
        </g>
        <!-- Main Beibei figure -->
        <g id="p4-bear" transform="translate(200,255)" class="float">
          <ellipse cx="0" cy="0" rx="24" ry="28" fill="#C8966A"/>
          <circle cx="0" cy="-31" r="20" fill="#C8966A"/>
          <circle cx="-14" cy="-47" r="8" fill="#C8966A"/>
          <circle cx="-14" cy="-47" r="4.5" fill="#E8A080"/>
          <circle cx="14" cy="-47" r="8" fill="#C8966A"/>

<script>
const BOOK_ID='m02-bear-helps'; const BOOK_TITLE='贝贝爱帮忙'; const BOOK_TOTAL=5;
function makeInteractive(el,animClass,msg){if(!el)return;el.classList.add('interactive');el.addEventListener('click',function(){if(el._busy)return;el._busy=true;el.classList.remove(animClass);void el.getBoundingClientRect();el.classList.add(animClass);if(msg){const scene=el.closest('.scene');const er=el.getBoundingClientRect(),sr=scene.getBoundingClientRect();const cx=er.left+er.width/2-sr.left,cy=Math.max(8,er.top-sr.top-48);const b=document.createElement('div');b.className='speech-bubble';b.textContent=msg;b.style.left=cx+'px';b.style.top=cy+'px';b.style.transform='translateX(-50%)';scene.appendChild(b);setTimeout(()=>b.remove(),1500);}setTimeout(()=>{el.classList.remove(animClass);el._busy=false;},750);});}
const pages=document.querySelectorAll('.page'),total=pages.length;
const dotsEl=document.getElementById('dots');let current=0;
for(let i=0;i<total;i++){const d=document.createElement('span');if(i===0)d.classList.add('is-active');dotsEl.appendChild(d);}
function goTo(idx){if(idx<0||idx>=total)return;speechSynthesis.cancel();if(idx===current){pages.forEach((p,i)=>{p.classList.toggle('is-active',i===idx);p.classList.remove('flip-out-fwd','flip-in-fwd','flip-out-bwd','flip-in-bwd');p.style.opacity='';p.style.pointerEvents='';});current=idx;document.getElementById('prev').disabled=idx===0;document.getElementById('next').disabled=idx===total-1;dotsEl.querySelectorAll('span').forEach((s,i)=>s.classList.toggle('is-active',i===idx));if(window.FO)FO.logProgress(BOOK_ID,idx,BOOK_TOTAL);return;}const dir=idx>current?'fwd':'bwd',outClass=dir==='fwd'?'flip-out-fwd':'flip-out-bwd',inClass=dir==='fwd'?'flip-in-fwd':'flip-in-bwd';const oldPage=pages[current],newPage=pages[idx];newPage.style.opacity='0';newPage.style.pointerEvents='none';oldPage.classList.add(outClass);newPage.classList.add(inClass);function cleanup(){oldPage.classList.remove('is-active',outClass);newPage.classList.remove(inClass);oldPage.style.opacity='';newPage.style.opacity='';newPage.style.pointerEvents='';newPage.classList.add('is-active');current=idx;document.getElementById('prev').disabled=idx===0;document.getElementById('next').disabled=idx===total-1;dotsEl.querySelectorAll('span').forEach((s,i)=>s.classList.toggle('is-active',i===idx));if(window.FO)FO.logProgress(BOOK_ID,idx,BOOK_TOTAL);}newPage.addEventListener('animationend',cleanup,{once:true});}
document.getElementById('prev').addEventListener('click',()=>goTo(current-1));
document.getElementById('next').addEventListener('click',()=>goTo(current+1));
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo(current-1);if(e.key==='ArrowRight')goTo(current+1);});
let _tx=0;document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-_tx;if(Math.abs(dx)>50)dx<0?goTo(current+1):goTo(current-1);});
document.getElementById('readBtn').addEventListener('click',()=>{const text=pages[current].dataset.text;if(!text||!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=.85;u.pitch=1.1;speechSynthesis.speak(u);});
goTo(0);
makeInteractive(document.getElementById('p1-bear'),'do-bounce','我去帮忙！');
makeInteractive(document.getElementById('p1-grandma'),'do-wobble','好重啊……');
makeInteractive(document.getElementById('p2-bear'),'do-bounce','我来！💪');
makeInteractive(document.getElementById('p3-bear'),'do-bounce','好开心！🌟');
makeInteractive(document.getElementById('p4-bear'),'do-bounce','帮忙！🐻');
makeInteractive(document.getElementById('p5-bear'),'do-bounce','♥ 开心！');
if(window.FO)FO.logHistory(BOOK_ID,BOOK_TITLE);
</script>
