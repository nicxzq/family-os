<script>
  const BOOK_ID = '18-good-coach';
  const BOOK_TITLE = '爸爸的一个好问题';
  const BOOK_TOTAL = 7;
  const pages = document.querySelectorAll('.page');
  const dotsEl = document.getElementById('dots');
  let current = 0;

  function interactionTarget(el) {
    return el ? el.querySelector('[data-interaction-layer]') || el : null;
  }

  function placeSpeechBubble(scene, el, msg) {
    const er = el.getBoundingClientRect();
    const sr = scene.getBoundingClientRect();
    const bubble = document.createElement('div');
    bubble.className = 'speech-bubble';
    bubble.textContent = msg;
    const root = getComputedStyle(document.documentElement);
    const edge = parseFloat(root.getPropertyValue('--speech-edge'));
    const gap = parseFloat(root.getPropertyValue('--speech-gap'));
    const minWidth = parseFloat(root.getPropertyValue('--speech-min'));
    bubble.style.maxWidth = Math.max(minWidth, sr.width - edge * 2) + 'px';
    scene.appendChild(bubble);
    const br = bubble.getBoundingClientRect();
    let left = er.left + er.width / 2 - sr.left;
    let top = er.top - sr.top - br.height - gap;
    if (top < edge) top = er.bottom - sr.top + gap;
    left = Math.max(edge + br.width / 2, Math.min(sr.width - edge - br.width / 2, left));
    bubble.style.left = left + 'px';
    bubble.style.top = Math.max(edge, Math.min(sr.height - br.height - edge, top)) + 'px';
    bubble.style.transform = 'translateX(-50%)';
    setTimeout(() => bubble.remove(), 1500);
  }

  function makeInteractive(id, animClass, msg) {
    const el = document.getElementById(id);
    const target = interactionTarget(el);
    if (!el || !target) return;
    el.classList.add('interactive');
    el.addEventListener('click', () => {
      target.classList.remove(animClass);
      void target.getBoundingClientRect();
      target.classList.add(animClass);
      const scene = el.closest('.scene');
      if (scene) placeSpeechBubble(scene, el, msg);
      setTimeout(() => target.classList.remove(animClass), 800);
    });
  }

  for (let i = 0; i < pages.length; i++) {
    dotsEl.appendChild(document.createElement('span'));
  }

  function goTo(idx) {
    if (idx < 0 || idx >= pages.length) return;
    speechSynthesis.cancel();
    pages.forEach((page, i) => page.classList.toggle('is-active', i === idx));
    dotsEl.querySelectorAll('span').forEach((dot, i) => dot.classList.toggle('is-active', i === idx));
    current = idx;
    document.getElementById('prev').disabled = idx === 0;
    document.getElementById('next').disabled = idx === pages.length - 1;
    if (window.FO) FO.logProgress(BOOK_ID, idx, BOOK_TOTAL);
  }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('next').addEventListener('click', () => goTo(current + 1));
  document.addEventListener('keydown', event => {
    if (event.key === 'ArrowLeft') goTo(current - 1);
    if (event.key === 'ArrowRight') goTo(current + 1);
  });
  let touchX = 0;
  document.addEventListener('touchstart', event => { touchX = event.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', event => {
    const dx = event.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) dx < 0 ? goTo(current + 1) : goTo(current - 1);
  });
  document.getElementById('readBtn').addEventListener('click', () => {
    const text = pages[current].dataset.text;
    if (!text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.85;
    utterance.pitch = 1.1;
    speechSynthesis.speak(utterance);
  });

  goTo(0);
  makeInteractive('p1-maomao', 'do-wobble', '桥塌了！');
  makeInteractive('p2-maomao', 'do-wobble', '告诉我答案吧');
  makeInteractive('p2-dad', 'do-bounce', '先看看');
  makeInteractive('p3-dad', 'do-bounce', '哪里先弯？');
  makeInteractive('p3-maomao', 'do-bounce', '我找找');
  makeInteractive('p4-maomao', 'do-bounce', '中间！');
  makeInteractive('p5-dad', 'do-bounce', '下一次呢？');
  makeInteractive('p5-maomao', 'do-bounce', '加支撑！');
  makeInteractive('p6-maomao', 'do-bounce', '成功啦！');
  makeInteractive('p6-dad', 'do-bounce', '你找到了');
  document.addEventListener('DOMContentLoaded', () => {
    if (window.FO) FO.logHistory(BOOK_ID, BOOK_TITLE);
  });
</script>
</body>
</html>
