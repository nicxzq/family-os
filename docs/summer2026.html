<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>快乐暑假 2026 · 打卡</title>
<style>
:root{
  --bg:#F2F7F5; --card:#FFFFFF; --ink:#1E3A4C; --sub:#7A93A3;
  --sea:#2AA5A0; --sea-soft:#E2F3F2; --sun:#FFB020; --sun-soft:#FFF3DC;
  --done:#2E9E6B; --done-soft:#E4F4EC; --red:#E5484D; --red-soft:#FDECEC;
  --line:#E4EDEA; --travel:#4C7DD8; --travel-soft:#E9F0FC;
  --r:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  font-size:16px; line-height:1.5;
}
.wrap{max-width:760px;margin:0 auto;padding:12px 14px 90px}
header.top{
  max-width:760px;margin:0 auto;padding:14px 14px 4px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.brand{font-weight:800;font-size:20px;letter-spacing:.5px}
.brand small{display:block;font-weight:500;font-size:12px;color:var(--sub);letter-spacing:1px}
.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:20;
  background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
.tabs button{
  flex:1;max-width:140px;border:0;background:none;color:var(--sub);
  font-size:12px;padding:6px 0 4px;border-radius:12px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;
}
.tabs button .ico{font-size:20px;line-height:1}
.tabs button.on{color:var(--sea);font-weight:700;background:var(--sea-soft)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin:12px 0;box-shadow:0 1px 2px rgba(30,58,76,.04)}

/* ---- day banner ---- */
.banner{
  border-radius:var(--r);padding:16px 18px;margin:10px 0 14px;color:#fff;
  background:linear-gradient(115deg,#2AA5A0 0%,#3FB7A6 55%,#FFB020 140%);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  box-shadow:0 6px 18px rgba(42,165,160,.25);
}
.banner .d1{font-size:24px;font-weight:800}
.banner .d2{font-size:13px;opacity:.92;margin-top:2px}
.badge{display:inline-block;font-size:12px;font-weight:700;background:rgba(255,255,255,.22);padding:2px 10px;border-radius:99px;margin-top:6px}
.ring{position:relative;width:74px;height:74px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.ring .pct small{font-size:10px;font-weight:500;opacity:.9}
.daynav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
.daynav button{
  border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 14px;
  font-size:14px;color:var(--ink);cursor:pointer;font-family:inherit;
}
.daynav .today-btn{color:var(--sea);font-weight:700}

/* ---- task list ---- */
.slot-title{font-size:13px;font-weight:700;color:var(--sub);margin:16px 4px 6px;letter-spacing:1px}
.task{
  display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:12px 12px;margin:8px 0;
  cursor:pointer;user-select:none;transition:background .15s;
}
.task:active{background:var(--sea-soft)}
.task .box{
  width:28px;height:28px;flex:none;border-radius:50%;
  border:2.5px solid #B9CEC9;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#fff;background:#fff;
}
.task .tx{flex:1;min-width:0}
.task .nm{font-size:16px;font-weight:600}
.task .tm{font-size:12px;color:var(--sub);margin-top:1px}
.task .ops{display:flex;gap:2px;flex:none}
.task .ops button{border:0;background:none;color:#B9CEC9;font-size:15px;padding:6px;cursor:pointer;font-family:inherit}
.task.opt .nm{font-weight:500}
.task.opt .box{border-style:dashed}
.task.done{background:var(--done-soft);border-color:#CBE8D8}
.task.done .box{background:var(--done);border-color:var(--done)}
.task.done .nm{text-decoration:line-through;color:#5E8C77}
.task.late{background:var(--red-soft);border-color:#F5C6C8}
.task.late .nm{color:var(--red)}
.task.late .box{border-color:var(--red)}
.late-tag{font-size:11px;color:var(--red);font-weight:700;margin-left:6px}
.addbtn{
  width:100%;border:1.5px dashed #B9CEC9;background:none;border-radius:14px;
  padding:11px;color:var(--sub);font-size:14px;cursor:pointer;margin-top:14px;font-family:inherit;
}
.toast{
  position:fixed;left:50%;bottom:88px;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;
  font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;
  white-space:nowrap;
}
.toast.show{opacity:.95}

/* ---- calendar ---- */
.cal-month{margin:14px 0 4px;font-weight:800;font-size:16px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .hd{text-align:center;font-size:12px;color:var(--sub);padding:2px 0}
.cell{
  aspect-ratio:1;border-radius:12px;background:var(--card);border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:14px;font-weight:600;cursor:pointer;position:relative;
}
.cell.blank{background:none;border:none;cursor:default}
.cell.future{color:#B4C6C1}
.cell .dot{width:7px;height:7px;border-radius:50%}
.cell.ok{background:var(--done-soft);border-color:#CBE8D8;color:var(--done)}
.cell.bad{background:var(--red-soft);border-color:#F5C6C8;color:var(--red)}
.cell.trav{background:var(--travel-soft);border-color:#CFDDF6;color:var(--travel)}
.cell.today{outline:2.5px solid var(--sun);outline-offset:1px}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--sub);margin-top:12px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:baseline}

/* ---- review ---- */
.wk{margin:14px 0}
.wk h3{margin:0 0 6px;font-size:15px}
.bar{height:10px;border-radius:99px;background:#E7F0ED;overflow:hidden;margin:8px 0}
.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--sea),var(--done))}
.wk .stat{font-size:13px;color:var(--sub)}
.missing{font-size:13px;color:var(--red);margin-top:6px;line-height:1.7}
.wk textarea{
  width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:10px;
  font-family:inherit;font-size:14px;min-height:52px;resize:vertical;color:var(--ink);background:#FBFDFC;
}
.cheer{font-size:13px;font-weight:700;margin-top:6px}

/* ---- settings ---- */
.set-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.set-row:last-child{border-bottom:0}
.set-row label{font-size:15px;font-weight:600}
.set-row .hint{display:block;font-size:12px;color:var(--sub);font-weight:400;margin-top:2px}
.set-row input[type=date],.set-row input[type=number]{
  border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:15px;font-family:inherit;color:var(--ink);background:#fff;
}
.set-row input[type=number]{width:72px;text-align:center}
.btn{
  border:0;border-radius:12px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
}
.btn.pri{background:var(--sea);color:#fff}
.btn.ghost{background:var(--sea-soft);color:var(--sea)}
.btn.danger{background:var(--red-soft);color:var(--red)}
.note{font-size:13px;color:var(--sub);line-height:1.7}
h2.sec{font-size:16px;margin:4px 0 6px}
</style>
</head>
<body>
<header class="top">
  <div class="brand">🌞 快乐暑假 2026<small>7 月 14 日 — 8 月 30 日 · 五升六</small></div>
</header>
<div class="wrap" id="app"></div>
<nav class="tabs" id="tabs"></nav>
<div class="toast" id="toast"></div>

<script>
/* ================= 基础 ================= */
const START='2026-07-14', END='2026-08-30', KEY='summer2026-v1';

function p(s){const a=s.split('-');return new Date(+a[0],+a[1]-1,+a[2]);}
function f(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addD(s,n){const d=p(s);d.setDate(d.getDate()+n);return f(d);}
function clamp(s){return s<START?START:(s>END?END:s);}
const WK=['日','一','二','三','四','五','六'];
function cn(s){const d=p(s);return (d.getMonth()+1)+' 月 '+d.getDate()+' 日 · 周'+WK[d.getDay()];}
const todayReal=f(new Date());

/* ---- 状态:只存差异,任务由规则生成 ---- */
let S;
function defaults(){return {cfg:{kuaile:2,yuedu:2},travel:{start:'',end:''},done:{},removed:{},added:{},renamed:{},comments:{},view:'day',sel:clamp(todayReal)};}
function load(){
  try{const raw=localStorage.getItem(KEY);if(!raw)return null;
    const s=JSON.parse(raw);return Object.assign(defaults(),s);}catch(e){return null;}
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
S=load()||defaults();
S.sel=clamp(S.sel||todayReal);

function isTravel(d){return S.travel.start&&S.travel.end&&d>=S.travel.start&&d<=S.travel.end;}

/* ================= 任务生成规则 =================
   固定骨架 + 差异覆盖(removed/added/renamed),
   将来接后端同步时,只需把 S 整体上传/下载即可。 */
const SLOTS=[
  ['morning','🌅 早晨'],
  ['study','📚 上午 · 学习'],
  ['flex','🧩 下午 · 自选'],
  ['cls','🏫 英语课'],
  ['evening','🌙 晚上'],
];
const TL={1:'练词汇',2:'练句子',3:'练对话',4:'练短文',5:'练综合',6:'双休自测'};

function genTasks(date){
  let t=[];
  const w=p(date).getDay();
  if(isTravel(date)){
    t.push({id:'maowu',name:'读《猫武士》(旅行也别忘啦)',slot:'flex',req:true,time:'任意时段'});
  }else{
    const ski=(date==='2026-07-15');
    t.push({id:'sport',name:'早起运动 30 分钟',slot:'morning',req:true,time:'8:00'});
    if(ski) t.push({id:'ski',name:'上午滑雪 ⛷️',slot:'morning',req:false,time:'上午'});
    if(!ski){
      t.push({id:'kuaile',name:'《快乐暑假》'+S.cfg.kuaile+' 页',slot:'study',req:true,time:'9:00-11:30'});
      t.push({id:'yuedu',name:'英语阅读训练 '+S.cfg.yuedu+' 篇',slot:'study',req:true,time:'9:00-11:30'});
    }
    if(w===2||w===5) t.push({id:'fanwen',name:'高分范文 · 学 1 个话题',slot:'study',req:true});
    t.push({id:'miaohong',name:'英语范文描红 1 篇',slot:'study',req:true});
    if(date==='2026-08-16') t.push({id:'mindmap',name:'《猫武士》思维导图制作 🗺️',slot:'study',req:true});
    if(date==='2026-08-23') t.push({id:'video',name:'《猫武士》讲书视频拍摄 🎬',slot:'study',req:true});
    t.push({id:'coding',name:'编程做游戏 30-60 分钟(自选)',slot:'flex',req:false,time:'14:00-15:30'});
    t.push({id:'cube',name:'魔方 · 平板对战(自选)',slot:'flex',req:false});
    t.push({id:'maowu',name:'读《猫武士》30 分钟',slot:'flex',req:true});
    if(date>='2026-07-15'&&date<='2026-07-19')
      t.push({id:'cls',name:'英语课(线下)',slot:'cls',req:true,time:'15:30 出发 · 16:00-17:50'});
    if(TL[w]) t.push({id:'tingli',name:'听力天天练 · '+TL[w],slot:'evening',req:true,time:'晚饭前后 10 分钟'});
    t.push({id:'lianzi',name:'练字 15-20 分钟',slot:'evening',req:true,time:'19:30'});
    if(w===6) t.push({id:'switch',name:'Switch 时间 2 个半小时 🎮',slot:'evening',req:false,time:'周六专属'});
    t.push({id:'sleep',name:'22:30 前上床睡觉',slot:'evening',req:true,time:'21:45 洗漱'});
  }
  const rm=S.removed[date]||[];
  t=t.filter(x=>rm.indexOf(x.id)<0);
  (S.added[date]||[]).forEach(x=>t.push(x));
  const rn=S.renamed[date]||{};
  t.forEach(x=>{if(rn[x.id])x.name=rn[x.id];});
  return t;
}
function isDone(d,id){return !!(S.done[d]&&S.done[d][id]);}
function reqStat(d){
  const t=genTasks(d).filter(x=>x.req);
  const done=t.filter(x=>isDone(d,x.id)).length;
  return {total:t.length,done:done};
}

/* ================= 渲染 ================= */
const app=document.getElementById('app');
const tabsEl=document.getElementById('tabs');
const TABS=[['day','☀️','今天'],['cal','📅','日历'],['rev','⭐','回顾'],['set','⚙️','设置']];
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),1800);
}
function render(){
  tabsEl.innerHTML=TABS.map(([k,i,n])=>
    '<button class="'+(S.view===k?'on':'')+'" onclick="go(\''+k+'\')"><span class="ico">'+i+'</span>'+n+'</button>').join('');
  if(S.view==='day')renderDay();
  else if(S.view==='cal')renderCal();
  else if(S.view==='rev')renderRev();
  else renderSet();
  save();
}
function go(v){S.view=v;render();window.scrollTo(0,0);}

/* ---- 今天 ---- */
function renderDay(){
  const d=S.sel, st=reqStat(d);
  const pct=st.total?Math.round(st.done/st.total*100):100;
  const C=2*Math.PI*30;
  const trav=isTravel(d);
  let h='';
  h+='<div class="banner"><div><div class="d1">'+cn(d)+'</div>'
    +'<div class="d2">必做 '+st.done+' / '+st.total+' 项'+(d===todayReal?' · 就是今天':'')+'</div>'
    +(trav?'<span class="badge">✈️ 旅行中 · 看书就好</span>':'')
    +(d>='2026-07-15'&&d<='2026-07-19'&&!trav?'<span class="badge">🏫 今天有英语课</span>':'')
    +'</div>'
    +'<div class="ring"><svg width="74" height="74"><circle cx="37" cy="37" r="30" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="7"/>'
    +'<circle cx="37" cy="37" r="30" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-dasharray="'+(C*pct/100)+' '+C+'"/></svg>'
    +'<div class="pct">'+pct+'%<small>完成</small></div></div></div>';
  h+='<div class="daynav">'
    +'<button onclick="mv(-1)" '+(d<=START?'disabled':'')+'>‹ 前一天</button>'
    +'<button class="today-btn" onclick="mvToday()">回到今天</button>'
    +'<button onclick="mv(1)" '+(d>=END?'disabled':'')+'>后一天 ›</button></div>';
  const tasks=genTasks(d);
  SLOTS.forEach(([k,label])=>{
    const ts=tasks.filter(x=>x.slot===k);
    if(!ts.length)return;
    h+='<div class="slot-title">'+label+'</div>';
    ts.forEach(x=>{
      const dn=isDone(d,x.id);
      const late=!dn&&x.req&&d<todayReal;
      h+='<div class="task '+(dn?'done':'')+' '+(late?'late':'')+' '+(x.req?'':'opt')+'" onclick="tg(\''+x.id+'\')">'
        +'<div class="box">'+(dn?'✓':'')+'</div>'
        +'<div class="tx"><div class="nm">'+esc(x.name)+(late?'<span class="late-tag">没完成</span>':'')+'</div>'
        +(x.time?'<div class="tm">'+esc(x.time)+'</div>':'')
        +'</div>'
        +'<div class="ops">'
        +'<button onclick="event.stopPropagation();rn(\''+x.id+'\')">✎</button>'
        +'<button onclick="event.stopPropagation();rmv(\''+x.id+'\')">✕</button>'
        +'</div></div>';
    });
  });
  h+='<button class="addbtn" onclick="addTask()">＋ 给这一天加一项任务</button>';
  app.innerHTML=h;
}
function mv(n){S.sel=clamp(addD(S.sel,n));render();}
function mvToday(){S.sel=clamp(todayReal);render();}
function tg(id){
  const d=S.sel;
  S.done[d]=S.done[d]||{};
  S.done[d][id]=!S.done[d][id];
  if(!S.done[d][id])delete S.done[d][id];
  const st=reqStat(d);
  render();
  if(st.total&&st.done===st.total)toast('🎉 今天必做全部完成,太棒了!');
}
function rn(id){
  const d=S.sel;
  const cur=genTasks(d).find(x=>x.id===id);if(!cur)return;
  const v=prompt('修改任务名称:',cur.name);
  if(v===null)return;
  const add=(S.added[d]||[]).find(x=>x.id===id);
  if(add)add.name=v.trim()||add.name;
  else{S.renamed[d]=S.renamed[d]||{};S.renamed[d][id]=v.trim()||cur.name;}
  render();
}
function rmv(id){
  const d=S.sel;
  if(!confirm('把这一项从这一天删掉?'))return;
  if((S.added[d]||[]).some(x=>x.id===id)){
    S.added[d]=S.added[d].filter(x=>x.id!==id);
  }else{
    S.removed[d]=S.removed[d]||[];
    if(S.removed[d].indexOf(id)<0)S.removed[d].push(id);
  }
  if(S.done[d])delete S.done[d][id];
  render();
}
function addTask(){
  const d=S.sel;
  const name=prompt('任务名称(例如:数学口算 1 页):');
  if(!name||!name.trim())return;
  const req=confirm('这是必做任务吗?\n「确定」= 必做(没完成会标红)\n「取消」= 自选');
  S.added[d]=S.added[d]||[];
  S.added[d].push({id:'u'+Date.now(),name:name.trim(),slot:req?'study':'flex',req:req});
  render();
}

/* ---- 日历 ---- */
function renderCal(){
  let h='<div class="card"><h2 class="sec">整个暑假一眼看完</h2><div class="note">点任意一天可以进去看详情、补打卡。</div></div>';
  [[2026,7],[2026,8]].forEach(([y,m])=>{
    h+='<div class="cal-month">'+m+' 月</div><div class="cal">';
    WK.forEach(w=>h+='<div class="hd">'+w+'</div>');
    const first=new Date(y,m-1,1);
    for(let i=0;i<first.getDay();i++)h+='<div class="cell blank"></div>';
    const days=new Date(y,m,0).getDate();
    for(let dd=1;dd<=days;dd++){
      const ds=f(new Date(y,m-1,dd));
      if(ds<START||ds>END){h+='<div class="cell blank"></div>';continue;}
      let cls='',icon='';
      if(isTravel(ds)){cls='trav';icon='✈️';}
      else if(ds>todayReal){cls='future';}
      else{
        const st=reqStat(ds);
        if(ds<todayReal)cls=(st.done>=st.total)?'ok':'bad';
        else cls=(st.done>=st.total&&st.total>0)?'ok':'';
      }
      if(ds===todayReal)cls+=' today';
      h+='<div class="cell '+cls+'" onclick="openDay(\''+ds+'\')"><span>'+dd+'</span>'+(icon?'<span style="font-size:11px">'+icon+'</span>':'')+'</div>';
    }
    h+='</div>';
  });
  h+='<div class="legend">'
    +'<span><i style="background:var(--done)"></i>全部完成</span>'
    +'<span><i style="background:var(--red)"></i>有没完成的</span>'
    +'<span><i style="background:var(--travel)"></i>旅行</span>'
    +'<span><i style="background:#B4C6C1"></i>还没到</span>'
    +'<span><i style="background:var(--sun)"></i>今天(金圈)</span></div>';
  app.innerHTML=h;
}
function openDay(d){S.sel=d;go('day');}

/* ---- 回顾 ---- */
function weekStart(d){
  const dt=p(d);const off=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-off);
  return f(dt);
}
function renderRev(){
  let h='<div class="card"><h2 class="sec">每周回顾</h2><div class="note">建议每周日晚一起翻一眼:看完成率,不做批评,写一句鼓励。</div></div>';
  const weeks={};
  for(let d=START;d<=END;d=addD(d,1)){
    const w=weekStart(d);(weeks[w]=weeks[w]||[]).push(d);
  }
  let idx=0;
  Object.keys(weeks).sort().forEach(w=>{
    idx++;
    const days=weeks[w].filter(d=>d<=todayReal);
    const range=cn(weeks[w][0]).split(' · ')[0]+' — '+cn(weeks[w][weeks[w].length-1]).split(' · ')[0];
    if(!days.length){
      h+='<div class="card wk"><h3>第 '+idx+' 周 · '+range+'</h3><div class="stat">还没开始</div></div>';
      return;
    }
    let tot=0,dn=0,miss=[];
    days.forEach(d=>{
      genTasks(d).filter(x=>x.req).forEach(x=>{
        tot++;
        if(isDone(d,x.id))dn++;
        else if(d<todayReal)miss.push(cn(d).split(' · ')[0]+' '+x.name);
      });
    });
    const pct=tot?Math.round(dn/tot*100):100;
    const cheer=pct>=85?'🌟 这一周非常稳,保持!':pct>=60?'💪 大部分都做到了,红色的挑 1-2 件补上就好':'🍉 别灰心,下周先保住每天 4 件必做';
    h+='<div class="card wk"><h3>第 '+idx+' 周 · '+range+'</h3>'
      +'<div class="bar"><i style="width:'+pct+'%"></i></div>'
      +'<div class="stat">必做完成 '+dn+' / '+tot+' 项('+pct+'%)</div>'
      +(miss.length?'<div class="missing">'+miss.slice(0,8).map(esc).join('<br>')+(miss.length>8?'<br>… 还有 '+(miss.length-8)+' 项':'')+'</div>':'')
      +'<div class="cheer">'+cheer+'</div>'
      +'<textarea placeholder="爸爸妈妈想说…(写给这一周的你)" onchange="cmt(\''+w+'\',this.value)">'+esc(S.comments[w]||'')+'</textarea>'
      +'</div>';
  });
  app.innerHTML=h;
}
function cmt(w,v){S.comments[w]=v;save();toast('已保存 ✓');}

/* ---- 设置 ---- */
function renderSet(){
  let h='<div class="card"><h2 class="sec">✈️ 旅行模式</h2>'
    +'<div class="note">设定日期后,这段时间每天只剩「读猫武士」一件事。</div>'
    +'<div class="set-row"><label>出发日</label><input type="date" id="ts" min="'+START+'" max="'+END+'" value="'+S.travel.start+'"></div>'
    +'<div class="set-row"><label>返程日</label><input type="date" id="te" min="'+START+'" max="'+END+'" value="'+S.travel.end+'"></div>'
    +'<div class="set-row"><button class="btn pri" onclick="setTravel()">保存旅行日期</button>'
    +'<button class="btn ghost" onclick="clearTravel()">取消旅行模式</button></div></div>';

  h+='<div class="card"><h2 class="sec">📏 每日任务量</h2>'
    +'<div class="set-row"><label>《快乐暑假》<span class="hint">页 / 天(约 70 页,2 页可在暑假内做完)</span></label>'
    +'<input type="number" min="1" max="6" value="'+S.cfg.kuaile+'" onchange="qty(\'kuaile\',this.value)"></div>'
    +'<div class="set-row"><label>英语阅读训练<span class="hint">篇 / 天(2 篇约完成 60-70 篇)</span></label>'
    +'<input type="number" min="1" max="4" value="'+S.cfg.yuedu+'" onchange="qty(\'yuedu\',this.value)"></div></div>';

  h+='<div class="card"><h2 class="sec">💾 数据备份 / 换设备</h2>'
    +'<div class="note">打卡记录存在本机浏览器里。换设备或怕丢,用下面两个按钮:导出一个文件 → 在另一台设备导入。建议每周日导出一次。</div>'
    +'<div class="set-row" style="border:0;padding-top:12px">'
    +'<button class="btn pri" onclick="expo()">导出备份文件</button>'
    +'<button class="btn ghost" onclick="document.getElementById(\'imp\').click()">导入备份文件</button>'
    +'<input type="file" id="imp" accept=".json" style="display:none" onchange="impo(this)"></div></div>';

  h+='<div class="card"><h2 class="sec">🧹 其他</h2>'
    +'<div class="set-row"><label>清空全部记录<span class="hint">删除所有打卡和修改,恢复初始计划</span></label>'
    +'<button class="btn danger" onclick="wipe()">清空</button></div></div>';

  h+='<div class="card"><h2 class="sec">📌 怎么用</h2><div class="note">'
    +'1. 每天做完一件,自己点一下打勾;过了当天还没勾的会变红,红了不用补罚,补做勾上就行。<br>'
    +'2. 任务点 ✎ 可以改名字,点 ✕ 删除,底部按钮可以临时加任务。<br>'
    +'3. 虚线圈的是自选项,不做不标红。周六晚的 Switch 是固定权利,不和完成情况挂钩。<br>'
    +'4. 部署:把本文件上传到网站(如 /summer/index.html)即可,无需任何后端。</div></div>';
  app.innerHTML=h;
}
function setTravel(){
  const a=document.getElementById('ts').value,b=document.getElementById('te').value;
  if(!a||!b||a>b){alert('请把出发日和返程日都选上,且出发日不能晚于返程日。');return;}
  S.travel={start:a,end:b};render();toast('旅行日期已保存 ✈️');
}
function clearTravel(){S.travel={start:'',end:''};render();toast('已取消旅行模式');}
function qty(k,v){
  v=Math.max(1,parseInt(v)||1);S.cfg[k]=v;save();toast('已更新,今后每天按 '+v+' 计');
}
function expo(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='暑假打卡备份-'+todayReal+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
function impo(inp){
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const s=JSON.parse(r.result);
      if(!s.done||!s.cfg)throw 0;
      S=Object.assign(defaults(),s);S.view='day';S.sel=clamp(todayReal);
      save();render();toast('导入成功 ✓');
    }catch(e){alert('这个文件不是有效的备份。');}
  };
  r.readAsText(file);inp.value='';
}
function wipe(){
  if(!confirm('确定清空全部打卡记录和修改?此操作不可恢复。'))return;
  S=defaults();save();render();
}

render();
</script>
</body>
</html>
