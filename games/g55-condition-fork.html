<style>
  .track-shell{width:100%;max-height:100%;overflow-y:auto;background:var(--cream-deep);border-radius:var(--radius);padding:var(--space-3xl);box-shadow:var(--shadow-soft);display:flex;flex-direction:column;gap:var(--space-2xl)}
  .track-label{font-size:var(--font-size-caption);color:var(--ink-mute);font-weight:700;margin:0 0 var(--space-sm);text-align:center}
  .track-label.running{color:var(--ink)}
  .track-row{display:flex;gap:var(--space-sm);justify-content:center;flex-wrap:wrap}
  .cell{width:var(--size-touch-target);height:var(--size-touch-target);border-radius:var(--radius-md);background:var(--paper);display:grid;place-items:center;font-size:var(--font-size-title);position:relative;box-shadow:var(--shadow-soft);flex-shrink:0;color:var(--ink-mute);font-weight:700}
  .cell.wall{background:var(--ink)}
  .cell.goal{background:var(--yellow)}
  .cell.start{background:var(--green-soft)}
  .cell.hidden-cell{background:var(--blue-soft)}
  .cell.crash{background:var(--coral)}
  .cell.robot::after{content:'\1F916';position:absolute;font-size:var(--font-size-title-sm)}
  .track-chips{display:flex;gap:var(--space-md);flex-wrap:wrap;flex-shrink:0;margin-top:var(--space-lg)}
  .track-chip{flex:1;background:var(--cream-deep);border-radius:var(--radius-full);padding:var(--space-sm) var(--space-lg);text-align:center;font-size:var(--font-size-caption);font-weight:700;color:var(--ink-mute)}
  .track-chip.pass{background:var(--green);color:var(--paper)}
  .track-chip.fail{background:var(--coral);color:var(--paper)}
  .blocks-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-xl)}
  .blocks-head .panel-title{margin:0}
  .slot-if,.slot-repeat{display:flex;flex-direction:column;align-items:stretch;min-height:auto;height:auto;gap:0;padding-bottom:var(--space-sm)}
  .box-header{display:grid;grid-template-columns:var(--space-8xl) minmax(0,1fr);align-items:center;gap:var(--space-md)}
  .if-branches{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm);margin:var(--space-sm) 0 0 var(--space-7xl)}
  .if-branches.nested{margin-left:var(--space-3xl)}
  .branch{background:color-mix(in srgb,var(--yellow) 6%,var(--cream));border-radius:var(--radius-md);padding:var(--space-sm)}
  .branch-label{font-size:var(--font-size-sm);color:var(--ink-mute);font-weight:700;margin-bottom:var(--space-xs);display:block}
  .branch-list,.repeat-body{list-style:none;padding:0;margin:0;display:grid;gap:var(--space-chart-gap)}
  .repeat-body{margin:var(--space-xs) 0 0 var(--space-7xl)}
  .inner-slot{min-height:34px;padding:var(--space-chart-gap) var(--space-sm);border-radius:var(--radius-md);font-size:var(--font-size-caption);grid-template-columns:minmax(0,1fr)}
  .inner-drop{border-style:dashed;background:color-mix(in srgb,var(--cream) 50%,transparent);border:var(--size-border) dashed var(--cream-deep)}
  .inner-drop .empty{font-size:var(--font-size-xs)}
  @media (max-width:767px){
    .cell{width:var(--space-9xl);height:var(--space-9xl);font-size:var(--font-size-body)}
  }
</style>

<script src="code-lab.js"></script>
<script>
var GAME_ID='g55-condition-fork';
var HEARTS=3;
var levels=[
  {title:'关卡 1 — 学会问路',len:6,slots:6,budget:10,repeat:false,
   hint:'两条赛道的墙位置不同，写死的步子必撞墙。"如果前方是墙…"能让程序自己看路。',
   tracks:[{name:'赛道 A',walls:[3]},{name:'赛道 B',walls:[4]}]},
  {title:'关卡 2 — 预算危机',len:8,slots:8,budget:4,repeat:true,
   hint:'只有 4 块积木的预算，一步一步摆肯定不够——"重复"来了。',
   tracks:[{name:'赛道 A',walls:[2,5]},{name:'赛道 B',walls:[3,6]}]},
  {title:'关卡 3 — 神秘赛道',len:8,slots:8,budget:4,repeat:true,mystery:true,
   hint:'第三条赛道的墙，运行前谁也不知道在哪。你的程序真的"放之四海而皆准"吗？',
   tracks:[{name:'赛道 A',walls:[1,3,5]},{name:'赛道 B',walls:[2,4,6]}]}
];
var levelIndex=0,slots=[],hearts=HEARTS,over=false,running=false;
var mysteryWalls=null,mysteryRevealed=false;
var dragDropped=false,dragSourcePath=null,touchDrag=null;

function lv(){return levels[levelIndex];}

/* ---------- 路径寻址：i | i,body,j | i,then,j | i,else,j | i,body,j,then,k ---------- */
function getContainer(pathStr){
  var parts=pathStr.split(','),arr=slots,i=0;
  while(i<parts.length-1){
    var node=arr[Number(parts[i])];
    var br=parts[i+1];
    arr=br==='then'?node.thenBody:(br==='else'?node.elseBody:node.body);
    i+=2;
  }
  return{arr:arr,key:Number(parts[parts.length-1])};
}
function setVal(pathStr,val){var c=getContainer(pathStr);c.arr[c.key]=val;return Number(pathStr.split(',')[0]);}
function removeVal(pathStr){
  var parts=pathStr.split(',');
  if(parts.length===1){slots[Number(parts[0])]=null;return Number(parts[0]);}
  var c=getContainer(pathStr);c.arr.splice(c.key,1);return Number(parts[0]);
}
function countBlocks(list){
  var n=0;
  (list||[]).forEach(function(it){
    if(!it)return;n++;
    if(it.type==='if'){n+=countBlocks(it.thenBody)+countBlocks(it.elseBody);}
    if(it.type==='repeat')n+=countBlocks(it.body);
  });
  return n;
}
function updateBudget(){
  var used=countBlocks(slots),cap=lv().budget;
  var pill=document.getElementById('budget-pill');
  pill.textContent='积木 '+used+' / '+cap;
  pill.classList.toggle('over',used>cap);
  document.getElementById('run-btn').disabled=running||over||used>cap||used===0;
}

/* ---------- 渲染程序 ---------- */
var leafLabel={move:'前进',skip:'跳过'};
function xBtn(){return '<button class="remove-btn" type="button" aria-label="移除">&#215;</button>';}
function leafHTML(path,item){
  return '<li class="slot inner-slot" data-path="'+path+'">'+
    '<div class="slot-block" draggable="true" data-path="'+path+'" data-type="'+item.type+'">'+leafLabel[item.type]+xBtn()+'</div></li>';
}
function dropZone(path,label){
  return '<li class="slot inner-slot inner-drop" data-path="'+path+'"><span class="empty">'+(label||'拖入')+'</span></li>';
}
function branchHTML(prefix,kind,body){
  var items=(body||[]).map(function(item,j){return leafHTML(prefix+','+kind+','+j,item);}).join('');
  items+=dropZone(prefix+','+kind+','+(body||[]).length);
  return '<div class="branch"><span class="branch-label">'+(kind==='then'?'是（有墙）':'否（没墙）')+'</span><ol class="branch-list">'+items+'</ol></div>';
}
function ifHTML(prefix,s,numHTML,nested){
  return '<li class="slot slot-if'+(nested?' inner-slot':'')+'" data-path="'+prefix+'">'+
    '<div class="box-header">'+numHTML+
      '<div class="slot-block" draggable="true" data-path="'+prefix+'" data-type="if">如果前方是墙…否则…'+xBtn()+'</div></div>'+
    '<div class="if-branches'+(nested?' nested':'')+'">'+branchHTML(prefix,'then',s.thenBody)+branchHTML(prefix,'else',s.elseBody)+'</div>'+
    '</li>';
}
function repeatHTML(i,s){
  var body=(s.body||[]).map(function(item,j){
    var p=i+',body,'+j;
    if(item.type==='if')return ifHTML(p,item,'<span class="inner-marker">&#8627;</span>',true);
    return leafHTML(p,item);
  }).join('');
  body+=dropZone(i+',body,'+(s.body||[]).length,'拖入指令');
  return '<li class="slot slot-repeat" data-path="'+i+'">'+
    '<div class="box-header"><span class="slot-num">'+(i+1)+'</span>'+
      '<div class="slot-block" draggable="true" data-path="'+i+'" data-type="repeat">重复 <input class="val-input" data-path="'+i+'" type="number" min="1" max="10" value="'+(s.count||2)+'"> 次'+xBtn()+'</div></div>'+
    '<ol class="repeat-body">'+body+'</ol></li>';
}
function slotHTML(i){
  var s=slots[i];
  if(!s)return'<li class="slot" data-path="'+i+'"><span class="slot-num">'+(i+1)+'</span><span class="empty">拖一个积木到这里</span></li>';
  if(s.type==='if')return ifHTML(String(i),s,'<span class="slot-num">'+(i+1)+'</span>',false);
  if(s.type==='repeat')return repeatHTML(i,s);
  return'<li class="slot" data-path="'+i+'"><span class="slot-num">'+(i+1)+'</span>'+
    '<div class="slot-block" draggable="true" data-path="'+i+'" data-type="'+s.type+'">'+leafLabel[s.type]+xBtn()+'</div></li>';
}
function renderSlots(){document.getElementById('program').innerHTML=slots.map(function(_,i){return slotHTML(i);}).join('');updateBudget();}
function renderSlot(i){
  var li=document.querySelector('#program > li[data-path="'+i+'"]');if(!li)return;
  var tmp=document.createElement('ol');tmp.innerHTML=slotHTML(i);
  li.parentNode.replaceChild(tmp.firstElementChild,li);
  updateBudget();
}
function clearIsOver(){document.querySelectorAll('.is-over').forEach(function(el){el.classList.remove('is-over');});}

/* ---------- 拖放 ---------- */
function dropAllowed(targetPath,type){
  var parts=targetPath.split(',');
  if(type==='repeat')return parts.length===1;
  if(type==='if')return parts.length===1||(parts.length===3&&parts[1]==='body');
  return true;
}
function handleDrop(targetPath,type,srcPath){
  if(!dropAllowed(targetPath,type))return false;
  if(type==='repeat'&&!lv().repeat)return false;
  dragDropped=true;
  var topSrc=srcPath?Number(srcPath.split(',')[0]):-1;
  var topDst=Number(targetPath.split(',')[0]);
  if(srcPath&&srcPath!==targetPath){removeVal(srcPath);if(topSrc!==topDst)renderSlot(topSrc);}
  var val=type==='if'?{type:'if',thenBody:[],elseBody:[]}
    :type==='repeat'?{type:'repeat',count:2,body:[]}
    :{type:type};
  setVal(targetPath,val);
  renderSlot(topDst);
  return true;
}
function bindProgram(){
  var prog=document.getElementById('program');
  prog.addEventListener('dragover',function(e){
    var el=e.target.closest('[data-path]');
    if(!el||el.classList.contains('slot-if')||el.classList.contains('slot-repeat'))return;
    e.preventDefault();clearIsOver();el.classList.add('is-over');
  });
  prog.addEventListener('drop',function(e){
    clearIsOver();
    var el=e.target.closest('[data-path]');
    if(!el||el.classList.contains('slot-if')||el.classList.contains('slot-repeat'))return;
    var type=e.dataTransfer.getData('text/plain');
    if(!leafLabel[type]&&type!=='if'&&type!=='repeat')return;
    e.preventDefault();
    handleDrop(el.dataset.path,type,e.dataTransfer.getData('source-path')||null);
  });
  prog.addEventListener('dragstart',function(e){
    var block=e.target.closest('.slot-block[data-path]');if(!block)return;
    dragDropped=false;dragSourcePath=block.dataset.path;
    e.dataTransfer.setData('text/plain',block.dataset.type);
    e.dataTransfer.setData('source-path',block.dataset.path);
  });
  prog.addEventListener('dragend',function(){
    clearIsOver();
    if(dragDropped){dragSourcePath=null;return;}
    if(dragSourcePath){renderSlot(removeVal(dragSourcePath));dragSourcePath=null;}
  });
  prog.addEventListener('click',function(e){
    var btn=e.target.closest('.remove-btn');if(!btn)return;
    e.stopPropagation();
    var block=btn.closest('.slot-block[data-path]');if(!block)return;
    renderSlot(removeVal(block.dataset.path));
  });
  prog.addEventListener('change',function(e){
    var inp=e.target.closest('.val-input');if(!inp)return;
    var c=getContainer(inp.dataset.path);
    var node=c.arr[c.key];
    if(node&&node.type==='repeat')node.count=Math.max(1,Math.min(10,parseInt(inp.value)||2));
  });
  prog.addEventListener('touchstart',function(e){
    if(e.target.closest('.val-input'))return;
    var block=e.target.closest('.slot-block[data-path]');if(!block||running)return;
    e.preventDefault();startTouch(block,e.touches[0]);
  },{passive:false});
}
function bindBlocks(){
  var bEl=document.getElementById('blocks');
  bEl.querySelectorAll('.block').forEach(function(b){
    b.addEventListener('dragstart',function(e){
      dragDropped=false;dragSourcePath=null;
      e.dataTransfer.setData('text/plain',b.dataset.type);
      e.dataTransfer.setData('source-path','');
    });
  });
  bEl.addEventListener('touchstart',function(e){
    var b=e.target.closest('.block');if(!b||running||b.classList.contains('is-locked'))return;
    e.preventDefault();startTouch(b,e.touches[0]);
  },{passive:false});
}
function startTouch(src,touch){
  var rect=src.getBoundingClientRect();
  var clone=src.cloneNode(true);clone.className=src.className+' touch-clone';
  var btn=clone.querySelector('.remove-btn');if(btn)btn.remove();
  clone.querySelectorAll('.val-input').forEach(function(inp){inp.style.pointerEvents='none';});
  document.body.appendChild(clone);
  touchDrag={type:src.dataset.type,srcPath:src.dataset.path||null,clone:clone,ox:rect.width/2,oy:rect.height/2};
  moveClone(touch.clientX,touch.clientY);
}
function moveClone(x,y){if(!touchDrag)return;touchDrag.clone.style.transform='translate('+(x-touchDrag.ox)+'px,'+(y-touchDrag.oy)+'px)';}
function endTouch(touch){
  if(!touchDrag)return;
  var td=touchDrag;touchDrag=null;td.clone.remove();
  var el=document.elementFromPoint(touch.clientX,touch.clientY);
  var dropEl=el?el.closest('[data-path]'):null;
  if(dropEl&&!dropEl.classList.contains('slot-if')&&!dropEl.classList.contains('slot-repeat')){
    handleDrop(dropEl.dataset.path,td.type,td.srcPath);
  } else if(td.srcPath){
    renderSlot(removeVal(td.srcPath));
  }
}
document.addEventListener('touchmove',function(e){if(!touchDrag)return;e.preventDefault();moveClone(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.addEventListener('touchend',function(e){if(!touchDrag)return;e.preventDefault();endTouch(e.changedTouches[0]);},{passive:false});
document.addEventListener('touchcancel',function(){if(touchDrag){touchDrag.clone.remove();touchDrag=null;}});

/* ---------- 赛道 ---------- */
function allTracks(){
  var ts=lv().tracks.slice();
  if(lv().mystery)ts.push({name:'神秘赛道 ?',walls:mysteryWalls||[],mystery:true});
  return ts;
}
function buildTrack(walls,len){
  var cells=[];
  for(var i=0;i<len;i++)cells.push(walls.indexOf(i)>=0?'wall':'safe');
  cells[0]='safe';cells[len-1]='safe';
  return cells;
}
function renderTracks(state){
  // state: {trackIdx, pos, crashPos} 可选，标出机器人位置
  var len=lv().len;
  document.getElementById('track-shell').innerHTML=allTracks().map(function(t,ti){
    var hideWalls=t.mystery&&!mysteryRevealed;
    var track=buildTrack(t.walls,len);
    var cells=track.map(function(c,i){
      var cls='cell';var txt='';
      if(hideWalls&&i>0&&i<len-1){cls+=' hidden-cell';txt='?';}
      else if(c==='wall')cls+=' wall';
      if(i===len-1){cls+=' goal';txt='⭐';}
      if(i===0)cls+=' start';
      if(state&&state.trackIdx===ti&&state.pos===i)cls+=' robot';
      if(state&&state.trackIdx===ti&&state.crashPos===i)cls+=' crash';
      return '<div class="'+cls+'">'+txt+'</div>';
    }).join('');
    var labelCls='track-label'+(state&&state.trackIdx===ti?' running':'');
    return '<div><p class="'+labelCls+'">'+t.name+'</p><div class="track-row">'+cells+'</div></div>';
  }).join('');
}
function genMystery(){
  var walls=[],count=2+Math.floor(Math.random()*2),tries=0;
  while(walls.length<count&&tries++<60){
    var w=1+Math.floor(Math.random()*(lv().len-2-1)); // 1..len-3
    var ok=walls.every(function(x){return Math.abs(x-w)>=2;});
    if(ok)walls.push(w);
  }
  return walls.sort(function(a,b){return a-b;});
}

/* ---------- 执行 ---------- */
async function runOnTrack(track,trackIdx,label){
  var len=lv().len;
  var pos=0,crashed=false,finished=false,ops=0;
  renderTracks({trackIdx:trackIdx,pos:pos});
  async function execList(list){
    for(var i=0;i<list.length;i++){
      if(crashed||finished||ops>200)return;
      var node=list[i];if(!node)continue;
      if(node.type==='move'){
        ops++;pos++;
        if(pos>=len||track[pos]==='wall')crashed=true;
        renderTracks({trackIdx:trackIdx,pos:Math.min(pos,len-1),crashPos:crashed?Math.min(pos,len-1):-1});
        await CodeLab.wait(170);
        if(!crashed&&pos===len-1)finished=true;
      } else if(node.type==='skip'){
        ops++;pos+=2;
        if(pos>=len)pos=len-1;
        else if(track[pos]==='wall')crashed=true;
        renderTracks({trackIdx:trackIdx,pos:Math.min(pos,len-1),crashPos:crashed?Math.min(pos,len-1):-1});
        await CodeLab.wait(170);
        if(!crashed&&pos>=len-1)finished=true;
      } else if(node.type==='if'){
        ops++;
        var frontWall=(pos+1<len)&&track[pos+1]==='wall';
        await execList(frontWall?(node.thenBody||[]):(node.elseBody||[]));
      } else if(node.type==='repeat'){
        var n=Math.max(1,Math.min(node.count||2,10));
        for(var k=0;k<n;k++){
          if(crashed||finished||ops>200)break;
          await execList(node.body||[]);
        }
      }
    }
  }
  await execList(slots);
  return{pass:finished&&!crashed,crashed:crashed};
}
async function runAllTracks(){
  if(running||over)return;running=true;
  document.getElementById('run-btn').disabled=true;
  CodeLab.hideResult();
  if(lv().mystery){mysteryWalls=genMystery();mysteryRevealed=true;}
  var ts=allTracks(),results=[];
  for(var t=0;t<ts.length;t++){
    var track=buildTrack(ts[t].walls,lv().len);
    results.push(await runOnTrack(track,t,ts[t].name));
    await CodeLab.wait(350);
  }
  document.getElementById('track-chips').innerHTML=ts.map(function(t,i){
    return '<span class="track-chip '+(results[i].pass?'pass':'fail')+'">'+t.name+' '+(results[i].pass?'✓':'✕')+'</span>';
  }).join('');
  var allPass=results.every(function(r){return r.pass;});
  running=false;
  if(allPass){
    over=true;
    var used=HEARTS-hearts+1;
    var stars=hearts; // 剩几颗心就几星（本次也算一次机会，但成功不扣心）
    CodeLab.saveStars(GAME_ID,levelIndex,stars);
    CodeLab.renderStarsHud(stars);
    document.getElementById('next-btn').classList.add('show');
    if(levelIndex===levels.length-1)CodeLab.markDone(GAME_ID);
    CodeLab.showResult('success','所有赛道通过！你的程序真的"放之四海而皆准" '+CodeLab.starHTML(stars),
      levelIndex<levels.length-1?'下一关':'再玩一次',nextLevel);
  } else {
    hearts--;
    CodeLab.renderHearts(HEARTS,hearts);
    CodeLab.renderStarsHud(Math.max(0,hearts));
    if(hearts<=0){
      over=true;
      CodeLab.showResult('fail','机会用完了…记住黄金组合：重复 { 如果前方是墙 → 跳过，否则 → 前进 }','重开本关',function(){loadLevel(levelIndex);});
    } else {
      var firstFail=ts[results.findIndex(function(r){return !r.pass;})].name;
      CodeLab.showResult('retry',firstFail+' 没通过（还剩 '+hearts+' 次机会）。哪一步是"写死"的？','知道了',CodeLab.hideResult);
      document.getElementById('run-btn').disabled=false;
      if(lv().mystery){mysteryRevealed=false;mysteryWalls=null;renderTracks(null);}
    }
  }
  updateBudget();
}
function nextLevel(){loadLevel(levelIndex<levels.length-1?levelIndex+1:0);}

function loadLevel(index){
  levelIndex=index;
  var l=levels[index];
  CodeLab.setLevel(index,levels.length,l.title,l.hint);
  hearts=HEARTS;over=false;running=false;
  mysteryWalls=null;mysteryRevealed=false;
  slots=Array(l.slots).fill(null);
  document.getElementById('repeat-block').classList.toggle('is-locked',!l.repeat);
  document.getElementById('hud-msg').textContent='预算 '+l.budget+' 块';
  document.getElementById('track-chips').innerHTML='';
  document.getElementById('next-btn').classList.remove('show');
  CodeLab.renderHearts(HEARTS,hearts);
  CodeLab.renderStarsHud(hearts);
  CodeLab.hideResult();
  renderSlots();renderTracks(null);
}
document.getElementById('clear-btn').onclick=function(){if(running||over)return;slots=Array(lv().slots).fill(null);renderSlots();};
document.getElementById('run-btn').onclick=runAllTracks;
document.getElementById('next-btn').onclick=nextLevel;
CodeLab.initMember();bindBlocks();bindProgram();loadLevel(0);
</script>
</body>
</html>
