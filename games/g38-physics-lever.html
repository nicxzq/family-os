<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">

<main class="physics-page">

<script src="../fo-utils.js"></script>
<script>
window.PHYSICS_GAME = {
  id:'g38-physics-lever', type:'lever', emoji:'⚖️', title:'杠杆原理',
  sub:'移动支点、改变重量，让跷跷板重新平衡。',
  concept:'力矩平衡', mission:'目标：让左右力矩接近相等，杠杆保持水平。',
  prompt:'重量不一定要一样，只要重量 × 力臂 接近就能平衡。',
  success:'杠杆平衡！你用力矩而不是只看重量解决了问题。',
  tryAgain:'还不平衡。试着把支点靠近更重的一侧。',
  learn:['力臂是力到支点的距离。','力矩 = 力 × 力臂。','剪刀、撬棍、跷跷板都利用杠杆。'],
  controls:[
    {id:'leftWeight',label:'左侧重量',min:5,max:60,value:32,unit:'kg'},
    {id:'rightWeight',label:'右侧重量',min:5,max:60,value:24,unit:'kg'},
    {id:'pivot',label:'支点位置',min:25,max:75,value:50,unit:'%'}
  ]
};
</script>
