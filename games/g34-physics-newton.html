<script>
window.PHYSICS_GAME = {
  id:'g34-physics-newton', type:'newton', emoji:'🍎', title:'小车加速度',
  sub:'改变推力、质量和摩擦，观察小车怎样加速。',
  concept:'F = ma', mission:'目标：让小车获得足够加速度，冲过终点线。',
  prompt:'按运行前先调参数：推力越大、质量越小、摩擦越小，小车越容易加速。',
  success:'小车冲过终点！你让合力产生了明显加速度。',
  tryAgain:'加速度不够。试着增大推力，或减小质量和摩擦。',

  controls:[
    {id:'force',label:'推力',min:10,max:90,value:48,unit:'N'},
    {id:'mass',label:'质量',min:4,max:20,value:12,unit:'kg'},
    {id:'friction',label:'摩擦',min:0,max:35,value:12,unit:'N'}
