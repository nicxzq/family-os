<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>二分查找 · 游戏</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{overflow:hidden;font-family:'LXGW WenKai TC',var(--font-serif);background:var(--cream);color:var(--ink)}
  .nav-member-btn{display:inline-flex;align-items:center;gap:8px;background:var(--paper);border:0;border-radius:999px;padding:6px 14px 6px 6px;font-family:inherit;font-size:14px;cursor:pointer;color:var(--ink-soft);box-shadow:var(--shadow-soft);flex-shrink:0}
  .nav-member-btn svg{border-radius:50%}
  .game-wrap{height:100dvh;display:flex;flex-direction:column;max-width:1160px;margin:0 auto;padding:12px 20px;gap:10px}
  .game-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--paper);box-shadow:var(--shadow-soft);border-radius:var(--radius);padding:10px 14px;flex-shrink:0}
  .back-link{text-decoration:none;color:var(--ink-mute);font-size:15px;flex-shrink:0}
  .game-title{flex:1;min-width:0;text-align:center;padding:0 8px}
  .title-name{display:block;font-size:16px;font-weight:700;line-height:1.3}
  .title-desc{display:block;font-size:12px;color:var(--ink-mute);line-height:1.3}
  .nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .level-pill{display:inline-flex;align-items:center;background:var(--paper);box-shadow:var(--shadow-soft);border-radius:999px;padding:6px 12px;color:var(--ink-soft);font-size:13px;font-weight:700;white-space:nowrap}
  .layout{flex:1;min-height:0;display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px;padding-bottom:16px}
  .panel{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:16px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .panel-title{font-size:16px;letter-spacing:.1em;color:var(--ink-mute);margin:0 0 12px;font-weight:700}
  .algo-tabs{display:flex;gap:8px;margin-bottom:14px;flex-shrink:0}
  .algo-tab{flex:1;border:2px solid var(--cream-deep);border-radius:var(--radius);background:var(--paper);color:var(--ink-soft);font-family:inherit;font-size:14px;font-weight:700;padding:10px 6px;cursor:pointer;transition:all .15s}
  .algo-tab.is-active[data-algo="linear"]{background:var(--blue);border-color:var(--blue);color:var(--paper)}
  .algo-tab.is-active[data-algo="binary"]{background:var(--coral);border-color:var(--coral);color:var(--paper)}
  .algo-desc{background:var(--cream-deep);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--ink-soft);line-height:1.6;margin-bottom:14px;flex-shrink:0}
  .target-box{background:var(--yellow-soft);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--ink);line-height:1.6;margin-bottom:14px;flex-shrink:0;font-weight:700;text-align:center}
  .stat-row{display:flex;gap:10px;margin-bottom:14px;flex-shrink:0}
  .stat-card{flex:1;background:var(--cream-deep);border-radius:var(--radius);padding:10px 12px;text-align:center}
  .stat-num{display:block;font-size:22px;font-weight:700;color:var(--ink)}
  .stat-num.is-empty{color:var(--ink-mute)}
  .stat-label{display:block;font-size:11px;color:var(--ink-mute);margin-top:2px}
  .compare{flex:1;min-height:0;overflow-y:auto}
  .compare-title{font-size:12px;letter-spacing:.1em;color:var(--ink-mute);margin:0 0 8px;font-weight:700}
  .compare-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}
  .compare-table th,.compare-table td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--cream-deep)}
  .compare-table th{color:var(--ink-mute);font-weight:700;font-size:12px}
  .compare-table td.dim{color:var(--ink-mute)}
  .compare-note{background:var(--yellow-soft);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--ink);line-height:1.6;display:none}
  .compare-note.show{display:block}
  .actions{display:flex;gap:10px;flex-shrink:0}
  .action{border:0;border-radius:999px;padding:10px 16px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;box-shadow:var(--shadow-soft)}
  .clear{background:var(--cream-deep);color:var(--ink-soft)}
  .run{background:var(--ink);color:var(--paper)}
  .run:disabled{opacity:.5;cursor:default}
  .next-wrap{margin-top:10px;flex-shrink:0}
  .next-btn{width:100%;border:0;border-radius:999px;background:var(--green);color:var(--paper);padding:10px 16px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;display:none}
  .next-btn.show{display:block}
  .stage-panel{display:flex;flex-direction:column;min-height:0;position:relative}
  .stage-head{position:absolute;top:0;left:0;right:0;padding:10px 16px 14px;z-index:6;pointer-events:none;
    background:linear-gradient(to bottom,color-mix(in srgb,var(--paper) 92%,transparent) 55%,transparent)}
  .stage-head h2{font-size:15px;margin:0;color:var(--ink)}
  .stage-head p{margin:2px 0 0;color:var(--ink-soft);font-size:12px}
  .tiles-shell-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:auto}
  .tiles-shell{width:100%;background:var(--cream-deep);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-soft)}
  .tiles-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
  .tile{min-width:30px;height:30px;border-radius:6px;background:var(--paper);display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--ink-soft);box-shadow:var(--shadow-soft);padding:0 3px;transition:background .15s,opacity .15s}
  .tile.checked{background:var(--blue-soft)}
  .tile.checking{background:var(--yellow)}
  .tile.eliminated{opacity:.3}
  .tile.found{background:var(--green);color:var(--paper)}
  .result{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:440px;border-radius:var(--radius);padding:10px 16px;display:none;align-items:center;justify-content:center;gap:10px;font-size:14px;font-weight:700;z-index:20;box-shadow:var(--shadow-card);text-align:center}
  .result.show{display:flex}
  .result.linear{background:var(--blue);color:var(--paper)}
  .result.binary{background:var(--coral);color:var(--paper)}
  .concepts-wrap{margin-top:16px}
  .concepts{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .concept-card{background:var(--paper);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-card)}
  .concept-card h3{font-size:15px;color:var(--ink);margin-bottom:6px}
  .concept-card p{font-size:13px;color:var(--ink-soft);line-height:1.6}
  .section-label{font-size:13px;letter-spacing:.12em;color:var(--ink-mute);margin-bottom:14px}
  @media (max-width:767px){
    body{overflow:auto}
    .game-wrap{height:auto;padding:10px}
    .layout{grid-template-columns:1fr;gap:10px;padding-bottom:10px}
    .stage-panel{order:-1;min-height:0}
    .tiles-shell-wrap{flex:none;max-height:260px}
    .result{top:50px;width:calc(100% - 20px)}
  }
</style>
<script src="/fo-gate.js"></script></head>
<body>
<main class="game-wrap">
  <nav class="game-nav">
    <a class="back-link" href="index.html#code">&#8592; 游戏库</a>
    <div class="game-title">
      <span class="title-name">二分查找</span>
      <span class="title-desc">同一个目标，两种查法，谁更快？</span>
    </div>
    <div class="nav-right">
      <div class="level-pill" id="level-pill">关卡 1 / 3</div>
      <button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button>
    </div>
  </nav>
  <div class="layout">
    <section class="panel">
      <h2 class="panel-title">选择算法</h2>
      <div class="algo-tabs" id="algo-tabs">
        <button class="algo-tab is-active" data-algo="linear">顺序查找</button>
        <button class="algo-tab" data-algo="binary">二分查找</button>
      </div>
      <p class="algo-desc" id="algo-desc"></p>
      <p class="target-box" id="target-box"></p>
      <div class="stat-row">
        <div class="stat-card"><span class="stat-num is-empty" id="stat-steps">–</span><span class="stat-label">查找次数</span></div>
        <div class="stat-card"><span class="stat-num is-empty" id="stat-n">–</span><span class="stat-label">数字总数</span></div>
      </div>
      <div class="compare">
        <p class="compare-title">本关对比</p>
        <table class="compare-table">
          <thead><tr><th>算法</th><th>查找次数</th></tr></thead>
          <tbody>
            <tr><td class="dim">顺序查找</td><td id="cmp-linear">–</td></tr>
            <tr><td class="dim">二分查找</td><td id="cmp-binary">–</td></tr>
          </tbody>
        </table>
        <p class="compare-note" id="compare-note"></p>
      </div>
      <div class="actions">
        <button class="action clear" id="clear-btn">重置</button>
        <button class="action run" id="run-btn">&#9654; 运行</button>
      </div>
      <div class="next-wrap"><button class="next-btn" id="next-btn">下一关</button></div>
    </section>
    <section class="panel stage-panel">
      <div class="stage-head">
        <h2 id="level-title">关卡 1</h2>
        <p id="level-hint"></p>
      </div>
      <div class="tiles-shell-wrap">
        <div class="tiles-shell">
          <div class="tiles-row" id="tiles-row"></div>
        </div>
      </div>
      <div class="result" id="result"><span id="result-text"></span></div>
    </section>
  </div>
  <section class="concepts-wrap wrap-narrow" style="max-width:1160px;margin:0 auto;width:100%">
    <p class="section-label">知识预习</p>
    <div class="concepts">
      <div class="concept-card"><h3>顺序查找</h3><p>从头找到尾，运气不好要找很多次</p></div>
      <div class="concept-card"><h3>二分查找</h3><p>每次砍掉一半范围，前提是数字已经排好序</p></div>
      <div class="concept-card"><h3>时间复杂度</h3><p>O(n) 和 O(log n)——数据越多，差距越大</p></div>
    </div>
  </section>
</main>
<script src="../fo-utils.js"></script>
<script>
var levels=[
  {title:'关卡 1 — 12 个数字',n:12,hint:'目标数字藏在最后——最考验顺序查找的耐心。'},
  {title:'关卡 2 — 30 个数字',n:30,hint:'数字变多了，两种算法的差距会更明显吗？'},
  {title:'关卡 3 — 100 个数字',n:100,hint:'最后一关，感受一下 O(n) 和 O(log n) 的真实差距。'}
];
var ALGO_DESC={
  linear:'顺序查找从第一个数字开始，一个一个往后比对，直到找到目标为止。',
  binary:'二分查找每次都看中间的数字：太小就去右边找，太大就去左边找，一次砍掉一半范围。'
};
var levelIndex=0,algo='linear',running=false;
var runFlags={linear:false,binary:false};
var lastStats={linear:null,binary:null};

function wait(ms){return new Promise(function(r){setTimeout(r,ms);});}

function linearSteps(arr,target){
  var steps=[];
  for(var i=0;i<arr.length;i++){
    steps.push({type:'check',idx:i});
    if(arr[i]===target){steps.push({type:'found',idx:i});break;}
  }
  return steps;
}
function binarySteps(arr,target){
  var steps=[],lo=0,hi=arr.length-1;
  while(lo<=hi){
    var mid=Math.floor((lo+hi)/2);
    steps.push({type:'check',idx:mid,lo:lo,hi:hi});
    if(arr[mid]===target){steps.push({type:'found',idx:mid});break;}
    else if(arr[mid]<target){lo=mid+1;}
    else{hi=mid-1;}
  }
  return steps;
}

function initMember(){
  var m=window.FO?FO.getMember():null,el=document.getElementById('nav-member-btn');
  if(m){el.innerHTML=FO.avatarSVG(m.avatar,m.color,32)+'<span>'+m.name+'</span>';el.onclick=function(){location.href='../dashboard.html'};}
  else{el.innerHTML='<span>登录</span>';el.onclick=function(){location.href='../login.html'};}
}

var currentArr=[];
function renderTiles(states){
  document.getElementById('tiles-row').innerHTML=currentArr.map(function(v,i){
    var cls='tile'+(states&&states[i]?(' '+states[i]):'');
    return '<div class="'+cls+'">'+v+'</div>';
  }).join('');
}
function resetTiles(){
  var n=levels[levelIndex].n;
  currentArr=[];for(var i=1;i<=n;i++)currentArr.push(i);
  renderTiles(null);
}

async function playSteps(steps,delay,mode){
  var states={};
  var compareCount=0;
  for(var i=0;i<steps.length;i++){
    var s=steps[i];
    if(s.type==='check'){
      compareCount++;
      if(mode==='binary'){
        for(var k=0;k<currentArr.length;k++){
          if(k<s.lo||k>s.hi)states[k]='eliminated';
          else if(states[k]!=='checked')delete states[k];
        }
      }
      states[s.idx]='checking';
      renderTiles(states);
      await wait(delay);
      if(states[s.idx]==='checking')states[s.idx]='checked';
    } else if(s.type==='found'){
      states[s.idx]='found';
      renderTiles(states);
    }
  }
  return compareCount;
}

function updateStatCards(){
  var s=lastStats[algo];
  document.getElementById('stat-steps').textContent=s?s:'–';
  document.getElementById('stat-steps').classList.toggle('is-empty',!s);
  document.getElementById('stat-n').textContent=levels[levelIndex].n;
  document.getElementById('stat-n').classList.remove('is-empty');
  document.getElementById('cmp-linear').textContent=lastStats.linear!=null?lastStats.linear:'–';
  document.getElementById('cmp-binary').textContent=lastStats.binary!=null?lastStats.binary:'–';
  var note=document.getElementById('compare-note');
  if(lastStats.linear!=null&&lastStats.binary!=null){
    var diff=lastStats.linear-lastStats.binary;
    note.textContent='这一关顺序查找比二分查找多找了 '+diff+' 次——数字越多，二分查找的优势就越明显。';
    note.classList.add('show');
    document.getElementById('next-btn').classList.add('show');
  } else {
    note.classList.remove('show');
  }
}
async function runAlgo(){
  if(running)return;running=true;
  document.getElementById('run-btn').disabled=true;
  resetTiles();await wait(100);
  var lv=levels[levelIndex],target=lv.n;
  var steps=algo==='linear'?linearSteps(currentArr,target):binarySteps(currentArr,target);
  var delay=Math.max(15,Math.min(160,1800/steps.length));
  var count=await playSteps(steps,delay,algo);
  lastStats[algo]=count;runFlags[algo]=true;
  var resultEl=document.getElementById('result'),textEl=document.getElementById('result-text');
  resultEl.className='result '+algo+' show';
  textEl.textContent=(algo==='linear'?'顺序查找':'二分查找')+' 完成 · 找了 '+count+' 次';
  updateStatCards();
  running=false;
  document.getElementById('run-btn').disabled=false;
  if(runFlags.linear&&runFlags.binary&&levelIndex===levels.length-1)markDone();
}
function markDone(){try{var d=JSON.parse(localStorage.getItem('fo_games_done')||'[]');if(d.indexOf('g56-binary-search')<0){d.push('g56-binary-search');localStorage.setItem('fo_games_done',JSON.stringify(d));}}catch(e){}}

function loadLevel(index){
  levelIndex=index;runFlags={linear:false,binary:false};lastStats={linear:null,binary:null};
  document.getElementById('level-pill').textContent='关卡 '+(index+1)+' / '+levels.length;
  document.getElementById('level-title').textContent=levels[index].title;
  document.getElementById('level-hint').textContent=levels[index].hint;
  document.getElementById('target-box').textContent='目标数字：'+levels[index].n;
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('compare-note').classList.remove('show');
  document.getElementById('result').className='result';
  resetTiles();updateStatCards();
}
document.getElementById('algo-tabs').addEventListener('click',function(e){
  var btn=e.target.closest('.algo-tab');if(!btn||running)return;
  algo=btn.dataset.algo;
  document.querySelectorAll('.algo-tab').forEach(function(t){t.classList.toggle('is-active',t===btn);});
  document.getElementById('algo-desc').textContent=ALGO_DESC[algo];
  updateStatCards();
});
document.getElementById('run-btn').onclick=runAlgo;
document.getElementById('clear-btn').onclick=function(){if(running)return;resetTiles();document.getElementById('result').className='result';};
document.getElementById('next-btn').onclick=function(){
  loadLevel(levelIndex<levels.length-1?levelIndex+1:0);
};
document.getElementById('algo-desc').textContent=ALGO_DESC.linear;
initMember();loadLevel(0);
</script>
</body>
</html>
