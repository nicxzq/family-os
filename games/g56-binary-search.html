<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>二分查找 · 游戏</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="code-lab.css">
<style>
  .tiles-shell{width:100%;max-height:100%;overflow-y:auto;background:var(--cream-deep);border-radius:var(--radius);padding:var(--space-3xl);box-shadow:var(--shadow-soft)}
  .tiles-row{display:flex;flex-wrap:wrap;gap:var(--space-xs);justify-content:center}
  .tile{min-width:var(--space-9xl);height:var(--space-9xl);border-radius:var(--radius-sm);background:var(--paper);display:grid;place-items:center;font-size:var(--font-size-sm);font-weight:700;color:var(--ink-mute);box-shadow:var(--shadow-soft);padding:0 var(--space-chart-gap);cursor:pointer;transition:background var(--duration-fast),opacity var(--duration-fast);user-select:none}
  .tile.eliminated{opacity:.25;cursor:default}
  .tile.low{background:var(--blue);color:var(--paper)}
  .tile.high{background:var(--coral);color:var(--paper)}
  .tile.found{background:var(--green);color:var(--paper);transform:scale(1.12)}
  .tile.checking{background:var(--yellow);color:var(--ink)}
  .target-box{background:var(--yellow-soft);border-radius:var(--radius);padding:var(--space-lg) var(--space-2xl);font-size:var(--font-size-note);color:var(--ink);line-height:1.6;margin-bottom:var(--space-xl);flex-shrink:0;font-weight:700;text-align:center}
  .feedback{min-height:var(--space-7xl);font-size:var(--font-size-note);font-weight:700;color:var(--ink-soft);text-align:center;margin-bottom:var(--space-lg);flex-shrink:0}
  @media (max-width:767px){
    .tile{min-width:var(--space-8xl);height:var(--space-8xl);font-size:var(--font-size-xs)}
  }
</style>
<script src="/fo-gate.js"></script></head>
<body class="code-lab">
<main class="game-wrap">
  <nav class="game-nav">
    <a class="back-link" href="index.html#code">&#8592; 游戏库</a>
    <div class="game-title">
      <span class="title-name">二分查找</span>
      <span class="title-desc">在预算内找到目标数字——学会"一刀砍一半"</span>
    </div>
    <div class="nav-right">
      <div class="level-pill" id="level-pill">关卡 1 / 3</div>
      <button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button>
    </div>
  </nav>
  <div class="layout">
    <section class="panel stage-panel">
      <div class="stage-head">
        <h2 id="level-title">关卡 1</h2>
        <p id="level-hint"></p>
      </div>
      <div class="hud">
        <span class="hud-budget" id="hud-budget">预算 –</span>
        <span class="feedback" id="feedback"></span>
        <span class="hud-stars" id="hud-stars"></span>
      </div>
      <div class="stage-body">
        <div class="tiles-shell"><div class="tiles-row" id="tiles-row"></div></div>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="legend-dot frontier"></span>小了·往右</span>
        <span class="legend-item"><span class="legend-dot mine"></span>大了·往左</span>
        <span class="legend-item"><span class="legend-dot path"></span>找到了</span>
        <span class="legend-item">被排除的区域会变暗</span>
      </div>
      <div class="result" id="result"><span id="result-text"></span><button id="result-btn">继续</button></div>
    </section>
    <section class="panel side-panel">
      <h2 class="panel-title">任务</h2>
      <p class="target-box" id="target-box"></p>
      <div class="stat-row">
        <div class="stat-card"><span class="stat-num" id="stat-guess">0</span><span class="stat-label">已猜次数</span></div>
        <div class="stat-card"><span class="stat-num" id="stat-remain">–</span><span class="stat-label">剩余可能</span></div>
      </div>
      <p class="hint-box">牌是从小到大排好的。每翻一张，就能排除一片区域——聪明的玩家每次都翻"剩余范围的正中间"。</p>
      <div class="compare-scroll">
        <p class="panel-title">本关对比</p>
        <table class="compare-table">
          <thead><tr><th>选手</th><th>查找次数</th></tr></thead>
          <tbody>
            <tr><td class="dim">你</td><td id="cmp-you">–</td></tr>
            <tr><td class="dim">二分查找</td><td id="cmp-binary">–</td></tr>
            <tr><td class="dim">顺序查找</td><td id="cmp-linear">–</td></tr>
          </tbody>
        </table>
        <p class="compare-note" id="compare-note"></p>
      </div>
      <div class="actions">
        <button class="action clear" id="retry-btn">重开本关</button>
        <button class="action run" id="demo-btn" disabled>&#9654; 看二分演示</button>
      </div>
      <button class="next-btn" id="next-btn">下一关</button>
    </section>
  </div>
  <section class="concepts-wrap">
    <p class="section-label">知识预习</p>
    <div class="concepts">
      <div class="concept-card"><h3>二分查找</h3><p>每次看剩余范围的中间，一次砍掉一半，前提是数字已排好序</p></div>
      <div class="concept-card"><h3>时间复杂度</h3><p>顺序查找是 O(n)，二分查找是 O(log n)——100 个数最多 7 次就够</p></div>
      <div class="concept-card"><h3>最坏情况</h3><p>评价算法要看"运气最差时要几步"，而不是碰巧一次猜中</p></div>
    </div>
  </section>
</main>
<script src="../fo-utils.js"></script>
<script src="code-lab.js"></script>
<script>
var GAME_ID='g56-binary-search';
var levels=[
  {title:'关卡 1 — 12 张牌',n:12,hint:'预算 6 次。先试试从正中间翻起。'},
  {title:'关卡 2 — 30 张牌',n:30,hint:'牌多了一倍多，聪明的翻法只多用 1 次预算。'},
  {title:'关卡 3 — 100 张牌',n:100,hint:'100 张牌，预算只有 9 次——相信"砍一半"的力量。'}
];
function optimalOf(n){return Math.ceil(Math.log(n)/Math.log(2));}
function budgetOf(n){return optimalOf(n)+2;}

var levelIndex=0,arr=[],target=-1,targetIdx=-1;
var lo=0,hi=0,guesses=0,over=false,demoRunning=false;

function buildArray(n){
  var a=[],v=0;
  for(var i=0;i<n;i++){v+=1+Math.floor(Math.random()*3);a.push(v);}
  return a;
}
function binaryCount(a,t){
  var l=0,h=a.length-1,c=0;
  while(l<=h){var m=Math.floor((l+h)/2);c++;if(a[m]===t)return c;if(a[m]<t)l=m+1;else h=m-1;}
  return c;
}
var tileState={}; // idx -> low|high|found|eliminated
function renderTiles(){
  document.getElementById('tiles-row').innerHTML=arr.map(function(v,i){
    var st=tileState[i];
    var cls='tile'+(st?' '+st:'');
    var revealed=st==='low'||st==='high'||st==='found'||st==='checking';
    return '<div class="'+cls+'" data-idx="'+i+'">'+(revealed?v:'?')+'</div>';
  }).join('');
}
function eliminate(from,to){
  for(var i=from;i<=to;i++)if(!tileState[i])tileState[i]='eliminated';
}
function updateHud(){
  var lv=levels[levelIndex],budget=budgetOf(lv.n);
  var left=budget-guesses;
  var el=document.getElementById('hud-budget');
  el.textContent='剩余预算 '+left+' 次';
  el.classList.toggle('danger',left<=2&&!over);
  document.getElementById('stat-guess').textContent=guesses;
  document.getElementById('stat-remain').textContent=over?'–':(hi-lo+1);
  if(!over)CodeLab.renderStarsHud(starsForGuesses(guesses+1)); // 预览：现在找到还能拿几星
}
function starsForGuesses(g){
  var opt=optimalOf(levels[levelIndex].n);
  if(g<=opt)return 3;
  if(g<=opt+1)return 2;
  return 1;
}
function onTileClick(e){
  if(over||demoRunning)return;
  var el=e.target.closest('.tile');if(!el)return;
  var i=parseInt(el.dataset.idx,10);
  if(tileState[i]==='eliminated'){flash('这片区域已经被排除了，别浪费预算！');return;}
  if(tileState[i])return;
  guesses++;
  var v=arr[i];
  if(v===target){
    tileState[i]='found';
    finishRound(true);
  } else if(v<target){
    tileState[i]='low';
    eliminate(lo,i);lo=i+1;
    flash(v+' 太小了 → 往右找');
  } else {
    tileState[i]='high';
    eliminate(i,hi);hi=i-1;
    flash(v+' 太大了 → 往左找');
  }
  renderTiles();
  if(!over&&guesses>=budgetOf(levels[levelIndex].n)&&tileState[targetIdx]!=='found'){
    finishRound(false);
  }
  updateHud();
}
function flash(text){document.getElementById('feedback').textContent=text;}
function finishRound(win){
  over=true;
  var lv=levels[levelIndex];
  document.getElementById('cmp-you').textContent=guesses;
  document.getElementById('cmp-binary').textContent=binaryCount(arr,target);
  document.getElementById('cmp-linear').textContent=targetIdx+1;
  document.getElementById('demo-btn').disabled=false;
  if(win){
    var stars=starsForGuesses(guesses);
    CodeLab.saveStars(GAME_ID,levelIndex,stars);
    CodeLab.renderStarsHud(stars);
    var note=document.getElementById('compare-note');
    note.textContent='二分查找最多只要 '+optimalOf(lv.n)+' 次，顺序查找运气差要 '+lv.n+' 次——牌越多，差距越大。';
    note.classList.add('show');
    document.getElementById('next-btn').classList.add('show');
    if(levelIndex===levels.length-1)CodeLab.markDone(GAME_ID);
    CodeLab.showResult('success','找到啦！用了 '+guesses+' 次 '+CodeLab.starHTML(stars),
      levelIndex<levels.length-1?'下一关':'再玩一次',nextLevel);
  } else {
    tileState[targetIdx]='found';renderTiles();
    flash('');
    CodeLab.showResult('fail','预算用完了…目标其实在这里（绿色）。每次翻"正中间"就不会超预算！','重开本关',function(){loadLevel(levelIndex);});
  }
  updateHud();
}
function nextLevel(){loadLevel(levelIndex<levels.length-1?levelIndex+1:0);}

async function playDemo(){
  if(demoRunning)return;demoRunning=true;
  document.getElementById('demo-btn').disabled=true;
  tileState={};renderTiles();
  var l=0,h=arr.length-1,c=0;
  while(l<=h){
    var m=Math.floor((l+h)/2);c++;
    tileState[m]='checking';renderTiles();
    flash('第 '+c+' 次：翻开正中间 '+arr[m]);
    await CodeLab.wait(700);
    if(arr[m]===target){tileState[m]='found';break;}
    if(arr[m]<target){tileState[m]='low';for(var i=l;i<=m;i++)if(!tileState[i])tileState[i]='eliminated';l=m+1;}
    else{tileState[m]='high';for(var j=m;j<=h;j++)if(!tileState[j])tileState[j]='eliminated';h=m-1;}
    renderTiles();
  }
  renderTiles();
  flash('二分查找用了 '+c+' 次');
  demoRunning=false;
  document.getElementById('demo-btn').disabled=false;
}

function loadLevel(index){
  levelIndex=index;
  var lv=levels[index];
  CodeLab.setLevel(index,levels.length,lv.title,lv.hint);
  arr=buildArray(lv.n);
  targetIdx=Math.floor(Math.random()*lv.n);
  target=arr[targetIdx];
  lo=0;hi=lv.n-1;guesses=0;over=false;tileState={};
  document.getElementById('target-box').textContent='在 '+lv.n+' 张牌里找到数字 '+target;
  document.getElementById('cmp-you').textContent='–';
  document.getElementById('cmp-binary').textContent='–';
  document.getElementById('cmp-linear').textContent='–';
  document.getElementById('compare-note').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('demo-btn').disabled=true;
  flash('点一张牌开始');
  CodeLab.hideResult();
  renderTiles();updateHud();
}
document.getElementById('tiles-row').addEventListener('click',onTileClick);
document.getElementById('retry-btn').onclick=function(){if(!demoRunning)loadLevel(levelIndex);};
document.getElementById('demo-btn').onclick=playDemo;
document.getElementById('next-btn').onclick=nextLevel;
CodeLab.initMember();loadLevel(0);
</script>
</body>
</html>
