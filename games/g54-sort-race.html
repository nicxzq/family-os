<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>排序竞速 · 游戏</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="code-lab.css">
<style>
  .bars-shell{width:100%;height:100%;background:var(--cream-deep);border-radius:var(--radius);padding:var(--space-9xl) var(--space-2xl) var(--space-2xl)}
  .bars-track{display:flex;align-items:flex-end;gap:var(--space-md);width:100%;height:100%}
  .bar{flex:1;border-radius:var(--radius-md) var(--radius-md) var(--radius-xs) var(--radius-xs);position:relative;background:var(--blue-soft);transition:background var(--duration-fast),height var(--duration-fast);min-height:var(--size-chart-bar-min)}
  .bar.comparing{background:var(--yellow)}
  .bar.swapping{background:var(--coral)}
  .bar.sorted{background:var(--green)}
  .bar.range{outline:var(--size-border) dashed var(--ink-mute);outline-offset:var(--space-2xs)}
  .bar.clickable{cursor:pointer}
  .bar.wrong{background:var(--coral);animation:shake .3s}
  .bar-label{position:absolute;top:calc(-1 * var(--space-6xl));left:0;right:0;text-align:center;font-size:var(--font-size-caption);font-weight:700;color:var(--ink-soft)}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .decision-title{font-size:var(--font-size-ui);font-weight:700;color:var(--ink);margin:0 0 var(--space-md);min-height:var(--space-6xl)}
  .feedback{min-height:38px;font-size:var(--font-size-note);line-height:1.5;font-weight:700;color:var(--ink-soft);margin-bottom:var(--space-lg);flex-shrink:0}
  .stage-body{padding-top:var(--space-lg)}
</style>
<script src="/fo-gate.js"></script></head>
<body class="code-lab">
<main class="game-wrap">
  <nav class="game-nav">
    <a class="back-link" href="index.html#code">&#8592; 游戏库</a>
    <div class="game-title">
      <span class="title-name">排序竞速</span>
      <span class="title-desc">你来当算法——亲手做每一次比较和交换</span>
    </div>
    <div class="nav-right">
      <div class="level-pill" id="level-pill">关卡 1 / 3</div>
      <button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button>
    </div>
  </nav>
  <div class="layout">
    <section class="panel stage-panel">
      <div class="stage-head">
        <h2 id="level-title">关卡 1</h2>
        <p id="level-hint"></p>
      </div>
      <div class="hud">
        <span class="hud-hearts" id="hud-hearts"></span>
        <span class="hud-budget" id="hud-progress">第 1 轮</span>
        <span class="hud-stars" id="hud-stars"></span>
      </div>
      <div class="stage-body">
        <div class="bars-shell"><div class="bars-track" id="bars-track"></div></div>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="legend-dot comparing"></span>正在比较</span>
        <span class="legend-item"><span class="legend-dot path"></span>已就位</span>
      </div>
      <div class="result" id="result"><span id="result-text"></span><button id="result-btn">继续</button></div>
    </section>
    <section class="panel side-panel">
      <h2 class="panel-title">你的决定</h2>
      <p class="decision-title" id="decision-title"></p>
      <div class="choice-row" id="choice-row"></div>
      <p class="feedback" id="feedback"></p>
      <p class="hint-box" id="mode-desc"></p>
      <div class="stat-row">
        <div class="stat-card"><span class="stat-num" id="stat-compare">0</span><span class="stat-label">比较次数</span></div>
        <div class="stat-card"><span class="stat-num" id="stat-swap">0</span><span class="stat-label">交换次数</span></div>
      </div>
      <table class="compare-table" id="race-table" hidden>
        <thead><tr><th>算法</th><th>比较</th><th>交换</th></tr></thead>
        <tbody>
          <tr><td class="dim">冒泡</td><td id="cmp-bubble-c">–</td><td id="cmp-bubble-s">–</td></tr>
          <tr><td class="dim">选择</td><td id="cmp-selection-c">–</td><td id="cmp-selection-s">–</td></tr>
        </tbody>
      </table>
      <p class="compare-note" id="compare-note"></p>
      <div class="actions">
        <button class="action clear" id="retry-btn">重开本关</button>
      </div>
      <button class="next-btn" id="next-btn">下一关</button>
    </section>
  </div>
  <section class="concepts-wrap">
    <p class="section-label">知识预习</p>
    <div class="concepts">
      <div class="concept-card"><h3>冒泡排序</h3><p>相邻两两比较，大的往后挪，一轮下来最大的"冒"到最后</p></div>
      <div class="concept-card"><h3>选择排序</h3><p>每一轮从剩下的数里挑出最小的，放到前面</p></div>
      <div class="concept-card"><h3>比较与交换</h3><p>数一数各做了几次，就能比较算法的快慢</p></div>
    </div>
  </section>
</main>
<script src="../fo-utils.js"></script>
<script src="code-lab.js"></script>
<script>
var GAME_ID='g54-sort-race';
var HEARTS=3;
var levels=[
  {mode:'bubble',n:6,title:'关卡 1 — 你来当冒泡排序',
   hint:'每次比较相邻两根柱子，判断要不要交换。判错 3 次就要重来。',
   desc:'冒泡排序规则：左边比右边大 → 交换；否则 → 不换。一轮走到头，最大的就"冒泡"到了最后。'},
  {mode:'selection',n:7,title:'关卡 2 — 你来当选择排序',
   hint:'在虚线框住的范围里，点出最小的那根柱子。点错 3 次就要重来。',
   desc:'选择排序规则：每一轮从"还没排好"的范围里找出最小值，换到范围的最前面。'},
  {mode:'race',n:8,title:'关卡 3 — 人机竞速：谁交换得更少？',
   hint:'先下注，再看两种算法在同一组数字上赛跑。押对了拿 3 星！',
   desc:'提示：想想这组数字乱到什么程度。数据越乱，冒泡排序要交换的次数就越多；选择排序每轮最多换 1 次。'}
];
var levelIndex=0,a=[],hearts=HEARTS,over=false,busy=false;
var compares=0,swaps=0;
var sortedSet={},activeCompare=[],activeSwap=[],rangeSet={},clickableSet={};
// bubble state
var bi=0,bj=0,passSwapped=false;
// selection state
var si=0;
// race state
var bet=null;

function shuffledValues(n){
  var vals=[];
  while(vals.length<n){var v=10+Math.floor(Math.random()*85);if(vals.indexOf(v)<0)vals.push(v);}
  var sorted=vals.slice().sort(function(x,y){return x-y;});
  var isSorted=vals.every(function(v,i){return v===sorted[i];});
  return isSorted?shuffledValues(n):vals;
}
function renderBars(){
  var max=Math.max.apply(null,a);
  document.getElementById('bars-track').innerHTML=a.map(function(v,i){
    var cls='bar';
    if(sortedSet[i])cls+=' sorted';
    else if(activeSwap.indexOf(i)>=0)cls+=' swapping';
    else if(activeCompare.indexOf(i)>=0)cls+=' comparing';
    if(rangeSet[i])cls+=' range';
    if(clickableSet[i])cls+=' clickable';
    var h=Math.max(8,Math.round(v/max*100));
    return '<div class="'+cls+'" data-idx="'+i+'" style="height:'+h+'%"><span class="bar-label">'+v+'</span></div>';
  }).join('');
}
function updateStats(){
  document.getElementById('stat-compare').textContent=compares;
  document.getElementById('stat-swap').textContent=swaps;
  CodeLab.renderHearts(HEARTS,hearts);
  CodeLab.renderStarsHud(hearts);
}
function setChoices(list){
  document.getElementById('choice-row').innerHTML=list.map(function(c){
    return '<button class="choice-btn" data-choice="'+c.id+'">'+c.label+'</button>';
  }).join('');
}
function setDecision(text){document.getElementById('decision-title').textContent=text;}
function feedback(text){document.getElementById('feedback').innerHTML=text;}
function setProgress(text){document.getElementById('hud-progress').textContent=text;}

/* ---------- 冒泡：玩家判断换不换 ---------- */
function bubbleAsk(){
  activeCompare=[bj,bj+1];activeSwap=[];renderBars();
  setDecision('第 '+(bi+1)+' 轮：'+a[bj]+' 和 '+a[bj+1]+'，要交换吗？');
  setProgress('第 '+(bi+1)+' 轮');
  setChoices([{id:'swap',label:'交换'},{id:'keep',label:'不换'}]);
}
async function bubbleAnswer(choice){
  var should=a[bj]>a[bj+1];
  compares++;
  if((choice==='swap')===should){
    feedback(should?('✔ '+a[bj]+' > '+a[bj+1]+'，交换！'):('✔ '+a[bj]+' ≤ '+a[bj+1]+'，不用换'));
    if(should){
      var t=a[bj];a[bj]=a[bj+1];a[bj+1]=t;
      swaps++;passSwapped=true;
      activeSwap=[bj,bj+1];activeCompare=[];renderBars();
      await CodeLab.wait(260);
    }
    bj++;
    if(bj>=a.length-1-bi){
      sortedSet[a.length-1-bi]=true;
      if(!passSwapped){for(var k=0;k<a.length;k++)sortedSet[k]=true;renderBars();return win();}
      bi++;bj=0;passSwapped=false;
      if(bi>=a.length-1){for(var k2=0;k2<a.length;k2++)sortedSet[k2]=true;renderBars();return win();}
      feedback('✔ 这一轮结束，'+a[a.length-bi]+' 已经就位');
    }
    updateStats();bubbleAsk();
  } else {
    wrong(should?('✘ 左边 '+a[bj]+' 比右边 '+a[bj+1]+' 大，应该交换'):('✘ 左边 '+a[bj]+' 没有比右边 '+a[bj+1]+' 大，不用换'));
    if(!over)bubbleAsk();
  }
}

/* ---------- 选择：玩家点出最小值 ---------- */
function selectionAsk(){
  rangeSet={};clickableSet={};activeCompare=[];activeSwap=[];
  for(var k=si;k<a.length;k++){rangeSet[k]=true;clickableSet[k]=true;}
  renderBars();
  setDecision('第 '+(si+1)+' 轮：点出虚线范围里最小的柱子');
  setProgress('第 '+(si+1)+' 轮');
  setChoices([]);
}
async function selectionPick(idx){
  if(idx<si||over||busy)return;
  busy=true;
  compares+=(a.length-si-1);
  var minIdx=si;
  for(var k=si+1;k<a.length;k++)if(a[k]<a[minIdx])minIdx=k;
  if(idx===minIdx){
    feedback('✔ 没错，'+a[idx]+' 是剩下里最小的');
    if(idx!==si){
      activeSwap=[si,idx];renderBars();
      await CodeLab.wait(260);
      var t=a[si];a[si]=a[idx];a[idx]=t;swaps++;
    }
    sortedSet[si]=true;si++;
    activeSwap=[];
    if(si>=a.length-1){for(var k2=0;k2<a.length;k2++)sortedSet[k2]=true;renderBars();updateStats();busy=false;return win();}
    updateStats();selectionAsk();
  } else {
    var el=document.querySelector('.bar[data-idx="'+idx+'"]');
    if(el)el.classList.add('wrong');
    wrong('✘ '+a[idx]+' 不是最小的，范围里还有更小的数');
    await CodeLab.wait(300);
    if(!over)selectionAsk();
  }
  busy=false;
}

/* ---------- 竞速：先下注再看赛跑 ---------- */
function bubbleSteps(arr){
  var x=arr.slice(),c=0,s=0,n=x.length,steps=[];
  for(var i=0;i<n-1;i++){var sw=false;
    for(var j=0;j<n-1-i;j++){c++;steps.push({t:'c',a:j,b:j+1});
      if(x[j]>x[j+1]){var tt=x[j];x[j]=x[j+1];x[j+1]=tt;s++;sw=true;steps.push({t:'s',a:j,b:j+1});}}
    steps.push({t:'ok',i:n-1-i});
    if(!sw)break;}
  return{c:c,s:s,steps:steps};
}
function selectionSteps(arr){
  var x=arr.slice(),c=0,s=0,n=x.length,steps=[];
  for(var i=0;i<n-1;i++){var m=i;
    for(var j=i+1;j<n;j++){c++;steps.push({t:'c',a:m,b:j});if(x[j]<x[m])m=j;}
    if(m!==i){var tt=x[i];x[i]=x[m];x[m]=tt;s++;steps.push({t:'s',a:i,b:m});}
    steps.push({t:'ok',i:i});}
  return{c:c,s:s,steps:steps};
}
function raceAsk(){
  setDecision('这组数字，哪种算法交换次数更少？');
  setProgress('下注阶段');
  setChoices([{id:'bubble',label:'冒泡'},{id:'selection',label:'选择'},{id:'tie',label:'一样多'}]);
  document.getElementById('race-table').hidden=false;
}
async function playSteps(algoName,st){
  var base=a.slice();
  sortedSet={};activeCompare=[];activeSwap=[];rangeSet={};clickableSet={};
  var arr=base.slice();
  feedback(algoName+' 跑起来…');
  for(var i=0;i<st.steps.length;i++){
    var s=st.steps[i];
    if(s.t==='c'){activeCompare=[s.a,s.b];activeSwap=[];}
    else if(s.t==='s'){var tt=arr[s.a];arr[s.a]=arr[s.b];arr[s.b]=tt;activeSwap=[s.a,s.b];activeCompare=[];}
    else if(s.t==='ok'){sortedSet[s.i]=true;}
    var keep=a;a=arr;renderBars();a=keep;
    await CodeLab.wait(Math.max(18,Math.min(120,2200/st.steps.length)));
  }
  for(var k=0;k<arr.length;k++)sortedSet[k]=true;
  var keep2=a;a=arr;renderBars();a=keep2;
}
async function raceAnswer(choice){
  bet=choice;busy=true;
  setChoices([]);
  var rb=bubbleSteps(a),rs=selectionSteps(a);
  await playSteps('冒泡排序',rb);
  document.getElementById('cmp-bubble-c').textContent=rb.c;
  document.getElementById('cmp-bubble-s').textContent=rb.s;
  await CodeLab.wait(500);
  await playSteps('选择排序',rs);
  document.getElementById('cmp-selection-c').textContent=rs.c;
  document.getElementById('cmp-selection-s').textContent=rs.s;
  var winner=rb.s<rs.s?'bubble':(rs.s<rb.s?'selection':'tie');
  var correct=bet===winner;
  var winnerLabel=winner==='bubble'?'冒泡更少':(winner==='selection'?'选择更少':'一样多');
  var note=document.getElementById('compare-note');
  note.textContent='交换次数：冒泡 '+rb.s+' 次 vs 选择 '+rs.s+' 次（'+winnerLabel+'）。选择排序每轮最多交换 1 次，数据越乱它的优势越明显；但两者比较次数都随数据量平方增长。';
  note.classList.add('show');
  hearts=correct?3:1;
  busy=false;
  win();
}

/* ---------- 通用回合结束 ---------- */
function wrong(text){
  hearts--;updateStats();
  feedback(text);
  if(hearts<=0){
    over=true;
    CodeLab.showResult('fail','三次都判错了……看看下面的算法规则，重来一次吧！','重开本关',function(){loadLevel(levelIndex);});
    setChoices([]);setDecision('');
  }
}
function win(){
  over=true;
  var stars=Math.max(1,hearts);
  CodeLab.saveStars(GAME_ID,levelIndex,stars);
  CodeLab.renderStarsHud(stars);
  setChoices([]);setDecision('');
  setProgress('完成');
  document.getElementById('next-btn').classList.add('show');
  if(levelIndex===levels.length-1)CodeLab.markDone(GAME_ID);
  var msg=levels[levelIndex].mode==='race'
    ?(hearts===3?'押对了！':'押错了，不过看清了两种算法的差别～')
    :'排好啦！比较 '+compares+' 次 · 交换 '+swaps+' 次';
  CodeLab.showResult('success',msg+' '+CodeLab.starHTML(stars),
    levelIndex<levels.length-1?'下一关':'再玩一次',nextLevel);
}
function nextLevel(){loadLevel(levelIndex<levels.length-1?levelIndex+1:0);}

function loadLevel(index){
  levelIndex=index;
  var lv=levels[index];
  CodeLab.setLevel(index,levels.length,lv.title,lv.hint);
  document.getElementById('mode-desc').textContent=lv.desc;
  a=shuffledValues(lv.n);
  hearts=HEARTS;over=false;busy=false;compares=0;swaps=0;bet=null;
  sortedSet={};activeCompare=[];activeSwap=[];rangeSet={};clickableSet={};
  bi=0;bj=0;passSwapped=false;si=0;
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('compare-note').classList.remove('show');
  document.getElementById('race-table').hidden=true;
  document.getElementById('cmp-bubble-c').textContent='–';
  document.getElementById('cmp-bubble-s').textContent='–';
  document.getElementById('cmp-selection-c').textContent='–';
  document.getElementById('cmp-selection-s').textContent='–';
  feedback('');
  CodeLab.hideResult();
  renderBars();updateStats();
  if(lv.mode==='bubble')bubbleAsk();
  else if(lv.mode==='selection')selectionAsk();
  else raceAsk();
}
document.getElementById('choice-row').addEventListener('click',function(e){
  var btn=e.target.closest('.choice-btn');if(!btn||over||busy)return;
  var mode=levels[levelIndex].mode;
  if(mode==='bubble')bubbleAnswer(btn.dataset.choice);
  else if(mode==='race')raceAnswer(btn.dataset.choice);
});
document.getElementById('bars-track').addEventListener('click',function(e){
  var bar=e.target.closest('.bar');if(!bar)return;
  if(levels[levelIndex].mode==='selection')selectionPick(parseInt(bar.dataset.idx,10));
});
document.getElementById('retry-btn').onclick=function(){if(!busy)loadLevel(levelIndex);};
document.getElementById('next-btn').onclick=nextLevel;
CodeLab.initMember();loadLevel(0);
</script>
</body>
</html>
