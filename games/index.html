<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>游戏库 · 十二岁的思辨场</title>
<meta name="description" content="给十二岁的你：4 类独立小游戏。">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  .nav-member-btn { display:inline-flex; align-items:center; gap:8px; background:var(--paper); border:0; border-radius:999px; padding:6px 14px 6px 6px; font-size:14px; cursor:pointer; color:var(--ink-soft); box-shadow:var(--shadow-soft); }
  .nav-member-btn svg { border-radius:50%; }
  .games-page { padding:0 0 90px; }
  .games-nav { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:10; background:var(--paper); box-shadow:var(--shadow-soft); border-radius:var(--radius); padding:10px 14px; margin-bottom:40px; }
  .games-nav a { color:var(--ink-mute); text-decoration:none; font-size:15px; }
  .games-hero { margin-bottom:24px; }
  .games-hero h1 { margin-bottom:12px; }
  .games-hero p { color:var(--ink-soft); font-size:20px; }
  .summary { display:inline-flex; align-items:center; gap:10px; background:var(--paper); border-radius:999px; padding:9px 18px; box-shadow:var(--shadow-soft); color:var(--ink-soft); margin:8px 0 28px; }
  .summary-dot { width:10px; height:10px; border-radius:50%; background:var(--green); }

  /* Category tabs */
  .cat-tabs { display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
  .cat-tab { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border:2px solid transparent; border-radius:999px; background:var(--paper); color:var(--ink-soft); font:inherit; font-size:15px; cursor:pointer; box-shadow:var(--shadow-soft); transition:all .2s; }
  .cat-tab:hover { border-color:var(--ink-mute); }
  .cat-tab.is-active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .cat-count { background:rgba(255,255,255,.2); border-radius:999px; padding:1px 7px; font-size:12px; }
  .cat-tab:not(.is-active) .cat-count { background:var(--cream-deep); color:var(--ink-mute); }
  .cat-panel { display:none; }
  .cat-panel.is-active { display:block; }
  .panel-desc { color:var(--ink-soft); font-size:16px; margin-bottom:24px; }

  /* Booklet cards for Q&A */
  .booklet-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:14px; max-width:800px; }
  @media (max-width:600px) { .booklet-grid { grid-template-columns:repeat(3,1fr); gap:10px; } }
  .booklet-card { display:flex; flex-direction:column; align-items:center; text-align:center; text-decoration:none; background:var(--paper); border-radius:var(--radius); padding:18px 12px 14px; box-shadow:var(--shadow-card); border-top:4px solid var(--coral); transition:transform .2s ease; min-height:140px; position:relative; }
  .booklet-card:hover { transform:translateY(-3px); }
  .booklet-card[data-color="yellow"] { border-top-color:var(--yellow); }
  .booklet-card[data-color="green"]  { border-top-color:var(--green); }
  .booklet-card[data-color="blue"]   { border-top-color:var(--blue); }
  .booklet-icon { font-size:32px; margin-bottom:8px; line-height:1; }
  .booklet-num { position:absolute; top:8px; left:10px; font-size:11px; color:var(--ink-mute); letter-spacing:.1em; }
  .booklet-title { font-size:13px; font-weight:700; color:var(--ink); line-height:1.4; margin-bottom:4px; }
  .booklet-done { font-size:11px; color:var(--green); margin-top:auto; }
  .booklet-todo { font-size:11px; color:var(--ink-mute); margin-top:auto; }

  /* Science / code / multi game cards */
  .game-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:14px; }
  .game-card { display:block; text-decoration:none; background:var(--paper); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-card); border-left:5px solid var(--coral); transition:transform .2s ease; }
  .game-card:hover { transform:translateY(-3px); }
  .game-card[data-color="yellow"] { border-left-color:var(--yellow); }
  .game-card[data-color="green"]  { border-left-color:var(--green); }
  .game-card[data-color="blue"]   { border-left-color:var(--blue); }
  .game-card.is-stub { opacity:.75; cursor:default; }
  .game-card.is-stub:hover { transform:none; }
  .card-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px; }
  .card-icon { font-size:28px; }
  .card-status { font-size:13px; color:var(--ink-mute); }
  .card-status.is-done { color:var(--green); }
  .game-card h2 { font-size:17px; margin-bottom:4px; color:var(--ink); }
  .stub-label { font-size:12px; color:var(--ink-mute); }

  /* Sub-sections in science panel */
  .sci-section { margin-bottom:40px; }
  .sci-label { font-size:14px; letter-spacing:.12em; color:var(--ink-mute); margin-bottom:16px; font-weight:700; }

  @media (max-width:760px) { .game-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<main class="games-page wrap">
  <nav class="games-nav">
    <a href="../for-eldest.html">← 给十二岁的你</a>
    <button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button>
  </nav>
  <header class="games-hero">
    <h1>游戏库 · 十二岁的思辨场</h1>
    <p>挑一个，独立玩，没人监考。</p>
  </header>
  <div class="summary"><span class="summary-dot"></span><span id="done-summary">正在加载…</span></div>

  <!-- Category Tabs -->
  <nav class="cat-tabs" role="tablist">
    <button role="tab" class="cat-tab is-active" data-cat="qa">🗣 问答类 <span class="cat-count">20</span></button>
    <button role="tab" class="cat-tab" data-cat="science">🔬 科学类 <span class="cat-count">20</span></button>
    <button role="tab" class="cat-tab" data-cat="code">🧩 程序类 <span class="cat-count">3</span></button>
    <button role="tab" class="cat-tab" data-cat="multi">🌐 多学科 <span class="cat-count">4</span></button>
  </nav>

  <!-- Q&A Panel -->
  <section id="panel-qa" class="cat-panel is-active" role="tabpanel">
    <p class="panel-desc">思辨与人生 · 20 个独立小游戏</p>
    <div class="booklet-grid" id="qa-grid"></div>
  </section>

  <!-- Science Panel -->
  <section id="panel-science" class="cat-panel" role="tabpanel">
    <p class="panel-desc">物理 · 化学 · 自然规律</p>
    <div class="sci-section">
      <div class="sci-label">🧪 化学</div>
      <div class="game-grid" id="chem-grid"></div>
    </div>
    <div class="sci-section">
      <div class="sci-label">⚡ 物理</div>
      <div class="game-grid" id="phys-grid"></div>
    </div>
  </section>

  <!-- Programming Panel -->
  <section id="panel-code" class="cat-panel" role="tabpanel">
    <p class="panel-desc">代码 · 算法 · 逻辑思维</p>
    <div class="game-grid" id="code-grid"></div>
  </section>

  <!-- Multi-discipline Panel -->
  <section id="panel-multi" class="cat-panel" role="tabpanel">
    <p class="panel-desc">跨学科 · 综合挑战</p>
    <div class="game-grid" id="multi-grid"></div>
  </section>
</main>

<script src="../fo-utils.js"></script>
<script>
  var qaGames = [
    ['g01-direction','方向 vs 目标','🧭','coral','/games/g01-direction.html'],
    ['g02-compound','时间的魔法','⏰','yellow','/games/g02-compound.html'],
    ['g03-responsibility','这是谁的事？','⚖️','green','/games/g03-responsibility.html'],
    ['g04-soft-skills','软技能地图','🎯','blue','/games/g04-soft-skills.html'],
    ['g05-attention','注意力卫士','🛡️','coral','/games/g05-attention.html'],
    ['g06-dilemma','两难题','🔀','yellow','/games/g06-dilemma.html'],
    ['g07-reading','阅读侦探','🔍','green','/games/g07-reading.html'],
    ['g08-letter','未来信件','✉️','blue','/games/g08-letter.html'],
    ['g09-growth','成长地图','🗺️','coral','/games/g09-growth.html'],
    ['g10-questions','提问高手','❓','yellow','/games/g10-questions.html'],
    ['g11-calm','不慌实验室','🌊','blue','/games/g11-calm.html'],
    ['g12-express','表达工坊','💬','coral','/games/g12-express.html'],
    ['g13-learn','学习解剖室','🔬','yellow','/games/g13-learn.html'],
    ['g14-bias','思维陷阱','🧠','green','/games/g14-bias.html'],
    ['g15-together','共学密码','🤝','blue','/games/g15-together.html'],
    ['g16-empathy','换位思考','💭','coral','/games/g16-empathy.html'],
    ['g17-info','信息鉴别','📡','yellow','/games/g17-info.html'],
    ['g18-longterm','长期主义','🌱','green','/games/g18-longterm.html'],
    ['g19-habit','习惯实验室','🔄','coral','/games/g19-habit.html'],
    ['g20-connect','知识连接','🔗','blue','/games/g20-connect.html'],
  ];

  var chemGames = [
    ['g21-chemistry','化学厨房','⚗️','green','/games/g21-chemistry.html',true],
    ['g23-chemistry-elements','元素探险','🧪','green','/games/g23-chemistry-elements.html',false],
    ['g24-chemistry-acids','酸碱侦探','🌡️','green','/games/g24-chemistry-acids.html',false],
    ['g25-chemistry-bonds','化学键拼图','🔗','green','/games/g25-chemistry-bonds.html',false],
    ['g26-chemistry-organic','有机物工厂','🌿','green','/games/g26-chemistry-organic.html',false],
    ['g27-chemistry-solution','溶液实验室','💧','green','/games/g27-chemistry-solution.html',false],
    ['g28-chemistry-redox','氧化还原','⚡','green','/games/g28-chemistry-redox.html',false],
    ['g29-chemistry-electro','电化学','🔋','green','/games/g29-chemistry-electro.html',false],
    ['g30-chemistry-balance','方程式配平','⚖️','green','/games/g30-chemistry-balance.html',false],
    ['g31-chemistry-burn','燃烧密室','🔥','green','/games/g31-chemistry-burn.html',false],
  ];

  var physGames = [
    ['g22-physics','物理弹弓','🎯','blue','/games/g22-physics.html',true],
    ['g32-physics-circuit','电路实验室','💡','blue','/games/g32-physics-circuit.html',false],
    ['g33-physics-optics','光路迷宫','🔭','blue','/games/g33-physics-optics.html',false],
    ['g34-physics-newton','牛顿三定律','🍎','blue','/games/g34-physics-newton.html',false],
    ['g35-physics-magnet','磁力对决','🧲','blue','/games/g35-physics-magnet.html',false],
    ['g36-physics-sound','声波探索','🔊','blue','/games/g36-physics-sound.html',false],
    ['g37-physics-heat','热传导','🌡️','blue','/games/g37-physics-heat.html',false],
    ['g38-physics-lever','杠杆原理','⚖️','blue','/games/g38-physics-lever.html',false],
    ['g39-physics-gravity','星球引力','🪐','blue','/games/g39-physics-gravity.html',false],
    ['g40-physics-wave','波动叠加','〰️','blue','/games/g40-physics-wave.html',false],
  ];

  var codeGames = [
    ['g41-blocks','代码积木','🧱','coral','/games/g41-blocks.html',true],
    ['g42-maze-algo','迷宫算法','🗺️','yellow','/games/g42-maze-algo.html',false],
    ['g43-pattern-draw','图案绘制','🎨','green','/games/g43-pattern-draw.html',false],
  ];

  var multiGames = [
    ['g44-history','历史侦探','🏛️','coral','/games/g44-history-detective.html',true],
    ['g45-geo','地图寻宝','🗺️','yellow','/games/g45-geo-treasure.html',true],
    ['g46-words','文字密码','📝','green','/games/g46-words-cipher.html',true],
    ['g47-math-art','数学画廊','🔢','blue','/games/g47-math-art.html',true],
  ];

  function doneList() {
    try { return JSON.parse(localStorage.getItem('fo_games_done') || '[]'); } catch(e) { return []; }
  }

  function buildQA(done) {
    return qaGames.map(function(g, i) {
      var isDone = done.indexOf(g[0]) >= 0;
      return '<a class="booklet-card" data-color="'+g[3]+'" href="'+g[4]+'">' +
        '<span class="booklet-num">'+(i+1 < 10 ? '0'+(i+1) : i+1)+'</span>' +
        '<span class="booklet-icon">'+g[2]+'</span>' +
        '<span class="booklet-title">'+g[1]+'</span>' +
        (isDone ? '<span class="booklet-done">✓ 完成</span>' : '<span class="booklet-todo">○ 未开始</span>') +
        '</a>';
    }).join('');
  }

  function buildSciCard(g, done) {
    var isDone = done.indexOf(g[0]) >= 0;
    var isLive = g[5];
    var cls = 'game-card' + (isLive ? '' : ' is-stub');
    var href = isLive ? ' href="'+g[4]+'"' : '';
    var tag = isLive ? 'a' : 'div';
    return '<'+tag+' class="'+cls+'" data-color="'+g[3]+'"'+href+'>' +
      '<div class="card-top"><span class="card-icon">'+g[2]+'</span>' +
      (isLive ? '<span class="card-status'+(isDone?' is-done':'')+'">'+( isDone?'✓ 完成':'▶ 开始')+'</span>' :
                '<span class="card-status">🚧 即将推出</span>') +
      '</div>' +
      '<h2>'+g[1]+'</h2>' +
      '</'+tag+'>';
  }

  (function(){
    var done = doneList();
    var qaCount = done.filter(function(id){ return id.startsWith('g0') || id.startsWith('g1') || id.startsWith('g2'); }).length;
    document.getElementById('done-summary').textContent = '已完成 ' + done.length + ' 个游戏';
    document.getElementById('qa-grid').innerHTML = buildQA(done);
    document.getElementById('chem-grid').innerHTML = chemGames.map(function(g){ return buildSciCard(g, done); }).join('');
    document.getElementById('phys-grid').innerHTML = physGames.map(function(g){ return buildSciCard(g, done); }).join('');
    document.getElementById('code-grid').innerHTML = codeGames.map(function(g){ return buildSciCard(g, done); }).join('');
    document.getElementById('multi-grid').innerHTML = multiGames.map(function(g){ return buildSciCard(g, done); }).join('');

    // Tab switching
    document.querySelectorAll('.cat-tab').forEach(function(tab){
      tab.addEventListener('click', function(){
        document.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.remove('is-active'); });
        document.querySelectorAll('.cat-panel').forEach(function(p){ p.classList.remove('is-active'); });
        tab.classList.add('is-active');
        document.getElementById('panel-'+tab.dataset.cat).classList.add('is-active');
      });
    });

    // Member button
    var m = window.FO ? FO.getMember() : null;
    var el = document.getElementById('nav-member-btn');
    if (m) {
      el.innerHTML = FO.avatarSVG(m.avatar, m.color, 32) + '<span>' + m.name + '</span>';
      el.onclick = function(){ location.href='../dashboard.html'; };
    } else {
      el.innerHTML = '<span>登录</span>';
      el.onclick = function(){ location.href='../login.html'; };
    }
  })();
</script>
</body>
</html>
