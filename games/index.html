<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>游戏库 · 哥哥的思辨场</title>
<meta name="description" content="给正在长大的你：4 类独立小游戏。">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  .nav-member-btn { display:inline-flex; align-items:center; gap:var(--space-md); background:var(--paper); border:0; border-radius:var(--radius-full); padding:var(--space-sm) var(--space-2xl) var(--space-sm) var(--space-sm); font-size:var(--font-size-ui); cursor:pointer; color:var(--ink-soft); box-shadow:var(--shadow-soft); }
  .nav-member-btn svg { border-radius:var(--radius-circle); }
  .games-page { padding:0 0 var(--space-page-bottom-lg); }
  .games-nav { display:flex; align-items:center; justify-content:space-between; gap:var(--space-xl); flex-wrap:wrap; position:sticky; top:0; z-index:10; background:var(--paper); box-shadow:var(--shadow-soft); border-radius:var(--radius); padding:var(--space-lg) var(--space-2xl); margin-bottom:var(--space-section); }
  .games-nav a { color:var(--ink-mute); text-decoration:none; font-size:var(--font-size-body-sm); }
  .games-hero { margin-bottom:var(--space-7xl); }
  .games-hero h1 { margin-bottom:var(--space-xl); }
  .games-hero p { color:var(--ink-soft); font-size:var(--font-size-title); }
  .summary { display:inline-flex; align-items:center; gap:var(--space-lg); background:var(--paper); border-radius:var(--radius-full); padding:var(--space-tab-y) var(--space-4xl); box-shadow:var(--shadow-soft); color:var(--ink-soft); margin:var(--space-md) 0 var(--space-8xl); }
  .summary-dot { width:var(--size-status-dot); height:var(--size-status-dot); border-radius:var(--radius-circle); background:var(--green); }

  /* Category tabs */
  .cat-tabs { display:flex; gap:var(--space-md); margin-bottom:var(--space-8xl); flex-wrap:wrap; }
  .cat-tab { display:inline-flex; align-items:center; gap:var(--space-sm); padding:var(--space-lg) var(--space-5xl); border:var(--size-border) solid transparent; border-radius:var(--radius-full); background:var(--paper); color:var(--ink-soft); font:inherit; font-size:var(--font-size-body-sm); cursor:pointer; box-shadow:var(--shadow-soft); transition:all .2s; }
  .cat-tab:hover { border-color:var(--ink-mute); }
  .cat-tab.is-active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .cat-count { background:var(--paper-translucent); border-radius:var(--radius-full); padding:var(--size-hairline) var(--space-tag-gap); font-size:var(--font-size-caption); }
  .cat-tab:not(.is-active) .cat-count { background:var(--cream-deep); color:var(--ink-mute); }
  .cat-panel { display:none; }
  .cat-panel.is-active { display:block; }
  .panel-desc { color:var(--ink-soft); font-size:var(--font-size-body); margin-bottom:var(--space-7xl); }

  /* Booklet cards for Q&A */
  .booklet-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(var(--size-booklet-min), 1fr)); gap:var(--space-2xl); max-width:var(--size-content-wide); }
  .booklet-card { display:flex; flex-direction:column; align-items:center; text-align:center; text-decoration:none; background:var(--paper); border-radius:var(--radius); padding:var(--space-4xl) var(--space-xl) var(--space-2xl); box-shadow:var(--shadow-card); border-top:var(--size-border-accent) solid var(--coral); transition:transform .2s ease; min-height:var(--size-booklet-height); position:relative; }
  .booklet-card:hover { transform:translateY(calc(-1 * var(--space-chart-gap))); }
  .booklet-card[data-color="yellow"] { border-top-color:var(--yellow); }
  .booklet-card[data-color="green"]  { border-top-color:var(--green); }
  .booklet-card[data-color="blue"]   { border-top-color:var(--blue); }
  .booklet-icon { font-size:var(--font-size-icon-lg); margin-bottom:var(--space-md); line-height:1; }
  .booklet-num { position:absolute; top:var(--space-md); left:var(--space-lg); font-size:var(--font-size-sm); color:var(--ink-mute); letter-spacing:.1em; }
  .booklet-title { font-size:var(--font-size-note); font-weight:700; color:var(--ink); line-height:1.4; margin-bottom:var(--space-xs); }
  .booklet-done { font-size:var(--font-size-sm); color:var(--green); margin-top:auto; }
  .booklet-todo { font-size:var(--font-size-sm); color:var(--ink-mute); margin-top:auto; }

  /* Science / code / multi game cards */
  .game-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(var(--size-grid-card-min),1fr)); gap:var(--space-2xl); }
  .game-card { display:block; text-decoration:none; background:var(--paper); border-radius:var(--radius); padding:var(--space-5xl); box-shadow:var(--shadow-card); border-left:var(--size-border-card) solid var(--coral); transition:transform .2s ease; }
  .game-card:hover { transform:translateY(calc(-1 * var(--space-chart-gap))); }
  .game-card[data-color="yellow"] { border-left-color:var(--yellow); }
  .game-card[data-color="green"]  { border-left-color:var(--green); }
  .game-card[data-color="blue"]   { border-left-color:var(--blue); }
  .game-card.is-stub { opacity:.75; cursor:default; }
  .game-card.is-stub:hover { transform:none; }
  .card-top { display:flex; align-items:center; justify-content:space-between; gap:var(--space-md); margin-bottom:var(--space-xl); }
  .card-icon { font-size:var(--font-size-icon); }
  .card-status { font-size:var(--font-size-note); color:var(--ink-mute); }
  .card-status.is-done { color:var(--green); }
  .game-card h2 { font-size:var(--font-size-body-lg); margin-bottom:var(--space-xs); color:var(--ink); }
  .stub-label { font-size:var(--font-size-caption); color:var(--ink-mute); }

  /* Sub-sections in science panel */
  .sci-section { margin-bottom:var(--space-section); }
  .sci-label { font-size:var(--font-size-ui); letter-spacing:.12em; color:var(--ink-mute); margin-bottom:var(--space-3xl); font-weight:700; }

  /* Locked games for signed-out visitors */
  .booklet-card.is-locked, .game-card.is-locked { position:relative; opacity:.82; }
  .booklet-card.is-locked::after, .game-card.is-locked::after {
    content:"🔒"; position:absolute; top:var(--space-md); right:var(--space-lg); font-size:var(--font-size-ui); opacity:.7;
  }

</style>
</head>
<body>
<main class="games-page wrap">
  <nav class="games-nav">
    <a href="../for-eldest.html">← 给正在长大的你</a>
    <button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button>
  </nav>
  <header class="games-hero">
    <h1>游戏库 · 哥哥的思辨场</h1>
    <p>挑一个，独立玩，没人监考。</p>
  </header>
  <div class="summary"><span class="summary-dot"></span><span id="done-summary">正在加载…</span></div>

  <!-- Category Tabs -->
  <nav class="cat-tabs" role="tablist">
    <button role="tab" class="cat-tab is-active" data-cat="qa">🗣 问答类 <span class="cat-count">20</span></button>
    <button role="tab" class="cat-tab" data-cat="science">🔬 科学类 <span class="cat-count">25</span></button>
    <button role="tab" class="cat-tab" data-cat="code">🧩 程序类 <span class="cat-count">10</span></button>
    <button role="tab" class="cat-tab" data-cat="multi">🌐 多学科 <span class="cat-count">4</span></button>
  </nav>

  <!-- Q&A Panel -->
  <section id="panel-qa" class="cat-panel is-active" role="tabpanel">
    <p class="panel-desc">思辨与人生 · 20 个独立小游戏</p>
    <div class="booklet-grid" id="qa-grid"></div>
  </section>

  <!-- Science Panel -->
  <section id="panel-science" class="cat-panel" role="tabpanel">
    <p class="panel-desc">物理 · 化学 · 自然规律</p>
    <div class="sci-section">
      <div class="sci-label">🧪 化学</div>
      <div class="game-grid" id="chem-grid"></div>
    </div>
    <div class="sci-section">
      <div class="sci-label">⚡ 物理</div>
      <div class="game-grid" id="phys-grid"></div>
    </div>
  </section>

  <!-- Programming Panel -->
  <section id="panel-code" class="cat-panel" role="tabpanel">
    <p class="panel-desc">代码 · 算法 · 逻辑思维</p>
    <div class="game-grid" id="code-grid"></div>
  </section>

  <!-- Multi-discipline Panel -->
  <section id="panel-multi" class="cat-panel" role="tabpanel">
    <p class="panel-desc">跨学科 · 综合挑战</p>
    <div class="game-grid" id="multi-grid"></div>
  </section>
</main>

<script src="../fo-utils.js"></script>
<script>
  var qaGames = [
    ['g01-direction','方向 vs 目标','🧭','coral','/games/g01-direction.html'],
    ['g02-compound','时间的魔法','⏰','yellow','/games/g02-compound.html'],
    ['g03-responsibility','这是谁的事？','⚖️','green','/games/g03-responsibility.html'],
    ['g04-soft-skills','软技能地图','🎯','blue','/games/g04-soft-skills.html'],
    ['g05-attention','注意力卫士','🛡️','coral','/games/g05-attention.html'],
    ['g06-dilemma','两难题','🔀','yellow','/games/g06-dilemma.html'],
    ['g07-reading','阅读侦探','🔍','green','/games/g07-reading.html'],
    ['g08-letter','未来信件','✉️','blue','/games/g08-letter.html'],
    ['g09-growth','成长地图','🗺️','coral','/games/g09-growth.html'],
    ['g10-questions','提问高手','❓','yellow','/games/g10-questions.html'],
    ['g11-calm','不慌实验室','🌊','blue','/games/g11-calm.html'],
    ['g12-express','表达工坊','💬','coral','/games/g12-express.html'],
    ['g13-learn','学习解剖室','🔬','yellow','/games/g13-learn.html'],
    ['g14-bias','思维陷阱','🧠','green','/games/g14-bias.html'],
    ['g15-together','共学密码','🤝','blue','/games/g15-together.html'],
    ['g16-empathy','换位思考','💭','coral','/games/g16-empathy.html'],
    ['g17-info','信息鉴别','📡','yellow','/games/g17-info.html'],
    ['g18-longterm','长期主义','🌱','green','/games/g18-longterm.html'],
    ['g19-habit','习惯实验室','🔄','coral','/games/g19-habit.html'],
    ['g20-connect','知识连接','🔗','blue','/games/g20-connect.html'],
  ];

  var chemGames = [
    ['g21-chemistry','化学厨房','⚗️','green','/games/g21-chemistry.html',true],
    ['g23-chemistry-elements','元素探险','🧪','green','/games/g23-chemistry-elements.html',true],
    ['g24-chemistry-acids','酸碱侦探','🌡️','green','/games/g24-chemistry-acids.html',true],
    ['g25-chemistry-bonds','化学键拼图','🔗','green','/games/g25-chemistry-bonds.html',true],
    ['g26-chemistry-organic','有机物工厂','🌿','green','/games/g26-chemistry-organic.html',true],
    ['g27-chemistry-solution','溶液实验室','💧','green','/games/g27-chemistry-solution.html',true],
    ['g28-chemistry-redox','氧化还原','⚡','green','/games/g28-chemistry-redox.html',true],
    ['g29-chemistry-electro','电化学','🔋','green','/games/g29-chemistry-electro.html',true],
    ['g30-chemistry-balance','方程式配平','⚖️','green','/games/g30-chemistry-balance.html',true],
    ['g31-chemistry-burn','燃烧密室','🔥','green','/games/g31-chemistry-burn.html',true],
    ['g48-chemistry-gas','气体大变身','💨','green','/games/g48-chemistry-gas.html',true],
    ['g49-chemistry-mole','摩尔小算盘','🔢','green','/games/g49-chemistry-mole.html',true],
    ['g50-chemistry-metal','金属擂台','🥇','green','/games/g50-chemistry-metal.html',true],
    ['g51-chemistry-rate','快慢实验室','⏱️','green','/games/g51-chemistry-rate.html',true],
    ['g52-chemistry-mixture','分离大师','🥽','green','/games/g52-chemistry-mixture.html',true],
    ['g48-chem-indicator','酸碱指示剂','🌈','green','/games/g48-chem-indicator.html',true],
    ['g49-chem-flame','焰色反应','🔥','green','/games/g49-chem-flame.html',true],
    ['g50-chem-balance','方程式配平','⚖️','green','/games/g50-chem-balance.html',true],
    ['g51-chem-mixing','溶液混合变色','🧫','green','/games/g51-chem-mixing.html',true],
    ['g52-chem-electro','电解水实验','⚡','green','/games/g52-chem-electro.html',true],
  ];

  var physGames = [
    ['g22-physics','物理弹弓','🎯','blue','/games/g22-physics.html',true],
    ['g32-physics-circuit','电路实验室','💡','blue','/games/g32-physics-circuit.html',true],
    ['g33-physics-optics','光路迷宫','🔭','blue','/games/g33-physics-optics.html',true],
    ['g34-physics-newton','小车加速度','🍎','blue','/games/g34-physics-newton.html',true],
    ['g35-physics-magnet','磁力对决','🧲','blue','/games/g35-physics-magnet.html',true],
    ['g36-physics-sound','声波探索','🔊','blue','/games/g36-physics-sound.html',true],
    ['g37-physics-heat','热传导','🌡️','blue','/games/g37-physics-heat.html',true],
    ['g38-physics-lever','杠杆原理','⚖️','blue','/games/g38-physics-lever.html',true],
    ['g39-physics-gravity','星球引力','🪐','blue','/games/g39-physics-gravity.html',true],
    ['g40-physics-wave','波动叠加','〰️','blue','/games/g40-physics-wave.html',true],
  ];

  var codeGames = [
    ['g41-blocks','代码积木','🧱','coral','/games/g41-blocks.html',true],
    ['g42-maze-algo','迷宫算法','🗺️','yellow','/games/g42-maze-algo.html',true],
    ['g43-pattern-draw','图案绘制','🎨','green','/games/g43-pattern-draw.html',true],
    ['g53-recursion-tree','递归树','🌳','blue','/games/g53-recursion-tree.html',true],
    ['g54-sort-race','排序竞速','🏁','coral','/games/g54-sort-race.html',true],
    ['g55-condition-fork','条件分岔口','🔀','yellow','/games/g55-condition-fork.html',true],
    ['g56-binary-search','二分查找','🔍','green','/games/g56-binary-search.html',true],
    ['g57-stack-queue','栈与队列','📚','blue','/games/g57-stack-queue.html',true],
    ['g58-logic-gate','逻辑门','💡','yellow','/games/g58-logic-gate.html',true],
    ['g59-greedy-coins','贪心找零','🪙','coral','/games/g59-greedy-coins.html',true],
  ];

  var multiGames = [
    ['g44-history-detective','历史侦探','🏛️','coral','/games/g44-history-detective.html',true],
    ['g45-geo','地图寻宝','🗺️','yellow','/games/g45-geo-treasure.html',true],
    ['g46-words-cipher','文字密码','📝','green','/games/g46-words-cipher.html',true],
    ['g47-math-art','数学画廊','🔢','blue','/games/g47-math-art.html',true],
  ];

  function doneList() {
    try { return JSON.parse(localStorage.getItem('fo_games_done') || '[]'); } catch(e) { return []; }
  }

  function buildQA(done) {
    return qaGames.map(function(g, i) {
      var isDone = done.indexOf(g[0]) >= 0;
      return '<a class="booklet-card" data-color="'+g[3]+'" href="'+g[4]+'">' +
        '<span class="booklet-num">'+(i+1 < 10 ? '0'+(i+1) : i+1)+'</span>' +
        '<span class="booklet-icon">'+g[2]+'</span>' +
        '<span class="booklet-title">'+g[1]+'</span>' +
        (isDone ? '<span class="booklet-done">✓ 完成</span>' : '<span class="booklet-todo">○ 未开始</span>') +
        '</a>';
    }).join('');
  }

  function buildSciCard(g, done) {
    var isDone = done.indexOf(g[0]) >= 0;
    var isLive = g[5];
    var cls = 'game-card' + (isLive ? '' : ' is-stub');
    var href = isLive ? ' href="'+g[4]+'"' : '';
    var tag = isLive ? 'a' : 'div';
    return '<'+tag+' class="'+cls+'" data-color="'+g[3]+'"'+href+'>' +
      '<div class="card-top"><span class="card-icon">'+g[2]+'</span>' +
      (isLive ? '<span class="card-status'+(isDone?' is-done':'')+'">'+( isDone?'✓ 完成':'▶ 开始')+'</span>' :
                '<span class="card-status">🚧 即将推出</span>') +
      '</div>' +
      '<h2>'+g[1]+'</h2>' +
      '</'+tag+'>';
  }

  (function(){
    var done = doneList();
    var qaCount = done.filter(function(id){ return id.startsWith('g0') || id.startsWith('g1') || id.startsWith('g2'); }).length;
    document.getElementById('done-summary').textContent = '已完成 ' + done.length + ' 个游戏';
    document.getElementById('qa-grid').innerHTML = buildQA(done);
    document.getElementById('chem-grid').innerHTML = chemGames.map(function(g){ return buildSciCard(g, done); }).join('');
    document.getElementById('phys-grid').innerHTML = physGames.map(function(g){ return buildSciCard(g, done); }).join('');
    document.getElementById('code-grid').innerHTML = codeGames.map(function(g){ return buildSciCard(g, done); }).join('');
    document.getElementById('multi-grid').innerHTML = multiGames.map(function(g){ return buildSciCard(g, done); }).join('');

    // Tab switching + remember active category
    var VALID_CATS = ['qa','science','code','multi'];
    function activateCat(cat){
      if (VALID_CATS.indexOf(cat) === -1) return false;
      document.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.toggle('is-active', t.dataset.cat === cat); });
      document.querySelectorAll('.cat-panel').forEach(function(p){ p.classList.remove('is-active'); });
      var panel = document.getElementById('panel-'+cat);
      if (panel) panel.classList.add('is-active');
      try { sessionStorage.setItem('games-cat', cat); } catch(e){}
      return true;
    }
    document.querySelectorAll('.cat-tab').forEach(function(tab){
      tab.addEventListener('click', function(){ activateCat(tab.dataset.cat); });
    });
    // Restore: URL hash (e.g. #science) > sessionStorage > default (qa)
    var hashCat = (location.hash || '').replace('#','').split(':')[0];
    var stored = '';
    try { stored = sessionStorage.getItem('games-cat') || ''; } catch(e){}
    activateCat(hashCat) || activateCat(stored) || activateCat('qa');

    // Member button
    var m = window.FO ? FO.getMember() : null;
    var el = document.getElementById('nav-member-btn');
    if (m) {
      el.innerHTML = FO.avatarSVG(m.avatar, m.color, 32) + '<span>' + m.name + '</span>';
      el.onclick = function(){ location.href='../dashboard.html'; };
    } else {
      el.innerHTML = '<span>登录</span>';
      el.onclick = function(){ location.href='../login.html'; };
    }

    // Lock gated games when signed out — first game of each group stays free.
    if (!m) {
      var FREE_GAMES = {'g01-direction':1,'g21-chemistry':1,'g22-physics':1,'g41-blocks':1,'g44-history-detective':1};
      document.querySelectorAll('.booklet-card[href], .game-card[href]').forEach(function(card){
        var href = card.getAttribute('href') || '';
        var id = href.split('/').pop().replace('.html','').split('#')[0];
        if (FREE_GAMES[id]) return;
        card.classList.add('is-locked');
        card.setAttribute('href', '/login.html?back=' + encodeURIComponent(href));
      });
    }
  })();
</script>
</body>
</html>
