<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>循环工厂 · 游戏</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="code-lab.css">
<style>
  .lf-shell{width:100%;max-height:100%;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-xl)}
  .lf-belt-label{font-size:var(--font-size-caption);color:var(--ink-mute);margin-bottom:var(--space-xs)}
  .lf-belt{background:var(--cream-deep);border-radius:var(--radius);padding:var(--space-lg);min-height:var(--space-10xl);display:flex;flex-wrap:wrap;gap:var(--space-xs);align-items:center;box-shadow:var(--shadow-soft)}
  .lf-belt.target{background:var(--paper);border:var(--size-hairline) dashed var(--cream-deep)}
  .lf-belt .ds-empty{color:var(--ink-mute);font-size:var(--font-size-caption)}
  .lf-part{min-width:var(--space-9xl);height:var(--space-9xl);border-radius:var(--radius-sm);display:grid;place-items:center;font-size:var(--font-size-note);font-weight:700;box-shadow:var(--shadow-soft);color:var(--paper)}
  .lf-part[data-p="A"]{background:var(--coral)}
  .lf-part[data-p="B"]{background:var(--blue)}
  .lf-part[data-p="G"]{background:var(--green)}
  .lf-part.ghost{opacity:.35}
  .lf-part.wrong{outline:var(--size-border-card) solid var(--coral);outline-offset:var(--space-2xs)}
  .lf-code{background:var(--paper);border-radius:var(--radius);padding:var(--space-lg);box-shadow:var(--shadow-soft);display:flex;flex-direction:column;gap:var(--space-xs);min-height:var(--space-10xl)}
  .lf-line{display:flex;align-items:center;gap:var(--space-sm);font-size:var(--font-size-note);color:var(--ink);padding:var(--space-2xs) var(--space-xs);border-radius:var(--radius-sm)}
  .lf-line.is-running{background:var(--yellow-soft)}
  .lf-line.indent{padding-left:var(--space-3xl)}
  .lf-line .lf-txt{flex:1}
  .lf-line .lf-del{border:0;background:transparent;color:var(--ink-mute);font-family:inherit;font-size:var(--font-size-note);cursor:pointer}
  .lf-line .lf-step{border:0;background:var(--cream);color:var(--ink-soft);border-radius:var(--radius-sm);width:var(--space-5xl);height:var(--space-5xl);font-family:inherit;cursor:pointer}
  .lf-line .lf-step:disabled{opacity:.35;cursor:default}
  .lf-empty{color:var(--ink-mute);font-size:var(--font-size-caption)}
  .lf-palette{display:flex;flex-wrap:wrap;gap:var(--space-sm)}
  .lf-btn{border:0;border-radius:var(--radius);padding:var(--space-sm) var(--space-lg);background:var(--cream-deep);color:var(--ink);font-family:inherit;font-size:var(--font-size-note);font-weight:700;cursor:pointer;box-shadow:var(--shadow-soft);transition:transform var(--duration-fast)}
  .lf-btn:active{transform:scale(.94)}
  .lf-btn:disabled{opacity:.4;cursor:default}
  .lf-btn.loop{background:var(--yellow-soft)}
  .lf-count{font-size:var(--font-size-note);color:var(--ink-soft)}
  .lf-count strong{color:var(--ink)}
  .lf-count .over{color:var(--coral)}
  .feedback{min-height:var(--space-7xl);font-size:var(--font-size-note);font-weight:700;color:var(--ink-soft);text-align:center;margin-bottom:var(--space-lg);flex-shrink:0}
</style>
<script src="/fo-gate.js"></script></head>
<body class="code-lab">
<main class="game-wrap">
  <nav class="game-nav">
    <a class="back-link" href="index.html#code">&#8592; 游戏库</a>
    <div class="game-title">
      <span class="title-name">循环工厂</span>
      <span class="title-desc">同一件事要做 20 遍时，聪明人写循环，不写 20 行</span>
    </div>
    <div class="nav-right">
      <div class="level-pill" id="level-pill">关卡 1 / 4</div>
      <button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button>
    </div>
  </nav>
  <div class="layout">
    <section class="panel stage-panel">
      <div class="stage-head">
        <h2 id="level-title">关卡 1</h2>
        <p id="level-hint"></p>
      </div>
      <div class="hud">
        <span class="hud-budget" id="hud-budget">指令 0</span>
        <span class="feedback" id="feedback"></span>
        <span class="hud-stars" id="hud-stars"></span>
      </div>
      <div class="stage-body">
        <div class="lf-shell">
          <div>
            <p class="lf-belt-label">订单要求（照着做出来）</p>
            <div class="lf-belt target" id="belt-target"></div>
          </div>
          <div>
            <p class="lf-belt-label">你的传送带（运行后产出）</p>
            <div class="lf-belt" id="belt-out"></div>
          </div>
          <p class="lf-count" id="count-note"></p>
        </div>
      </div>
      <div class="result" id="result"><span id="result-text"></span><button id="result-btn">继续</button></div>
    </section>
    <section class="panel side-panel">
      <h2 class="panel-title">你的程序</h2>
      <div class="lf-code" id="code-list"></div>
      <p class="panel-title">加指令</p>
      <div class="lf-palette">
        <button class="lf-btn" data-add="A">放零件 A</button>
        <button class="lf-btn" data-add="B">放零件 B</button>
        <button class="lf-btn" data-add="G">放齿轮</button>
        <button class="lf-btn loop" data-add="LOOP">重复 N 次 {…}</button>
      </div>
      <p class="hint-box" id="hint-box"></p>
      <div class="actions">
        <button class="action clear" id="clear-btn">清空</button>
        <button class="action run" id="run-btn">&#9654; 运行</button>
      </div>
      <button class="next-btn" id="next-btn">下一关</button>
    </section>
  </div>
</main>
<section class="concepts-wrap">
  <p class="section-label">知识预习</p>
  <div class="concepts">
    <div class="concept-card"><h3>循环</h3><p>「重复 N 次 { … }」把要做很多遍的事写一遍。改数量只要改一个数字，不用重抄。</p></div>
    <div class="concept-card"><h3>循环体</h3><p>大括号里的那几条，就是每一轮都会被执行的部分。想清楚"一轮做什么"，是写循环的关键。</p></div>
    <div class="concept-card"><h3>为什么要少写</h3><p>指令越少，出错的地方越少、改起来越快。程序员偷的懒，都是为了以后省事。</p></div>
  </div>
</section>
<script src="../fo-utils.js"></script>
<script src="code-lab.js"></script>
<script>
var GAME_ID='g62-loop-factory';
var PART_LABEL={A:'A',B:'B',G:'⚙'};
var PART_NAME={A:'零件 A',B:'零件 B',G:'齿轮'};

var levels=[
  {title:'关卡 1 — 一模一样的八个',
   target:'AAAAAAAA',
   hint:'八个零件 A。一条条放要八行，用循环只要两行。',
   best:2,limit:null,
   tip:'重复 8 次 { 放零件 A }'},
  {title:'关卡 2 — 一轮做两件事',
   target:'ABABABAB',
   hint:'A、B 交替。先想清楚"一轮"是什么，再决定重复几次。',
   best:3,limit:null,
   tip:'一轮＝放 A 再放 B，这样只要重复 4 次。'},
  {title:'关卡 3 — 每三个加一个齿轮',
   target:'AABGAABGAABG',
   hint:'找出重复的那一小段，它就是循环体。',
   best:5,limit:null,
   tip:'一轮＝A、A、B、齿轮，重复 3 次。'},
  {title:'关卡 4 — 只给你 4 条指令',
   target:'GBBBBBBBBBBG',
   hint:'指令条数被限死了，不用循环绝对做不完。',
   best:4,limit:4,
   tip:'先放一个齿轮，中间用循环放 10 个 B，最后再补一个齿轮。'}
];

var levelIndex=0,prog=[],over=false,running=false;

/* 程序结构：[{t:'put',p:'A'} | {t:'loop',n:3,body:[{t:'put',p:'A'}...]}] */
function countLines(list){
  var n=0;
  list.forEach(function(c){
    n++;
    if(c.t==='loop')n+=countLines(c.body);
  });
  return n;
}
function runProgram(list,out){
  list.forEach(function(c){
    if(c.t==='put'){out.push(c.p);}
    else{for(var i=0;i<c.n;i++)runProgram(c.body,out);}
  });
  return out;
}
/* 展平成带行号的执行序列，用于逐步高亮 */
function trace(list,path,steps){
  list.forEach(function(c,i){
    var id=path.concat(i).join('-');
    if(c.t==='put'){steps.push({id:id,p:c.p});}
    else{for(var k=0;k<c.n;k++)trace(c.body,path.concat(i),steps);}
  });
  return steps;
}

function flash(t){document.getElementById('feedback').textContent=t;}

function partHTML(p,cls){
  return '<div class="lf-part'+(cls?' '+cls:'')+'" data-p="'+p+'">'+PART_LABEL[p]+'</div>';
}

function renderTarget(){
  var t=levels[levelIndex].target.split('');
  document.getElementById('belt-target').innerHTML=t.map(function(p){return partHTML(p,'ghost');}).join('');
}
function renderOut(arr,wrongAt){
  var el=document.getElementById('belt-out');
  el.innerHTML=arr.length
    ? arr.map(function(p,i){return partHTML(p,i===wrongAt?'wrong':'');}).join('')
    : '<span class="ds-empty">还没开工，点「运行」看看产出</span>';
}

function renderCode(){
  var box=document.getElementById('code-list');
  if(!prog.length){box.innerHTML='<span class="lf-empty">还没有指令。用下面的按钮拼一段程序。</span>';}
  else{box.innerHTML=lines(prog,[]).join('');}
  box.querySelectorAll('[data-del]').forEach(function(b){
    b.onclick=function(){if(running||over)return;removeAt(b.dataset.del.split('-'));renderCode();updateCount();};
  });
  box.querySelectorAll('[data-inc]').forEach(function(b){
    b.onclick=function(){if(running||over)return;bump(b.dataset.inc.split('-'),1);renderCode();updateCount();};
  });
  box.querySelectorAll('[data-dec]').forEach(function(b){
    b.onclick=function(){if(running||over)return;bump(b.dataset.dec.split('-'),-1);renderCode();updateCount();};
  });
}
function lines(list,path){
  var out=[];
  list.forEach(function(c,i){
    var id=path.concat(i).join('-');
    var inLoop=path.length?' indent':'';
    if(c.t==='put'){
      out.push('<div class="lf-line'+inLoop+'" data-id="'+id+'"><span class="lf-txt">放 '+PART_NAME[c.p]+'</span>'+
        '<button class="lf-del" data-del="'+id+'" aria-label="删除">✕</button></div>');
    }else{
      out.push('<div class="lf-line'+inLoop+'" data-id="'+id+'"><span class="lf-txt">重复 '+c.n+' 次 {</span>'+
        '<button class="lf-step" data-dec="'+id+'" aria-label="减少次数">−</button>'+
        '<button class="lf-step" data-inc="'+id+'" aria-label="增加次数">＋</button>'+
        '<button class="lf-del" data-del="'+id+'" aria-label="删除">✕</button></div>');
      out=out.concat(lines(c.body,path.concat(i)));
      out.push('<div class="lf-line'+inLoop+'"><span class="lf-txt">}</span></div>');
    }
  });
  return out;
}

/* 新指令默认加到最后一个 loop 里（如果最后一条是 loop），否则加到顶层 */
function addCmd(kind){
  if(running||over)return;
  var cmd=kind==='LOOP'?{t:'loop',n:2,body:[]}:{t:'put',p:kind};
  var last=prog[prog.length-1];
  if(last&&last.t==='loop'&&kind!=='LOOP')last.body.push(cmd);
  else prog.push(cmd);
  renderCode();updateCount();
}
function removeAt(pathArr){
  var idx=pathArr.map(Number),list=prog;
  for(var i=0;i<idx.length-1;i++)list=list[idx[i]].body;
  list.splice(idx[idx.length-1],1);
}
function bump(pathArr,d){
  var idx=pathArr.map(Number),list=prog;
  for(var i=0;i<idx.length-1;i++)list=list[idx[i]].body;
  var c=list[idx[idx.length-1]];
  c.n=Math.max(1,Math.min(20,c.n+d));
}

function updateCount(){
  var lv=levels[levelIndex],n=countLines(prog);
  var el=document.getElementById('count-note');
  var over_=lv.limit&&n>lv.limit;
  el.innerHTML='已用 <strong>'+n+'</strong> 条指令'+
    (lv.limit?'（本关最多 <strong class="'+(over_?'over':'')+'">'+lv.limit+'</strong> 条）':'')+
    '，最优 '+lv.best+' 条。';
  document.getElementById('hud-budget').textContent='指令 '+n;
  document.getElementById('hud-budget').classList.toggle('danger',!!over_);
  document.getElementById('run-btn').disabled=running||over||!prog.length;
}

async function run(){
  if(running||over||!prog.length)return;
  var lv=levels[levelIndex];
  var n=countLines(prog);
  if(lv.limit&&n>lv.limit){flash('指令太多了，本关最多 '+lv.limit+' 条——想想哪段能塞进循环');return;}
  running=true;updateCount();
  CodeLab.hideResult();
  var steps=trace(prog,[],[]);
  if(steps.length>60){flash('产出太多了，先把重复次数调小一点');running=false;updateCount();return;}
  var out=[];renderOut(out);
  for(var i=0;i<steps.length;i++){
    document.querySelectorAll('.lf-line').forEach(function(el){el.classList.remove('is-running');});
    var cur=document.querySelector('.lf-line[data-id="'+steps[i].id+'"]');
    if(cur)cur.classList.add('is-running');
    out.push(steps[i].p);
    renderOut(out);
    flash('生产中… 第 '+out.length+' 个');
    await CodeLab.wait(180);
  }
  document.querySelectorAll('.lf-line').forEach(function(el){el.classList.remove('is-running');});
  running=false;
  check(out,n);
}

function check(out,n){
  var lv=levels[levelIndex],want=lv.target.split('');
  var wrongAt=-1;
  for(var i=0;i<Math.max(out.length,want.length);i++){
    if(out[i]!==want[i]){wrongAt=i;break;}
  }
  if(wrongAt>=0){
    renderOut(out,wrongAt);
    var why=out.length<want.length?'产出少了 '+(want.length-out.length)+' 个':
            (out.length>want.length?'多做了 '+(out.length-want.length)+' 个':'第 '+(wrongAt+1)+' 个放错了');
    flash(why+'，改改再试');
    CodeLab.showResult('retry','还没对上订单：'+why+'。',null);
    updateCount();
    return;
  }
  over=true;
  var stars=n<=lv.best?3:(n<=lv.best+2?2:1);
  CodeLab.saveStars(GAME_ID,levelIndex,stars);
  CodeLab.renderStarsHud(stars);
  document.getElementById('next-btn').classList.add('show');
  flash('订单完成！');
  updateCount();
  if(levelIndex===levels.length-1)CodeLab.markDone(GAME_ID);
  var head=stars===3?'漂亮，正好是最短写法！':'做出来了，不过还能更短。';
  CodeLab.showResult(stars===3?'success':'retry',
    head+' 你用了 '+n+' 条指令，最优 '+lv.best+' 条 '+CodeLab.starHTML(stars),
    levelIndex<levels.length-1?'下一关':'再玩一次',nextLevel);
}

function nextLevel(){loadLevel(levelIndex<levels.length-1?levelIndex+1:0);}

function loadLevel(index){
  levelIndex=index;
  var lv=levels[index];
  CodeLab.setLevel(index,levels.length,lv.title,lv.hint);
  prog=[];over=false;running=false;
  document.getElementById('hud-stars').innerHTML='';
  document.getElementById('hud-budget').classList.remove('danger');
  document.getElementById('hint-box').textContent='提示：'+lv.tip;
  document.getElementById('next-btn').classList.remove('show');
  renderTarget();renderOut([]);renderCode();updateCount();
  flash('先看订单，再拼程序');
  CodeLab.hideResult();
}

document.querySelectorAll('[data-add]').forEach(function(b){
  b.onclick=function(){addCmd(b.dataset.add);};
});
document.getElementById('clear-btn').onclick=function(){if(running)return;prog=[];over=false;renderOut([]);renderCode();updateCount();CodeLab.hideResult();flash('清空了，重新拼');};
document.getElementById('run-btn').onclick=run;
document.getElementById('next-btn').onclick=nextLevel;
CodeLab.initMember();loadLevel(0);
</script>
</body>
</html>
