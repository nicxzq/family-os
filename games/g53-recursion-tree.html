<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>递归树 · 游戏</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="code-lab.css">
<style>
  .canvas-shell{position:relative;height:100%;max-width:100%;aspect-ratio:1;background:var(--cream-deep);border-radius:var(--radius);padding:var(--space-lg);box-shadow:var(--shadow-soft)}
  #tree-canvas{display:block;width:100%;height:100%;border-radius:var(--radius-md);background:var(--cream)}
  .sliders{display:flex;flex-direction:column;gap:var(--space-lg);margin-bottom:var(--space-xl);flex-shrink:0}
  .slider-row label{display:flex;flex-direction:column;gap:var(--space-xs);font-size:var(--font-size-note);color:var(--ink-soft);font-weight:700}
  .slider-row .row-top{display:flex;justify-content:space-between}
  .slider-row input[type="range"]{width:100%;accent-color:var(--coral)}
  .slider-row.locked{opacity:.45}
  .slider-row.locked .lock-tag{color:var(--ink-mute)}
  .lock-tag{display:none;font-size:var(--font-size-caption)}
  .slider-row.locked .lock-tag{display:inline}
  .stack-note{font-size:var(--font-size-xs);color:var(--ink-mute);line-height:1.5;margin:0 0 var(--space-md);flex-shrink:0}
  .call-stack{flex:1;min-height:60px;max-height:150px;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:var(--space-xs);padding:var(--space-2xs)}
  .stack-frame{background:var(--cream-deep);border-radius:var(--radius-md);padding:var(--space-xs) var(--space-lg);font-size:var(--font-size-caption);color:var(--ink-soft);font-weight:700;flex-shrink:0}
  .stack-frame.is-top{background:var(--blue-soft);color:var(--ink)}
  .stack-frame.is-base{background:var(--yellow-soft);color:var(--ink)}
  @media (max-width:767px){
    .canvas-shell{height:auto;width:min(100%,42dvh)}
    .call-stack{max-height:90px}
  }
</style>
<script src="/fo-gate.js"></script></head>
<body class="code-lab">
<main class="game-wrap">
  <nav class="game-nav">
    <a class="back-link" href="index.html#code">&#8592; 游戏库</a>
    <div class="game-title">
      <span class="title-name">递归树</span>
      <span class="title-desc">观察目标树，反推出让函数"叫自己"的三个参数</span>
    </div>
    <div class="nav-right">
      <div class="level-pill" id="level-pill">关卡 1 / 4</div>
      <button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button>
    </div>
  </nav>
  <div class="layout">
    <section class="panel stage-panel">
      <div class="stage-head">
        <h2 id="level-title">关卡 1</h2>
        <p id="level-hint"></p>
      </div>
      <div class="hud">
        <span class="hud-hearts" id="hud-hearts"></span>
        <span class="hud-budget" id="hud-branches">树枝 –</span>
        <span class="hud-stars" id="hud-stars"></span>
      </div>
      <div class="stage-body">
        <div class="canvas-shell" id="canvas-shell"><canvas id="tree-canvas"></canvas></div>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="legend-dot ghost"></span>目标图案</span>
        <span class="legend-item"><span class="legend-dot mine"></span>你的树</span>
      </div>
      <div class="result" id="result"><span id="result-text"></span><button id="result-btn">继续</button></div>
    </section>
    <section class="panel side-panel">
      <h2 class="panel-title">调整参数</h2>
      <div class="sliders">
        <div class="slider-row" id="row-depth"><label><span class="row-top"><span>递归深度 <span class="lock-tag">🔒</span></span><span id="val-depth">3</span></span>
          <input type="range" id="depth" min="1" max="7" step="1" value="3"></label></div>
        <div class="slider-row" id="row-angle"><label><span class="row-top"><span>分支角度 <span class="lock-tag">🔒</span></span><span id="val-angle">25°</span></span>
          <input type="range" id="angle" min="10" max="55" step="5" value="25"></label></div>
        <div class="slider-row" id="row-ratio"><label><span class="row-top"><span>收缩比例 <span class="lock-tag">🔒</span></span><span id="val-ratio">0.70</span></span>
          <input type="range" id="ratio" min="55" max="80" step="5" value="70"></label></div>
      </div>
      <p class="hint-box" id="strategy-hint">观察灰色目标树：数一数它有几层（深度）、张得多开（角度）、上层的枝条缩得多快（比例）。每次"画树"消耗一次机会！</p>
      <div class="actions">
        <button class="action clear" id="retry-btn">重开本关</button>
        <button class="action run" id="run-btn">&#9654; 画树</button>
      </div>
      <h2 class="panel-title">调用栈</h2>
      <p class="stack-note">函数每次调用自己就压入一层，遇到"基例"停止并逐层返回。</p>
      <div class="call-stack" id="call-stack"></div>
      <button class="next-btn" id="next-btn">下一关</button>
    </section>
  </div>
</main>
<section class="concepts-wrap">
  <p class="section-label">知识预习</p>
  <div class="concepts">
    <div class="concept-card"><h3>递归</h3><p>函数调用自己，把大问题拆成更小的同类问题</p></div>
    <div class="concept-card"><h3>基例</h3><p>递归停止的条件，少了它就会无限循环</p></div>
    <div class="concept-card"><h3>指数增长</h3><p>深度每加一层，树枝数几乎翻倍——这就是 2 的力量</p></div>
  </div>
</section>
<script src="../fo-utils.js"></script>
<script src="code-lab.js"></script>
<script>
var GAME_ID='g53-recursion-tree';
var ATTEMPTS=5;
var levels=[
  {title:'关卡 1 — 数层数',free:['depth'],target:{angle:25,ratio:0.70,depth:4},
   hint:'角度和比例已锁定，只需数出目标树有几层，调好深度再画。'},
  {title:'关卡 2 — 张开的角度',free:['depth','angle'],target:{angle:45,ratio:0.70,depth:5},
   hint:'这棵树张得很开。先定深度，再试角度。'},
  {title:'关卡 3 — 三个参数一起调',free:['depth','angle','ratio'],target:{angle:25,ratio:0.65,depth:6},
   hint:'全部解锁！比例越小，越往上枝条缩得越快。'},
  {title:'关卡 4 — 神秘树',free:['depth','angle','ratio'],random:true,
   hint:'目标是随机生成的，没有任何提示——用前三关练出的眼力吧。'}
];
var levelIndex=0,running=false,over=false,attemptsLeft=ATTEMPTS;
var LOGICAL=300,ctx,scaleFactor=1;
var segments=[],ghostSegs=[],activeDot=null,callStack=[],targetParams=null;

function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
function getP(id){return parseInt(document.getElementById(id).value,10);}
function params(){return{angle:getP('angle'),ratio:getP('ratio')/100,depth:getP('depth')};}
function syncLabels(){
  document.getElementById('val-angle').textContent=getP('angle')+'°';
  document.getElementById('val-ratio').textContent=(getP('ratio')/100).toFixed(2);
  document.getElementById('val-depth').textContent=getP('depth');
}
function starsForAttempt(used){return used<=1?3:(used<=3?2:1);}

function setupCanvas(){
  var shell=document.getElementById('canvas-shell');
  var size=Math.max(shell.clientWidth-20,60);
  var canvas=document.getElementById('tree-canvas');
  var dpr=window.devicePixelRatio||1;
  canvas.width=size*dpr;canvas.height=size*dpr;
  ctx=canvas.getContext('2d');
  scaleFactor=(size*dpr)/LOGICAL;
  ctx.setTransform(scaleFactor,0,0,scaleFactor,0,0);
  redraw();
}
function clearCanvas(){
  var c=document.getElementById('tree-canvas');
  ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,c.width,c.height);ctx.restore();
}
function drawSegs(list,color,alpha){
  ctx.save();ctx.globalAlpha=alpha==null?1:alpha;
  ctx.strokeStyle=color;ctx.lineWidth=3;ctx.lineCap='round';
  list.forEach(function(s){ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();});
  ctx.restore();
}
function redraw(){
  if(!ctx)return;
  clearCanvas();
  drawSegs(ghostSegs,cssVar('--ink-mute'),0.35);
  drawSegs(segments,cssVar('--coral'),1);
  if(activeDot){ctx.save();ctx.fillStyle=cssVar('--coral');ctx.beginPath();ctx.arc(activeDot.x,activeDot.y,4,0,Math.PI*2);ctx.fill();ctx.restore();}
}
function buildSegments(p){
  var segs=[];
  (function rec(x,y,len,heading,d){
    if(d<=0||len<3)return;
    var rad=heading*Math.PI/180;
    var nx=x+Math.sin(rad)*len,ny=y-Math.cos(rad)*len;
    segs.push({x1:x,y1:y,x2:nx,y2:ny});
    rec(nx,ny,len*p.ratio,heading-p.angle,d-1);
    rec(nx,ny,len*p.ratio,heading+p.angle,d-1);
  })(150,280,90,0,p.depth);
  return segs;
}
function renderStack(){
  document.getElementById('call-stack').innerHTML=callStack.map(function(f,i){
    var top=i===callStack.length-1;
    return '<div class="stack-frame'+(top?' is-top':'')+(f.base?' is-base':'')+'">draw(depth='+f.depth+')'+(f.base?' — 基例，返回':'')+'</div>';
  }).join('');
}
async function drawBranch(x,y,len,heading,depth,p,delay){
  var isBase=depth<=0||len<3;
  callStack.push({depth:depth,base:isBase});renderStack();
  await CodeLab.wait(delay);
  if(!isBase){
    var rad=heading*Math.PI/180;
    var nx=x+Math.sin(rad)*len,ny=y-Math.cos(rad)*len;
    segments.push({x1:x,y1:y,x2:nx,y2:ny});
    activeDot={x:nx,y:ny};redraw();
    await CodeLab.wait(delay);
    await drawBranch(nx,ny,len*p.ratio,heading-p.angle,depth-1,p,delay);
    await drawBranch(nx,ny,len*p.ratio,heading+p.angle,depth-1,p,delay);
  }
  callStack.pop();renderStack();
  await CodeLab.wait(Math.max(4,delay*0.4));
}
function matches(p){
  return p.depth===targetParams.depth
    &&Math.abs(p.angle-targetParams.angle)<=3
    &&Math.abs(p.ratio-targetParams.ratio)<=0.03;
}
async function runTree(){
  if(running||over)return;running=true;
  document.getElementById('run-btn').disabled=true;
  CodeLab.hideResult();
  segments=[];callStack=[];renderStack();redraw();
  await CodeLab.wait(80);
  var p=params();
  var total=Math.pow(2,p.depth+1)-1;
  var delay=Math.max(6,Math.min(160,900/total));
  await drawBranch(150,280,90,0,p.depth,p,delay);
  activeDot=null;redraw();
  attemptsLeft--;
  document.getElementById('hud-branches').textContent='树枝 '+segments.length+' 根';
  CodeLab.renderHearts(ATTEMPTS,attemptsLeft);
  if(matches(p)){
    over=true;
    var used=ATTEMPTS-attemptsLeft;
    var stars=starsForAttempt(used);
    CodeLab.saveStars(GAME_ID,levelIndex,stars);
    CodeLab.renderStarsHud(stars);
    document.getElementById('next-btn').classList.add('show');
    if(levelIndex===levels.length-1)CodeLab.markDone(GAME_ID);
    CodeLab.showResult('success','长成目标的样子啦！第 '+used+' 次就成功 '+CodeLab.starHTML(stars),
      levelIndex<levels.length-1?'下一关':'再玩一次',nextLevel);
  } else if(attemptsLeft<=0){
    over=true;
    CodeLab.showResult('fail','机会用完了…答案是：深度 '+targetParams.depth+' · 角度 '+targetParams.angle+'° · 比例 '+targetParams.ratio.toFixed(2),
      '重开本关',function(){loadLevel(levelIndex);});
  } else {
    var diffs=[];
    if(p.depth!==targetParams.depth)diffs.push('层数不对，再数数灰色树有几层');
    else if(Math.abs(p.angle-targetParams.angle)>3)diffs.push('角度差得有点多');
    else diffs.push('比例还不对，看看枝条变细的速度');
    CodeLab.showResult('retry',diffs[0]+'（还剩 '+attemptsLeft+' 次）','知道了',CodeLab.hideResult);
  }
  running=false;
  document.getElementById('run-btn').disabled=over;
}
function nextLevel(){loadLevel(levelIndex<levels.length-1?levelIndex+1:0);}

function randTarget(){
  var angles=[10,15,20,25,30,35,40,45,50,55];
  var ratios=[0.55,0.60,0.65,0.70,0.75,0.80];
  return{angle:angles[Math.floor(Math.random()*angles.length)],
    ratio:ratios[Math.floor(Math.random()*ratios.length)],
    depth:3+Math.floor(Math.random()*4)};
}
function loadLevel(index){
  levelIndex=index;
  var lv=levels[index];
  CodeLab.setLevel(index,levels.length,lv.title,lv.hint);
  targetParams=lv.random?randTarget():lv.target;
  attemptsLeft=ATTEMPTS;over=false;
  // 自由/锁定参数：锁定的滑杆固定为目标值（它不是谜题的一部分）
  ['depth','angle','ratio'].forEach(function(id){
    var free=lv.free.indexOf(id)>=0;
    var input=document.getElementById(id);
    input.disabled=!free;
    document.getElementById('row-'+id).classList.toggle('locked',!free);
    if(!free){
      input.value=id==='ratio'?Math.round(targetParams.ratio*100):targetParams[id];
    } else {
      input.value=id==='depth'?2:(id==='angle'?25:70);
    }
  });
  syncLabels();
  segments=[];callStack=[];renderStack();activeDot=null;
  ghostSegs=buildSegments(targetParams);
  document.getElementById('hud-branches').textContent='树枝 –';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('run-btn').disabled=false;
  CodeLab.renderHearts(ATTEMPTS,attemptsLeft);
  CodeLab.renderStarsHud(0);
  CodeLab.hideResult();
  redraw();
}
document.getElementById('run-btn').onclick=runTree;
document.getElementById('retry-btn').onclick=function(){if(!running)loadLevel(levelIndex);};
document.getElementById('next-btn').onclick=nextLevel;
['angle','ratio','depth'].forEach(function(id){document.getElementById(id).addEventListener('input',syncLabels);});
window.addEventListener('resize',setupCanvas);
CodeLab.initMember();setupCanvas();loadLevel(0);
</script>
</body>
</html>
