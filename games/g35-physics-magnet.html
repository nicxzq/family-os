<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>磁力对决 · 游戏</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  .nav-member-btn{display:inline-flex;align-items:center;gap:8px;background:var(--paper);border:0;border-radius:999px;padding:6px 14px 6px 6px;font-family:inherit;font-size:14px;cursor:pointer;color:var(--ink-soft);box-shadow:var(--shadow-soft)}
  .nav-member-btn svg{border-radius:50%}
  .game-nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--paper);box-shadow:var(--shadow-soft);border-radius:var(--radius);padding:10px 14px;margin-bottom:32px}
  .back-link{text-decoration:none;color:var(--ink-mute);font-size:15px}
  .wrap{max-width:720px;margin:0 auto;padding:0 20px 80px}
  .game-hero{text-align:center;margin-bottom:36px}
  .game-hero .emoji{font-size:64px;display:block;margin-bottom:16px}
  .game-hero h1{font-size:clamp(28px,5vw,42px);margin-bottom:10px}
  .game-hero .sub{color:var(--ink-soft);font-size:17px;line-height:1.6}
  .teaser{background:var(--paper);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-card);margin-bottom:24px}
  .teaser h2{font-size:14px;letter-spacing:.12em;color:var(--ink-mute);margin-bottom:16px}
  .teaser ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:12px}
  .teaser li{display:flex;align-items:flex-start;gap:10px;font-size:16px;color:var(--ink-soft);line-height:1.6}
  .teaser li::before{content:"→";color:var(--coral);flex-shrink:0;margin-top:2px}
  .coming-soon{background:var(--cream-deep);border-radius:var(--radius);padding:20px 24px;text-align:center;font-size:18px;color:var(--ink-mute);margin-bottom:28px;border:2px dashed var(--ink-mute)}
  .concepts{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .concept-card{background:var(--paper);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-card)}
  .concept-card h3{font-size:15px;color:var(--ink);margin-bottom:6px}
  .concept-card p{font-size:13px;color:var(--ink-soft);line-height:1.6}
  .section-label{font-size:13px;letter-spacing:.12em;color:var(--ink-mute);margin-bottom:14px}
</style>
</head>
<body>
<main class="wrap">
  <nav class="game-nav">
    <a class="back-link" href="index.html">← 游戏库</a>
    <button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button>
  </nav>
  <header class="game-hero">
    <span class="emoji">🧲</span>
    <h1>磁力对决</h1>
    <p class="sub">同极相斥、异极相吸——简单的规律，却能造出电动机和发电机。</p>
  </header>
  <section class="teaser">
    <h2>这个游戏里，你将会…</h2>
    <ul>
      <li>放置磁铁观察磁场线方向</li>
      <li>利用排斥力把物体悬浮</li>
      <li>拖动线圈切割磁感线产生电流</li>
    </ul>
  </section>
  <div class="coming-soon">🚧 即将推出 · 敬请期待</div>
  <p class="section-label">知识预习</p>
  <div class="concepts">
    <div class="concept-card"><h3>磁场</h3><p>看不见但真实存在的力场</p></div>
    <div class="concept-card"><h3>地磁场</h3><p>地球本身是一块大磁铁</p></div>
    <div class="concept-card"><h3>电磁感应</h3><p>运动产生电，电产生磁</p></div>
  </div>
</main>
<script src="../fo-utils.js"></script>
<script>
  var m = window.FO ? FO.getMember() : null;
  var el = document.getElementById('nav-member-btn');
  if(m){ el.innerHTML = FO.avatarSVG(m.avatar,m.color,32)+'<span>'+m.name+'</span>'; el.onclick=function(){location.href='../dashboard.html'}; }
  else { el.innerHTML='<span>登录</span>'; el.onclick=function(){location.href='../login.html'}; }
</script>
</body>
</html>
