<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>未来信件 · 写给十年后的你</title><link rel="icon" href="../favicon.svg" type="image/svg+xml"><link rel="stylesheet" href="../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
.nav-member-btn{display:inline-flex;align-items:center;gap:8px;background:var(--paper);border:0;border-radius:999px;padding:6px 14px 6px 6px;font-family:inherit;font-size:14px;cursor:pointer;color:var(--ink-soft);box-shadow:var(--shadow-soft)}.nav-member-btn svg{border-radius:50%}.game{max-width:720px;margin:0 auto;padding:0px 28px 90px}.game-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10;background:var(--paper);box-shadow:var(--shadow-soft);border-radius:var(--radius);padding:10px 14px;margin-bottom:24px}.back{color:var(--ink-mute);text-decoration:none}.game-intro{text-align:center;margin-bottom:30px}.game-intro h1{font-size:clamp(32px,5vw,48px);line-height:1.2;margin-bottom:14px}.game-intro p{color:var(--ink-soft);font-size:18px}.letter-card,.result{background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);padding:34px}.field{margin-bottom:18px}.field label{display:block;color:var(--ink);font-weight:600;margin-bottom:8px}textarea,input{width:100%;border:1.5px solid var(--blue-soft);background:var(--cream);border-radius:14px;color:var(--ink);font:inherit;padding:13px 15px}textarea{resize:vertical;line-height:1.8}.short{min-height:74px}.mid{min-height:112px}.long{min-height:150px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn,.next-link{border:0;background:var(--ink);color:var(--cream);border-radius:999px;padding:12px 22px;font:inherit;text-decoration:none;cursor:pointer}.ghost{background:var(--cream);color:var(--ink)}.saved{display:none;color:var(--green);margin-top:14px}.saved.is-shown{display:block}.result{display:none;margin-top:22px}.result.is-active{display:block}.letter-output{white-space:pre-wrap;text-align:left;background:var(--cream);border-radius:var(--radius);padding:20px;color:var(--ink-soft);margin:16px 0 20px}.result h2{text-align:center}
</style><script src="/fo-gate.js"></script></head><body><main class="game"><nav class="game-nav"><a class="back" href="index.html#qa">← 游戏库</a><button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button></nav><header class="game-intro"><h1>未来信件 · 写给十年后的你</h1><p>写给十年后的你，也是在问今天的你。</p></header>
<section class="letter-card"><div class="field"><label for="f1">十年后，你几岁？你在哪里？</label><textarea id="f1" class="short"></textarea></div><div class="field"><label for="f2">你希望那时候的你，在做什么？</label><textarea id="f2" class="mid"></textarea></div><div class="field"><label for="f3">你最希望自己保留的一个品质是⋯⋯</label><textarea id="f3" class="short"></textarea></div><div class="field"><label for="f4">你对现在的你有什么话想说？</label><textarea id="f4" class="long"></textarea></div><div class="field"><label for="f5">结尾：落款，今天的日期</label><input id="f5" type="text"></div><div class="actions"><button class="btn" id="save">保存信件</button><button class="btn ghost" id="load">重新读一遍</button></div><p id="saved" class="saved">信件已保存 ✓</p></section>
<section class="result" id="result"><h2>这封信，十年后再打开。</h2><div class="letter-output" id="letter-output"></div><a class="next-link" href="g09-growth.html">下一个游戏 →</a></section></main><script src="../fo-utils.js"></script><script>
var ids=['f1','f2','f3','f4','f5'],gameId='g08-letter';function markDone(){var a=JSON.parse(localStorage.getItem('fo_games_done')||'[]');if(a.indexOf(gameId)<0){a.push(gameId);localStorage.setItem('fo_games_done',JSON.stringify(a));}}function data(){var o={};ids.forEach(function(id){o[id]=document.getElementById(id).value});return o}function fill(o){ids.forEach(function(id){document.getElementById(id).value=(o&&o[id])||''})}function output(o){document.getElementById('letter-output').textContent='十年后的我：\n\n'+o.f1+'\n\n我希望你正在：\n'+o.f2+'\n\n请保留这个品质：\n'+o.f3+'\n\n现在的我想对你说：\n'+o.f4+'\n\n'+o.f5;document.getElementById('result').classList.add('is-active');markDone()}document.getElementById('f5').value=(function(d){return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'})(new Date());document.getElementById('save').onclick=function(){var o=data();localStorage.setItem('fo_future_letter',JSON.stringify(o));document.getElementById('saved').classList.add('is-shown');output(o)};document.getElementById('load').onclick=function(){var o=JSON.parse(localStorage.getItem('fo_future_letter')||'{}');fill(o);if(o.f1||o.f2||o.f3||o.f4||o.f5)output(o)};(function(){var m=window.FO&&FO.getMember(),el=document.getElementById('nav-member-btn');if(m){el.innerHTML=FO.avatarSVG(m.avatar,m.color,32)+'<span>'+m.name+'</span>';el.onclick=function(){location.href='../dashboard.html'}}else{el.innerHTML='<span>登录</span>';el.onclick=function(){location.href='../login.html'}}})();
</script></body></html>
