<style>
  .canvas-shell{position:relative;height:100%;max-width:100%;aspect-ratio:1;background:var(--cream-deep);border-radius:var(--radius);padding:var(--space-lg);box-shadow:var(--shadow-soft)}
  #turtle-canvas{display:block;width:100%;height:100%;border-radius:var(--radius-md);background:var(--cream)}
  .blocks-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-xl)}
  .blocks-head .panel-title{margin:0}
  .slot-repeat{display:flex;flex-direction:column;align-items:stretch;min-height:auto;height:auto;gap:0;padding-bottom:var(--space-sm)}
  .repeat-header{display:grid;grid-template-columns:var(--space-8xl) minmax(0,1fr);align-items:center;gap:var(--space-md)}
  .repeat-body{list-style:none;padding:0;margin:var(--space-xs) 0 0 var(--space-7xl);display:grid;gap:var(--space-chart-gap)}
  .inner-slot{min-height:36px;padding:var(--space-chart-gap) var(--space-sm);border-radius:var(--radius-md);font-size:var(--font-size-caption)}
  .inner-marker{color:var(--ink-mute);font-size:var(--font-size-note);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .inner-drop{border-style:dashed;background:color-mix(in srgb,var(--cream) 50%,transparent)}
  .inner-drop .empty{font-size:var(--font-size-sm)}
  .nested-repeat{background:color-mix(in srgb,var(--yellow) 6%,var(--cream));border-color:color-mix(in srgb,var(--yellow) 40%,transparent);flex-direction:column;align-items:stretch;height:auto;padding-bottom:var(--space-xs)}
  .nested-repeat .repeat-header{grid-template-columns:var(--space-5xl) minmax(0,1fr)}
  .nested-repeat .inner-marker{width:var(--space-5xl)}
  .nested-body{margin-left:var(--space-3xl)}
  @media (max-width:767px){
    .canvas-shell{height:auto;width:min(100%,42dvh)}
  }
</style>
<script src="/fo-gate.js"></script></head>
<body class="code-lab">

  <div class="layout">

      </div>

    <div class="concept-card"><h3>参数</h3><p>改一个数字，图案就完全不同</p></div>
    <div class="concept-card"><h3>嵌套循环</h3><p>循环里面还有循环，画出更复杂的图案</p></div>

<script src="code-lab.js"></script>
<script>
var GAME_ID='g43-pattern-draw';
var RUNS=5;
var levels=[
  {title:'关卡 1 — 正方形',budget:3,
   hint:'只给你 3 块积木，一块一块拼"前进"肯定不够——试试"重复"。',
   hints:['正方形有 4 条一样长的边，每个角都是 90°。','重复 4 次 { 前进 90 → 右转 90 }。'],
   recipe:[{type:'repeat',count:4,body:[{type:'move',value:90},{type:'right',value:90}]}]},
  {title:'关卡 2 — 八角星',budget:3,
   hint:'还是 3 块积木。这次转的角度要比直角更大。',
   hints:['星星有 8 个尖角，每次转 135°。','重复 8 次 { 前进 110 → 右转 135 }。'],
   recipe:[{type:'repeat',count:8,body:[{type:'move',value:110},{type:'right',value:135}]}]},
  {title:'关卡 3 — 嵌套花朵',budget:6,
   hint:'6 块积木画 3 个六边形？循环里面还得再套一个循环。',
   hints:['花朵是 3 个六边形，每画完一个转 120°。','外层重复 3 次 { 重复 6 次 { 前进 70 → 右转 60 } → 右转 120 }。'],
   recipe:[{type:'repeat',count:3,body:[
     {type:'repeat',count:6,body:[{type:'move',value:70},{type:'right',value:60}]},
     {type:'right',value:120}
   ]}]}
];
var labels={move:'前进',right:'右转',left:'左转',repeat:'重复'};
var units={move:'px',right:'°',left:'°'};
var vrange={move:[10,200],right:[1,180],left:[1,180]};
var defaults={move:60,right:90,left:90};
var SLOTS=6,slots=[],levelIndex=0;
var running=false,over=false,runsLeft=RUNS,hintUsed=0;
var dragDropped=false,dragSourcePath=null,touchDrag=null;
var LOGICAL=300,ctx,scaleFactor=1;
var MATCH_TOL=12;

function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
function pathParts(p){return p.split(',').map(Number);}
function getParent(pathStr){
  var parts=pathParts(pathStr);
  if(parts.length===1)return{arr:slots,key:parts[0]};
  var obj=slots[parts[0]];
  for(var i=1;i<parts.length-1;i++)obj=obj.body[parts[i]];
  return{arr:obj.body,key:parts[parts.length-1]};
}
function getVal(pathStr){var p=getParent(pathStr);return p.arr[p.key];}
function setVal(pathStr,val){var p=getParent(pathStr);p.arr[p.key]=val;return pathParts(pathStr)[0];}
function removeVal(pathStr){
  var parts=pathParts(pathStr);
  if(parts.length===1){slots[parts[0]]=null;return parts[0];}
  var p=getParent(pathStr);p.arr.splice(p.key,1);return parts[0];
}
function countBlocks(list){
  var n=0;
  (list||[]).forEach(function(it){if(!it)return;n++;if(it.type==='repeat')n+=countBlocks(it.body);});
  return n;
}
function updateBudget(){
  var used=countBlocks(slots),cap=levels[levelIndex].budget;
  var pill=document.getElementById('budget-pill');
  pill.textContent='积木 '+used+' / '+cap;
  pill.classList.toggle('over',used>cap);
  document.getElementById('run-btn').disabled=running||over||used>cap||used===0;
}

function xBtn(){return '<button class="remove-btn" type="button" aria-label="移除">&#215;</button>';}
function leafInner(path,item){
  if(item.type==='repeat'){
    return '重复 <input class="val-input" data-kind="count" data-path="'+path+'" type="number" min="1" max="20" value="'+(item.count||2)+'"> 次';
  }
  var r=vrange[item.type];
  return labels[item.type]+' <input class="val-input" data-kind="value" data-path="'+path+'" type="number" min="'+r[0]+'" max="'+r[1]+'" value="'+item.value+'"> '+units[item.type];
}
function dropZone(path){
  return '<li class="slot inner-slot inner-drop" data-path="'+path+'">'+
    '<span class="inner-marker">&#8627;</span><span class="empty">拖入指令</span></li>';
}
function innerItemHTML(path,item){
  return '<li class="slot inner-slot" data-path="'+path+'">'+
    '<span class="inner-marker">&#8627;</span>'+
    '<div class="slot-block" draggable="true" data-path="'+path+'" data-type="'+item.type+'">'+
      leafInner(path,item)+xBtn()+'</div></li>';
}
function nestedRepeatHTML(path,s){
  var body=(s.body||[]).map(function(item,k){
    var p=path+','+k;
    return item.type==='repeat'?nestedRepeatHTML(p,item):innerItemHTML(p,item);
  }).join('');
  body+=dropZone(path+','+(s.body||[]).length);
  return '<li class="slot inner-slot nested-repeat" data-path="'+path+'">'+
    '<div class="repeat-header">'+
      '<span class="inner-marker">&#8627;</span>'+
      '<div class="slot-block" draggable="true" data-path="'+path+'" data-type="repeat">'+
        leafInner(path,s)+xBtn()+'</div></div>'+
    '<ol class="repeat-body nested-body">'+body+'</ol></li>';
}
function repeatHTML(i,s){
  var body=(s.body||[]).map(function(item,j){
    var path=i+','+j;
    return item.type==='repeat'?nestedRepeatHTML(path,item):innerItemHTML(path,item);
  }).join('');
  body+=dropZone(i+','+(s.body||[]).length);
  return '<li class="slot slot-repeat" data-path="'+i+'">'+
    '<div class="repeat-header">'+
      '<span class="slot-num">'+(i+1)+'</span>'+
      '<div class="slot-block" draggable="true" data-path="'+i+'" data-type="repeat">'+
        leafInner(i,s)+xBtn()+'</div></div>'+
    '<ol class="repeat-body">'+body+'</ol></li>';
}
function slotHTML(i){
  var s=slots[i];
  if(!s)return'<li class="slot" data-path="'+i+'"><span class="slot-num">'+(i+1)+'</span><span class="empty">拖一个积木到这里</span></li>';
  if(s.type==='repeat')return repeatHTML(i,s);
  return'<li class="slot" data-path="'+i+'"><span class="slot-num">'+(i+1)+'</span>'+
    '<div class="slot-block" draggable="true" data-path="'+i+'" data-type="'+s.type+'">'+
      leafInner(i,s)+xBtn()+'</div></li>';
}
function renderSlots(){document.getElementById('program').innerHTML=slots.map(function(_,i){return slotHTML(i);}).join('');updateBudget();}
function renderSlot(i){
  var li=document.querySelector('#program > li[data-path="'+i+'"]');if(!li)return;
  var tmp=document.createElement('ol');tmp.innerHTML=slotHTML(i);
  li.parentNode.replaceChild(tmp.firstElementChild,li);
  updateBudget();
}
function clearIsOver(){document.querySelectorAll('.is-over').forEach(function(el){el.classList.remove('is-over');});}

function handleDrop(targetPath,type,srcPath){
  var depth=targetPath.split(',').length;
  if(type==='repeat'&&depth>=3)return false;
  dragDropped=true;
  var topSrc=srcPath?pathParts(srcPath)[0]:-1;
  var topDst=pathParts(targetPath)[0];
  if(srcPath&&srcPath!==targetPath){removeVal(srcPath);if(topSrc!==topDst)renderSlot(topSrc);}
  var val=type==='repeat'?{type:'repeat',count:2,body:[]}:{type:type,value:defaults[type]};
  setVal(targetPath,val);
  renderSlot(topDst);
  return true;
}
function bindProgram(){
  var prog=document.getElementById('program');
  prog.addEventListener('dragover',function(e){
    var el=e.target.closest('[data-path]');
    if(!el||el.classList.contains('slot-repeat')||el.classList.contains('nested-repeat'))return;
    e.preventDefault();clearIsOver();el.classList.add('is-over');
  });
  prog.addEventListener('drop',function(e){
    clearIsOver();
    var el=e.target.closest('[data-path]');
    if(!el||el.classList.contains('slot-repeat')||el.classList.contains('nested-repeat'))return;
    var type=e.dataTransfer.getData('text/plain');
    if(!labels[type])return;
    e.preventDefault();
    handleDrop(el.dataset.path,type,e.dataTransfer.getData('source-path')||null);
  });
  prog.addEventListener('dragstart',function(e){
    var block=e.target.closest('.slot-block[data-path]');if(!block)return;
    dragDropped=false;dragSourcePath=block.dataset.path;
    e.dataTransfer.setData('text/plain',block.dataset.type);
    e.dataTransfer.setData('source-path',block.dataset.path);
  });
  prog.addEventListener('dragend',function(){
    clearIsOver();
    if(dragDropped){dragSourcePath=null;return;}
    if(dragSourcePath){renderSlot(removeVal(dragSourcePath));dragSourcePath=null;}
  });
  prog.addEventListener('click',function(e){
    var btn=e.target.closest('.remove-btn');if(!btn)return;
    e.stopPropagation();
    var block=btn.closest('.slot-block[data-path]');if(!block)return;
    renderSlot(removeVal(block.dataset.path));
  });
  prog.addEventListener('change',function(e){
    var inp=e.target.closest('.val-input');if(!inp)return;
    var blk=inp.closest('.slot-block[data-path]');if(!blk)return;
    var val=getVal(blk.dataset.path);if(!val)return;
    if(inp.dataset.kind==='count')val.count=Math.max(1,Math.min(20,parseInt(inp.value)||2));
    else val.value=Math.max(1,parseInt(inp.value)||defaults[val.type]);
  });
  prog.addEventListener('touchstart',function(e){
    if(e.target.closest('.val-input'))return;
    var block=e.target.closest('.slot-block[data-path]');if(!block||running)return;
    e.preventDefault();startTouch(block,e.touches[0]);
  },{passive:false});
}
function bindBlocks(){
  var bEl=document.getElementById('blocks');
  bEl.querySelectorAll('.block').forEach(function(b){
    b.addEventListener('dragstart',function(e){
      dragDropped=false;dragSourcePath=null;
      e.dataTransfer.setData('text/plain',b.dataset.type);
      e.dataTransfer.setData('source-path','');
    });
  });
  bEl.addEventListener('touchstart',function(e){
    var b=e.target.closest('.block');if(!b||running)return;
    e.preventDefault();startTouch(b,e.touches[0]);
  },{passive:false});
}
function startTouch(src,touch){
  var rect=src.getBoundingClientRect();
  var clone=src.cloneNode(true);clone.className=src.className+' touch-clone';
  var btn=clone.querySelector('.remove-btn');if(btn)btn.remove();
  clone.querySelectorAll('.val-input').forEach(function(inp){inp.style.pointerEvents='none';});
  document.body.appendChild(clone);
  touchDrag={type:src.dataset.type,srcPath:src.dataset.path||null,clone:clone,ox:rect.width/2,oy:rect.height/2};
  moveClone(touch.clientX,touch.clientY);
}
function moveClone(x,y){if(!touchDrag)return;touchDrag.clone.style.transform='translate('+(x-touchDrag.ox)+'px,'+(y-touchDrag.oy)+'px)';}
function endTouch(touch){
  if(!touchDrag)return;
  var td=touchDrag;touchDrag=null;td.clone.remove();
  var el=document.elementFromPoint(touch.clientX,touch.clientY);
  var dropEl=el?el.closest('[data-path]'):null;
  if(dropEl&&!dropEl.classList.contains('slot-repeat')&&!dropEl.classList.contains('nested-repeat')){
    handleDrop(dropEl.dataset.path,td.type,td.srcPath);
  } else if(td.srcPath){
    renderSlot(removeVal(td.srcPath));
  }
}
document.addEventListener('touchmove',function(e){if(!touchDrag)return;e.preventDefault();moveClone(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.addEventListener('touchend',function(e){if(!touchDrag)return;e.preventDefault();endTouch(e.changedTouches[0]);},{passive:false});
document.addEventListener('touchcancel',function(){if(touchDrag){touchDrag.clone.remove();touchDrag=null;}});

/* ---------- 编译与绘制 ---------- */
function compileList(list){
  var cmds=[],MAX=600;
  (function pushBody(body){
    (body||[]).forEach(function(item){
      if(!item||cmds.length>=MAX)return;
      if(item.type==='repeat'){
        var n=Math.max(1,Math.min(item.count||2,20));
        for(var k=0;k<n&&cmds.length<MAX;k++)pushBody(item.body);
      } else cmds.push({type:item.type,value:item.value});
    });
  })(list);
  return cmds;
}
function traceSegments(cmds){
  var segs=[],st={x:150,y:150,heading:0};
  cmds.forEach(function(cmd){
    if(cmd.type==='move'){
      var rad=st.heading*Math.PI/180;
      var nx=st.x+Math.sin(rad)*cmd.value,ny=st.y-Math.cos(rad)*cmd.value;
      segs.push({x1:st.x,y1:st.y,x2:nx,y2:ny});
      st.x=nx;st.y=ny;
    } else if(cmd.type==='right')st.heading+=cmd.value;
    else if(cmd.type==='left')st.heading-=cmd.value;
  });
  return segs;
}
function segClose(a,b,tol){
  function d(x1,y1,x2,y2){return Math.hypot(x1-x2,y1-y2);}
  return (d(a.x1,a.y1,b.x1,b.y1)<=tol&&d(a.x2,a.y2,b.x2,b.y2)<=tol)
       ||(d(a.x1,a.y1,b.x2,b.y2)<=tol&&d(a.x2,a.y2,b.x1,b.y1)<=tol);
}
function patternMatches(playerSegs,targetSegs){
  if(!playerSegs.length)return false;
  var used=[];
  var allTargetCovered=targetSegs.every(function(t){
    for(var i=0;i<playerSegs.length;i++){
      if(segClose(playerSegs[i],t,MATCH_TOL)){used[i]=true;return true;}
    }
    return false;
  });
  if(!allTargetCovered)return false;
  // 玩家不能有目标之外的"多余线条"（重复描线可以）
  return playerSegs.every(function(p,i){
    if(used[i])return true;
    return targetSegs.some(function(t){return segClose(p,t,MATCH_TOL);});
  });
}

function setupCanvas(){
  var shell=document.getElementById('canvas-shell');
  var size=Math.max(shell.clientWidth-20,60);
  var canvas=document.getElementById('turtle-canvas');
  var dpr=window.devicePixelRatio||1;
  canvas.width=size*dpr;canvas.height=size*dpr;
  ctx=canvas.getContext('2d');
  scaleFactor=(size*dpr)/LOGICAL;
  ctx.setTransform(scaleFactor,0,0,scaleFactor,0,0);
  redraw();
}
function clearCanvas(){
  var c=document.getElementById('turtle-canvas');
  ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,c.width,c.height);ctx.restore();
}
var segments=[],ghostSegs=[],curState={x:150,y:150,heading:0};
function drawSegs(list,color,alpha){
  ctx.save();ctx.globalAlpha=alpha==null?1:alpha;
  ctx.strokeStyle=color;ctx.lineWidth=3;ctx.lineCap='round';
  list.forEach(function(s){ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();});
  ctx.restore();
}
function drawMarker(x,y,heading){
  ctx.save();ctx.translate(x,y);ctx.rotate(heading*Math.PI/180);
  ctx.fillStyle=cssVar('--ink');
  ctx.beginPath();ctx.moveTo(0,-9);ctx.lineTo(6,7);ctx.lineTo(-6,7);ctx.closePath();ctx.fill();
  ctx.restore();
}
function redraw(){
  if(!ctx)return;
  clearCanvas();
  drawSegs(ghostSegs,cssVar('--ink-mute'),0.35);
  drawSegs(segments,cssVar('--coral'),1);
  drawMarker(curState.x,curState.y,curState.heading);
}
function resetTurtle(){segments=[];curState={x:150,y:150,heading:0};redraw();}

async function runProgram(){
  if(running||over)return;running=true;
  CodeLab.hideResult();
  resetTurtle();await CodeLab.wait(100);
  var cmds=compileList(slots);
  for(var i=0;i<cmds.length;i++){
    var cmd=cmds[i];
    if(cmd.type==='move'){
      var rad=curState.heading*Math.PI/180;
      var nx=curState.x+Math.sin(rad)*cmd.value,ny=curState.y-Math.cos(rad)*cmd.value;
      segments.push({x1:curState.x,y1:curState.y,x2:nx,y2:ny});
      curState.x=nx;curState.y=ny;
    } else if(cmd.type==='right')curState.heading+=cmd.value;
    else if(cmd.type==='left')curState.heading-=cmd.value;
    redraw();
    await CodeLab.wait(cmds.length>40?18:45);
  }
  runsLeft--;
  CodeLab.renderHearts(RUNS,runsLeft);
  if(patternMatches(segments,ghostSegs)){
    over=true;
    var used=RUNS-runsLeft;
    var stars=used<=1?3:(used<=3?2:1);
    CodeLab.saveStars(GAME_ID,levelIndex,stars);
    CodeLab.renderStarsHud(stars);
    document.getElementById('next-btn').classList.add('show');
    if(levelIndex===levels.length-1)CodeLab.markDone(GAME_ID);
    CodeLab.showResult('success','和目标图案完全重合！'+CodeLab.starHTML(stars),
      levelIndex<levels.length-1?'下一关':'再玩一次',nextLevel);
  } else if(runsLeft<=0){
    over=true;
    CodeLab.showResult('fail','机会用完了…参考做法：'+levels[levelIndex].hints[levels[levelIndex].hints.length-1],
      '重开本关',function(){loadLevel(levelIndex);});
  } else {
    CodeLab.showResult('retry','和灰色目标还没对上（还剩 '+runsLeft+' 次）。对照目标调调数字？','知道了',CodeLab.hideResult);
  }
  running=false;
  updateBudget();
}
function nextLevel(){loadLevel(levelIndex<levels.length-1?levelIndex+1:0);}

function showHint(){
  var hints=levels[levelIndex].hints;
  if(hintUsed>=hints.length)return;
  document.getElementById('level-hint').textContent='💡 '+hints[hintUsed];
  hintUsed++;
  if(hintUsed>=hints.length)document.getElementById('hint-btn').disabled=true;
}
function loadLevel(index){
  levelIndex=index;
  var lv=levels[index];
  CodeLab.setLevel(index,levels.length,lv.title,lv.hint);
  runsLeft=RUNS;over=false;hintUsed=0;
  slots=Array(SLOTS).fill(null);renderSlots();
  ghostSegs=traceSegments(compileList(lv.recipe));
  document.getElementById('hud-msg').textContent='预算 '+lv.budget+' 块';
  document.getElementById('hint-btn').disabled=false;
  document.getElementById('next-btn').classList.remove('show');
  CodeLab.renderHearts(RUNS,runsLeft);
  CodeLab.renderStarsHud(0);
  CodeLab.hideResult();
  resetTurtle();
}
document.getElementById('clear-btn').onclick=function(){if(running||over)return;slots=Array(SLOTS).fill(null);renderSlots();resetTurtle();CodeLab.hideResult();};
document.getElementById('hint-btn').onclick=showHint;
document.getElementById('run-btn').onclick=runProgram;
document.getElementById('next-btn').onclick=nextLevel;
window.addEventListener('resize',setupCanvas);
CodeLab.initMember();bindBlocks();bindProgram();setupCanvas();loadLevel(0);
</script>
</body>
</html>
