<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>声波探索 · 游戏</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="physics-playground.css">
</head>
<body>
<main class="physics-page">
  <nav class="physics-nav"><a class="physics-back" href="index.html">← 游戏库</a><button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button></nav>
  <header class="physics-hero"><div id="emoji" class="physics-emoji"></div><div><h1 id="title"></h1><p id="sub" class="physics-sub"></p></div></header>
  <div class="physics-status"><span id="score" class="physics-pill"></span><span id="badge" class="physics-pill"></span><span id="live" class="physics-pill"></span></div>
  <section class="physics-stage"><canvas id="physics-canvas" width="720" height="360"></canvas><div id="message" class="physics-message"></div></section>
  <section class="physics-grid"><div id="controls" class="physics-controls"></div><aside class="physics-brief"><h2 id="concept"></h2><p id="mission"></p><ul id="learn"></ul></aside></section>
</main>
<script src="../fo-utils.js"></script>
<script>
window.PHYSICS_GAME = {
  id:'g36-physics-sound', type:'sound', emoji:'🔊', title:'声波探索',
  sub:'调整频率、振幅和噪声，让接收器读到清晰声音。',
  concept:'频率和振幅', mission:'目标：制造一个高频、足够响、低噪声的清晰波形。',
  prompt:'波形会实时动起来。频率影响疏密，振幅影响高低。',
  success:'接收器识别成功！你做出了清晰的声波。',
  tryAgain:'声音还不够清晰。提高振幅、降低噪声，频率也要足够高。',
  learn:['频率越高，声音越尖。','振幅越大，声音越响。','噪声会干扰接收器识别规律波形。'],
  controls:[
    {id:'frequency',label:'频率',min:160,max:680,value:320,unit:'Hz'},
    {id:'amplitude',label:'振幅',min:10,max:80,value:35,unit:''},
    {id:'noise',label:'噪声',min:0,max:80,value:45,unit:''}
  ]
};
</script>
<script src="physics-playground.js"></script>
</body>
</html>
