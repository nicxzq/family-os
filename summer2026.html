<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,noai,noimageai">
<title>快乐暑假 2026 · 打卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/fo-supabase.js"></script>
<style>
:root{
  /* 语义色 → 复用全站调色板 */
  --sp-brand:var(--blue); --sp-brand-soft:var(--blue-soft);
  --sp-done:var(--green); --sp-done-soft:var(--green-soft);
  --sp-late:var(--coral); --sp-late-soft:var(--coral-soft);
  --sp-travel:var(--yellow); --sp-travel-soft:var(--yellow-soft);
  --sp-line:var(--cream-deep);
}
body{
  background:var(--cream); color:var(--ink);
  font-size:var(--font-size-body); line-height:1.5;
}
.wrap{max-width:var(--size-content-medium);margin:0 auto;padding:var(--space-xl) var(--space-2xl) var(--space-page-bottom-lg)}
header.top{
  max-width:var(--size-content-medium);margin:0 auto;padding:var(--space-2xl) var(--space-2xl) var(--space-xs);
  display:flex;align-items:center;justify-content:space-between;gap:var(--space-md);flex-wrap:wrap;
}
.brand{font-weight:700;font-size:var(--font-size-title);letter-spacing:.5px}
.brand small{display:block;font-weight:500;font-size:var(--font-size-caption);color:var(--ink-mute);letter-spacing:1px}
.top-right{display:flex;align-items:center;gap:var(--space-md)}
.back{
  display:inline-flex;align-items:center;gap:var(--space-sm);text-decoration:none;
  color:var(--ink-soft);background:var(--paper);border-radius:var(--radius-full);
  padding:var(--space-sm) var(--space-2xl);font-size:var(--font-size-ui);box-shadow:var(--shadow-soft);
}
.sync{
  font-size:var(--font-size-caption);color:var(--ink-mute);background:var(--paper);
  border-radius:var(--radius-full);padding:var(--space-xs) var(--space-tag-x);box-shadow:var(--shadow-soft);
  display:inline-flex;align-items:center;gap:var(--space-sm);white-space:nowrap;cursor:pointer;
}
.sync .dot{width:var(--size-dot);height:var(--size-dot);border-radius:var(--radius-circle);background:var(--ink-mute)}
.sync.ok .dot{background:var(--sp-done)}
.sync.syncing .dot{background:var(--sp-brand)}
.sync.err .dot{background:var(--sp-late)}

.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:20;
  background:var(--glass-nav);backdrop-filter:blur(8px);
  border-top:var(--size-hairline) solid var(--sp-line);
  display:flex;justify-content:space-around;
  padding:var(--space-sm) var(--space-md) calc(var(--space-sm) + env(safe-area-inset-bottom));
}
.tabs button{
  flex:1;max-width:140px;border:0;background:none;color:var(--ink-mute);
  font-size:var(--font-size-caption);padding:var(--space-sm) 0 var(--space-xs);border-radius:var(--radius-card-inner);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:var(--space-2xs);font-family:inherit;
}
.tabs button .ico{font-size:var(--font-size-title);line-height:1}
.tabs button.on{color:var(--sp-brand);font-weight:700;background:var(--sp-brand-soft)}
.card{background:var(--paper);border-radius:var(--radius);padding:var(--space-2xl) var(--space-3xl);margin:var(--space-xl) 0;box-shadow:var(--shadow-card)}

/* ---- day banner ---- */
.banner{
  border-radius:var(--radius);padding:var(--space-3xl) var(--space-4xl);margin:var(--space-lg) 0 var(--space-2xl);color:var(--paper);
  background:linear-gradient(115deg,var(--coral) 0%,var(--coral-soft) 45%,var(--yellow) 130%);
  display:flex;align-items:center;justify-content:space-between;gap:var(--space-xl);
  box-shadow:var(--shadow-card);
}
.banner .d1{font-size:var(--font-size-hero-sm);font-weight:700}
.banner .d2{font-size:var(--font-size-note);opacity:.95;margin-top:var(--space-2xs)}
.badge{display:inline-block;font-size:var(--font-size-caption);font-weight:700;background:var(--paper-translucent);padding:var(--space-2xs) var(--space-lg);border-radius:var(--radius-full);margin-top:var(--space-sm)}
.ring{position:relative;width:74px;height:74px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:var(--font-size-body)}
.ring .pct small{font-size:var(--font-size-xs);font-weight:500;opacity:.9}
.daynav{display:flex;align-items:center;justify-content:space-between;gap:var(--space-md);margin-top:var(--space-md)}
.daynav button{
  border:var(--size-hairline) solid var(--sp-line);background:var(--paper);border-radius:var(--radius-card-inner);padding:var(--space-md) var(--space-2xl);
  font-size:var(--font-size-ui);color:var(--ink);cursor:pointer;font-family:inherit;
}
.daynav button:disabled{opacity:.4;cursor:default}
.daynav .today-btn{color:var(--sp-brand);font-weight:700}

/* ---- task list ---- */
.slot-title{font-size:var(--font-size-note);font-weight:700;color:var(--ink-mute);margin:var(--space-3xl) var(--space-xs) var(--space-sm);letter-spacing:1px}
.task{
  display:flex;align-items:center;gap:var(--space-xl);background:var(--paper);
  border:var(--size-hairline) solid var(--sp-line);border-radius:var(--radius-card-inner);padding:var(--space-xl);margin:var(--space-md) 0;
  cursor:pointer;user-select:none;transition:background var(--duration-fast);
}
.task:active{background:var(--sp-brand-soft)}
.task .box{
  width:var(--size-timeline-marker);height:var(--size-timeline-marker);flex:none;border-radius:var(--radius-circle);
  border:var(--size-border) solid var(--ink-mute);display:flex;align-items:center;justify-content:center;
  font-size:var(--font-size-body);color:var(--paper);background:var(--paper);
}
.task .tx{flex:1;min-width:0}
.task .nm{font-size:var(--font-size-body);font-weight:500}
.task .tm{font-size:var(--font-size-caption);color:var(--ink-mute);margin-top:1px}
.task .ops{display:flex;gap:var(--space-2xs);flex:none}
.task .ops button{border:0;background:none;color:var(--ink-mute);font-size:var(--font-size-body-sm);padding:var(--space-sm);cursor:pointer;font-family:inherit}
.task.opt .nm{font-weight:400}
.task.opt .box{border-style:dashed}
.task.done{background:var(--sp-done-soft);border-color:var(--sp-done)}
.task.done .box{background:var(--sp-done);border-color:var(--sp-done)}
.task.done .nm{text-decoration:line-through;color:var(--ink-soft)}
.task.late{background:var(--sp-late-soft);border-color:var(--sp-late)}
.task.late .nm{color:var(--sp-late)}
.task.late .box{border-color:var(--sp-late)}
.late-tag{font-size:var(--font-size-sm);color:var(--sp-late);font-weight:700;margin-left:var(--space-sm)}
.addbtn{
  width:100%;border:1.5px dashed var(--ink-mute);background:none;border-radius:var(--radius-card-inner);
  padding:var(--space-tag-x);color:var(--ink-mute);font-size:var(--font-size-ui);cursor:pointer;margin-top:var(--space-2xl);font-family:inherit;
}
.toast{
  position:fixed;left:50%;bottom:88px;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);padding:var(--space-lg) var(--space-4xl);border-radius:var(--radius-full);
  font-size:var(--font-size-ui);font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;
  white-space:nowrap;
}
.toast.show{opacity:.96}

/* ---- calendar ---- */
.cal-month{margin:var(--space-2xl) 0 var(--space-xs);font-weight:700;font-size:var(--font-size-body)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:var(--space-sm)}
.cal .hd{text-align:center;font-size:var(--font-size-caption);color:var(--ink-mute);padding:var(--space-2xs) 0}
.cell{
  aspect-ratio:1;border-radius:var(--radius-card-inner);background:var(--paper);border:var(--size-hairline) solid var(--sp-line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--space-2xs);
  font-size:var(--font-size-ui);font-weight:500;cursor:pointer;position:relative;
}
.cell.blank{background:none;border:none;cursor:default}
.cell.future{color:var(--ink-mute)}
.cell.ok{background:var(--sp-done-soft);border-color:var(--sp-done);color:var(--ink-soft)}
.cell.bad{background:var(--sp-late-soft);border-color:var(--sp-late);color:var(--sp-late)}
.cell.trav{background:var(--sp-travel-soft);border-color:var(--sp-travel);color:var(--ink-soft)}
.cell.today{outline:2.5px solid var(--sp-brand);outline-offset:1px}
.cell .mini{font-size:var(--font-size-sm)}
.legend{display:flex;flex-wrap:wrap;gap:var(--space-xl);font-size:var(--font-size-caption);color:var(--ink-mute);margin-top:var(--space-xl)}
.legend i{display:inline-block;width:var(--size-status-dot);height:var(--size-status-dot);border-radius:var(--radius-circle);margin-right:var(--space-xs);vertical-align:baseline}

/* ---- review ---- */
.wk{margin:var(--space-2xl) 0}
.wk h3{margin:0 0 var(--space-sm);font-size:var(--font-size-body-sm)}
.bar{height:var(--size-status-dot);border-radius:var(--radius-full);background:var(--sp-brand-soft);overflow:hidden;margin:var(--space-md) 0}
.bar i{display:block;height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--sp-brand),var(--sp-done))}
.wk .stat{font-size:var(--font-size-note);color:var(--ink-mute)}
.missing{font-size:var(--font-size-note);color:var(--sp-late);margin-top:var(--space-sm);line-height:1.7}
.wk textarea{
  width:100%;border:var(--size-hairline) solid var(--sp-line);border-radius:var(--radius-card-inner);padding:var(--space-lg);margin-top:var(--space-lg);
  font-family:inherit;font-size:var(--font-size-ui);min-height:52px;resize:vertical;color:var(--ink);background:var(--cream);
}
.cheer{font-size:var(--font-size-note);font-weight:700;margin-top:var(--space-sm)}

/* ---- settings ---- */
.set-row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-lg);padding:var(--space-lg) 0;border-bottom:var(--size-hairline) solid var(--sp-line);flex-wrap:wrap}
.set-row:last-child{border-bottom:0}
.set-row label{font-size:var(--font-size-body-sm);font-weight:500}
.set-row .hint{display:block;font-size:var(--font-size-caption);color:var(--ink-mute);font-weight:400;margin-top:var(--space-2xs)}
.set-row input[type=date],.set-row input[type=number]{
  border:var(--size-hairline) solid var(--sp-line);border-radius:var(--radius-md);padding:var(--space-md) var(--space-lg);font-size:var(--font-size-body-sm);font-family:inherit;color:var(--ink);background:var(--paper);
}
.set-row input[type=number]{width:72px;text-align:center}
.btn{
  border:0;border-radius:var(--radius-card-inner);padding:var(--space-lg) var(--space-3xl);font-size:var(--font-size-ui);font-weight:700;cursor:pointer;font-family:inherit;
}
.btn.pri{background:var(--sp-brand);color:var(--paper)}
.btn.ghost{background:var(--sp-brand-soft);color:var(--sp-brand)}
.btn.danger{background:var(--sp-late-soft);color:var(--sp-late)}
.note{font-size:var(--font-size-note);color:var(--ink-soft);line-height:1.7}
h2.sec{font-size:var(--font-size-body);margin:var(--space-xs) 0 var(--space-sm)}
.login-cta{background:var(--sp-travel-soft);border-radius:var(--radius);padding:var(--space-2xl) var(--space-3xl);margin:var(--space-xl) 0;font-size:var(--font-size-note);line-height:1.7}
.login-cta a{color:var(--sp-brand);font-weight:700;text-decoration:none}

/* ---- 跑马灯 ---- */
.marquee{
  display:flex;align-items:center;gap:var(--space-md);
  background:var(--sp-travel-soft);border-radius:var(--radius-full);
  padding:var(--space-md) var(--space-3xl);margin:var(--space-lg) 0 var(--space-2xl);
  overflow:hidden;position:relative;cursor:pointer;
  font-size:var(--font-size-note);color:var(--ink-soft);
}
.marquee .mq-ico{flex:none}
.marquee .mq-vp{flex:1;overflow:hidden;white-space:nowrap}
.marquee .mq-in{display:inline-block;padding-left:100%;animation:mq 20s linear infinite}
.marquee:active .mq-in{animation-play-state:paused}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-100%)}}

/* ---- 打勾特效 ---- */
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.4)}70%{transform:scale(.88)}100%{transform:scale(1)}}
.task .box.pop{animation:pop .45s ease}
#fx{position:fixed;inset:0;pointer-events:none;z-index:60}

/* ---- 点评卡片 ---- */
.eval{background:var(--paper);border-radius:var(--radius);padding:var(--space-2xl) var(--space-3xl);margin:var(--space-2xl) 0 0;box-shadow:var(--shadow-card);border-left:var(--size-border-card) solid var(--sp-brand)}
.eval h3{font-size:var(--font-size-body-sm);margin-bottom:var(--space-sm);display:flex;align-items:center;gap:var(--space-sm)}
.eval .txt{font-size:var(--font-size-note);color:var(--ink-soft);line-height:1.8;white-space:pre-wrap}
.eval .ai-btn{margin-top:var(--space-lg);border:0;background:var(--sp-brand-soft);color:var(--sp-brand);border-radius:var(--radius-full);padding:var(--space-sm) var(--space-3xl);font-size:var(--font-size-caption);font-weight:700;cursor:pointer;font-family:inherit}
.eval .ai-btn:disabled{opacity:.5;cursor:default}

/* ---- 日历标记 ---- */
.cell .marks{display:flex;gap:var(--space-2xs);justify-content:center;flex-wrap:nowrap;line-height:1;min-height:var(--font-size-sm)}
.cell .marks span{font-size:var(--font-size-xs)}
.cell .marks span.pend{opacity:.35;filter:grayscale(1)}
.cell .chk{position:absolute;top:var(--space-2xs);right:var(--space-2xs);font-size:var(--font-size-sm);color:var(--sp-done);font-weight:700}
.cell.bad.gentle{background:var(--paper);border-color:var(--sp-line);color:var(--ink)}
.cell.bad.gentle .miss{position:absolute;bottom:var(--space-2xs);right:var(--space-2xs);font-size:var(--font-size-xs);color:var(--sp-travel)}

/* ---- 开关(原生 checkbox) ---- */
.tgl{display:inline-flex;align-items:center;gap:var(--space-md);font-size:var(--font-size-ui);cursor:pointer}
.tgl input{width:var(--space-5xl);height:var(--space-5xl);accent-color:var(--sp-done);cursor:pointer}

/* ---- LLM 设置输入 ---- */
.set-col{display:flex;flex-direction:column;gap:var(--space-sm);padding:var(--space-lg) 0;border-bottom:var(--size-hairline) solid var(--sp-line)}
.set-col label{font-size:var(--font-size-body-sm);font-weight:500}
.set-col .hint{font-size:var(--font-size-caption);color:var(--ink-mute);font-weight:400}
.set-col input{
  border:var(--size-hairline) solid var(--sp-line);border-radius:var(--radius-md);padding:var(--space-md) var(--space-lg);
  font-size:var(--font-size-ui);font-family:inherit;color:var(--ink);background:var(--paper);width:100%;
}
</style>
</head>
<body>
<header class="top">
  <div class="brand">🌞 快乐暑假 2026<small>7 月 14 日 — 8 月 30 日 · 五升六</small></div>
  <div class="top-right">
    <span class="sync" id="sync" onclick="go('set')"><span class="dot"></span><span id="sync-t">本地</span></span>
    <a class="back" href="/for-eldest">← 哥哥主页</a>
  </div>
</header>
<div class="wrap" id="app"></div>
<nav class="tabs" id="tabs"></nav>
<div class="toast" id="toast"></div>
<canvas id="fx"></canvas>

<script>
/* ================= 基础 ================= */
const START='2026-07-14', END='2026-08-30', KEY='summer2026-v1';

function p(s){const a=s.split('-');return new Date(+a[0],+a[1]-1,+a[2]);}
function f(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addD(s,n){const d=p(s);d.setDate(d.getDate()+n);return f(d);}
function clamp(s){return s<START?START:(s>END?END:s);}
const WK=['日','一','二','三','四','五','六'];
function cn(s){const d=p(s);return (d.getMonth()+1)+' 月 '+d.getDate()+' 日 · 周'+WK[d.getDay()];}
const todayReal=f(new Date());

/* ---- 状态:只存差异,任务由规则生成 ---- */
let S;
function defaults(){return {cfg:{kuaile:2,yuedu:2,gentle:true},travel:{start:'',end:''},done:{},removed:{},added:{},renamed:{},comments:{},evals:{},weekEvals:{},view:'day',sel:clamp(todayReal)};}
function load(){
  try{const raw=localStorage.getItem(KEY);if(!raw)return null;
    const s=JSON.parse(raw);return Object.assign(defaults(),s);}catch(e){return null;}
}
function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
S=load()||defaults();
S.sel=clamp(S.sel||todayReal);

/* ---- 云同步(可选):登录后自动同步,未登录纯本地 ---- */
let _cloudOK=false,_pushT=null;
function setSync(state){
  const el=document.getElementById('sync');if(!el)return;
  const t=document.getElementById('sync-t');
  el.className='sync '+state;
  t.textContent={ok:'云端同步',syncing:'同步中…',err:'同步失败',local:'本地'}[state]||'本地';
}
function save(){saveLocal();pushCloud();}
function pushCloud(){
  if(!_cloudOK)return;
  clearTimeout(_pushT);setSync('syncing');
  _pushT=setTimeout(async()=>{
    try{await FO_DB.saveSummerPlan(S);setSync('ok');}catch(e){setSync('err');}
  },800);
}
async function cloudInit(){
  if(typeof FO_DB==='undefined'||!FO_DB.isConfigured())return;
  let session=null;try{session=await FO_DB.getSession();}catch(e){}
  if(!session){setSync('local');return;}
  _cloudOK=true;setSync('syncing');
  try{
    const remote=await FO_DB.getSummerPlan();
    if(remote&&remote.done){S=Object.assign(defaults(),remote);S.sel=clamp(S.sel||todayReal);saveLocal();render();}
    else{await FO_DB.saveSummerPlan(S);}
    setSync('ok');
  }catch(e){setSync('err');}
}

function isTravel(d){return S.travel.start&&S.travel.end&&d>=S.travel.start&&d<=S.travel.end;}

/* ================= LLM(OpenAI 兼容,存本地不上云) ================= */
const LLM_KEY='summer2026-llm';
function llmCfg(){
  try{return Object.assign({baseURL:'https://api.openai.com/v1',key:'',model:'gpt-4o-mini'},JSON.parse(localStorage.getItem(LLM_KEY)||'{}'));}
  catch(e){return {baseURL:'https://api.openai.com/v1',key:'',model:'gpt-4o-mini'};}
}
function saveLLM(c){localStorage.setItem(LLM_KEY,JSON.stringify(c));}
function llmReady(){return !!llmCfg().key;}
async function llm(sys,user){
  const c=llmCfg();
  if(!c.key)throw new Error('未配置 API');
  const res=await fetch(c.baseURL.replace(/\/+$/,'')+'/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+c.key},
    body:JSON.stringify({model:c.model,temperature:0.7,max_tokens:260,
      messages:[{role:'system',content:sys},{role:'user',content:user}]})
  });
  if(!res.ok)throw new Error('HTTP '+res.status+'（可能是 Key 错误或接口不支持浏览器跨域）');
  const j=await res.json();
  const t=j&&j.choices&&j.choices[0]&&j.choices[0].message&&j.choices[0].message.content;
  if(!t)throw new Error('返回为空');
  return t.trim();
}

/* ================= 撒花特效 ================= */
const fx=document.getElementById('fx');const fxc=fx.getContext('2d');
let fxP=[],fxRAF=0;
function fxResize(){fx.width=innerWidth;fx.height=innerHeight;}
addEventListener('resize',fxResize);fxResize();
function cssv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
const CONF=['--coral','--yellow','--green','--blue','--coral-soft'].map(cssv);
function burst(x,y,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=3+Math.random()*7;
    fxP.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,g:.18+Math.random()*.12,
      s:4+Math.random()*5,c:CONF[i%CONF.length],life:60+Math.random()*30,rot:Math.random()*6.28,vr:(Math.random()-.5)*.4});
  }
  if(!fxRAF)fxTick();
}
function fxTick(){
  fxc.clearRect(0,0,fx.width,fx.height);
  fxP=fxP.filter(p=>p.life>0);
  fxP.forEach(p=>{
    p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life--;
    fxc.save();fxc.translate(p.x,p.y);fxc.rotate(p.rot);fxc.globalAlpha=Math.min(1,p.life/25);
    fxc.fillStyle=p.c;fxc.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);fxc.restore();
  });
  if(fxP.length)fxRAF=requestAnimationFrame(fxTick);else{fxRAF=0;fxc.clearRect(0,0,fx.width,fx.height);}
}
function celebrate(big){

/* ================= 点评(规则兜底 + AI) ================= */
function dayFacts(d){
  const ts=genTasks(d);
  const req=ts.filter(x=>x.req),opt=ts.filter(x=>!x.req);
  const doneReq=req.filter(x=>isDone(d,x.id)),missReq=req.filter(x=>!isDone(d,x.id));
  const doneOpt=opt.filter(x=>isDone(d,x.id));
  return {req,opt,doneReq,missReq,doneOpt,pct:req.length?Math.round(doneReq.length/req.length*100):100};
}
function evalRule(d){
  const F=dayFacts(d);
  if(F.req.length===0)return '今天是轻松日，读读书、玩一玩就很好。';
  const miss=F.missReq.map(x=>x.name.replace(/\(.*?\)/g,'')).slice(0,2).join('、');
  if(F.pct===100)return '满分！必做的每一件都完成了。'+(F.doneOpt.length?'还额外做了自己喜欢的事，这种主动特别棒。':'把这种稳稳的感觉记住。');
  if(F.pct>=80)return '完成得很不错（'+F.pct+'%）。就差“'+miss+'”了，睡前顺手补上，今天就圆满了。';
  if(F.pct>=50)return '做到了一多半（'+F.pct+'%），已经不容易。挑“'+miss+'”里最快的一件先补，别贪多。';
  return '今天节奏有点慢（'+F.pct+'%），没关系。只挑一件最重要的“'+(F.missReq[0]?F.missReq[0].name.replace(/\(.*?\)/g,''):'')+'”完成，就算赢。';
}
async function aiEvalDay(d){
  const F=dayFacts(d);
  const sys='你是一位温暖、真诚、不说教的家长教练，对象是一个 11 岁男孩(五升六)。用中文，2-3 句，语气平等、具体、中肯：先肯定他做到的，再温和提一句没做到的(若有)，最后给一句明天可执行的小建议。不要堆叠感叹号，不要空泛套话。';
  const usr='日期 '+cn(d)+'。必做完成 '+F.doneReq.length+'/'+F.req.length+'（'+F.pct+'%）。\n已完成：'+(F.doneReq.map(x=>x.name).join('、')||'无')+'。\n未完成：'+(F.missReq.map(x=>x.name).join('、')||'无')+'。\n额外完成的自选项：'+(F.doneOpt.map(x=>x.name).join('、')||'无')+'。';
  const t=await llm(sys,usr);
  S.evals[d]=t;save();
  return t;
}

function reqStat(d){

}

let _streak=0,_streakDay=null;
function tg(id){
  const d=S.sel;
  S.done[d]=S.done[d]||{};
  const now=!S.done[d][id];
  S.done[d][id]=now;
  if(!now)delete S.done[d][id];
  const st=reqStat(d);
  render();save();
  if(now){
    const box=document.querySelector('.task[data-id="'+id+'"] .box');
    if(box){box.classList.add('pop');const r=box.getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2,16);}
    if(_streakDay!==d){_streak=0;_streakDay=d;}
    _streak++;
    if(st.total&&st.done===st.total){celebrate(true);toast('🎉 今天必做全部完成，太棒了！');}
    else if(_streak%3===0){celebrate(true);toast('🔥 连续完成 '+_streak+' 项，手感正热！');}
  }else{_streak=0;}
}
function rn(id){
  const d=S.sel;
  const cur=genTasks(d).find(x=>x.id===id);if(!cur)return;
  const v=prompt('修改任务名称:',cur.name);
  if(v===null)return;
  const add=(S.added[d]||[]).find(x=>x.id===id);
  if(add)add.name=v.trim()||add.name;
  else{S.renamed[d]=S.renamed[d]||{};S.renamed[d][id]=v.trim()||cur.name;}
  render();save();
}
function rmv(id){
  const d=S.sel;
  if(!confirm('把这一项从这一天删掉?'))return;
  if((S.added[d]||[]).some(x=>x.id===id)){
    S.added[d]=S.added[d].filter(x=>x.id!==id);
  }else{
    S.removed[d]=S.removed[d]||[];
    if(S.removed[d].indexOf(id)<0)S.removed[d].push(id);
  }
  if(S.done[d])delete S.done[d][id];
  render();save();
}
function addTask(){
  const d=S.sel;

function renderRev(){
  let h='<div class="card"><h2 class="sec">每周回顾</h2><div class="note">建议每周日晚一起翻一眼:看完成率,不做批评,写一句鼓励。</div></div>';
  const weeks={};
  for(let d=START;d<=END;d=addD(d,1)){
    const w=weekStart(d);(weeks[w]=weeks[w]||[]).push(d);
  }
  let idx=0;
  Object.keys(weeks).sort().forEach(w=>{
    idx++;
    const days=weeks[w].filter(d=>d<=todayReal);
    const range=cn(weeks[w][0]).split(' · ')[0]+' — '+cn(weeks[w][weeks[w].length-1]).split(' · ')[0];
    if(!days.length){
      h+='<div class="card wk"><h3>第 '+idx+' 周 · '+range+'</h3><div class="stat">还没开始</div></div>';
      return;
    }
    let tot=0,dn=0,miss=[];
    days.forEach(d=>{
      genTasks(d).filter(x=>x.req).forEach(x=>{
        tot++;

        else if(d<todayReal)miss.push(cn(d).split(' · ')[0]+' '+x.name);

    const pct=tot?Math.round(dn/tot*100):100;
    const cheer=pct>=85?'🌟 这一周非常稳,保持!':pct>=60?'💪 大部分都做到了,红色的挑 1-2 件补上就好':'🍉 别灰心,下周先保住每天 4 件必做';
    h+='<div class="card wk"><h3>第 '+idx+' 周 · '+range+'</h3>'
      +'<div class="bar"><i style="width:'+pct+'%"></i></div>'
      +'<div class="stat">必做完成 '+dn+' / '+tot+' 项('+pct+'%)</div>'
      +(miss.length?'<div class="missing">'+miss.slice(0,8).map(esc).join('<br>')+(miss.length>8?'<br>… 还有 '+(miss.length-8)+' 项':'')+'</div>':'')

  app.innerHTML=h;

      +'<span class="note">不登录也能正常用，只是记录只存在当前这台设备上。</span></div>';
  }
  h+='<div class="card"><h2 class="sec">✈️ 旅行模式</h2>'
    +'<div class="note">设定日期后,这段时间每天只剩「读猫武士」一件事。</div>'
    +'<div class="set-row"><label>出发日</label><input type="date" id="ts" min="'+START+'" max="'+END+'" value="'+S.travel.start+'"></div>'
    +'<div class="set-row"><label>返程日</label><input type="date" id="te" min="'+START+'" max="'+END+'" value="'+S.travel.end+'"></div>'
    +'<div class="set-row"><button class="btn pri" onclick="setTravel()">保存旅行日期</button>'
    +'<button class="btn ghost" onclick="clearTravel()">取消旅行模式</button></div></div>';

  h+='<div class="card"><h2 class="sec">📏 每日任务量</h2>'
    +'<div class="set-row"><label>《快乐暑假》<span class="hint">页 / 天(约 70 页,2 页可在暑假内做完)</span></label>'
    +'<input type="number" min="1" max="6" value="'+S.cfg.kuaile+'" onchange="qty(\'kuaile\',this.value)"></div>'
    +'<div class="set-row"><label>英语阅读训练<span class="hint">篇 / 天(2 篇约完成 60-70 篇)</span></label>'
    +'<input type="number" min="1" max="4" value="'+S.cfg.yuedu+'" onchange="qty(\'yuedu\',this.value)"></div></div>';

  h+='<div class="card"><h2 class="sec">💾 数据备份 / 换设备</h2>'
    +'<div class="note">'+(_cloudOK?'已登录,打卡会自动同步到云端,换设备登录同一账号即可看到。下面的导出仅作额外备份用。':'未登录时打卡只存本机浏览器。可以导出一个文件 → 在另一台设备导入。')+'</div>'
    +'<div class="set-row" style="border:0;padding-top:var(--space-xl)">'
    +'<button class="btn pri" onclick="expo()">导出备份文件</button>'
    +'<button class="btn ghost" onclick="document.getElementById(\'imp\').click()">导入备份文件</button>'
    +'<input type="file" id="imp" accept=".json" style="display:none" onchange="impo(this)"></div></div>';

  h+='<div class="card"><h2 class="sec">🧹 其他</h2>'
    +'<div class="set-row"><label>清空全部记录<span class="hint">删除所有打卡和修改,恢复初始计划</span></label>'
    +'<button class="btn danger" onclick="wipe()">清空</button></div></div>';

  h+='<div class="card"><h2 class="sec">📌 怎么用</h2><div class="note">'
    +'1. 每天做完一件,自己点一下打勾;过了当天还没勾的会变红,红了不用补罚,补做勾上就行。<br>'
    +'2. 任务点 ✎ 可以改名字,点 ✕ 删除,底部按钮可以临时加任务。<br>'
    +'3. 虚线圈的是自选项,不做不标红。周六晚的 Switch 是固定权利,不和完成情况挂钩。<br>'
    +'4. 登录后,家里电脑和平板会自动同步,不用手动搬运。</div></div>';
  app.innerHTML=h;
}
function setTravel(){
  const a=document.getElementById('ts').value,b=document.getElementById('te').value;
  if(!a||!b||a>b){alert('请把出发日和返程日都选上,且出发日不能晚于返程日。');return;}
  S.travel={start:a,end:b};render();save();toast('旅行日期已保存 ✈️');
}
function clearTravel(){S.travel={start:'',end:''};render();save();toast('已取消旅行模式');}
function qty(k,v){
  v=Math.max(1,parseInt(v)||1);S.cfg[k]=v;save();toast('已更新,今后每天按 '+v+' 计');
}
function expo(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='暑假打卡备份-'+todayReal+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
function impo(inp){
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const s=JSON.parse(r.result);
      if(!s.done||!s.cfg)throw 0;
      S=Object.assign(defaults(),s);S.view='day';S.sel=clamp(todayReal);
      save();render();toast('导入成功 ✓');
    }catch(e){alert('这个文件不是有效的备份。');}
  };
  r.readAsText(file);inp.value='';
}
function wipe(){
  if(!confirm('确定清空全部打卡记录和修改?此操作不可恢复。'))return;
  S=defaults();save();render();
}

render();
cloudInit();
</script>
</body>
</html>
