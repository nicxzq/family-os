<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>家庭仪表盘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --coral:#E56B5A;
    --coral-soft:#F4A799;
    --yellow:#F4C13E;
    --yellow-soft:#FBE39A;
    --green:#6FA86D;
    --green-soft:#B5D4A8;
    --blue:#4B7BA8;
    --blue-soft:#A8C2DE;
    --cream:#F8F2E2;
    --cream-deep:#F1E8D0;
    --ink:#2B2419;
    --ink-soft:#5C4F3D;
    --ink-mute:#8C7C66;
    --shadow-card:0 4px 0 rgba(43,36,25,0.06),0 12px 32px -16px rgba(43,36,25,0.18);
    --shadow-soft:0 2px 0 rgba(43,36,25,0.08);
    --radius:18px;
    --radius-lg:28px;
    --radius-md:10px;
    --radius-circle:50%;
    --paper:#FFFDF6;
    --space-xs:4px;
    --space-md:8px;
    --space-lg:10px;
    --space-xl:12px;
    --font-size-xs:10px;
    --font-size-sm:11px;
    --font-size-caption:12px;
    --size-border-card:5px;
    --shelf-book-min-w:130px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(180deg, var(--cream) 0%, var(--cream-deep) 100%);
    color: var(--ink);
    font-family: "LXGW WenKai TC", serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }
  a { color: inherit; }
  .page {
    max-width: 880px;
    margin: 0 auto;
  }
  .dash-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .back-link,
  .member-pill,
  .quick-card,
  .book-progress-card,
  .history-item,
  .family-item,
  .form-card {
    box-shadow: var(--shadow-card);
  }
  .back-link,
  .member-pill {
    text-decoration: none;
    border-radius: 999px;
    background: rgba(255,255,255,0.86);
    padding: 8px 14px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-soft);
  }
  .member-pill svg { border-radius: 50%; }
  .hero-member,
  .bookshelf-section,
  .family-section,
  .quick-links,
  .edit-profile,
  .login-hero {
    margin-top: 18px;
    background: rgba(255,255,255,0.66);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow-card);
    backdrop-filter: blur(8px);
  }
  .edit-profile {
    display: none;
  }
  .edit-profile.is-open {
    display: block;
  }
  .hero-member,
  .login-hero {
    text-align: center;
  }
  .hero-avatar {
    margin-bottom: 14px;
  }
  .hero-member h1,
  .login-hero h1 {
    margin: 0 0 10px;
    font-size: clamp(34px, 7vw, 48px);
  }
  .hero-stats {
    margin-top: 12px;
    color: var(--ink-soft);
    font-size: 18px;
  }
  .role-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    padding: 6px 12px;
    color: white;
    font-size: 13px;
  }
  .role-badge.parent { background: var(--blue); }
  .role-badge.child { background: var(--coral); }
  .section-title {
    margin: 0 0 16px;
    font-size: 25px;
  }
  .book-progress-list,
  .history-list,
  .family-list {
    display: grid;
    gap: var(--radius-card-inner);
  }
  .bookshelf {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--shelf-book-min-w), 1fr));
    gap: var(--space-xl);
  }
  .shelf-book {
    background: var(--paper);
    border-radius: var(--radius-md);
    overflow: hidden;
    text-decoration: none;
    color: var(--ink);
    box-shadow: var(--shadow-soft);
    position: relative;
    display: block;
    transition: opacity 0.15s;
  }
  .shelf-book:hover { opacity: 0.85; }
  .shelf-top { height: var(--size-border-card); }
  .shelf-body { padding: var(--space-md); }
  .shelf-title { font-size: var(--font-size-caption); font-weight: 700; line-height: 1.3; margin-bottom: var(--space-chart-gap); color: var(--ink); }
  .shelf-meta { font-size: var(--font-size-sm); color: var(--ink-mute); }
  .shelf-time { font-size: var(--font-size-xs); color: var(--ink-mute); margin-top: var(--space-2xs); }
  .shelf-check {
    position: absolute;
    top: var(--space-xs);
    right: var(--space-xs);
    background: var(--green);
    color: var(--paper);
    border-radius: var(--radius-circle);
    width: var(--radius);
    height: var(--radius);
    font-size: var(--font-size-xs);
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .book-progress-card {
    display: grid;
    grid-template-columns: 8px 1fr auto;
    gap: 16px;
    align-items: center;
    background: white;
    border-radius: var(--radius);
    padding: 14px 16px 14px 0;
    text-decoration: none;
  }
  .book-strip {
    height: 64px;
    border-radius: 0 4px 4px 0;
  }
  .book-main strong {
    display: block;
    font-size: 18px;
    margin-bottom: 8px;
  }
  progress {
    width: 100%;
    height: 12px;
    appearance: none;
  }
  progress::-webkit-progress-bar {
    background: var(--cream-deep);
    border-radius: 999px;
  }
  progress::-webkit-progress-value {
    background: var(--coral);
    border-radius: 999px;
  }
  progress::-moz-progress-bar {
    background: var(--coral);
    border-radius: 999px;
  }
  .book-meta {
    margin-top: 8px;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .status-badge {
    min-width: 84px;
    text-align: center;
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 13px;
    color: white;
  }
  .status-badge.done { background: var(--coral); }
  .status-badge.idle { background: var(--ink-mute); }
  .history-item,
  .family-item {
    background: white;
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .history-left,
  .family-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .history-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--yellow);
    flex: 0 0 auto;
  }
  .history-time,
  .family-meta {
    color: var(--ink-soft);
    font-size: 14px;
  }
  .quick-links {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }
  .quick-card {
    background: white;
    border-radius: var(--radius);
    padding: 18px;
    border: 0;
    text-decoration: none;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    text-align: left;
  }
  .quick-card strong {
    font-size: 20px;
  }
  .quick-card span {
    color: var(--ink-soft);
  }
  .edit-grid {
    display: grid;
    gap: 16px;
  }
  .field label,
  .picker-label {
    display: block;
    margin-bottom: 8px;
    color: var(--ink-soft);
    font-size: 15px;
  }
  .text-input {
    width: 100%;
    border: 2px solid var(--cream-deep);
    border-radius: var(--radius);
    padding: 14px 16px;
    font: inherit;
    background: white;
  }
  .avatar-row,
  .color-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .avatar-btn,
  .color-btn,
  .save-btn,
  .secondary-btn,
  .danger-btn,
  .login-btn {
    font: inherit;
    cursor: pointer;
    transition: transform 0.2s ease, opacity 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .avatar-btn {
    width: 62px;
    height: 62px;
    border-radius: var(--radius);
    border: 2px solid transparent;
    background: var(--cream);
  }
  .avatar-btn.is-selected {
    border: 3px solid var(--coral);
    background: white;
  }
  .color-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 3px solid transparent;
    padding: 0;
  }
  .color-btn[data-color="coral"] { background: var(--coral); }
  .color-btn[data-color="blue"] { background: var(--blue); }
  .color-btn[data-color="green"] { background: var(--green); }
  .color-btn[data-color="yellow"] { background: var(--yellow); }
  .color-btn.is-selected {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.86);
  }
  .save-btn,
  .login-btn {
    border: 0;
    border-radius: 999px;
    background: var(--coral);
    color: white;
    padding: 14px 18px;
    width: 100%;
    box-shadow: var(--shadow-soft);
  }
  .danger-zone {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .code-row {
    display: flex;
    gap: 10px;
  }
  .code-row .text-input {
    flex: 1;
  }
  .code-btn {
    border: 0;
    border-radius: 999px;
    padding: 0 16px;
    background: var(--blue);
    color: var(--paper);
    font: inherit;
    cursor: pointer;
    box-shadow: var(--shadow-soft);
  }
  .secondary-btn,
  .danger-btn {
    flex: 1;
    border-radius: 999px;
    padding: 13px 16px;
    border: 0;
  }
  .secondary-btn {
    background: var(--cream-deep);
    color: var(--ink);
  }
  .danger-btn {
    background: var(--ink);
    color: white;
  }
  .empty {
    color: var(--ink-soft);
    margin: 0;
  }
  .login-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: auto;
    min-width: 140px;
    text-decoration: none;
    margin-top: 12px;
  }
  .family-section[hidden] {
    display: none;
  }
  @media (max-width: 720px) {
    .book-progress-card {
      grid-template-columns: 8px 1fr;
    }
    .status-badge {
      grid-column: 2;
      justify-self: start;
    }
    .quick-links {
      grid-template-columns: 1fr;
    }
    .danger-zone {
      flex-direction: column;
    }
  }
</style>
</head>
<body>
<div class="page">
  <div class="dash-top">
    <a class="back-link" href="index.html">← 返回</a>
    <a id="member-pill" class="member-pill" href="login.html"></a>
  </div>

  <section id="login-hero" class="login-hero" hidden>
    <h1>请先登录</h1>
    <p>登录后就能看到每个人的共读进度、最近阅读和零花钱实验室。</p>
    <a class="login-btn" href="login.html?back=dashboard.html">去登录</a>
  </section>

  <section id="dashboard-body" hidden>
    <section class="hero-member">
      <div id="hero-avatar" class="hero-avatar"></div>
      <h1 id="hero-name"></h1>
      <div id="hero-role"></div>
      <div id="hero-stats" class="hero-stats"></div>
    </section>

    <section class="bookshelf-section">
      <h2 class="section-title">📚 我的书架</h2>
      <div id="bookshelf" class="bookshelf"></div>
    </section>

    <section class="games-section" style="margin-top:18px;background:rgba(255,255,255,0.66);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-card);backdrop-filter:blur(8px);">
      <h2 class="section-title" id="games-toggle" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin:0 0 16px;">
        🎮 答题库进度 <span id="games-chevron" style="font-size:18px;transition:transform 0.3s;">▾</span>
      </h2>
      <div id="games-body">
        <div id="games-summary" style="margin-bottom:12px;color:var(--ink-soft);font-size:15px;"></div>
        <div id="games-grid" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
      </div>
    </section>

    <section id="family-section" class="family-section" hidden>
      <h2 class="section-title">👨‍👩‍👧‍👦 家庭进度</h2>
      <div id="family-list" class="family-list"></div>
    </section>

    <section class="quick-links">
      <a class="quick-card" href="for-youngest.html"><strong>📚 去读绘本</strong><span>回到毛毛绘本系列</span></a>
      <a class="quick-card" href="piggy-bank.html"><strong>🐷 零花钱</strong><span>打开今天的账本和目标</span></a>
      <button id="toggle-edit-btn" class="quick-card" type="button"><strong>✏️ 编辑档案</strong><span>修改名字、头像和颜色</span></button>
    </section>

    <section id="edit-section" class="edit-profile">
      <h2 class="section-title">✏️ 编辑档案</h2>
      <div class="edit-grid">
        <div class="field">
          <label for="edit-name">名字</label>
          <input id="edit-name" class="text-input" type="text" maxlength="8">
        </div>
        <div class="field">
          <div class="picker-label">选头像</div>
          <div id="avatar-row" class="avatar-row"></div>
        </div>
        <div class="field">
          <div class="picker-label">选颜色</div>
          <div id="color-row" class="color-row"></div>
        </div>
        <div id="family-code-field" class="field" hidden>
          <label for="family-code-input">家庭码</label>
          <div class="code-row">
            <input id="family-code-input" class="text-input" type="password" placeholder="输入新的家庭码">
            <button id="update-code-btn" class="code-btn" type="button">修改</button>
          </div>
        </div>
        <button id="save-btn" class="save-btn" type="button">保存档案</button>
        <div class="danger-zone">
          <button id="logout-btn" class="secondary-btn" type="button">退出登录</button>
          <button id="delete-btn" class="danger-btn" type="button">删除此档案</button>
        </div>
      </div>
    </section>
  </section>
</div>

<script src="/fo-utils.js"></script>
<script>
  const BOOKS = [
    { id: '01-try-it', title: '试一试', href: 'storybooks/01-try-it.html', color: 'coral', total: 5 },
    { id: '02-the-library', title: '图书馆', href: 'storybooks/02-the-library.html', color: 'blue', total: 5 },
    { id: '03-ten-minutes', title: '十分钟', href: 'storybooks/03-ten-minutes.html', color: 'green', total: 5 },
    { id: '04-the-mountain', title: '上山', href: 'storybooks/04-the-mountain.html', color: 'blue', total: 5 },
    { id: '05-why-why', title: '为什么', href: 'storybooks/05-why-why.html', color: 'green', total: 5 },
    { id: '06-the-direction', title: '毛毛的路', href: 'storybooks/06-the-direction.html', color: 'yellow', total: 5 },
    { id: '07-soft-skills', title: '毛毛的谢谢', href: 'storybooks/07-soft-skills.html', color: 'green', total: 7 },
    { id: '08-patient-seeds', title: '毛毛的种子', href: 'storybooks/08-patient-seeds.html', color: 'blue', total: 7 },
    { id: '09-good-direction', title: '毛毛的好方向', href: 'storybooks/09-good-direction.html', color: 'coral', total: 7 },
    { id: '10-attention', title: '毛毛的注意力', href: 'storybooks/10-attention.html', color: 'blue', total: 7 },
    { id: '11-new-friend', title: '毛毛的软技能', href: 'storybooks/11-new-friend.html', color: 'green', total: 7 },
    { id: '12-learn-together', title: '毛毛共学记', href: 'storybooks/12-learn-together.html', color: 'yellow', total: 7 }
  ];
  const COLOR_VAR = { coral: 'var(--coral)', blue: 'var(--blue)', green: 'var(--green)', yellow: 'var(--yellow)' };

  (function () {
    var member = FO.getMember();
    var memberPill = document.getElementById('member-pill');
    var loginHero = document.getElementById('login-hero');
    var dashboardBody = document.getElementById('dashboard-body');
    var familySection = document.getElementById('family-section');
    var avatarTypes = ['chick', 'dad', 'mom', 'star'];
    var colorTypes = ['coral', 'blue', 'green', 'yellow'];
    var editState = { avatar: 'chick', color: 'coral' };

    if (!member) {
      memberPill.textContent = '选择成员';
      loginHero.hidden = false;
      return;
    }

    dashboardBody.hidden = false;
    memberPill.innerHTML = FO.avatarSVG(member.avatar, member.color, 28) + '<span>' + member.name + '</span>';

    function getCompletedCount(targetMember) {
      var progress = FO.getProgress(targetMember.id);
      return BOOKS.filter(function (book) {
        return progress[book.id] && progress[book.id].completed;
      }).length;
    }

    function getReadPages(targetMember) {
      var progress = FO.getProgress(targetMember.id);
      return BOOKS.reduce(function (sum, book) {
        var rec = progress[book.id];
        return sum + (rec ? rec.pages.length : 0);
      }, 0);
    }

    function renderHero() {
      document.getElementById('hero-avatar').innerHTML = FO.avatarSVG(member.avatar, member.color, 96);
      document.getElementById('hero-name').textContent = member.name;
      document.getElementById('hero-role').innerHTML =
        '<span class="role-badge ' + member.role + '">' + (member.role === 'parent' ? '家长' : '孩子') + '</span>';
      document.getElementById('hero-stats').textContent =
        '已读 ' + getCompletedCount(member) + ' 本 · 共 ' + getReadPages(member) + ' 页';
    }

    function renderBookshelf() {
      var shelf = document.getElementById('bookshelf');
      var progress = FO.getProgress(member.id);
      var sorted = BOOKS.slice().sort(function (a, b) {
        var ta = (progress[a.id] && progress[a.id].lastTs) || 0;
        var tb = (progress[b.id] && progress[b.id].lastTs) || 0;
        if (ta !== tb) return tb - ta;
        return BOOKS.indexOf(a) - BOOKS.indexOf(b);
      });
      shelf.innerHTML = '';
      sorted.forEach(function (book) {
        var rec = progress[book.id] || { pages: [], completed: false, last: 0, lastTs: 0 };
        var lastTs = rec.lastTs || 0;
        var card = document.createElement('a');
        card.className = 'shelf-book' + (rec.completed ? ' is-done' : '');
        card.href = book.href;
        card.innerHTML =
          '<div class="shelf-top" style="background:' + COLOR_VAR[book.color] + '"></div>' +
          '<div class="shelf-body">' +
            '<div class="shelf-title">' + book.title + '</div>' +
            '<div class="shelf-meta">' + rec.pages.length + '/' + book.total + ' 页</div>' +
            (lastTs ? '<div class="shelf-time">' + FO.formatTimeAgo(lastTs) + '</div>' : '') +
          '</div>' +
          (rec.completed ? '<div class="shelf-check">✓</div>' : '');
        shelf.appendChild(card);
      });
    }

    function renderFamily() {
      if (member.role !== 'parent') {
        familySection.hidden = true;
        return;
      }
      familySection.hidden = false;
      var list = document.getElementById('family-list');
      list.innerHTML = '';
      FO.getMembers().forEach(function (item) {
        var row = document.createElement('div');
        row.className = 'family-item';
        row.innerHTML =
          '<div class="family-left">' +
            FO.avatarSVG(item.avatar, item.color, 32) +
            '<div><strong>' + item.name + '</strong><div class="family-meta">已完成 ' + getCompletedCount(item) + ' 本</div></div>' +
          '</div>';
        list.appendChild(row);
      });
    }

    function renderAvatarPicker() {
      var row = document.getElementById('avatar-row');
      row.innerHTML = '';
      avatarTypes.forEach(function (avatar) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'avatar-btn' + (editState.avatar === avatar ? ' is-selected' : '');
        btn.innerHTML = FO.avatarSVG(avatar, 'coral', 48);
        btn.addEventListener('click', function () {
          editState.avatar = avatar;
          renderAvatarPicker();
        });
        row.appendChild(btn);
      });
    }

    function renderColorPicker() {
      var row = document.getElementById('color-row');
      row.innerHTML = '';
      colorTypes.forEach(function (color) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'color-btn' + (editState.color === color ? ' is-selected' : '');
        btn.setAttribute('data-color', color);
        btn.addEventListener('click', function () {
          editState.color = color;
          renderColorPicker();
        });
        row.appendChild(btn);
      });
    }

    function renderEditor() {
      document.getElementById('edit-name').value = member.name;
      document.getElementById('family-code-field').hidden = member.role !== 'parent';
      editState.avatar = member.avatar;
      editState.color = member.color;
      renderAvatarPicker();
      renderColorPicker();
    }

    function removeMemberData(memberId) {
      localStorage.setItem('fo_members', JSON.stringify(FO.getMembers().filter(function (m) {
        return m.id !== memberId;
      })));
      var progress = JSON.parse(localStorage.getItem('fo_progress') || '{}');
      delete progress[memberId];
      localStorage.setItem('fo_progress', JSON.stringify(progress));
      var piggy = JSON.parse(localStorage.getItem('fo_piggy') || '{}');
      delete piggy[memberId];
      localStorage.setItem('fo_piggy', JSON.stringify(piggy));
      var history = JSON.parse(localStorage.getItem('fo_history') || '[]').filter(function (item) {
        return item.memberId !== memberId;
      });
      localStorage.setItem('fo_history', JSON.stringify(history));
    }

    document.getElementById('save-btn').addEventListener('click', function () {
      var nextName = document.getElementById('edit-name').value.trim();
      if (!nextName) {
        alert('请先填写名字。');
        return;
      }
      member = {
        id: member.id,
        name: nextName,
        role: member.role,
        avatar: editState.avatar,
        color: editState.color,
        joined: member.joined
      };
      FO.updateMember(member);
      FO.setMember(member);
      renderHero();
      renderBookshelf();
      renderFamily();
      renderEditor();
    });
    document.getElementById('update-code-btn').addEventListener('click', function () {
      var nextCode = document.getElementById('family-code-input').value.trim();
      if (!nextCode) {
        alert('请输入新的家庭码。');
        return;
      }
      FO.setFamilyCode(nextCode);
      document.getElementById('family-code-input').value = '';
      alert('家庭码已更新。');
    });
    document.getElementById('toggle-edit-btn').addEventListener('click', function () {
      document.getElementById('edit-section').classList.toggle('is-open');
    });

    document.getElementById('logout-btn').addEventListener('click', function () {
      localStorage.removeItem('fo_member');
      location.href = 'index.html';
    });

    document.getElementById('delete-btn').addEventListener('click', function () {
      if (!confirm('确定删除这个档案吗？')) return;
      removeMemberData(member.id);
      localStorage.removeItem('fo_member');
      location.href = 'login.html';
    });

    renderHero();
    renderBookshelf();
    renderFamily();
    renderEditor();

    // Games progress
    var ALL_GAMES = [
      {id:'g01-direction',label:'方向 vs 目标',color:'coral'},
      {id:'g02-compound',label:'时间的魔法',color:'yellow'},
      {id:'g03-responsibility',label:'这是谁的事',color:'green'},
      {id:'g04-soft-skills',label:'软技能地图',color:'blue'},
      {id:'g05-attention',label:'注意力卫士',color:'coral'},
      {id:'g06-dilemma',label:'两难题',color:'yellow'},
      {id:'g07-reading',label:'阅读侦探',color:'green'},
      {id:'g08-letter',label:'未来信件',color:'blue'},
      {id:'g09-growth',label:'成长地图',color:'coral'},
      {id:'g10-questions',label:'提问高手',color:'yellow'},
      {id:'g11-calm',label:'不慌实验室',color:'blue'},
      {id:'g12-express',label:'表达工坊',color:'coral'},
      {id:'g13-learn',label:'学习解剖室',color:'yellow'},
      {id:'g14-bias',label:'思维陷阱',color:'green'},
      {id:'g15-together',label:'共学密码',color:'blue'},
      {id:'g16-empathy',label:'换位思考',color:'coral'},
      {id:'g17-info',label:'信息鉴别',color:'yellow'},
      {id:'g18-longterm',label:'长期主义',color:'green'},
      {id:'g19-habit',label:'习惯实验室',color:'coral'},
      {id:'g20-connect',label:'知识连接',color:'blue'},
      {id:'g21-chemistry',label:'化学厨房',color:'green'},
      {id:'g22-physics',label:'物理弹弓',color:'yellow'},
      {id:'g23-chemistry-elements',label:'元素探险',color:'green'},
      {id:'g24-chemistry-acids',label:'酸碱侦探',color:'green'},
      {id:'g25-chemistry-bonds',label:'化学键拼图',color:'green'},
      {id:'g26-chemistry-organic',label:'有机物工厂',color:'green'},
      {id:'g27-chemistry-solution',label:'溶液实验室',color:'green'},
      {id:'g28-chemistry-redox',label:'氧化还原',color:'green'},
      {id:'g29-chemistry-electro',label:'电化学',color:'green'},
      {id:'g30-chemistry-balance',label:'方程式配平',color:'green'},
      {id:'g31-chemistry-burn',label:'燃烧密室',color:'green'},
      {id:'g41-blocks',label:'代码积木',color:'coral'},
      {id:'g44-history-detective',label:'历史侦探',color:'coral',href:'/games/g44-history-detective.html'},
      {id:'g45-geo',label:'地图寻宝',color:'yellow',href:'/games/g45-geo-treasure.html'},
      {id:'g46-words-cipher',label:'文字密码',color:'green',href:'/games/g46-words-cipher.html'},
      {id:'g47-math-art',label:'数学画廊',color:'blue'}
    ];
    var gameColorVarMap = {coral:'var(--coral)',yellow:'var(--yellow)',green:'var(--green)',blue:'var(--blue)'};
    function renderGames() {
      var done = [];
      try { done = JSON.parse(localStorage.getItem('fo_games_done') || '[]'); } catch(e) {}
      var doneCount = ALL_GAMES.filter(function(g){ return done.indexOf(g.id) >= 0; }).length;
      document.getElementById('games-summary').textContent = '已完成 ' + doneCount + ' / ' + ALL_GAMES.length + ' 个';
      var grid = document.getElementById('games-grid');
      grid.innerHTML = '';
      ALL_GAMES.forEach(function(game) {
        var isDone = done.indexOf(game.id) >= 0;
        var pill = document.createElement('a');
        pill.href = game.href || '/games/' + game.id + '.html';
        pill.title = game.label;
        pill.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:999px;font-size:13px;text-decoration:none;font-family:inherit;transition:opacity 0.2s;' +
          (isDone ? 'background:' + gameColorVarMap[game.color] + ';color:#FFFDF6;' : 'background:var(--cream-deep);color:var(--ink-mute);');
        pill.textContent = (isDone ? '✓ ' : '') + game.label;
        grid.appendChild(pill);
      });
    }
    renderGames();
    var gamesOpen = true;
    document.getElementById('games-toggle').addEventListener('click', function() {
      gamesOpen = !gamesOpen;
      document.getElementById('games-body').style.display = gamesOpen ? '' : 'none';
      document.getElementById('games-chevron').style.transform = gamesOpen ? 'rotate(0deg)' : 'rotate(-90deg)';
    });
  })();
</script>
