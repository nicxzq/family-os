<!doctype html>
<!-- 哥哥读本目录 · 数据驱动；新增一篇只需在 READERS 数组里加一行 -->
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,noai,noimageai">
<title>成长读本 · 给正在长大的你</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing:border-box; }
  body { background:var(--cream); color:var(--ink); font-family:"LXGW WenKai TC","LXGW WenKai",serif; margin:0; }
  .topbar { position:sticky; top:0; z-index:20; display:flex; justify-content:space-between; align-items:center; padding:var(--space-2xl) var(--space-5xl); background:var(--glass-btn); backdrop-filter:blur(var(--space-xl)); }
  .topbar .back { text-decoration:none; color:var(--ink-soft); font-size:var(--font-size-body-sm); background:var(--paper); padding:var(--space-tag-gap) var(--space-2xl); border-radius:var(--radius-full); box-shadow:var(--shadow-soft); }
  .nav-member-btn { display:inline-flex; align-items:center; gap:var(--space-md); background:var(--paper); border:0; border-radius:var(--radius-full); padding:var(--space-sm) var(--space-2xl) var(--space-sm) var(--space-sm); font-family:inherit; font-size:var(--font-size-ui); cursor:pointer; color:var(--ink-soft); box-shadow:var(--shadow-soft); }
  .wrap { max-width:var(--size-content-narrow); margin:0 auto; padding:var(--space-xl) var(--space-5xl) var(--space-page-bottom); }
  .hero h1 { font-size:clamp(var(--font-size-hero-sm), 6vw, var(--font-size-hero)); margin:var(--space-4xl) 0 var(--space-md); }
  .hero p { color:var(--ink-soft); font-size:var(--font-size-body-lg); line-height:1.7; margin:0 0 var(--space-md); }
  .group-title { display:flex; align-items:center; gap:var(--space-lg); margin:var(--space-section) 0 var(--space-xl); font-size:var(--font-size-title-sm); color:var(--ink-soft); }
  .group-title::after { content:""; flex:1; height:var(--size-hairline); background:var(--cream-deep); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--size-grid-card-min),1fr)); gap:var(--space-2xl); }
  .card { display:block; text-decoration:none; color:inherit; background:var(--paper); border-radius:var(--radius-lg); box-shadow:var(--shadow-card); padding:var(--space-5xl); transition:transform .15s; border-top:var(--size-border-accent) solid var(--accent, var(--coral)); }
  .card:hover { transform:translateY(calc(var(--space-chart-gap) * -1)); }
  .card .code { font-size:var(--font-size-note); color:var(--ink-mute); letter-spacing:.06em; }
  .card h3 { font-size:var(--font-size-title); margin:var(--space-sm) 0; line-height:1.35; }
  .card .sub { font-size:var(--font-size-note); color:var(--ink-soft); line-height:1.6; }
  .card.soon { pointer-events:none; opacity:.55; border-top-color:var(--cream-deep); background:var(--cream-deep); box-shadow:none; }
  .card.soon .tag { display:inline-block; margin-top:var(--space-lg); font-size:var(--font-size-sm); color:var(--ink-mute); background:var(--paper); padding:var(--space-chart-gap) var(--space-lg); border-radius:var(--radius-full); }
  .card.done .tag { display:inline-block; margin-top:var(--space-lg); font-size:var(--font-size-sm); color:var(--paper); background:var(--green); padding:var(--space-chart-gap) var(--space-lg); border-radius:var(--radius-full); }
  .card.is-locked { position:relative; opacity:.82; }
  .card.is-locked::after { content:"🔒"; position:absolute; top:var(--space-xl); right:var(--space-2xl); font-size:var(--font-size-ui); opacity:.7; }
</style>
</head>
<body>
  <nav class="topbar">
    <a class="back" href="../for-eldest.html">← 回到我的主页</a>
    <button id="nav-member-btn" class="nav-member-btn" aria-label="成员"></button>
  </nav>

  <main class="wrap">
    <div class="hero">
      <h1>成长读本</h1>
      <p>不是测验，没有分数。每篇讲一个值得想清楚的概念——读完，给自己留一个本周可以试的小行动。</p>
    </div>
    <div id="groups"></div>
  </main>

  <script src="../fo-utils.js"></script>
  <script>
    // 新增一篇：在对应分组里加一行 [篇号, 标题, 副标题, 文件(或null=敬请期待), 强调色]
    const READERS = {
      '专注 · 注意力': [
        ['F01','多巴胺不是快乐物质','你以为的"快乐"，其实是"想要"', '02-dopamine.html', 'var(--coral)'],
        ['F02','短视频为什么刷不完','它被设计成"刷不完"的', '03-variable-reward.html', 'var(--coral)'],
        ['F03','注意力被切碎，到底亏了什么','一直切来切去，代价有多大', '04-switching-cost.html', 'var(--coral)'],
        ['F04','注意力是你唯一真正拥有的','为什么刷完反而更累', '01-attention-scarce.html', 'var(--coral)'],
        ['F05','识字，不等于会用文字','短视频正在抹掉你用文字的能力', '05-power-of-words.html', 'var(--coral)'],
        ['F06','用它做这个，就不能做那个','别硬忍，用好习惯把坏习惯挤出去', '06-opportunity-cost.html', 'var(--coral)'],
        ['F07','你最该专注的，可能不是作业','睡眠、运动、放松，才是给大脑充电', '07-brain-battery.html', 'var(--blue)'],
        ['F08','这件事，值我一生的万分之一吗','一把随身的尺子：值不值得专注', '08-worth-it.html', 'var(--green)'],
      ],
      '把时间当作朋友': [
        ['T01','你不是大脑的奴隶','谁主谁仆', '09-master-or-servant.html', 'var(--blue)'],
        ['T02','时间，其实管不了','能管的不是时间，是你自己', '10-time-unmanageable.html', 'var(--green)'],
        ['T03','没有捷径，只有交换','你越想快，越快不了', '11-accept-reality.html', 'var(--coral)'],
        ['T04','你的时间，到底去哪了','一支笔，看清时间花在哪', '12-time-log.html', 'var(--blue)'],
      ],
      '学习的真相': [
        ['L01','大脑的使用说明','先读说明书', null, 'var(--green)'],
      ],
    };
    const ACCENT_DEFAULT = 'var(--coral)';
    const box = document.getElementById('groups');
    Object.keys(READERS).forEach(function(g){
      const h = document.createElement('div'); h.className='group-title'; h.textContent=g; box.appendChild(h);
      const grid = document.createElement('div'); grid.className='grid';
      READERS[g].forEach(function(r){
        const [code,title,sub,file,accent]=r;
        const a=document.createElement('a');
        a.style.setProperty('--accent', accent||ACCENT_DEFAULT);
        if(file){ a.className='card done'; a.href='/readers/'+file; a.innerHTML='<span class="code">'+code+'</span><h3>'+title+'</h3><span class="sub">'+sub+'</span><span class="tag">可阅读</span>'; }
        else { a.className='card soon'; a.innerHTML='<span class="code">'+code+'</span><h3>'+title+'</h3><span class="sub">'+sub+'</span><span class="tag">敬请期待</span>'; }
        grid.appendChild(a);
      });
      box.appendChild(grid);
    });

    // member button (same logic as games/index.html)
    const m = window.FO ? FO.getMember() : null;
    const el = document.getElementById('nav-member-btn');
    if (m) { el.innerHTML = FO.avatarSVG(m.avatar, m.color, 32) + '<span>' + m.name + '</span>'; el.onclick=function(){location.href='../dashboard.html';}; }
    else { el.innerHTML = '<span>登录</span>'; el.onclick=function(){location.href='../login.html';}; }

    // Lock reader articles when signed out — they require login to open.
    if (!m) {
      document.querySelectorAll('.card.done[href]').forEach(function(card){
        var href = card.getAttribute('href') || '';
        card.classList.add('is-locked');
        card.setAttribute('href', '/login.html?back=' + encodeURIComponent(href));
      });
    }
  </script>
</body>
</html>
