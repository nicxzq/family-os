<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>家庭墙 · 竖版（主版） · 可编辑</title>
<meta name="description" content="A3 竖向家庭墙海报，含 Tweaks 面板可直接编辑六条家规。">
<meta property="og:title" content="家庭墙 · 竖版（主版） · 可编辑">
<meta property="og:description" content="A3 竖向家庭墙海报，含 Tweaks 面板可直接编辑六条家规。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://family.carlxu.cn/wall-portrait">
<meta property="og:image" content="https://family.carlxu.cn/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="家庭墙 · 竖版（主版） · 可编辑">
<meta name="twitter:description" content="A3 竖向家庭墙海报，含 Tweaks 面板可直接编辑六条家规。">
<meta name="twitter:image" content="https://family.carlxu.cn/og.png">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "LXGW WenKai TC", "LXGW WenKai", serif;
    background: #E8E0CD;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .controls {
    max-width: 800px;
    margin: 0 auto 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .controls .left, .controls .right { display: flex; gap: 8px; align-items: center; }
  .back, .switch {
    text-decoration: none;
    color: #5C4F3D;
    font-size: 13px;
    padding: 8px 14px;
    background: rgba(255,255,255,0.5);
    border-radius: 999px;
    border: 0;
    font-family: inherit;
    cursor: pointer;
  }
  .print-btn {
    background: #2B2419;
    color: #F8F2E2;
    border: 0;
    padding: 10px 22px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
  }
  .hint {
    max-width: 800px;
    margin: 0 auto 32px;
    background: rgba(255, 255, 255, 0.5);
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 14px;
    color: #5C4F3D;
    line-height: 1.6;
  }

  .poster {
    width: 100%;
    max-width: 800px;
    aspect-ratio: 297 / 420;
    margin: 0 auto;
    background: #F8F2E2;
    padding: 6%;
    box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.3);
    position: relative;
    display: flex;
    flex-direction: column;
    color: #2B2419;
    overflow: hidden;
  }
  .poster::before {
    content: ""; position: absolute; inset: 3%;
    border: 2px solid #2B2419; border-radius: 8px;
    pointer-events: none;
  }
  .poster::after {
    content: ""; position: absolute; inset: calc(3% + 8px);
    border: 1px solid #2B2419; border-radius: 6px;
    pointer-events: none; opacity: 0.3;
  }

  .poster-head {
    text-align: center;
    margin-bottom: 5%;
    padding-top: 2%;
  }
  .poster-head .eyebrow {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: #8C7C66;
    margin-bottom: 12px;
  }
  .poster-head h1 {
    font-size: clamp(28px, 5vw, 44px);
    line-height: 1.1;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }
  .poster-head .sub {
    font-size: clamp(13px, 1.8vw, 16px);
    color: #5C4F3D;
    font-style: italic;
  }

  .rules {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    padding: 0 4%;
  }
  .rule {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    padding: 2.5% 0;
    border-bottom: 1px dashed rgba(43, 36, 25, 0.2);
  }
  .rule:last-child { border-bottom: 0; }
  .rule-num {
    width: clamp(32px, 5vw, 48px);
    height: clamp(32px, 5vw, 48px);
    border-radius: 50%;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: clamp(16px, 2.5vw, 22px);
    flex-shrink: 0;
    margin-top: 4px;
  }
  .rule-body { flex: 1; }
  .rule-body h3 {
    font-size: clamp(15px, 2.2vw, 19px);
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .rule-body p {
    font-size: clamp(12px, 1.6vw, 14px);
    color: #5C4F3D;
    line-height: 1.5;
  }

  .poster-foot {
    text-align: center;
    padding-top: 3%;
    font-size: 11px;
    color: #8C7C66;
    border-top: 1px solid rgba(43, 36, 25, 0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .poster-foot .signature { font-style: italic; }

  .deco { position: absolute; pointer-events: none; }
  .deco-1 { top: 3%; left: 3%; }
  .deco-2 { top: 3%; right: 3%; }
  .deco-3 { bottom: 3%; left: 3%; }
  .deco-4 { bottom: 3%; right: 3%; }

  @media print {
    @page { size: A3 portrait; margin: 0; }
    body { background: white; padding: 0; }
    .controls, .hint { display: none; }
    .poster {
      width: 100vw; height: 100vh;
      max-width: none; aspect-ratio: auto;
      box-shadow: none; margin: 0;
    }
  }
</style>
</head>
<body>

<div class="controls">
  <div class="left">
    <a class="back" href="wall.html">← 全部版本</a>
    <a class="switch" href="wall-landscape.html">横版</a>
    <a class="switch" href="wall-cards.html">单卡片版</a>
  </div>
  <div class="right">
    <button class="print-btn" onclick="window.print()">🖨 打印 / 保存 PDF</button>
  </div>
</div>

<div class="hint">
  💡 按 <strong>Ctrl/⌘ + P</strong> 打印；推荐 A3 贴墙。打开右下 Tweaks 面板可以直接改这六条的措辞（自动保存到这个文件）。
</div>

<div class="poster" id="poster">

  <svg class="deco deco-1" width="40" height="40" viewBox="0 0 40 40">
    <circle cx="10" cy="10" r="6" fill="#E56B5A"/>
    <circle cx="28" cy="20" r="4" fill="#F4C13E"/>
    <circle cx="15" cy="28" r="3" fill="#6FA86D"/>
  </svg>
  <svg class="deco deco-2" width="40" height="40" viewBox="0 0 40 40">
    <circle cx="30" cy="10" r="6" fill="#F4C13E"/>
    <circle cx="12" cy="20" r="4" fill="#E56B5A"/>
    <circle cx="25" cy="28" r="3" fill="#4B7BA8"/>
  </svg>
  <svg class="deco deco-3" width="40" height="40" viewBox="0 0 40 40">
    <circle cx="10" cy="30" r="6" fill="#6FA86D"/>
    <circle cx="28" cy="20" r="4" fill="#E56B5A"/>
    <circle cx="15" cy="12" r="3" fill="#F4C13E"/>
  </svg>
  <svg class="deco deco-4" width="40" height="40" viewBox="0 0 40 40">
    <circle cx="30" cy="30" r="6" fill="#4B7BA8"/>
    <circle cx="12" cy="20" r="4" fill="#F4C13E"/>
    <circle cx="25" cy="12" r="3" fill="#E56B5A"/>
  </svg>

  <div class="poster-head">
    <div class="eyebrow" data-comment-anchor="poster-eyebrow">A FAMILY OF LONG-TERMISTS</div>
    <h1 id="ph-title"></h1>
    <div class="sub" id="ph-sub"></div>
  </div>

  <div class="rules" id="rules"></div>

  <div class="poster-foot">
    <span>v1 · 持续升级</span>
    <span class="signature" id="ph-sig"></span>
    <span>family.os</span>
  </div>

</div>

<!-- Tweaks 面板 root -->
<div id="tweaks-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const WALL_DEFAULTS = /*EDITMODE-BEGIN*/{
  "title": "我们家的六条",
  "subtitle": "— 不焦虑，不躺平，慢慢来 —",
  "signature": "— 我们家 · 2026 —",
  "r1t": "方向 比 目标 重要。",
  "r1b": "我们不预设谁要成为什么。只确认大家在变得越来越好。",
  "r2t": "读书 是 家事。",
  "r2b": "买书的钱永远不省。家里随时都有人正在读一本书。",
  "r3t": "一起学，不教训。",
  "r3b": "大人也是学生。\"我们一起查查\"代替\"你应该⋯⋯\"。",
  "r4t": "软技能 也是 学问。",
  "r4b": "判断、沟通、组织、做选择——饭桌也是教室。",
  "r5t": "保护 彼此的 注意力。",
  "r5b": "不打断对方专注的时刻。吃饭时不刷手机——大人先做。",
  "r6t": "不慌，时间是朋友。",
  "r6b": "非必要不竞争。我们押的是十年，不是这一周。"
}/*EDITMODE-END*/;

const RULE_COLORS = ["#E56B5A", "#F4C13E", "#6FA86D", "#4B7BA8", "#E56B5A", "#F4C13E"];
const RULE_NUMS = ["一", "二", "三", "四", "五", "六"];

function PosterRules({ t }) {
  return (
    <>
      {[1,2,3,4,5,6].map(i => {
        const c = RULE_COLORS[i-1];
        const textColor = c === "#F4C13E" ? "#2B2419" : "white";
        return (
          <div className="rule" key={i}>
            <div className="rule-num" style={{ background: c, color: textColor }}>{RULE_NUMS[i-1]}</div>
            <div className="rule-body">
              <h3>{t[`r${i}t`]}</h3>
              <p>{t[`r${i}b`]}</p>
            </div>
          </div>
        );
      })}
    </>
  );
}

function PosterHead({ t }) {
  return (
    <>
      <h1 dangerouslySetInnerHTML={{__html: ""}}>{t.title}</h1>
      <div className="sub">{t.subtitle}</div>
    </>
  );
}

function App() {
  const [t, setTweak] = useTweaks(WALL_DEFAULTS);

  // 把状态写到静态布局节点里
  React.useEffect(() => {
    document.getElementById("ph-title").textContent = t.title;
    document.getElementById("ph-sub").textContent = t.subtitle;
    document.getElementById("ph-sig").textContent = t.signature;
  }, [t.title, t.subtitle, t.signature]);

  return (
    <TweaksPanel title="家庭墙 · 编辑">
      <TweakSection label="标题区" />
      <TweakText label="主标题"     value={t.title}     onChange={v => setTweak('title', v)} />
      <TweakText label="副标题"     value={t.subtitle}  onChange={v => setTweak('subtitle', v)} />
      <TweakText label="底部署名"   value={t.signature} onChange={v => setTweak('signature', v)} />

      {[1,2,3,4,5,6].map(i => (
        <React.Fragment key={i}>
          <TweakSection label={`第 ${RULE_NUMS[i-1]} 条`} />
          <TweakText label="主句" value={t[`r${i}t`]} onChange={v => setTweak(`r${i}t`, v)} />
          <TweakText label="说明" value={t[`r${i}b`]} onChange={v => setTweak(`r${i}b`, v)} />
        </React.Fragment>
      ))}
    </TweaksPanel>
  );
}

// 渲染规则到 DOM
function renderRules() {
  const container = document.getElementById('rules');
  container.innerHTML = '';
  for (let i = 1; i <= 6; i++) {
    const c = RULE_COLORS[i-1];
    const textColor = c === "#F4C13E" ? "#2B2419" : "white";
    const rule = document.createElement('div');
    rule.className = 'rule';
    rule.innerHTML = `
      <div class="rule-num" style="background:${c};color:${textColor}">${RULE_NUMS[i-1]}</div>
      <div class="rule-body">
        <h3 data-r="${i}t"></h3>
        <p data-r="${i}b"></p>
      </div>
    `;
    container.appendChild(rule);
  }
}
renderRules();

// 监听 tweaks 的 state 变化，同步更新静态 DOM
function syncDOM(t) {
  document.getElementById("ph-title").textContent = t.title;
  document.getElementById("ph-sub").textContent   = t.subtitle;
  document.getElementById("ph-sig").textContent   = t.signature;
  for (let i = 1; i <= 6; i++) {
    const ht = document.querySelector(`[data-r="${i}t"]`);
    const pb = document.querySelector(`[data-r="${i}b"]`);
    if (ht) ht.textContent = t[`r${i}t`];
    if (pb) pb.textContent = t[`r${i}b`];
  }
}
syncDOM(WALL_DEFAULTS);

function AppWithSync() {
  const [t, setTweak] = useTweaks(WALL_DEFAULTS);
  React.useEffect(() => { syncDOM(t); }, [t]);
  return (
    <TweaksPanel title="家庭墙 · 编辑">
      <TweakSection label="标题区" />
      <TweakText label="主标题"     value={t.title}     onChange={v => setTweak('title', v)} />
      <TweakText label="副标题"     value={t.subtitle}  onChange={v => setTweak('subtitle', v)} />
      <TweakText label="底部署名"   value={t.signature} onChange={v => setTweak('signature', v)} />
      {[1,2,3,4,5,6].map(i => (
        <React.Fragment key={i}>
          <TweakSection label={`第 ${RULE_NUMS[i-1]} 条`} />
          <TweakText label="主句" value={t[`r${i}t`]} onChange={v => setTweak(`r${i}t`, v)} />
          <TweakText label="说明" value={t[`r${i}b`]} onChange={v => setTweak(`r${i}b`, v)} />
        </React.Fragment>
      ))}
    </TweaksPanel>
  );
}

const root = ReactDOM.createRoot(document.getElementById('tweaks-root'));
root.render(<AppWithSync />);
</script>

</body>
</html>
