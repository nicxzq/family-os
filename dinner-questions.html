var THEMES_ORDER=['方向','读书','一起学','软技能','注意力','时间'];

function weekOfYear(){
  var now=new Date(),start=new Date(now.getFullYear(),0,1);
  var day=Math.floor((now-start)/864e5);
  return Math.min(50,Math.max(1,Math.floor(day/7)+1));
}

var thisWeek=weekOfYear(),current=thisWeek-1;

function render(idx){
  var t=TOPICS[idx];
  var feat=document.getElementById('featured');
  feat.dataset.color=t.color;
  document.getElementById('feat-week').textContent='第 '+t.w+' 周';
  var badge=document.getElementById('this-week-badge');
  badge.style.display=(t.w===thisWeek)?'inline-flex':'none';
  var themeTag=document.getElementById('feat-theme');
  themeTag.textContent=t.theme;
  themeTag.dataset.color=t.color;
  document.getElementById('feat-question').textContent=t.q;
  var ol=document.getElementById('feat-prompts');
  ol.innerHTML=t.prompts.map(function(p){return '<li>'+p+'</li>';}).join('');
  document.getElementById('week-counter').textContent=t.w+' / 50';
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').disabled=idx===49;
  document.querySelectorAll('.topic-chip').forEach(function(c){
    c.classList.toggle('is-active',parseInt(c.dataset.w,10)===t.w);
  });
  current=idx;
}

document.getElementById('btn-prev').onclick=function(){go(current-1);};
document.getElementById('btn-next').onclick=function(){go(current+1);};

function go(idx){
  if(idx<0||idx>49)return;
  render(idx);
  window.scrollTo({top:0,behavior:'smooth'});
}

var themesList=document.getElementById('themes-list');
THEMES_ORDER.forEach(function(theme){
  var topics=TOPICS.filter(function(t){return t.theme===theme;});
  var block=document.createElement('div');
  block.className='theme-block';
  block.innerHTML='<div class="theme-label">'+theme+'</div><div class="topic-row">'+
    topics.map(function(t){
      return '<button class="topic-chip" data-color="'+t.color+'" data-w="'+t.w+'">'+
        '<span class="chip-num">W'+t.w+'</span>'+
        '<span>'+t.title+'</span>'+
        '</button>';
    }).join('')+
  '</div>';
  themesList.appendChild(block);
});

document.querySelectorAll('.topic-chip').forEach(function(btn){
  btn.onclick=function(){go(parseInt(btn.dataset.w,10)-1);};
});

render(current);
