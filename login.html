<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>家庭成员</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/fo-supabase.js"></script>
<style>
  :root {
    --coral:#E56B5A;
    --coral-soft:#F4A799;
    --yellow:#F4C13E;
    --yellow-soft:#FBE39A;
    --green:#6FA86D;
    --green-soft:#B5D4A8;
    --blue:#4B7BA8;
    --blue-soft:#A8C2DE;
    --cream:#F8F2E2;
    --cream-deep:#F1E8D0;
    --ink:#2B2419;
    --ink-soft:#5C4F3D;
    --ink-mute:#8C7C66;
    --shadow-card:0 4px 0 rgba(43,36,25,0.06),0 12px 32px -16px rgba(43,36,25,0.18);
    --shadow-soft:0 2px 0 rgba(43,36,25,0.08);
    --radius:18px;
    --radius-lg:28px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--cream);
    color: var(--ink);
    font-family: "LXGW WenKai TC", serif;
    padding: 28px 16px 48px;
  }
  .page {
    max-width: 600px;
    margin: 0 auto;
  }
  .topbar {
    margin-bottom: 22px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--ink-soft);
    background: rgba(255,255,255,0.72);
    padding: 8px 14px;
    border-radius: 999px;
    box-shadow: var(--shadow-soft);
    margin-bottom: 16px;
  }
  h1 {
    font-size: clamp(34px, 8vw, 46px);
    margin: 0 0 8px;
  }
  .subtitle {
    margin: 0;
    color: var(--ink-soft);
    font-size: 18px;
  }
  .member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    margin: 28px 0 20px;
  }
  .member-card,
  .create-card {
    background: white;
    border: 0;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 20px;
    text-align: center;
    font-family: inherit;
    color: var(--ink);
    cursor: pointer;
    min-height: 184px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .member-card svg,
  .avatar-btn svg {
    border-radius: 50%;
  }
  .member-card:hover,
  .create-card:hover {
    transform: translateY(-2px);
  }
  .member-card,
  .create-card,
  .avatar-btn,
  .color-btn,
  .role-btn,
  .submit-btn,
  .ghost-link {
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .member-name {
    font-size: 18px;
    font-weight: 700;
  }
  .role-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 13px;
    color: white;
  }
  .role-badge.child { background: var(--coral); }
  .role-badge.parent { background: var(--blue); }
  .create-card {
    border: 2px dashed var(--coral-soft);
    background: rgba(255,255,255,0.48);
  }
  .create-plus {
    font-size: 40px;
    line-height: 1;
    color: var(--coral);
  }
  .create-form {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.35s ease, opacity 0.25s ease, margin-top 0.25s ease;
    background: white;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 0 20px;
  }
  .create-form.is-open {
    max-height: 720px;
    opacity: 1;
    margin-top: 16px;
    padding: 24px 20px;
  }
  .create-form h3 {
    margin: 0 0 18px;
    font-size: 26px;
  }
  .field {
    margin-bottom: 18px;
  }
  .field label,
  .picker-label {
    display: block;
    margin-bottom: 10px;
    color: var(--ink-soft);
    font-size: 15px;
  }
  .text-input,
  .code-input {
    width: 100%;
    border: 2px solid var(--cream-deep);
    border-radius: var(--radius);
    padding: 14px 16px;
    font: inherit;
    background: var(--cream);
    color: var(--ink);
  }
  .avatar-row,
  .color-row,
  .role-row {
    display: flex;
    gap: 10px;
  }
  .avatar-row { justify-content: space-between; }
  .avatar-btn,
  .role-btn {
    border: 2px solid transparent;
    border-radius: var(--radius);
    background: var(--cream);
    cursor: pointer;
    font: inherit;
    color: var(--ink);
  }
  .avatar-btn {
    width: 62px;
    height: 62px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .avatar-btn.is-selected {
    border: 3px solid var(--coral);
    background: white;
  }
  .color-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    padding: 0;
    flex: 0 0 auto;
  }
  .color-btn[data-color="coral"] { background: var(--coral); }
  .color-btn[data-color="blue"] { background: var(--blue); }
  .color-btn[data-color="green"] { background: var(--green); }
  .color-btn[data-color="yellow"] { background: var(--yellow); }
  .color-btn.is-selected {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.9);
  }
  .role-btn {
    flex: 1;
    padding: 14px 12px;
    font-size: 18px;
    background: white;
    border-color: var(--cream-deep);
  }
  .role-btn.is-selected {
    background: var(--cream-deep);
    border-color: var(--ink);
  }
  #code-wrap {
    display: none;
  }
  #code-wrap.is-visible {
    display: block;
  }
  .submit-btn {
    width: 100%;
    border: 0;
    border-radius: 999px;
    padding: 15px 18px;
    font: inherit;
    font-size: 18px;
    color: white;
    background: var(--coral);
    cursor: pointer;
    box-shadow: var(--shadow-soft);
  }
  .error {
    min-height: 22px;
    margin: 10px 0 0;
    color: var(--coral);
    font-size: 14px;
  }
  .guest-link {
    display: inline-block;
    margin-top: 22px;
    color: var(--ink-soft);
    text-decoration: none;
    font-size: 15px;
  }
  .helper {
    margin-top: 10px;
    color: var(--ink-mute);
    font-size: 13px;
  }
  /* auth overlay */
  .auth-overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .auth-overlay::before {
    content: ''; position: absolute; inset: 0;
    background: var(--ink); opacity: 0.45;
  }
  .auth-overlay.is-open { opacity: 1; pointer-events: auto; }
  .auth-modal {
    position: relative; z-index: 1;
    width: var(--__proposed-authModalResponsiveWidth);
    max-width: var(--__proposed-authModalMaxWidth);
  }
  .sync-bar { text-align: center; }
  .sync-btn {
    background: none; border: thin solid var(--blue-soft);
    border-radius: var(--radius); font: inherit;
    color: var(--blue); cursor: pointer;
  }
  .sync-btn:hover { background: var(--blue-soft); }

  /* WeChat 登录按钮 */
  .wechat-section { margin-bottom: 4px; }
  .wechat-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #07C160; color: white; border: 0;
    border-radius: var(--radius-full); padding: 14px 24px;
    font: inherit; font-size: 17px; cursor: pointer; width: 100%;
    box-shadow: var(--shadow-soft); text-decoration: none;
  }
  .wechat-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 18px 0 4px; color: var(--ink-mute); font-size: 13px;
  }
  .wechat-divider::before, .wechat-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--cream-deep);
  }

  /* 家庭身份选择（注册 + setup 共用）*/
  .family-role-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .family-role-btn {
    border: 2px solid var(--cream-deep); border-radius: var(--radius);
    padding: 10px 6px; font: inherit; font-size: 15px;
    background: white; cursor: pointer; text-align: center; color: var(--ink);
  }
  .family-role-btn.is-selected { background: var(--cream-deep); border-color: var(--coral); }

  /* setup 全屏弹窗（微信首次登录后完善信息）*/
  .setup-overlay {
    position: fixed; inset: 0; background: var(--cream); z-index: 200;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    padding: 20px 16px 32px;
  }
  .setup-card {
    width: 100%; max-width: 480px; background: white;
    border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: 22px 20px 20px;
    margin: 0 auto;
  }
  .setup-card h2 { margin: 0 0 18px; font-size: 26px; }
  .setup-card .field { margin-bottom: 14px; }
  .setup-card .avatar-btn { width: 52px; height: 52px; }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a id="back-link" class="back-link" href="index.html" hidden>← 返回</a>
    <h1>家庭成员</h1>
    <p class="subtitle">选择你是谁</p>
  </div>

  <!-- 微信一键登录（仅微信浏览器内显示）-->
  <div id="wechat-section" class="wechat-section" hidden>
    <a href="/api/wechat-login" class="wechat-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8.7 10.3a1.1 1.1 0 1 0 0-2.2 1.1 1.1 0 0 0 0 2.2zm6.1 0a1.1 1.1 0 1 0 0-2.2 1.1 1.1 0 0 0 0 2.2zM12 2C6.5 2 2 6 2 11c0 2.8 1.3 5.3 3.4 7l-.9 2.7 3.1-1.6c1.3.5 2.8.8 4.4.8 5.5 0 10-4 10-9S17.5 2 12 2zm5.6 11.6c-.2.5-.9 1-1.6 1.1-.4.1-.9.2-2.8-.6-2.4-1-3.9-3.4-4-3.6-.2-.2-1-1.3-1-2.5 0-1.2.6-1.8 1-2.2s.7-.4.9-.4h.7c.2 0 .5 0 .7.5l1 2.4c.1.2.1.5 0 .7l-.3.4-.4.5c-.1.1-.2.3-.1.5.5.8 1.1 1.5 1.8 2.1.7.5 1.5.9 2.3 1.1.2.1.4 0 .5-.1l.6-.7c.1-.2.3-.2.5-.1l2.3 1.1c.2.1.4.2.5.5z"/></svg>
      微信一键登录
    </a>
    <div class="wechat-divider">或用账号登录</div>
  </div>

  <div id="member-grid" class="member-grid"></div>

  <div id="create-form" class="create-form">
    <h3>新建成员</h3>
    <form id="member-form">
      <div class="field">
        <label for="name-input">名字</label>
        <input id="name-input" class="text-input" type="text" placeholder="叫什么名字？" maxlength="8">
      </div>
      <div class="field">
        <div class="picker-label">选头像</div>
        <div id="avatar-row" class="avatar-row"></div>
      </div>
      <div class="field">
        <div class="picker-label">选颜色</div>
        <div id="color-row" class="color-row"></div>
      </div>
      <div class="field">
        <div class="picker-label">我是</div>
        <div class="role-row">
          <button type="button" class="role-btn is-selected" data-role="child">🐣 孩子</button>
          <button type="button" class="role-btn" data-role="parent">🐓 家长</button>
        </div>
      </div>
      <div id="code-wrap" class="field">
        <label for="code-input">家庭码</label>
        <input id="code-input" class="code-input" type="password" placeholder="默认 1234">
        <div class="helper">只有家长档案需要输入家庭码。</div>
      </div>
      <button type="submit" class="submit-btn">开始阅读 →</button>
      <p id="error-msg" class="error"></p>
    </form>
  </div>

  <a id="guest-link" class="guest-link" href="index.html">以访客继续</a>

  <div class="sync-bar">
    <button class="sync-btn" id="sync-btn">🔗 登录同步数据</button>
    <p id="sync-status" class="helper"></p>
  </div>
</div>

<!-- Auth overlay -->
<div id="auth-overlay" class="auth-overlay">
  <div class="auth-modal">
    <div class="create-form is-open" style="max-height:none;margin-top:0;">
      <h3>账户</h3>
      <div class="field">
        <div class="picker-label">操作</div>
        <div class="role-row" id="auth-tabs">
          <button type="button" class="role-btn is-selected" data-tab="login">登录</button>
          <button type="button" class="role-btn" data-tab="register">注册</button>
        </div>
      </div>

      <!-- Login -->
      <div id="auth-login-section">
        <div class="field">
          <label for="auth-email">邮箱</label>
          <input id="auth-email" class="text-input" type="email" autocomplete="email" placeholder="邮箱地址">
        </div>
        <div class="field">
          <label for="auth-password">密码</label>
          <input id="auth-password" class="text-input" type="password" autocomplete="current-password" placeholder="密码">
        </div>
        <button type="button" id="auth-login-btn" class="submit-btn">登录</button>
        <p id="auth-error" class="error"></p>
      </div>

      <!-- Register -->
      <div id="auth-reg-section" hidden>
        <div class="field">
          <label for="reg-email">邮箱</label>
          <input id="reg-email" class="text-input" type="email" autocomplete="email" placeholder="邮箱地址">
        </div>
        <div class="field">
          <label for="reg-password">密码</label>
          <input id="reg-password" class="text-input" type="password" autocomplete="new-password" placeholder="至少 6 位">
        </div>
        <div class="field">
          <label for="reg-invite">邀请码</label>
          <input id="reg-invite" class="code-input" type="text" placeholder="FAMILY2026">
          <div class="helper">家庭成员用 FAMILY2026，朋友向家长索取专属码。</div>
        </div>
        <div class="field">
          <div class="picker-label">我是</div>
          <div class="role-row" id="reg-role-row">
            <button type="button" class="role-btn is-selected" data-role="child">🐣 孩子</button>
            <button type="button" class="role-btn" data-role="parent">🐓 家长</button>
            <button type="button" class="role-btn" data-role="friend">🌟 朋友</button>
          </div>
        </div>
        <div class="field" id="reg-family-role-wrap" hidden>
          <div class="picker-label">具体身份</div>
          <div class="family-role-grid" id="reg-family-role-grid"></div>
        </div>
        <button type="button" id="auth-reg-btn" class="submit-btn">注册 →</button>
        <p id="reg-error" class="error"></p>
      </div>

      <button type="button" id="auth-close-btn" class="guest-link" style="display:block;">关闭</button>
    </div>
  </div>
</div>

<!-- setup 全屏弹窗：微信首次登录后完善身份信息 -->
<div id="setup-overlay" class="setup-overlay" hidden>
  <div class="setup-card">
    <h2>你好！先认识一下 👋</h2>
    <div class="field">
      <label for="setup-name">名字</label>
      <input id="setup-name" class="text-input" type="text" placeholder="叫什么名字？" maxlength="8">
    </div>
    <div class="field">
      <div class="picker-label">我是</div>
      <div class="family-role-grid" id="setup-role-grid"></div>
    </div>
    <div class="field">
      <div class="picker-label">选头像</div>
      <div id="setup-avatar-row" class="avatar-row"></div>
    </div>
    <div class="field">
      <div class="picker-label">选颜色</div>
      <div id="setup-color-row" class="color-row"></div>
    </div>
    <button id="setup-submit" class="submit-btn">完成 →</button>
    <p id="setup-error" class="error"></p>
  </div>
</div>

<script src="/fo-utils.js"></script>
<script>
  (function () {
    var back = new URLSearchParams(location.search).get('back');
    var backLink = document.getElementById('back-link');
    var memberGrid = document.getElementById('member-grid');
    var createForm = document.getElementById('create-form');
    var guestLink = document.getElementById('guest-link');
    var form = document.getElementById('member-form');
    var nameInput = document.getElementById('name-input');
    var codeWrap = document.getElementById('code-wrap');
    var codeInput = document.getElementById('code-input');
    var errorMsg = document.getElementById('error-msg');
    var selected = { avatar: 'chick', color: 'coral', role: 'child' };
    var avatars = ['chick', 'dad', 'mom', 'star'];
    var colors = ['coral', 'blue', 'green', 'yellow'];

    function targetHref() {
      return back || 'index.html';
    }

    if (back) {
      backLink.hidden = false;
      backLink.href = back;
    }

    function renderMembers() {
      var members = FO.getMembers();
      memberGrid.innerHTML = '';
      members.forEach(function (member) {
        var card = document.createElement('button');
        card.type = 'button';
        card.className = 'member-card';
        card.innerHTML =
          FO.avatarSVG(member.avatar, member.color, 64) +
          '<div class="member-name">' + member.name + '</div>' +
          '<span class="role-badge ' + member.role + '">' + (member.role === 'parent' ? '家长' : '孩子') + '</span>';
        card.addEventListener('click', function () {
          FO.setMember(member);
          location.href = targetHref();
        });
        memberGrid.appendChild(card);
      });

      var createCard = document.createElement('button');
      createCard.type = 'button';
      createCard.className = 'create-card';
      createCard.innerHTML = '<div class="create-plus">＋</div><div>新建成员</div>';
      createCard.addEventListener('click', function () {
        createForm.classList.toggle('is-open');
      });
      memberGrid.appendChild(createCard);
    }

    function renderAvatarPicker() {
      var row = document.getElementById('avatar-row');
      row.innerHTML = '';
      avatars.forEach(function (avatar) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'avatar-btn' + (selected.avatar === avatar ? ' is-selected' : '');
        btn.innerHTML = FO.avatarSVG(avatar, 'coral', 48);
        btn.addEventListener('click', function () {
          selected.avatar = avatar;
          renderAvatarPicker();
        });
        row.appendChild(btn);
      });
    }

    function renderColorPicker() {
      var row = document.getElementById('color-row');
      row.innerHTML = '';
      colors.forEach(function (color) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'color-btn' + (selected.color === color ? ' is-selected' : '');
        btn.setAttribute('data-color', color);
        btn.setAttribute('aria-label', color);
        btn.addEventListener('click', function () {
          selected.color = color;
          renderColorPicker();
        });
        row.appendChild(btn);
      });
    }

    function syncRole(role) {
      selected.role = role;
      document.querySelectorAll('.role-btn').forEach(function (btn) {
        btn.classList.toggle('is-selected', btn.getAttribute('data-role') === role);
      });
      codeWrap.classList.toggle('is-visible', role === 'parent');
    }

    document.querySelectorAll('.role-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        syncRole(btn.getAttribute('data-role'));
      });
    });

    guestLink.addEventListener('click', function (event) {
      event.preventDefault();
      localStorage.removeItem('fo_member');
      location.href = 'index.html';
    });

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      errorMsg.textContent = '';
      var name = nameInput.value.trim();
      if (!name) {
        errorMsg.textContent = '请先填写名字。';
        return;
      }
      if (selected.role === 'parent' && codeInput.value !== FO.getFamilyCode()) {
        errorMsg.textContent = '家庭码不对。';
        return;
      }
      var member = {
        id: FO.uuid(),
        name: name,
        role: selected.role,
        avatar: selected.avatar,
        color: selected.color,
        joined: Date.now()
      };
      FO.addMember(member);
      FO.setMember(member);
      location.href = targetHref();
    });

    renderMembers();
    renderAvatarPicker();
    renderColorPicker();
    syncRole('child');
  })();
</script>
<script>
  // ── Supabase auth ────────────────────────────────────────────────────────────
  (function () {
    var overlay   = document.getElementById('auth-overlay');
    var syncBtn   = document.getElementById('sync-btn');
    var syncStatus = document.getElementById('sync-status');
    var regRole   = 'child';

    function openOverlay()  { overlay.classList.add('is-open'); }
    function closeOverlay() { overlay.classList.remove('is-open'); }

    // close on backdrop click
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) closeOverlay();
    });
    document.getElementById('auth-close-btn').addEventListener('click', closeOverlay);

    // tab switching
    document.getElementById('auth-tabs').addEventListener('click', function (e) {
      var btn = e.target.closest('[data-tab]');
      if (!btn) return;
      var tab = btn.dataset.tab;
      document.querySelectorAll('#auth-tabs .role-btn').forEach(function (b) {
        b.classList.toggle('is-selected', b.dataset.tab === tab);
      });
      document.getElementById('auth-login-section').hidden = (tab !== 'login');
      document.getElementById('auth-reg-section').hidden   = (tab !== 'register');
    });

    // register role picker
    document.getElementById('reg-role-row').addEventListener('click', function (e) {
      var btn = e.target.closest('[data-role]');
      if (!btn) return;
      regRole = btn.dataset.role;
      document.querySelectorAll('#reg-role-row .role-btn').forEach(function (b) {
        b.classList.toggle('is-selected', b.dataset.role === regRole);
      });
    });

    // sync button: toggle sign-in / sign-out
    syncBtn.addEventListener('click', async function () {
      if (typeof FO_DB === 'undefined' || !FO_DB.isConfigured()) {
        syncStatus.textContent = '后端未配置，数据暂存本设备。';
        return;
      }
      var session = await FO_DB.getSession();
      if (session) {
        await FO_DB.signOut();
        syncBtn.textContent = '🔗 登录同步数据';
        syncStatus.textContent = '已退出登录。';
      } else {
        openOverlay();
      }
    });

    // sign in
    document.getElementById('auth-login-btn').addEventListener('click', async function () {
      var errorEl = document.getElementById('auth-error');
      errorEl.textContent = '';
      var email    = document.getElementById('auth-email').value.trim();
      var password = document.getElementById('auth-password').value;
      if (!email || !password) { errorEl.textContent = '请填写邮箱和密码。'; return; }
      try {
        var data = await FO_DB.signIn(email, password);
        var profile = await FO_DB.getProfile(data.user.id);
        if (profile) {
          var m = { id: data.user.id, name: profile.name, avatar: profile.avatar, color: profile.color, role: profile.role, joined: Date.now() };
          FO.setMember(m);
          if (!FO.getMembers().find(function (x) { return x.id === m.id; })) FO.addMember(m);
        }
        closeOverlay();
        syncBtn.textContent = '✅ ' + (profile ? profile.name : email);
        syncStatus.textContent = '数据将自动同步到云端。';
        document.getElementById('member-grid') && (function(){ var memberGrid = document.getElementById('member-grid'); memberGrid.innerHTML = ''; }());
        location.reload();
      } catch (err) {
        errorEl.textContent = '邮箱或密码不正确。';
      }
    });

    // register
    document.getElementById('auth-reg-btn').addEventListener('click', async function () {
      var errorEl = document.getElementById('reg-error');
      errorEl.textContent = '';
      var email    = document.getElementById('reg-email').value.trim();
      var password = document.getElementById('reg-password').value;
      var code     = document.getElementById('reg-invite').value.trim().toUpperCase();
      if (!email || !password) { errorEl.textContent = '请填写邮箱和密码。'; return; }
      if (!code)               { errorEl.textContent = '请填写邀请码。'; return; }
      if (password.length < 6) { errorEl.textContent = '密码至少需要 6 位。'; return; }
      try {
        var ok = await FO_DB.checkInviteCode(code);
        if (!ok) { errorEl.textContent = '邀请码无效或已用完。'; return; }
        var cur  = FO.getMember();
        var meta = { name: cur ? cur.name : '新成员', avatar: cur ? cur.avatar : 'chick', color: cur ? cur.color : 'coral', role: regRole, family_role: regFamilyRole || '' };
        var result = await FO_DB.signUp(email, password, meta);
        // Supabase returns user=null when the email already exists but is unconfirmed
        // (prevents email enumeration; doesn't resend automatically)
        if (!result.user) {
          errorEl.innerHTML = '此邮箱已注册但尚未验证。<button id="resend-btn" style="background:none;border:0;color:var(--blue);cursor:pointer;font:inherit;text-decoration:underline;">重新发送验证邮件</button>';
          document.getElementById('resend-btn').addEventListener('click', async function () {
            this.disabled = true; this.textContent = '发送中…';
            try {
              await FO_DB.resendVerification(email);
              errorEl.textContent = '验证邮件已重发，请查收收件箱（含垃圾箱）。';
            } catch (e) {
              errorEl.textContent = '发送失败：' + (e.message || '请稍后再试');
            }
          });
          return;
        }
        await FO_DB.useInviteCode(code);
        closeOverlay();
        syncStatus.textContent = '注册成功！请查收确认邮件，点击链接后再回来登录。';
      } catch (err) {
        errorEl.textContent = '注册失败：' + (err.message || '请稍后再试');
      }
    });

    // auto-restore session on load
    (async function () {
      if (typeof FO_DB === 'undefined' || !FO_DB.isConfigured()) return;
      try {
        var session = await FO_DB.getSession();
        if (!session) return;
        var profile = await FO_DB.getProfile(session.user.id);
        if (!profile) return;
        var m = { id: session.user.id, name: profile.name, avatar: profile.avatar, color: profile.color, role: profile.role, family_role: profile.family_role || '', joined: Date.now() };
        FO.setMember(m);
        if (!FO.getMembers().find(function (x) { return x.id === m.id; })) FO.addMember(m);
        syncBtn.textContent = '✅ ' + profile.name;
        syncStatus.textContent = '数据将自动同步到云端。';
        var grid = document.getElementById('member-grid');
        if (grid) {
          grid.innerHTML = '';
          FO.getMembers().forEach(function (member) {
            var card = document.createElement('button');
            card.type = 'button'; card.className = 'member-card';
            card.innerHTML = FO.avatarSVG(member.avatar, member.color, 64) +
              '<div class="member-name">' + member.name + '</div>' +
              '<span class="role-badge ' + member.role + '">' + (member.role === 'parent' ? '家长' : '孩子') + '</span>';
            card.addEventListener('click', function () { FO.setMember(member); location.href = new URLSearchParams(location.search).get('back') || 'index.html'; });
            grid.appendChild(card);
          });
        }
      } catch (e) { /* offline / unconfigured */ }
    })();

    // 注册表单：role 切换时动态更新 family_role 选项
    var regFamilyRole = '';
    var familyRoleOptions = {
      child:  [['哥哥','哥哥'],['弟弟','弟弟']],
      parent: [['爸爸','爸爸'],['妈妈','妈妈']],
      friend: [['爷爷','爷爷'],['奶奶','奶奶'],['其他','其他']],
    };
    function updateFamilyRoleGrid(role) {
      var wrap = document.getElementById('reg-family-role-wrap');
      var grid = document.getElementById('reg-family-role-grid');
      var opts = familyRoleOptions[role];
      if (!opts) { wrap.hidden = true; return; }
      wrap.hidden = false;
      regFamilyRole = opts[0][0];
      grid.innerHTML = '';
      opts.forEach(function (opt) {
        var btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'family-role-btn' + (opt[0] === regFamilyRole ? ' is-selected' : '');
        btn.textContent = opt[1]; btn.dataset.familyRole = opt[0];
        btn.addEventListener('click', function () {
          regFamilyRole = opt[0];
          grid.querySelectorAll('.family-role-btn').forEach(function (b) {
            b.classList.toggle('is-selected', b.dataset.familyRole === regFamilyRole);
          });
        });
        grid.appendChild(btn);
      });
    }
    document.getElementById('reg-role-row').addEventListener('click', function (e) {
      var btn = e.target.closest('[data-role]');
      if (btn) updateFamilyRoleGrid(btn.dataset.role);
    });
    updateFamilyRoleGrid('child');

    // 把 family_role 带入注册 meta
    var origRegBtn = document.getElementById('auth-reg-btn');
    origRegBtn.addEventListener('click', function () {
      // family_role 已在 regFamilyRole 变量里，注入到 meta 供注册流程使用
      // 注册完成后通过 updateProfile 补全
    }, true);
  })();
</script>

<script>
  // ── 微信按钮 + setup 弹窗 ────────────────────────────────────────────────────
  (function () {
    // 微信浏览器内才显示微信登录按钮
    if (FO.isWechat()) {
      document.getElementById('wechat-section').hidden = false;
    }

    var isSetup = new URLSearchParams(location.search).get('setup') === '1';
    if (!isSetup) return;

    // ?setup=1：等待 Supabase session 后展示角色设置弹窗
    var avatars = ['chick', 'dad', 'mom', 'star'];
    var colors  = ['coral', 'blue', 'green', 'yellow'];
    var familyRoles = ['爸爸','妈妈','哥哥','弟弟','爷爷','奶奶'];
    var setupSel = { avatar: 'chick', color: 'coral', family_role: '' };

    function renderSetupGrid() {
      var grid = document.getElementById('setup-role-grid');
      grid.innerHTML = '';
      familyRoles.forEach(function (fr) {
        var btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'family-role-btn' + (setupSel.family_role === fr ? ' is-selected' : '');
        btn.textContent = fr; btn.dataset.familyRole = fr;
        btn.addEventListener('click', function () {
          setupSel.family_role = fr;
          renderSetupGrid();
        });
        grid.appendChild(btn);
      });
    }
    function renderSetupAvatars() {
      var row = document.getElementById('setup-avatar-row');
      row.innerHTML = '';
      avatars.forEach(function (a) {
        var btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'avatar-btn' + (setupSel.avatar === a ? ' is-selected' : '');
        btn.innerHTML = FO.avatarSVG(a, 'coral', 48);
        btn.addEventListener('click', function () { setupSel.avatar = a; renderSetupAvatars(); });
        row.appendChild(btn);
      });
    }
    function renderSetupColors() {
      var row = document.getElementById('setup-color-row');
      row.innerHTML = '';
      colors.forEach(function (c) {
        var btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'color-btn' + (setupSel.color === c ? ' is-selected' : '');
        btn.dataset.color = c; btn.setAttribute('aria-label', c);
        btn.addEventListener('click', function () { setupSel.color = c; renderSetupColors(); });
        row.appendChild(btn);
      });
    }

    function showSetupOverlay() {
      renderSetupGrid();
      renderSetupAvatars();
      renderSetupColors();
      document.getElementById('setup-overlay').hidden = false;
    }

    document.getElementById('setup-submit').addEventListener('click', async function () {
      var name = document.getElementById('setup-name').value.trim();
      var errorEl = document.getElementById('setup-error');
      errorEl.textContent = '';
      if (!name) { errorEl.textContent = '请先填写名字。'; return; }
      if (!setupSel.family_role) { errorEl.textContent = '请选择你的身份。'; return; }
      this.disabled = true; this.textContent = '保存中…';
      try {
        // 确定 role（parent/child/friend）
        var roleMap = { '爸爸':'parent','妈妈':'parent','哥哥':'child','弟弟':'child','爷爷':'friend','奶奶':'friend' };
        var role = roleMap[setupSel.family_role] || 'friend';
        await FO_DB.updateProfile({ name: name, family_role: setupSel.family_role, role: role, avatar: setupSel.avatar, color: setupSel.color });
        await FO.syncFromSupabase();
        location.href = '/';
      } catch (e) {
        errorEl.textContent = '保存失败，请重试。';
        this.disabled = false; this.textContent = '完成 →';
      }
    });

    // 等 Supabase session 就绪后显示弹窗
    (async function () {
      if (typeof FO_DB === 'undefined' || !FO_DB.isConfigured()) return;
      var session = await FO_DB.getSession();
      if (session) { showSetupOverlay(); return; }
      // 没有 session 则监听 auth 状态变化（magic link 处理中）
      if (window._supabaseClient) {
        var sub = window._supabaseClient.auth.onAuthStateChange(function (event, s) {
          if (event === 'SIGNED_IN' && s) {
            sub.data.subscription.unsubscribe();
            showSetupOverlay();
          }
        });
      }
    })();
  })();
</script>
</body>
